n        <ul>\n          <li>Stop reading new material completely</li>\n          <li>Read only: theorist one-liners, fossil table, PVTG list top 20, dating method card</li>\n          <li>Get 8 hours sleep the night before \u2014 more valuable than 8 hours extra studying</li>\n          <li>Eat a full breakfast on exam morning \u2014 glucose directly impacts recall speed</li>\n        </ul>\n      </div>\n    </div>\n\n    <div style=\"margin-top: 40px;\">\n      <h3 style=\"font-family: 'Playfair Display', serif; color: var(--gold-light); margin-bottom: 16px; font-size: 1.2rem;\">Progress Benchmarks \u2014 Am I on Track?</h3>\n      <div class=\"progress-wrap\">\n        <div class=\"progress-row\">\n          <div class=\"progress-label\">End of Month 1 \u2014 Full mock score</div>\n          <div class=\"progress-bar-bg\"><div class=\"progress-bar-fill\" style=\"width:47%; background: linear-gradient(90deg, #c05030, #e07050);\"></div></div>\n          <div class=\"progress-pct\">130\u2013150</div>\n        </div>\n        <div class=\"progress-row\">\n          <div class=\"progress-label\">End of Month 2 \u2014 Full mock score</div>\n          <div class=\"progress-bar-bg\"><div class=\"progress-bar-fill\" style=\"width:60%; background: linear-gradient(90deg, var(--gold), var(--gold-light));\"></div></div>\n          <div class=\"progress-pct\">170\u2013185</div>\n        </div>\n        <div class=\"progress-row\">\n          <div class=\"progress-label\">End of Month 3 \u2014 Full mock score</div>\n          <div class=\"progress-bar-bg\"><div class=\"progress-bar-fill\" style=\"width:69%; background: linear-gradient(90deg, var(--gold), #ffe080);\"></div></div>\n          <div class=\"progress-pct\">195\u2013210</div>\n        </div>\n        <div class=\"progress-row\">\n          <div class=\"progress-label\">Week 15 \u2014 Full mock score (pre-exam)</div>\n          <div class=\"progress-bar-bg\"><div class=\"progress-bar-fill\" style=\"width:78%; background: linear-gradient(90deg, #5a9a5a, #9adf9a);\"></div></div>\n          <div class=\"progress-pct\">215\u2013230</div>\n        </div>\n        <div class=\"progress-row\">\n          <div class=\"progress-label\">Qualification threshold (General ~70%)</div>\n          <div class=\"progress-bar-bg\"><div class=\"progress-bar-fill\" style=\"width:70%; background: rgba(200,146,42,0.45);\"></div></div>\n          <div class=\"progress-pct\">~210</div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"callout success\" style=\"margin-top: 32px;\">\n      <p><strong>Final Word:</strong> UGC NET Anthropology with a ~210/300 cutoff is genuinely competitive \u2014 this is a 70% exam, not a 40% exam. That means every unit matters, Paper 1 cannot be ignored, and consistent mock practice is non-negotiable. A student who covers 85% of the syllabus deeply, drills 2500+ MCQs, scores 215+ in mocks, and manages time on exam day will qualify. Follow this plan without shortcuts and qualification is the expected outcome, not a lucky outcome.</p>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 18: FOSSIL FLASHCARDS -->\n<div class=\"section\" id=\"flashcards\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">18</div>\n      <div class=\"section-title-block\">\n        <h2>Fossil Flashcards \u2014 Interactive Study Tool</h2>\n        <div class=\"divider\"></div>\n        <p>Click any card to flip it and reveal full morphological details, discoverer, and exam notes</p>\n      </div>\n    </div>\n\n    <div class=\"fc-controls\">\n      <button class=\"fc-btn active\" onclick=\"filterCards('all')\">All Fossils</button>\n      <button class=\"fc-btn\" onclick=\"filterCards('australopith')\">Australopithecines</button>\n      <button class=\"fc-btn\" onclick=\"filterCards('homo')\">Genus Homo</button>\n      <button class=\"fc-btn\" onclick=\"filterCards('early')\">Pre-Australopith</button>\n      <button class=\"fc-btn\" onclick=\"resetCards()\">\u21ba Reset All Cards</button>\n    </div>\n    <div class=\"fc-progress\" id=\"fc-progress\">Click a card to flip \u00b7 0 / 14 reviewed</div>\n\n    <div class=\"flashcard-grid\" id=\"flashcard-grid\">\n\n      <!-- Pre-Australopiths -->\n      <div class=\"flashcard-wrap\" data-group=\"early\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~7 MYA \u00b7 Chad, Africa</div>\n            <div class=\"fc-name\">Sahelanthropus tchadensis</div>\n            <div class=\"fc-nickname\">\"Touma\u00ef\"</div>\n            <div class=\"fc-cc\">Brain: ~360\u2013370 cc</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Sahelanthropus tchadensis</div>\n            <ul>\n              <li>Discovered by Michel Brunet, 2001\u20132002 (Toros-Menalla, Chad)</li>\n              <li>Oldest known hominid \u2014 ~7 million years old</li>\n              <li>Small canines (unlike apes) suggest reduced sexual competition</li>\n              <li>Foramen magnum position hints at bipedalism \u2014 debated</li>\n              <li>Pronounced brow ridges like later hominids</li>\n              <li>Nicknamed \"Touma\u00ef\" (hope of life in Goran language)</li>\n              <li>\u26a0\ufe0f Exam: Oldest hominid + discoverer Brunet = frequent MCQ</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"flashcard-wrap\" data-group=\"early\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~6 MYA \u00b7 Kenya</div>\n            <div class=\"fc-name\">Orrorin tugenensis</div>\n            <div class=\"fc-nickname\">\"Millennium Man\"</div>\n            <div class=\"fc-cc\">Brain: ~300 cc (est.)</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Orrorin tugenensis</div>\n            <ul>\n              <li>Discovered by Brigitte Senut & Martin Pickford, 2001 (Tugen Hills, Kenya)</li>\n              <li>~6 million years old \u2014 \"Millennium Man\"</li>\n              <li>Femur morphology strongly suggests upright walking</li>\n              <li>Teeth more human-like than Ardipithecus</li>\n              <li>Found in wooded habitat \u2014 challenges savanna hypothesis</li>\n              <li>\u26a0\ufe0f Exam: Senut & Pickford as discoverers; Kenya location</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"flashcard-wrap\" data-group=\"early\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~4.4 MYA \u00b7 Ethiopia</div>\n            <div class=\"fc-name\">Ardipithecus ramidus</div>\n            <div class=\"fc-nickname\">\"Ardi\" \u2014 ARA-VP-6/500</div>\n            <div class=\"fc-cc\">Brain: ~300\u2013350 cc</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Ardipithecus ramidus</div>\n            <ul>\n              <li>Discovered by Tim White, Gen Suwa & Berhane Asfaw, 1992\u20131994 (Afar, Ethiopia)</li>\n              <li>Published fully in 2009 \u2014 specimen \"Ardi\" is ~45% complete skeleton</li>\n              <li>Facultative biped \u2014 could walk upright AND climb trees</li>\n              <li>Grasping big toe (abducted hallux) \u2014 still arboreal</li>\n              <li>Small canines unlike modern apes \u2014 reduced male\u2013male competition</li>\n              <li>Woodland habitat, NOT open savanna \u2014 overturns savanna bipedalism theory</li>\n              <li>\u26a0\ufe0f Exam: Tim White as discoverer; challenges savanna hypothesis</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <!-- Australopiths -->\n      <div class=\"flashcard-wrap\" data-group=\"australopith\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~3.9\u20132.9 MYA \u00b7 Ethiopia/Tanzania</div>\n            <div class=\"fc-name\">Australopithecus afarensis</div>\n            <div class=\"fc-nickname\">\"Lucy\" \u2014 AL-288-1</div>\n            <div class=\"fc-cc\">Brain: ~380\u2013450 cc</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">A. afarensis \u2014 EXAM FAVOURITE</div>\n            <ul>\n              <li>Lucy (AL-288-1) found by Donald Johanson & Tom Gray, 1974 \u2014 Hadar, Ethiopia</li>\n              <li>~40% complete skeleton; named after \"Lucy in the Sky with Diamonds\"</li>\n              <li>Valgus knee angle confirms habitual bipedalism</li>\n              <li>Laetoli footprints (Tanzania, 3.6 MYA) \u2014 Mary Leakey; confirms bipedalism before big brain</li>\n              <li>Long arms, curved finger bones = still partly arboreal</li>\n              <li>Gracile form; sexual dimorphism pronounced</li>\n              <li>\u26a0\ufe0f Exam: Johanson + Lucy + Hadar + valgus knee + Laetoli footprints</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"flashcard-wrap\" data-group=\"australopith\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~3.3\u20132.1 MYA \u00b7 South Africa</div>\n            <div class=\"fc-name\">Australopithecus africanus</div>\n            <div class=\"fc-nickname\">\"Taung Child\"</div>\n            <div class=\"fc-cc\">Brain: ~420\u2013500 cc</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">A. africanus \u2014 EXAM FAVOURITE</div>\n            <ul>\n              <li>Taung Child discovered by Raymond Dart, 1924 (Taung, South Africa)</li>\n              <li>First African hominid ever found \u2014 revolutionary at the time</li>\n              <li>Dart coined \"Australopithecus africanus\" (southern ape of Africa)</li>\n              <li>Central foramen magnum \u2192 upright posture</li>\n              <li>Gracile form; round skull; smaller teeth than robust forms</li>\n              <li>Sites: Sterkfontein, Makapansgat, Taung</li>\n              <li>Robert Broom later found adult specimens at Sterkfontein</li>\n              <li>\u26a0\ufe0f Exam: Dart + Taung Child + first African hominid fossil</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"flashcard-wrap\" data-group=\"australopith\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~2.7\u20131.2 MYA \u00b7 East & South Africa</div>\n            <div class=\"fc-name\">Paranthropus boisei</div>\n            <div class=\"fc-nickname\">\"Nutcracker Man\" / Zinjanthropus</div>\n            <div class=\"fc-cc\">Brain: ~500\u2013550 cc</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Paranthropus boisei \u2014 Robust</div>\n            <ul>\n              <li>Found by Mary Leakey, 1959 \u2014 Olduvai Gorge, Tanzania (Bed I)</li>\n              <li>Originally named Zinjanthropus boisei by Louis Leakey</li>\n              <li>Massive sagittal crest (attachment for chewing muscles)</li>\n              <li>Large molars and premolars \u2014 \"Nutcracker\" diet of tough foods</li>\n              <li>Robust australopithecine \u2014 also includes P. robustus (South Africa, Broom 1938)</li>\n              <li>Lived alongside early Homo \u2014 coexistence not replacement</li>\n              <li>\u26a0\ufe0f Exam: Mary Leakey + Olduvai + sagittal crest + 1959</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <!-- Genus Homo -->\n      <div class=\"flashcard-wrap\" data-group=\"homo\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~2.4\u20131.4 MYA \u00b7 East Africa</div>\n            <div class=\"fc-name\">Homo habilis</div>\n            <div class=\"fc-nickname\">\"Handy Man\"</div>\n            <div class=\"fc-cc\">Brain: ~510\u2013687 cc</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Homo habilis \u2014 First Homo</div>\n            <ul>\n              <li>Named by Louis Leakey, Phillip Tobias & John Napier, 1964</li>\n              <li>Found at Olduvai Gorge, Tanzania (Bed I & II)</li>\n              <li>First member of genus Homo \u2014 controversial classification</li>\n              <li>Associated with Oldowan stone tools (Mode 1)</li>\n              <li>Still had long arms, small stature \u2014 mix of ape and human features</li>\n              <li>KNM-ER 1470 (Richard Leakey, 1972, Kenya) \u2014 possibly H. rudolfensis</li>\n              <li>\u26a0\ufe0f Exam: Leakey + Tobias + Napier; Oldowan tools; first Homo</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"flashcard-wrap\" data-group=\"homo\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~1.89\u20130.14 MYA \u00b7 Africa, Asia, Europe</div>\n            <div class=\"fc-name\">Homo erectus</div>\n            <div class=\"fc-nickname\">Java Man \u00b7 Peking Man</div>\n            <div class=\"fc-cc\">Brain: ~850\u20131100 cc</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Homo erectus \u2014 EXAM FAVOURITE</div>\n            <ul>\n              <li>Java Man: found by Eug\u00e8ne Dubois, 1891 (Trinil, Java) \u2014 first fossil outside Africa</li>\n              <li>Peking Man: found by Davidson Black & Pei Wenzhong, 1927 (Zhoukoudian, China)</li>\n              <li>First hominid to leave Africa (Out of Africa I, ~1.8 MYA)</li>\n              <li>Associated with Acheulean tools (Mode 2 \u2014 hand axes, cleavers)</li>\n              <li>Controlled use of fire \u2014 Zhoukoudian site evidence</li>\n              <li>Sangiran (Java) \u2014 largest H. erectus site; Nariokotome \"Turkana Boy\" (KNM-WT 15000)</li>\n              <li>\u26a0\ufe0f Exam: Dubois + Java + Acheulean + fire + first to leave Africa</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"flashcard-wrap\" data-group=\"homo\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~700,000\u2013200,000 BP \u00b7 Africa & Europe</div>\n            <div class=\"fc-name\">Homo heidelbergensis</div>\n            <div class=\"fc-nickname\">Archaic H. sapiens</div>\n            <div class=\"fc-cc\">Brain: ~1100\u20131400 cc</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Homo heidelbergensis</div>\n            <ul>\n              <li>Mauer mandible (Germany, 1907) \u2014 type specimen</li>\n              <li>Boxgrove (UK) and Arago Cave (France) important sites</li>\n              <li>Rhodesian Man (Broken Hill, Zambia) = African equivalent</li>\n              <li>Last common ancestor of both Neanderthals (Europe) and H. sapiens (Africa)</li>\n              <li>Hunted large game (horse, rhinoceros, elephant)</li>\n              <li>Wooden spears found at Sch\u00f6ningen, Germany (~400,000 BP)</li>\n              <li>\u26a0\ufe0f Exam: ancestor to BOTH Neanderthals and modern humans</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"flashcard-wrap\" data-group=\"homo\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~430,000\u201340,000 BP \u00b7 Europe & W. Asia</div>\n            <div class=\"fc-name\">Homo neanderthalensis</div>\n            <div class=\"fc-nickname\">\"Neanderthal Man\"</div>\n            <div class=\"fc-cc\">Brain: ~1200\u20131750 cc</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Neanderthals \u2014 EXAM FAVOURITE</div>\n            <ul>\n              <li>Neanderthal Valley, Germany \u2014 discovered 1856, named by William King 1864</li>\n              <li>Brain LARGER than modern humans on average (~1450 cc vs ~1350 cc)</li>\n              <li>Cold-climate adaptations: robust build, large nose, wide chest</li>\n              <li>Mousterian tool industry (Mode 3 \u2014 Levallois flaking)</li>\n              <li>Evidence of burial (Shanidar Cave), ochre use, symbolic behavior</li>\n              <li>1\u20134% Neanderthal DNA in non-African modern humans (Svante P\u00e4\u00e4bo, 2010)</li>\n              <li>Went extinct ~40,000 BP \u2014 competed with / absorbed by H. sapiens</li>\n              <li>\u26a0\ufe0f Exam: DNA interbreeding; Mousterian tools; larger brain; P\u00e4\u00e4bo (Nobel 2022)</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"flashcard-wrap\" data-group=\"homo\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~2018 Discovery \u00b7 Siberia, Russia</div>\n            <div class=\"fc-name\">Denisovans</div>\n            <div class=\"fc-nickname\">The \"Ghost Population\"</div>\n            <div class=\"fc-cc\">Known from DNA only</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Denisovans</div>\n            <ul>\n              <li>Discovered from a finger bone in Denisova Cave, Siberia, 2010 (Svante P\u00e4\u00e4bo's team)</li>\n              <li>Identified purely through ancient DNA \u2014 no morphological reconstruction possible</li>\n              <li>Sister group to Neanderthals \u2014 shared common ancestor with them</li>\n              <li>3\u20135% Denisovan DNA in modern Melanesians, Aboriginal Australians, some Asians</li>\n              <li>Denisova Cave = shared habitat with Neanderthals \u2014 and evidence of hybrids found</li>\n              <li>Xiahe mandible (Tibet) suggests Denisovans adapted to high altitude</li>\n              <li>\u26a0\ufe0f Exam: P\u00e4\u00e4bo + Denisova Cave + DNA-only identification + Melanesian DNA</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"flashcard-wrap\" data-group=\"homo\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~300,000 BP \u2013 Present</div>\n            <div class=\"fc-name\">Homo sapiens</div>\n            <div class=\"fc-nickname\">Anatomically Modern Humans</div>\n            <div class=\"fc-cc\">Brain: ~1350 cc avg</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Homo sapiens</div>\n            <ul>\n              <li>Oldest specimens: Jebel Irhoud, Morocco \u2014 ~315,000 BP (Hublin et al., 2017)</li>\n              <li>Omo Kibish, Ethiopia \u2014 ~195,000 BP (Herto skulls ~160,000 BP)</li>\n              <li>Fully modern behaviour: ~70,000\u201350,000 BP (Upper Palaeolithic revolution)</li>\n              <li>Out of Africa II: dispersal globally ~70,000\u201360,000 BP</li>\n              <li>Distinguishing features: high forehead, rounded skull, chin (mental eminence), small brow ridges</li>\n              <li>Cave art (Chauvet, Lascaux), figurines, music \u2014 symbolic revolution</li>\n              <li>Cro-Magnon (France) = early European H. sapiens (~35,000 BP)</li>\n              <li>\u26a0\ufe0f Exam: Jebel Irhoud + 315,000 BP; chin as unique H. sapiens feature</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"flashcard-wrap\" data-group=\"homo\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~100,000\u201350,000 BP \u00b7 Flores, Indonesia</div>\n            <div class=\"fc-name\">Homo floresiensis</div>\n            <div class=\"fc-nickname\">\"The Hobbit\"</div>\n            <div class=\"fc-cc\">Brain: ~380 cc</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Homo floresiensis</div>\n            <ul>\n              <li>Found by Peter Brown, Mike Morwood et al., 2003 \u2014 Liang Bua Cave, Flores Island</li>\n              <li>Height only ~1 metre \u2014 named \"Hobbit\"</li>\n              <li>Brain size similar to H. habilis despite small stature \u2014 island dwarfism</li>\n              <li>Used stone tools, hunted pygmy elephants (Stegodon)</li>\n              <li>Survived until ~50,000 BP \u2014 contemporaneous with modern humans</li>\n              <li>Descended from H. erectus that reached Flores ~1 MYA</li>\n              <li>\u26a0\ufe0f Exam: Flores + Brown/Morwood + island dwarfism + 2003 discovery</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"flashcard-wrap\" data-group=\"homo\" onclick=\"flipCard(this)\">\n        <div class=\"flashcard-inner\">\n          <div class=\"flashcard-front\">\n            <div class=\"fc-mya\">~300,000\u201330,000 BP \u00b7 East Africa</div>\n            <div class=\"fc-name\">Homo naledi</div>\n            <div class=\"fc-nickname\">\"Star\" (Sesotho)</div>\n            <div class=\"fc-cc\">Brain: ~465\u2013610 cc</div>\n            <div class=\"fc-hint\">tap to reveal \u21bb</div>\n          </div>\n          <div class=\"flashcard-back\">\n            <div class=\"fc-back-title\">Homo naledi</div>\n            <ul>\n              <li>Discovered by Lee Berger, 2013\u20132015 \u2014 Rising Star Cave, South Africa</li>\n              <li>Over 1,500 bone fragments from at least 15 individuals \u2014 largest SA find</li>\n              <li>Mix of primitive (small brain, curved fingers) & modern features (feet, hands)</li>\n              <li>Dated surprisingly young (~335,000\u2013236,000 BP) despite primitive features</li>\n              <li>Found deep in cave \u2014 deliberate body disposal behaviour suggested</li>\n              <li>Contemporary with H. heidelbergensis and early H. sapiens in Africa</li>\n              <li>\u26a0\ufe0f Exam: Lee Berger + Rising Star Cave + deliberate disposal + small brain despite recent age</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n    </div><!-- end flashcard-grid -->\n  </div>\n</div>\n\n<!-- SECTION 19: DATING METHODS VISUAL -->\n<div class=\"section\" id=\"dating\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">19</div>\n      <div class=\"section-title-block\">\n        <h2>Archaeological Dating Methods \u2014 Visual Reference</h2>\n        <div class=\"divider\"></div>\n        <p>Every method: type \u00b7 material it works on \u00b7 range \u00b7 principle \u00b7 exam gotchas</p>\n      </div>\n    </div>\n\n    <div style=\"display:flex; gap:20px; margin-bottom:24px; flex-wrap:wrap;\">\n      <div style=\"display:flex; align-items:center; gap:8px; font-size:0.82rem; color:var(--parchment-dark); opacity:0.7;\">\n        <div style=\"width:14px;height:14px;border-radius:3px;background:rgba(192,80,48,0.35);border:1px solid #e09060;\"></div> Relative Dating\n      </div>\n      <div style=\"display:flex; align-items:center; gap:8px; font-size:0.82rem; color:var(--parchment-dark); opacity:0.7;\">\n        <div style=\"width:14px;height:14px;border-radius:3px;background:rgba(45,74,45,0.35);border:1px solid #9adf9a;\"></div> Absolute / Chronometric Dating\n      </div>\n    </div>\n\n    <div class=\"dating-grid\">\n\n      <!-- RELATIVE -->\n      <div class=\"dating-card relative-card\">\n        <div class=\"dating-header\" style=\"background:rgba(192,80,48,0.1);\">\n          <div class=\"dating-icon\" style=\"background:rgba(192,80,48,0.2);\">\ud83c\udfdb</div>\n          <div>\n            <h4>Stratigraphy</h4>\n            <span class=\"dating-type-badge relative-badge\">Relative</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Sediments, soil layers, archaeological deposits</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">Law of Superposition \u2014 lower layers are older than upper layers (unless disturbed)</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">Unlimited \u2014 works across geological and archaeological timescales</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Key Names</span><span class=\"dv\">Nicolas Steno (1669) \u2014 formulated the law; William Smith \u2014 applied to fossils</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Most fundamental dating principle; inverted stratigraphy (disturbance) is a frequent trap question</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(192,80,48,0.6),rgba(192,80,48,0.1));width:100%;\"></div>\n        </div>\n      </div>\n\n      <div class=\"dating-card relative-card\">\n        <div class=\"dating-header\" style=\"background:rgba(192,80,48,0.1);\">\n          <div class=\"dating-icon\" style=\"background:rgba(192,80,48,0.2);\">\ud83d\udd27</div>\n          <div>\n            <h4>Typology / Seriation</h4>\n            <span class=\"dating-type-badge relative-badge\">Relative</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Stone tools, pottery, art styles, artefact assemblages</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">Artefact styles change over time in a recognisable pattern \u2014 style evolution</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">Unlimited \u2014 relative sequence only, no absolute dates</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Key Names</span><span class=\"dv\">Oscar Montelius (typological method); Flinders Petrie (ceramic seriation in Egypt)</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Petrie's battleship curve is the classic seriation example; tool mode sequence (1\u21925) is typology in action</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(192,80,48,0.6),rgba(192,80,48,0.1));width:100%;\"></div>\n        </div>\n      </div>\n\n      <div class=\"dating-card relative-card\">\n        <div class=\"dating-header\" style=\"background:rgba(192,80,48,0.1);\">\n          <div class=\"dating-icon\" style=\"background:rgba(192,80,48,0.2);\">\ud83e\uddb7</div>\n          <div>\n            <h4>Fluorine-Uranium-Nitrogen Test</h4>\n            <span class=\"dating-type-badge relative-badge\">Relative</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Bones and teeth \u2014 organic remains from the SAME deposit only</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">Fluorine & uranium increase over time in bone; nitrogen decreases over time. Compare levels between specimens.</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">Cannot give age in years \u2014 only tells if specimens are contemporaneous</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Key Names</span><span class=\"dv\">Kenneth Oakley used it to expose the Piltdown Man fraud (1949)</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Piltdown Man hoax detection via FUN test = most famous application. Works only on bones from the SAME deposit.</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(192,80,48,0.6),rgba(192,80,48,0.1));width:80%;\"></div>\n        </div>\n      </div>\n\n      <div class=\"dating-card relative-card\">\n        <div class=\"dating-header\" style=\"background:rgba(192,80,48,0.1);\">\n          <div class=\"dating-icon\" style=\"background:rgba(192,80,48,0.2);\">\ud83c\udf3f</div>\n          <div>\n            <h4>Palynology (Pollen Analysis)</h4>\n            <span class=\"dating-type-badge relative-badge\">Relative</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Pollen grains preserved in peat bogs, lake sediments, cave floors</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">Pollen types change with climate and vegetation changes \u2014 creates a relative sequence (pollen diagram)</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">Hundreds to millions of years \u2014 relative sequence only without corroboration</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Key Names</span><span class=\"dv\">Lennart von Post \u2014 developed pollen analysis method, 1916 (Sweden)</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Used to reconstruct past vegetation and climate (paleoclimate); valuable for understanding human adaptations to environment</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(192,80,48,0.6),rgba(192,80,48,0.1));width:100%;\"></div>\n        </div>\n      </div>\n\n      <!-- ABSOLUTE -->\n      <div class=\"dating-card absolute-card\">\n        <div class=\"dating-header\" style=\"background:rgba(45,74,45,0.12);\">\n          <div class=\"dating-icon\" style=\"background:rgba(45,74,45,0.25);\">\u269b</div>\n          <div>\n            <h4>Radiocarbon Dating (C-14)</h4>\n            <span class=\"dating-type-badge absolute-badge\">Absolute</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Organic material only \u2014 bone, charcoal, wood, shell, seeds, peat</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">C-14 is absorbed while alive; after death it decays at a known rate. Measure remaining C-14 to calculate age.</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Half-life</span><span class=\"dv\">5,730 years (corrected value) \u2014 Libby's original: 5,568 years. Both values appear in exams.</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">Up to ~50,000 BP (about 8\u20139 half-lives); AMS technique extends to ~75,000 BP</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Key Names</span><span class=\"dv\">Willard F. Libby \u2014 developed method 1949; Nobel Prize in Chemistry 1960</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Does NOT work on rock, metal, or inorganic material. Calibration needed due to varying atmospheric C-14. Most exam favourite absolute method.</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(90,154,90,0.7),rgba(90,154,90,0.1));width:60%;\"></div>\n        </div>\n      </div>\n\n      <div class=\"dating-card absolute-card\">\n        <div class=\"dating-header\" style=\"background:rgba(45,74,45,0.12);\">\n          <div class=\"dating-icon\" style=\"background:rgba(45,74,45,0.25);\">\ud83c\udf0b</div>\n          <div>\n            <h4>Potassium-Argon (K-Ar)</h4>\n            <span class=\"dating-type-badge absolute-badge\">Absolute</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Volcanic rock only (lava, tuff, igneous rock). NOT for organic material.</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">Radioactive K-40 decays to Ar-40 at known rate. Measure trapped argon to calculate age of rock formation.</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Half-life</span><span class=\"dv\">1.25 billion years \u2014 suitable for very old materials</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">100,000 years to billions of years \u2014 used for Pliocene/Miocene hominid sites</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Used to date VOLCANIC ROCK surrounding fossils (not the fossil itself). Key sites: Olduvai, Hadar, Laetoli. Ar-Ar variant is more precise.</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(90,154,90,0.7),rgba(90,154,90,0.1));width:100%;\"></div>\n        </div>\n      </div>\n\n      <div class=\"dating-card absolute-card\">\n        <div class=\"dating-header\" style=\"background:rgba(45,74,45,0.12);\">\n          <div class=\"dating-icon\" style=\"background:rgba(45,74,45,0.25);\">\ud83c\udf32</div>\n          <div>\n            <h4>Dendrochronology</h4>\n            <span class=\"dating-type-badge absolute-badge\">Absolute</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Wood \u2014 timber in ancient structures, preserved wood, wooden artefacts</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">Trees form one ring per year; ring width varies with climate. Match patterns to master chronology to get exact year.</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">Up to ~12,000 years BP (master chronology for European oaks)</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Key Names</span><span class=\"dv\">A.E. Douglass \u2014 developed dendrochronology; Andrew Ellicott Douglass (1920s)</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Most precise dating method (can give exact year); also provides palaeoclimate data. Limitation: needs preserved wood AND master chronology for that region.</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(90,154,90,0.7),rgba(90,154,90,0.1));width:30%;\"></div>\n        </div>\n      </div>\n\n      <div class=\"dating-card absolute-card\">\n        <div class=\"dating-header\" style=\"background:rgba(45,74,45,0.12);\">\n          <div class=\"dating-icon\" style=\"background:rgba(45,74,45,0.25);\">\ud83c\udffa</div>\n          <div>\n            <h4>Thermoluminescence (TL)</h4>\n            <span class=\"dating-type-badge absolute-badge\">Absolute</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Heated materials \u2014 pottery, burned flint, baked clay, hearth stones</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">Electrons trapped by radiation since last heating. When reheated in lab, they release light proportional to accumulated dose.</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">5,000 to 500,000 years BP</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Only works on material that was PREVIOUSLY HEATED. Used when C-14 and K-Ar are both unsuitable. OSL (Optically Stimulated Luminescence) is the light-based equivalent for sediments.</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(90,154,90,0.7),rgba(90,154,90,0.1));width:75%;\"></div>\n        </div>\n      </div>\n\n      <div class=\"dating-card absolute-card\">\n        <div class=\"dating-header\" style=\"background:rgba(45,74,45,0.12);\">\n          <div class=\"dating-icon\" style=\"background:rgba(45,74,45,0.25);\">\ud83e\udeb8</div>\n          <div>\n            <h4>Uranium Series Dating</h4>\n            <span class=\"dating-type-badge absolute-badge\">Absolute</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Calcium carbonate \u2014 cave formations (stalactites, stalagmites), coral, travertine, tooth enamel</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">U-238 and U-235 decay through a series of radioactive isotopes; measure ratio of parent to daughter isotopes</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">1,000 to ~500,000 years BP (U-Th); U-Pa extends to ~600,000 BP</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Useful for cave sites where C-14 fails beyond 50,000 BP. Used to date Neanderthal and early H. sapiens cave sites in Europe and Middle East.</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(90,154,90,0.7),rgba(90,154,90,0.1));width:80%;\"></div>\n        </div>\n      </div>\n\n      <div class=\"dating-card absolute-card\">\n        <div class=\"dating-header\" style=\"background:rgba(45,74,45,0.12);\">\n          <div class=\"dating-icon\" style=\"background:rgba(45,74,45,0.25);\">\ud83e\uddec</div>\n          <div>\n            <h4>Molecular Clock / DNA Dating</h4>\n            <span class=\"dating-type-badge absolute-badge\">Absolute</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Ancient DNA (aDNA) from bones and teeth; modern comparative DNA</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">DNA mutates at roughly constant rate; number of mutations between two sequences estimates time since divergence</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">100s of years to millions of years (molecular clock); aDNA extraction up to ~800,000 BP</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Key Names</span><span class=\"dv\">Svante P\u00e4\u00e4bo (Nobel 2022) \u2014 Neanderthal & Denisovan genomes; Emile Zuckerkandl & Linus Pauling \u2014 molecular clock concept</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Used for mtDNA Eve (~200,000 BP), Y-chromosome Adam, and Neanderthal\u2013Denisovan\u2013H. sapiens split estimates. Increasingly tested in recent papers.</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(90,154,90,0.7),rgba(90,154,90,0.1));width:100%;\"></div>\n        </div>\n      </div>\n\n      <div class=\"dating-card absolute-card\">\n        <div class=\"dating-header\" style=\"background:rgba(45,74,45,0.12);\">\n          <div class=\"dating-icon\" style=\"background:rgba(45,74,45,0.25);\">\ud83e\uddf2</div>\n          <div>\n            <h4>Archaeomagnetism</h4>\n            <span class=\"dating-type-badge absolute-badge\">Absolute</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Fired clay, baked earth, hearths, kilns \u2014 in situ (unmoved since original heating)</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">Iron particles in clay align with Earth's magnetic field when heated. Earth's magnetic pole wanders \u2014 recorded pole position dates the firing event.</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">Up to ~10,000 years BP (limited by available master polar wander curve)</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Must remain in original position \u2014 disturbed features cannot be dated. Less commonly tested but conceptually interesting for MCQs on \"what material\"</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(90,154,90,0.7),rgba(90,154,90,0.1));width:20%;\"></div>\n        </div>\n      </div>\n\n      <div class=\"dating-card absolute-card\">\n        <div class=\"dating-header\" style=\"background:rgba(45,74,45,0.12);\">\n          <div class=\"dating-icon\" style=\"background:rgba(45,74,45,0.25);\">\ud83d\udca1</div>\n          <div>\n            <h4>OSL \u2014 Optically Stimulated Luminescence</h4>\n            <span class=\"dating-type-badge absolute-badge\">Absolute</span>\n          </div>\n        </div>\n        <div class=\"dating-body\">\n          <div class=\"dating-row\"><span class=\"dk\">Material</span><span class=\"dv\">Sediment grains (quartz, feldspar) \u2014 dates when sediment was last exposed to sunlight</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Principle</span><span class=\"dv\">Light resets electron traps in grains. After burial, traps refill from radiation. Expose to light in lab \u2014 emitted light = accumulated dose = age since burial</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Range</span><span class=\"dv\">100 to ~350,000 years BP</span></div>\n          <div class=\"dating-row\"><span class=\"dk\">Exam Tip</span><span class=\"dv\">Used to date when sediments were deposited \u2014 crucial for sites beyond C-14 range. Used at Jebel Irhoud (Morocco) to date the 315,000 BP H. sapiens remains.</span></div>\n          <div class=\"dating-range-bar\" style=\"background:linear-gradient(90deg,rgba(90,154,90,0.7),rgba(90,154,90,0.1));width:65%;\"></div>\n        </div>\n      </div>\n\n    </div><!-- end dating-grid -->\n\n    <div class=\"callout\" style=\"margin-top:28px;\">\n      <p><strong>The Ultimate Dating Method Quick Test:</strong> When a question gives you a material and asks which method \u2014 ask: Is it organic? \u2192 C-14. Volcanic rock? \u2192 K-Ar. Pottery/fired clay? \u2192 TL. Cave formations/coral? \u2192 U-series. Wood? \u2192 Dendrochronology. Sediment? \u2192 OSL. Bone comparing same deposit? \u2192 FUN. All of these distinctions appear in UGC NET papers.</p>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 20: THEORY COMPARISON MATRIX -->\n<div class=\"section\" id=\"theory-matrix\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">20</div>\n      <div class=\"section-title-block\">\n        <h2>Anthropological Theory \u2014 Full Comparison Matrix</h2>\n        <div class=\"divider\"></div>\n        <p>Every school side-by-side: time period \u00b7 key theorists \u00b7 core idea \u00b7 method \u00b7 key work \u00b7 critique \u2014 scroll right for full table</p>\n      </div>\n    </div>\n\n    <div class=\"theory-matrix-wrap\">\n      <table class=\"theory-matrix\">\n        <thead>\n          <tr>\n            <th>School / Theory</th>\n            <th>Period</th>\n            <th>Key Theorists</th>\n            <th>Central Concept</th>\n            <th>Method / Approach</th>\n            <th>Landmark Work</th>\n            <th>Core Critique</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr>\n            <td>Unilinear Evolution</td>\n            <td><span class=\"tm-period\">1860s\u20131900s</span></td>\n            <td>Tylor, Morgan, Spencer, Frazer</td>\n            <td>All cultures pass through the same evolutionary stages: Savagery \u2192 Barbarism \u2192 Civilization. Culture is a progressive, universal process.</td>\n            <td>Armchair anthropology \u2014 comparative method using travellers' accounts and missionary reports; no fieldwork</td>\n            <td>Primitive Culture (Tylor 1871); Ancient Society (Morgan 1877); The Golden Bough (Frazer 1890)</td>\n            <td class=\"tm-critique\">Ethnocentric; assumes Western civilisation is the pinnacle; ignores unique historical contexts; \"armchair\" data unreliable</td>\n          </tr>\n          <tr>\n            <td>Diffusionism</td>\n            <td><span class=\"tm-period\">1880s\u20131920s</span></td>\n            <td>British: G.E. Smith, W.J. Perry; German: Ratzel, Frobenius, Graebner; American: Wissler, Kroeber</td>\n            <td>Cultural similarities result from diffusion (borrowing), not independent invention. British School: Egypt as cradle of all civilisation.</td>\n            <td>Mapping cultural traits and tracing their geographic spread; culture circles (Kulturkreise) mapping</td>\n            <td>The Ancient Egyptians (Smith); The History of Ethnological Theory (Lowie, critical)</td>\n            <td class=\"tm-critique\">Heliocentric (Egypt-focus) is extreme and unsupported; ignores independent invention; culture area concept is static</td>\n          </tr>\n          <tr>\n            <td>Historical Particularism</td>\n            <td><span class=\"tm-period\">1900s\u20131940s</span></td>\n            <td>Franz Boas; students: Kroeber, Lowie, Sapir, Mead, Benedict</td>\n            <td>Each culture has unique history; cultural relativism; cultures must be understood on their own terms; 4-field approach to anthropology</td>\n            <td>Intensive fieldwork; learn the language; document before cultures disappear; rigorous empirical data</td>\n            <td>The Mind of Primitive Man (1911); Race Language & Culture (1940)</td>\n            <td class=\"tm-critique\">Anti-theoretical; accumulation of facts without synthesis; over-emphasis on historical accident; culture history not causal explanation</td>\n          </tr>\n          <tr>\n            <td>Culture & Personality</td>\n            <td><span class=\"tm-period\">1920s\u20131950s</span></td>\n            <td>Margaret Mead, Ruth Benedict, Kardiner, Sapir, Linton</td>\n            <td>National character; culture shapes personality; each culture has a dominant configuration (Apollonian/Dionysian); basic personality structure</td>\n            <td>Psychological testing + fieldwork; life histories; personality interviews; child-rearing observation</td>\n            <td>Patterns of Culture (Benedict 1934); Coming of Age in Samoa (Mead 1928)</td>\n            <td class=\"tm-critique\">Overgeneralisation of \"national character\"; Derek Freeman's critique of Mead's Samoa data; reductionist approach to culture</td>\n          </tr>\n          <tr>\n            <td>Functionalism (Malinowski)</td>\n            <td><span class=\"tm-period\">1920s\u20131940s</span></td>\n            <td>Bronis\u0142aw Malinowski</td>\n            <td>All cultural elements function to satisfy basic biological and psychological needs (7 basic needs); culture is an instrumental apparatus</td>\n            <td>Long-term participant observation; intensive fieldwork; living with the community; learning local language</td>\n            <td>Argonauts of the Western Pacific (1922); Crime & Custom in Savage Society (1926)</td>\n            <td class=\"tm-critique\">Over-functional \u2014 assumes every element has a function; cannot explain culture change; ignores history; circular reasoning</td>\n          </tr>\n          <tr>\n            <td>Structural-Functionalism</td>\n            <td><span class=\"tm-period\">1920s\u20131960s</span></td>\n            <td>A.R. Radcliffe-Brown; Fortes, Evans-Pritchard, Gluckman</td>\n            <td>Society is like an organism; social structure (patterns of relations) maintains social equilibrium; synchronic analysis; no individual psychology</td>\n            <td>Comparative method across cultures; structural analysis; kinship as social structure; social morphology</td>\n            <td>Structure & Function in Primitive Society (1952); African Political Systems (Fortes & E-P 1940)</td>\n            <td class=\"tm-critique\">Ignores social change and conflict; overly static model; teleological \u2014 assumes society needs to maintain itself; neglects agency</td>\n          </tr>\n          <tr>\n            <td>Structuralism (L\u00e9vi-Strauss)</td>\n            <td><span class=\"tm-period\">1950s\u20131970s</span></td>\n            <td>Claude L\u00e9vi-Strauss; influenced by Saussure, Jakobson (linguistics)</td>\n            <td>Universal binary oppositions underlie all culture (raw/cooked, nature/culture, hot/cold). The savage mind operates by bricolage. Myths and kinship share deep structure.</td>\n            <td>Structural analysis of myths, kinship, totemism \u2014 find the underlying logical structure; not empiricist</td>\n            <td>Elementary Structures of Kinship (1949); Mythologiques (4 vols, 1964\u201371); Savage Mind (1962)</td>\n            <td class=\"tm-critique\">Too abstract and untestable; ignores history and social context; critics say binary oppositions are imposed by analyst, not found in data</td>\n          </tr>\n          <tr>\n            <td>Symbolic / Interpretive</td>\n            <td><span class=\"tm-period\">1960s\u20131980s</span></td>\n            <td>Clifford Geertz, Victor Turner, Mary Douglas</td>\n            <td>Culture as a system of symbols and meanings; thick description (Geertz); symbols are multivocal (Turner); culture as text to be interpreted</td>\n            <td>Interpretive approach; ethnography as translation; symbolic analysis of ritual, art, religion</td>\n            <td>Interpretation of Cultures (Geertz 1973); The Ritual Process (Turner 1969); Purity & Danger (Douglas 1966)</td>\n            <td class=\"tm-critique\">Relativistic; cannot compare cultures scientifically; \"whose interpretation?\" problem; too focused on meaning at expense of material conditions</td>\n          </tr>\n          <tr>\n            <td>Neo-Evolutionism</td>\n            <td><span class=\"tm-period\">1940s\u20131960s</span></td>\n            <td>Leslie White, Julian Steward, Marshall Sahlins, Elman Service</td>\n            <td>White: culture evolves via energy capture (E\u00d7T\u2192C). Steward: multilinear evolution; cultural ecology. Service: Band\u2192Tribe\u2192Chiefdom\u2192State</td>\n            <td>Cross-cultural comparison; materialist and ecological analysis; energy and technology focus</td>\n            <td>Science of Culture (White 1949); Theory of Culture Change (Steward 1955); Stone Age Economics (Sahlins 1972)</td>\n            <td class=\"tm-critique\">White is too deterministic; ignores agency; Steward's cultural ecology sometimes circular; Service's typology oversimplifies political diversity</td>\n          </tr>\n          <tr>\n            <td>Marxist Anthropology</td>\n            <td><span class=\"tm-period\">1960s\u20131980s</span></td>\n            <td>Meillassoux, Terray, Godelier, Eric Wolf, Eleanor Leacock</td>\n            <td>Mode of production shapes social relations; kinship as ideology masking exploitation; domestic mode of production in pre-capitalist societies; class analysis applied cross-culturally</td>\n            <td>Historical materialist analysis; political economy framework; attention to labour, reproduction, inequality</td>\n            <td>Europe & People Without History (Wolf 1982); Maidens Meal & Money (Meillassoux 1975)</td>\n            <td class=\"tm-critique\">Economic reductionism; neglects symbolism and meaning; European Marxist categories may not translate cross-culturally</td>\n          </tr>\n          <tr>\n            <td>Feminist Anthropology</td>\n            <td><span class=\"tm-period\">1970s\u2013present</span></td>\n            <td>Rosaldo, Ortner, Leacock, Slocum, Eleanor Burke Leacock, Strathern</td>\n            <td>Anthropology has been androcentric; woman\u2013nature::man\u2013culture (Ortner); woman the gatherer hypothesis challenges male-biased narratives; intersectionality</td>\n            <td>Critical review of existing ethnography; feminist fieldwork methodology; focus on women's perspectives; reflexive ethnography</td>\n            <td>Woman Culture & Society (Rosaldo & Lamphere 1974); Making Gender (Ortner 1996)</td>\n            <td class=\"tm-critique\">Early feminist anthropology accused of universalising \"woman\"; later postcolonial feminists (Mohanty) critique Western feminist assumptions about Third World women</td>\n          </tr>\n          <tr>\n            <td>Practice Theory / Agency</td>\n            <td><span class=\"tm-period\">1970s\u2013present</span></td>\n            <td>Pierre Bourdieu, Anthony Giddens, Marshall Sahlins, Sherry Ortner</td>\n            <td>Bridge between structure and agency; habitus (Bourdieu); structuration (Giddens); people both constrained by and reproduce social structures through daily practices</td>\n            <td>Ethnographic observation of everyday practice; attention to how structure is reproduced or transformed through action</td>\n            <td>Outline of a Theory of Practice (Bourdieu 1977); Distinction (1984); Making History (Sahlins)</td>\n            <td class=\"tm-critique\">Bourdieu's habitus sometimes circular; not fully able to account for radical social change; agency can be romanticised</td>\n          </tr>\n          <tr>\n            <td>Postmodern / Reflexive</td>\n            <td><span class=\"tm-period\">1980s\u20132000s</span></td>\n            <td>James Clifford, George Marcus, Michael Fischer, Paul Rabinow</td>\n            <td>Crisis of representation; ethnographic authority questioned; texts are partial, positioned, and political; writing is a form of power; multi-sited ethnography</td>\n            <td>Reflexive ethnography; dialogue and polyphony in texts; attention to power in fieldwork; experimental writing</td>\n            <td>Writing Culture (Clifford & Marcus 1986); Anthropology as Cultural Critique (Marcus & Fischer)</td>\n            <td class=\"tm-critique\">Paralyses fieldwork with doubt; produces impenetrable writing; accused of solipsism; ironically still produced by privileged Western academics</td>\n          </tr>\n          <tr>\n            <td>Transactionalism / Processualism</td>\n            <td><span class=\"tm-period\">1960s\u20131980s</span></td>\n            <td>Fredrik Barth, Nick Bailey, Jeremy Boissevain</td>\n            <td>Focus on individuals as strategists maximising values; ethnic boundaries maintained by interaction, not primordial traits; social organisation as outcome of individual decisions</td>\n            <td>Focus on processes, strategies, networks; transaction as unit of analysis; case studies of decision-making</td>\n            <td>Models of Social Organisation (Barth 1966); Ethnic Groups & Boundaries (Barth 1969)</td>\n            <td class=\"tm-critique\">Overly individualistic; rational-actor model ignores structural constraints; neglects meaning and emotion; difficult to scale up to macro analysis</td>\n          </tr>\n        </tbody>\n      </table>\n    </div>\n\n    <div class=\"callout\" style=\"margin-top:28px;\">\n      <p><strong>Exam Pattern:</strong> Theory questions test 3 types \u2014 (1) \"Who said X concept\" (2) \"Which school/theorist used Y method\" (3) \"What is the critique of Z theory.\" This matrix covers all three. Read it column by column, not just row by row \u2014 the Method and Critique columns are especially heavily tested in recent years (2019\u20132024 papers).</p>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 21: PVTG REGIONAL MAP -->\n<div class=\"section\" id=\"pvtg-map\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">21</div>\n      <div class=\"section-title-block\">\n        <h2>PVTG State-wise Regional Map</h2>\n        <div class=\"divider\"></div>\n        <p>All 75 PVTGs organised by region with key characteristics and exam-relevant details. <span style=\"color:var(--gold-light);\">\u2605 = Appears frequently in exams</span></p>\n      </div>\n    </div>\n\n    <div class=\"pvtg-map-legend\">\n      <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#7a9ab8;\"></div> North India</div>\n      <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#9a5a9a;\"></div> Central India</div>\n      <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#5a9a5a;\"></div> East India</div>\n      <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#c8922a;\"></div> West India</div>\n      <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#c05030;\"></div> South India</div>\n      <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#5a9a9a;\"></div> North-East India</div>\n      <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#3a5a8a;\"></div> Andaman & Nicobar Islands</div>\n    </div>\n\n    <div class=\"pvtg-map-container\">\n\n      <!-- NORTH -->\n      <div class=\"pvtg-region north\">\n        <div class=\"region-header\">\n          <div><div class=\"region-name\">North India</div><div class=\"region-states\">Uttarakhand \u00b7 HP \u00b7 J&K</div></div>\n          <div class=\"region-count\" style=\"color:#7a9ab8;\">5</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Raji (Rajis / Van Rawat)<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Uttarakhand (Pithoragarh, Champawat)</div>\n          <div class=\"pe-note\">Semi-nomadic forest dwellers; hunters and gatherers; bark clothing historically; very small population (~500)</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Buksa (Buxas)</div>\n          <div class=\"pe-state\">Uttarakhand (Terai region)</div>\n          <div class=\"pe-note\">Transitioning from forest dwelling to settled agriculture; Tarai-Bhabar belt; closely related to Tharu</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Lahaula (Lahula)</div>\n          <div class=\"pe-state\">Himachal Pradesh (Lahaul-Spiti)</div>\n          <div class=\"pe-note\">Tibetan Buddhist; high altitude pastoralism; semi-nomadic; geographically isolated population</div>\n        </div>\n      </div>\n\n      <!-- CENTRAL -->\n      <div class=\"pvtg-region central\">\n        <div class=\"region-header\">\n          <div><div class=\"region-name\">Central India</div><div class=\"region-states\">MP \u00b7 Chhattisgarh \u00b7 Jharkhand</div></div>\n          <div class=\"region-count\" style=\"color:#9a5a9a;\">15+</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Baiga<span class=\"pvtg-star\">\u2605</span><span class=\"pvtg-exam-tag\">EXAM HOT</span></div>\n          <div class=\"pe-state\">M.P. \u00b7 Chhattisgarh \u00b7 Jharkhand</div>\n          <div class=\"pe-note\">Practice bewar (shifting cultivation); traditional healers; tattoo tradition; refuse to till land with iron (sacred taboo)</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Abujhmaria<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Chhattisgarh (Abujhmar Hills, Narayanpur)</div>\n          <div class=\"pe-note\">\"The Unknown Maria\" \u2014 one of India's most isolated tribes; forest-dwelling; very limited outside contact until 1960s</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Kamar</div>\n          <div class=\"pe-state\">Chhattisgarh (Raipur, Mahasamund)</div>\n          <div class=\"pe-note\">Bamboo basket-making artisans; forest-based economy; declining population; known for iron craft</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Birhor</div>\n          <div class=\"pe-state\">Jharkhand \u00b7 Chhattisgarh \u00b7 W.Bengal</div>\n          <div class=\"pe-note\">Itinerant hunter-gatherers; \"rope-makers\" (bi = jungle, hor = man); semi-nomadic in leaf huts (Tand)</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Saharia<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">M.P. (Guna, Shivpuri) \u00b7 Rajasthan</div>\n          <div class=\"pe-note\">Most backward tribal group in M.P.; forest-based livelihoods; Sahariya habitat in Chambal region</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Bharia</div>\n          <div class=\"pe-state\">M.P. (Chhindwara \u2014 Patalkot valley)</div>\n          <div class=\"pe-note\">Live in Patalkot valley \u2014 1500 ft deep gorge; completely isolated; traditional healing knowledge; entered modern healthcare only recently</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Asur</div>\n          <div class=\"pe-state\">Jharkhand (Netarhat Plateau)</div>\n          <div class=\"pe-note\">Traditional iron smelters (asur = demon, connected to iron mythology); facing displacement; shrinking population</div>\n        </div>\n      </div>\n\n      <!-- EAST -->\n      <div class=\"pvtg-region east\">\n        <div class=\"region-header\">\n          <div><div class=\"region-name\">East India</div><div class=\"region-states\">Odisha \u00b7 W.Bengal</div></div>\n          <div class=\"region-count\" style=\"color:#5a9a5a;\">15+</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Dongaria Kondh<span class=\"pvtg-star\">\u2605</span><span class=\"pvtg-exam-tag\">EXAM HOT</span></div>\n          <div class=\"pe-state\">Odisha (Niyamgiri Hills, Rayagada)</div>\n          <div class=\"pe-note\">Famous for Niyamgiri mining controversy (Vedanta Aluminium case 2013); worship Niyam Raja as forest deity; turmeric farming; fiercely resisted displacement</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Bondo Poraja (Bondo)<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Odisha (Malkangiri district)</div>\n          <div class=\"pe-note\">Women wear metal neck rings; minimal clothing tradition; worship sun and mountain spirits; one of the last isolated groups in India</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Juang<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Odisha (Keonjhar, Dhenkanal)</div>\n          <div class=\"pe-note\">Known for leaf-plate clothing historically; shifting cultivation; unique kinship system studied by Nihar Ranjan Ray; PVTG with detailed ethnographies</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Toto</div>\n          <div class=\"pe-state\">W.Bengal (Totopara, Alipurduar)</div>\n          <div class=\"pe-note\">Among India's smallest tribal groups (~1,600 people); unique Toto language; Bhutan border area; endangered \u2014 significant increase effort underway</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Lodha (Kheria)</div>\n          <div class=\"pe-state\">W.Bengal \u00b7 Odisha</div>\n          <div class=\"pe-note\">Formerly denotified as \"criminal tribe\" (Criminal Tribes Act 1871); hunters; now facing stigma and landlessness</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Didayi (Didhay)</div>\n          <div class=\"pe-state\">Odisha (Malkangiri, Koraput)</div>\n          <div class=\"pe-note\">Literally \"earthlings\" in their language; forest-based; known through Verrier Elwin's early studies in the region</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Lanjia Saura<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Odisha (Gajapati, Rayagada)</div>\n          <div class=\"pe-note\">Saura sub-group; traditional wall paintings (idital) as form of communication with spirits; frequently studied by folklorists</div>\n        </div>\n      </div>\n\n      <!-- WEST -->\n      <div class=\"pvtg-region west\">\n        <div class=\"region-header\">\n          <div><div class=\"region-name\">West India</div><div class=\"region-states\">Gujarat \u00b7 Rajasthan</div></div>\n          <div class=\"region-count\" style=\"color:#c8922a;\">5</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Siddi (Siddis)<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Gujarat \u00b7 Karnataka \u00b7 Goa \u00b7 AP</div>\n          <div class=\"pe-note\">Descendants of East African Bantu brought to India as slaves and soldiers (14th\u201319th centuries); retain African cultural practices including music (Dhamali); distinctive physical features</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Padhar</div>\n          <div class=\"pe-state\">Gujarat (Rann of Kutch region)</div>\n          <div class=\"pe-note\">Salt workers and fishermen; Rann of Kutch; displaced by partition-era border changes; very small, economically marginalised population</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Kathodia / Kotwalia</div>\n          <div class=\"pe-state\">Gujarat (South Gujarat, Valsad)</div>\n          <div class=\"pe-note\">Bamboo artisans; forest dwellers; making tools and baskets; declining forest access has disrupted traditional livelihood</div>\n        </div>\n      </div>\n\n      <!-- SOUTH -->\n      <div class=\"pvtg-region south\" style=\"grid-column: span 1;\">\n        <div class=\"region-header\">\n          <div><div class=\"region-name\">South India</div><div class=\"region-states\">Tamil Nadu \u00b7 Kerala \u00b7 Karnataka \u00b7 AP \u00b7 Telangana</div></div>\n          <div class=\"region-count\" style=\"color:#c05030;\">16</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Toda<span class=\"pvtg-star\">\u2605</span><span class=\"pvtg-exam-tag\">EXAM HOT</span></div>\n          <div class=\"pe-state\">Tamil Nadu (Nilgiri Hills \u2014 Ooty)</div>\n          <div class=\"pe-note\">Famous for fraternal polyandry (woman married to multiple brothers); sacred buffalo herding; unique barrel-shaped temples; studied by W.H.R. Rivers (The Todas, 1906)</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Chenchu<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Andhra Pradesh \u00b7 Telangana (Nallamala Hills)</div>\n          <div class=\"pe-note\">Forest hunters and gatherers; Nagarjunasagar-Srisailam Tiger Reserve; legends in Mahabharata as Cheenchulakulam; refuse settled agriculture; studied by Furer-Haimendorf</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Irula (Irular)<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Tamil Nadu \u00b7 Kerala</div>\n          <div class=\"pe-note\">Renowned snake catchers; venom extraction for anti-venom production; tribal cooperative set up in 1978; forest food collectors and hunters</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Kota</div>\n          <div class=\"pe-state\">Tamil Nadu (Nilgiri Hills)</div>\n          <div class=\"pe-note\">One of the Nilgiri hill tribes; known for metalwork, pottery, music; bartering with Todas and Badagas historically; their musicians perform at all Nilgiri tribe ceremonies</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Cholanaikkan<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Kerala (Malappuram district)</div>\n          <div class=\"pe-note\">Cave dwellers in Silent Valley area; semi-nomadic; among the most isolated tribes in Kerala; very small population (~200); contact established only in 1970s</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Kadar</div>\n          <div class=\"pe-state\">Kerala (Thrissur, Palakkad \u2014 Anamalai hills)</div>\n          <div class=\"pe-note\">Forest dwellers; honey and minor forest produce collectors; studied by C. von Furer-Haimendorf; live along Kerala-Tamil Nadu border forests</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Koraga</div>\n          <div class=\"pe-state\">Karnataka \u00b7 Kerala (coastal belt)</div>\n          <div class=\"pe-note\">Once practiced Ajalu (untouchable status, rolling on leftover food); Supreme Court ended this practice; weavers and basket-makers; coastal Karnataka</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Jenu Kuruba</div>\n          <div class=\"pe-state\">Karnataka (Nagarhole, Kodagu)</div>\n          <div class=\"pe-note\">Honey gatherers (\"jenu\" = honey); traditional knowledge of forests; displaced by wildlife sanctuary creation; tiger reserve conflicts</div>\n        </div>\n      </div>\n\n      <!-- NORTHEAST -->\n      <div class=\"pvtg-region northeast\">\n        <div class=\"region-header\">\n          <div><div class=\"region-name\">North-East India</div><div class=\"region-states\">Assam \u00b7 Manipur \u00b7 Tripura \u00b7 Mizoram</div></div>\n          <div class=\"region-count\" style=\"color:#5a9a9a;\">5</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Reang / Bru<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Tripura \u00b7 Mizoram</div>\n          <div class=\"pe-note\">Largest PVTG displacement case in India \u2014 over 37,000 Bru refugees from Mizoram settled in Tripura after ethnic violence (1997); resettlement completed 2020</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Maram Naga</div>\n          <div class=\"pe-state\">Manipur (Senapati district)</div>\n          <div class=\"pe-note\">One of several Naga sub-groups; known for headhunting traditions (now historic); terrace farming; morungs (dormitory system for young men)</div>\n        </div>\n      </div>\n\n      <!-- ISLANDS -->\n      <div class=\"pvtg-region islands\" style=\"grid-column: span 2;\">\n        <div class=\"region-header\">\n          <div><div class=\"region-name\">Andaman & Nicobar Islands</div><div class=\"region-states\">5 PVTGs \u2014 Most Studied & Most Frequently Examined</div></div>\n          <div class=\"region-count\" style=\"color:#6090c0;\">5</div>\n        </div>\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px;\">\n          <div class=\"pvtg-entry starred\">\n            <div class=\"pe-tribe\">Sentinelese<span class=\"pvtg-star\">\u2605\u2605</span><span class=\"pvtg-exam-tag\">ALWAYS IN EXAM</span></div>\n            <div class=\"pe-state\">North Sentinel Island (A&N)</div>\n            <div class=\"pe-note\">Most isolated humans on Earth; reject all outside contact; Indian Navy maintains exclusion zone (3 nautical miles); 2018 \u2014 John Allen Chau missionary killed. Population unknown (~50\u2013500). Protected by Indian govt under Andaman & Nicobar Protection of Aboriginal Tribes Act.</div>\n          </div>\n          <div class=\"pvtg-entry starred\">\n            <div class=\"pe-tribe\">Jarawa<span class=\"pvtg-star\">\u2605\u2605</span><span class=\"pvtg-exam-tag\">ALWAYS IN EXAM</span></div>\n            <div class=\"pe-state\">South & Middle Andaman</div>\n            <div class=\"pe-note\">Hostile to outsiders until 1998 when first peaceful contact made. Population ~380. Hunter-gatherers. Supreme Court \"human safari\" ban along Andaman Trunk Road. Major vulnerability from disease contact.</div>\n          </div>\n          <div class=\"pvtg-entry starred\">\n            <div class=\"pe-tribe\">Onge (Ong)<span class=\"pvtg-star\">\u2605</span></div>\n            <div class=\"pe-state\">Little Andaman Island</div>\n            <div class=\"pe-state\" style=\"margin-top:2px;\">Population: ~100 (critically low)</div>\n            <div class=\"pe-note\">Semi-nomadic forest hunters; contact established; severe population decline from 1951 (~150) to today. Honey collection, pig hunting, sea turtle eggs. Critically endangered as a people.</div>\n          </div>\n          <div class=\"pvtg-entry starred\">\n            <div class=\"pe-tribe\">Great Andamanese<span class=\"pvtg-star\">\u2605</span></div>\n            <div class=\"pe-state\">Strait Island (A&N Islands)</div>\n            <div class=\"pe-state\" style=\"margin-top:2px;\">Population: ~60 (near extinction)</div>\n            <div class=\"pe-note\">Originally 10 tribes; decimated by British colonisation and disease after 1858; from ~5,000 to ~60 today. Now settled on Strait Island. Classic example of contact-induced depopulation.</div>\n          </div>\n          <div class=\"pvtg-entry starred\">\n            <div class=\"pe-tribe\">Shompen<span class=\"pvtg-star\">\u2605</span></div>\n            <div class=\"pe-state\">Great Nicobar Island</div>\n            <div class=\"pe-state\" style=\"margin-top:2px;\">Population: ~200\u2013300</div>\n            <div class=\"pe-note\">Interior forest dwellers of Great Nicobar; semi-nomadic; avoid outsiders; threatened by Great Nicobar development project (2022) \u2014 major conservation controversy. Hunter-gatherers + forest food.</div>\n          </div>\n        </div>\n      </div>\n\n    </div><!-- end pvtg-map-container -->\n\n    <div class=\"callout\" style=\"margin-top:28px;\">\n      <p><strong>How to study PVTGs for exam:</strong> Memorise in 3 tiers \u2014 (1) Islands: all 5 by heart with distinguishing features. (2) Famous-for-one-thing tribes: Toda = polyandry, Irula = snakes, Dongaria Kondh = Niyamgiri, Siddi = African origin, Birhor = rope-makers, Chenchu = Nallamala forest. (3) State-count geography: Odisha and Jharkhand have the highest number of PVTGs. Questions often test \"which tribe belongs to which state\" \u2014 this regional map structure helps anchor those associations spatially.</p>\n    </div>\n\n  </div>\n</div>\n\n<script>\n  // Flashcard flip functionality\n  let reviewedCount = 0;\n  const reviewed = new Set();\n\n  function flipCard(el) {\n    el.classList.toggle('flipped');\n    const id = el.querySelector('.fc-name').textContent;\n    if (!reviewed.has(id)) {\n      reviewed.add(id);\n      reviewedCount = reviewed.size;\n      const total = document.querySelectorAll('.flashcard-wrap:not([style*=\"display: none\"])').length;\n      document.getElementById('fc-progress').textContent =\n        `${reviewedCount} card${reviewedCount !== 1 ? 's' : ''} reviewed \u00b7 Click again to flip back`;\n    }\n  }\n\n  function filterCards(group) {\n    document.querySelectorAll('.fc-btn').forEach(b => b.classList.remove('active'));\n    event.target.classList.add('active');\n    reviewed.clear();\n    document.querySelectorAll('.flashcard-wrap').forEach(card => {\n      if (group === 'all' || card.dataset.group === group) {\n        card.style.display = '';\n        card.classList.remove('flipped');\n      } else {\n        card.style.display = 'none';\n        card.classList.remove('flipped');\n      }\n    });\n    const visible = document.querySelectorAll('.flashcard-wrap:not([style*=\"display: none\"])').length;\n    document.getElementById('fc-progress').textContent = `Showing ${visible} cards \u00b7 Click any card to flip`;\n  }\n\n  function resetCards() {\n    reviewed.clear();\n    document.querySelectorAll('.flashcard-wrap').forEach(c => {\n      c.classList.remove('flipped');\n      c.style.display = '';\n    });\n    document.querySelectorAll('.fc-btn').forEach(b => b.classList.remove('active'));\n    document.querySelector('.fc-btn').classList.add('active');\n    document.getElementById('fc-progress').textContent = 'All cards reset \u00b7 0 / 14 reviewed';\n  }\n<\/script>\n\n<footer>\n  UGC NET Anthropology \u2014 Complete 4-Month Study System \u00b7 Designed for guaranteed qualification \u00b7 Good luck, scholar.\n</footer>\n\n</body>\n</html>\n", "Syllabus_Master.md": "# UGC NET Anthropology (Paper II) - 2026 Progress Tracker\n\n| Unit | Topic Name | Status | Last Revision Date | Core Focus Area |\n| :--- | :--- | :--- | :--- | :--- |\n| **Unit 1** | Fundamentals of Anthropology | To-Do | - | Meaning, Scope, Branches, Relationships with other sciences. |\n| **Unit 2** | Human Evolution & Primatology | To-Do | - | Theories of evolution, Primate classification, Extinct hominins. |\n| **Unit 3** | Modern Human Variation | To-Do | - | Biological diversity, Race vs Racism, Genetics and environment. |\n| **Unit 4** | Human Growth & Social/Cultural | To-Do | - | Growth stages, Marriage, Family, Kinship, Religion, Economy, Politics. |\n| **Unit 5** | Human Genetics & Prehistoric Archaeology | To-Do | - | Population genetics, blood groups, Scope of prehistoric archaeology. |\n| **Unit 6** | Anthropological Theories & Palaeolithic India| To-Do | - | Evolutionism, Functionalism, Structuralism, Lower Palaeolithic in India. |\n| **Unit 7** | Indian Society and Culture | To-Do | - | Varna, Jati, Purusharthas, Sanskritization, Dominant Caste, Jajmani system. |\n| **Unit 8** | Tribal Situation in India | To-Do | - | PVTGs, Constitutional safeguards, Tribal movements, Development policies. |\n| **Unit 9** | Indian Anthropology Development & Applied Anthro| To-Do | - | History of anthropological thought in India, Applied vs Action, Interventions. |\n| **Unit 10** | Research Methods and Techniques | To-Do | - | Ethnography, Emic/Etic perspectives, PRA, Basic statistics in research. |\n", "Implementation_Plan.md": "# PDF Integration Implementation Plan\n\n## \ud83d\udccc Overview\nThis plan outlines how the 20+ anthropological PDF files discovered i
