nnot have an heuristic expiry computed. If this isn't present, responses neither with an explicit expiration nor heuristically cacheable will not be cached. Default `undefined`.\n- `type` - The [type of cache](https://developer.mozilla.org/en-US/docs/Web/HTTP/Guides/Caching#types_of_caches) for Undici to act as. Can be `shared` or `private`. Default `shared`. `private` implies privately cacheable responses will be cached and potentially shared with other users of your application.\n\n**Usage with `fetch`**\n\n```js\nconst { Agent, cacheStores, interceptors, setGlobalDispatcher } = require('undici')\n\nconst client = new Agent().compose(interceptors.cache({\n  store: new cacheStores.MemoryCacheStore({\n    maxSize: 100 * 1024 * 1024, // 100MB\n    maxCount: 1000,\n    maxEntrySize: 5 * 1024 * 1024 // 5MB\n  })\n}))\n\nsetGlobalDispatcher(client)\n\n// First request goes to the network and is cached when cache headers allow it.\nconst first = await fetch('https://example.com/data')\n\n// Second request can be served from cache according to RFC9111 rules.\nconst second = await fetch('https://example.com/data')\n```\n\n##### `Deduplicate Interceptor`\n\nThe `deduplicate` interceptor deduplicates concurrent identical requests. When multiple identical requests are made while one is already in-flight, only one request is sent to the origin server, and all waiting handlers receive the same response. This reduces server load and improves performance.\n\n**Options**\n\n- `methods` - The [**safe** HTTP methods](https://www.rfc-editor.org/rfc/rfc9110#section-9.2.1) to deduplicate. Default `['GET']`.\n- `skipHeaderNames` - Header names that, if present in a request, will cause the request to skip deduplication entirely. Useful for headers like `idempotency-key` where presence indicates unique processing. Header name matching is case-insensitive. Default `[]`.\n- `excludeHeaderNames` - Header names to exclude from the deduplication key. Requests with different values for these headers will still be deduplicated together. Useful for headers like `x-request-id` that vary per request but shouldn't affect deduplication. Header name matching is case-insensitive. Default `[]`.\n- `maxBufferSize` - Maximum bytes buffered per paused waiting deduplicated handler. If a waiting handler remains paused and exceeds this threshold, it is failed with an abort error to prevent unbounded memory growth. Default `5 * 1024 * 1024`.\n\n**Usage**\n\n```js\nconst { Client, interceptors } = require(\"undici\");\nconst { deduplicate, cache } = interceptors;\n\n// Deduplicate only\nconst client = new Client(\"http://service.example\").compose(\n  deduplicate()\n);\n\n// Deduplicate with caching\nconst clientWithCache = new Client(\"http://service.example\").compose(\n  deduplicate(),\n  cache()\n);\n```\n\nRequests are considered identical if they have the same:\n- Origin\n- HTTP method\n- Path\n- Request headers (excluding any headers specified in `excludeHeaderNames`)\n\nAll deduplicated requests receive the complete response including status code, headers, and body.\n\nFor observability, request deduplication events are published to the `undici:request:pending-requests` [diagnostic channel](/docs/docs/api/DiagnosticsChannel.md#undicirequestpending-requests).\n\n## Instance Events\n\n### Event: `'connect'`\n\nParameters:\n\n* **origin** `URL`\n* **targets** `Array<Dispatcher>`\n\n### Event: `'disconnect'`\n\nParameters:\n\n* **origin** `URL`\n* **targets** `Array<Dispatcher>`\n* **error** `Error`\n\nEmitted when the dispatcher has been disconnected from the origin.\n\n> **Note**: For HTTP/2, this event is also emitted when the dispatcher has received the [GOAWAY Frame](https://webconcepts.info/concepts/http2-frame-type/0x7) with an Error with the message `HTTP/2: \"GOAWAY\" frame received` and the code `UND_ERR_INFO`.\n> Due to nature of the protocol of using binary frames, it is possible that requests gets hanging as a frame can be received between the `HEADER` and `DATA` frames.\n> It is recommended to handle this event and close the dispatcher to create a new HTTP/2 session.\n\n### Event: `'connectionError'`\n\nParameters:\n\n* **origin** `URL`\n* **targets** `Array<Dispatcher>`\n* **error** `Error`\n\nEmitted when dispatcher fails to connect to\norigin.\n\n### Event: `'drain'`\n\nParameters:\n\n* **origin** `URL`\n\nEmitted when dispatcher is no longer busy.\n\n## Parameter: `UndiciHeaders`\n\n* `Record<string, string | string[] | undefined> | string[] | Iterable<[string, string | string[] | undefined]> | null`\n\nHeader arguments such as `options.headers` in [`Client.dispatch`](/docs/docs/api/Client.md#clientdispatchoptions-handlers) can be specified in three forms:\n* As an object specified by the `Record<string, string | string[] | undefined>` (`IncomingHttpHeaders`) type.\n* As an array of strings. An array representation of a header list must have an even length, or an `InvalidArgumentError` will be thrown.\n* As an iterable that can encompass `Headers`, `Map`, or a custom iterator returning key-value pairs.\nKeys are lowercase and values are not modified.\n\nUndici validates header syntax at the protocol level (for example, invalid header names and invalid control characters in string values), but it does not sanitize untrusted application input. Validate and sanitize any user-provided header names and values before passing them to Undici to prevent header/body injection vulnerabilities.\n\nWhen using the array header format (`string[]`), Undici processes only indexed elements. Additional properties assigned to the array object are ignored.\n\nResponse headers will derive a `host` from the `url` of the [Client](/docs/docs/api/Client.md#class-client) instance if no `host` header was previously specified.\n\n### Example 1 - Object\n\n```js\n{\n  'content-length': '123',\n  'content-type': 'text/plain',\n  connection: 'keep-alive',\n  host: 'mysite.com',\n  accept: '*/*'\n}\n```\n\n### Example 2 - Array\n\n```js\n[\n  'content-length', '123',\n  'content-type', 'text/plain',\n  'connection', 'keep-alive',\n  'host', 'mysite.com',\n  'accept', '*/*'\n]\n```\n\n### Example 3 - Iterable\n\n```js\nnew Headers({\n  'content-length': '123',\n  'content-type': 'text/plain',\n  connection: 'keep-alive',\n  host: 'mysite.com',\n  accept: '*/*'\n})\n```\nor\n```js\nnew Map([\n  ['content-length', '123'],\n  ['content-type', 'text/plain'],\n  ['connection', 'keep-alive'],\n  ['host', 'mysite.com'],\n  ['accept', '*/*']\n])\n```\nor\n```js\n{\n  *[Symbol.iterator] () {\n    yield ['content-length', '123']\n    yield ['content-type', 'text/plain']\n    yield ['connection', 'keep-alive']\n    yield ['host', 'mysite.com']\n    yield ['accept', '*/*']\n  }\n}\n```\n", "node_modules/undici/docs/docs/api/Debug.md": "# Debug\n\nUndici (and subsenquently `fetch` and `websocket`) exposes a debug statement that can be enabled by setting `NODE_DEBUG` within the environment.\n\nThe flags available are:\n\n## `undici`\n\nThis flag enables debug statements for the core undici library.\n\n```sh\nNODE_DEBUG=undici node script.js\n\nUNDICI 16241: connecting to nodejs.org using https:h1\nUNDICI 16241: connecting to nodejs.org using https:h1\nUNDICI 16241: connected to nodejs.org using https:h1\nUNDICI 16241: sending request to GET https://nodejs.org/\nUNDICI 16241: received response to GET https://nodejs.org/ - HTTP 307\nUNDICI 16241: connecting to nodejs.org using https:h1\nUNDICI 16241: trailers received from GET https://nodejs.org/\nUNDICI 16241: connected to nodejs.org using https:h1\nUNDICI 16241: sending request to GET https://nodejs.org/en\nUNDICI 16241: received response to GET https://nodejs.org/en - HTTP 200\nUNDICI 16241: trailers received from GET https://nodejs.org/en\n```\n\n## `fetch`\n\nThis flag enables debug statements for the `fetch` API.\n\n> **Note**: statements are pretty similar to the ones in the `undici` flag, but scoped to `fetch`\n\n```sh\nNODE_DEBUG=fetch node script.js\n\nFETCH 16241: connecting to nodejs.org using https:h1\nFETCH 16241: connecting to nodejs.org using https:h1\nFETCH 16241: connected to nodejs.org using https:h1\nFETCH 16241: sending request to GET https://nodejs.org/\nFETCH 16241: received response to GET https://nodejs.org/ - HTTP 307\nFETCH 16241: connecting to nodejs.org using https:h1\nFETCH 16241: trailers received from GET https://nodejs.org/\nFETCH 16241: connected to nodejs.org using https:h1\nFETCH 16241: sending request to GET https://nodejs.org/en\nFETCH 16241: received response to GET https://nodejs.org/en - HTTP 200\nFETCH 16241: trailers received from GET https://nodejs.org/en\n```\n\n## `websocket`\n\nThis flag enables debug statements for the `Websocket` API.\n\n> **Note**: statements can overlap with `UNDICI` ones if `undici` or `fetch` flag has been enabled as well.\n\n```sh\nNODE_DEBUG=websocket node script.js\n\nWEBSOCKET 18309: connecting to echo.websocket.org using https:h1\nWEBSOCKET 18309: connected to echo.websocket.org using https:h1\nWEBSOCKET 18309: sending request to GET https://echo.websocket.org/\nWEBSOCKET 18309: connection opened <ip_address>\n```\n", "node_modules/undici/docs/docs/api/RedirectHandler.md": "# Class: RedirectHandler\n\nA class that handles redirection logic for HTTP requests.\n\n## `new RedirectHandler(dispatch, maxRedirections, opts, handler)`\n\nArguments:\n\n- **dispatch** `function` - The dispatch function to be called after every retry.\n- **maxRedirections** `number` - Maximum number of redirections allowed.\n- **opts** `object` - Options for handling redirection.\n- **handler** `object` - An object containing handlers for different stages of the request lifecycle.\n\nReturns: `RedirectHandler`\n\n### Parameters\n\n- **dispatch** `(options: Dispatch.DispatchOptions, handlers: Dispatch.DispatchHandler) => Promise<Dispatch.DispatchResponse>` (required) - Dispatch function to be called after every redirection.\n- **maxRedirections** `number` (required) - Maximum number of redirections allowed.\n- **opts** `object` (required) - Options for handling redirection.\n- **handler** `object` (required) - Handlers for different stages of the request lifecycle.\n\n### Properties\n\n- **location** `string` - The current redirection location.\n- **abort** `function` - The abort function.\n- **opts** `object` - The options for handling redirection.\n- **maxRedirections** `number` - Maximum number of redirections allowed.\n- **handler** `object` - Handlers for different stages of the request lifecycle.\n- **history** `Array` - An array representing the history of URLs during redirection.\n\n### Methods\n\n#### `onConnect(abort)`\n\nCalled when the connection is established.\n\nParameters:\n\n- **abort** `function` - The abort function.\n\n#### `onUpgrade(statusCode, headers, socket)`\n\nCalled when an upgrade is requested.\n\nParameters:\n\n- **statusCode** `number` - The HTTP status code.\n- **headers** `object` - The headers received in the response.\n- **socket** `object` - The socket object.\n\n#### `onError(error)`\n\nCalled when an error occurs.\n\nParameters:\n\n- **error** `Error` - The error that occurred.\n\n#### `onHeaders(statusCode, headers, resume, statusText)`\n\nCalled when headers are received.\n\nParameters:\n\n- **statusCode** `number` - The HTTP status code.\n- **headers** `object` - The headers received in the response.\n- **resume** `function` - The resume function.\n- **statusText** `string` - The status text.\n\n#### `onData(chunk)`\n\nCalled when data is received.\n\nParameters:\n\n- **chunk** `Buffer` - The data chunk received.\n\n#### `onComplete(trailers)`\n\nCalled when the request is complete.\n\nParameters:\n\n- **trailers** `object` - The trailers received.\n\n#### `onBodySent(chunk)`\n\nCalled when the request body is sent.\n\nParameters:\n\n- **chunk** `Buffer` - The chunk of the request body sent.\n", "node_modules/undici/docs/docs/best-practices/proxy.md": "# Connecting through a proxy\n\nConnecting through a proxy is possible by:\n\n- Using [ProxyAgent](/docs/docs/api/ProxyAgent.md).\n- Configuring `Client` or `Pool` constructor.\n\nThe proxy url should be passed to the `Client` or `Pool` constructor, while the upstream server url\nshould be added to every request call in the `path`.\nFor instance, if you need to send a request to the `/hello` route of your upstream server,\nthe `path` should be `path: 'http://upstream.server:port/hello?foo=bar'`.\n\nIf you proxy requires basic authentication, you can send it via the `proxy-authorization` header.\n\n### Connect without authentication\n\n```js\nimport { Client } from 'undici'\nimport { createServer } from 'http'\nimport { createProxy } from 'proxy'\n\nconst server = await buildServer()\nconst proxyServer = await buildProxy()\n\nconst serverUrl = `http://localhost:${server.address().port}`\nconst proxyUrl = `http://localhost:${proxyServer.address().port}`\n\nserver.on('request', (req, res) => {\n  console.log(req.url) // '/hello?foo=bar'\n  res.setHeader('content-type', 'application/json')\n  res.end(JSON.stringify({ hello: 'world' }))\n})\n\nconst client = new Client(proxyUrl)\n\nconst response = await client.request({\n  method: 'GET',\n  path: serverUrl + '/hello?foo=bar'\n})\n\nresponse.body.setEncoding('utf8')\nlet data = ''\nfor await (const chunk of response.body) {\n  data += chunk\n}\nconsole.log(response.statusCode) // 200\nconsole.log(JSON.parse(data)) // { hello: 'world' }\n\nserver.close()\nproxyServer.close()\nclient.close()\n\nfunction buildServer () {\n  return new Promise((resolve, reject) => {\n    const server = createServer()\n    server.listen(0, () => resolve(server))\n  })\n}\n\nfunction buildProxy () {\n  return new Promise((resolve, reject) => {\n    const server = createProxy(createServer())\n    server.listen(0, () => resolve(server))\n  })\n}\n```\n\n### Connect with authentication\n\n```js\nimport { Client } from 'undici'\nimport { createServer } from 'http'\nimport { createProxy } from 'proxy'\n\nconst server = await buildServer()\nconst proxyServer = await buildProxy()\n\nconst serverUrl = `http://localhost:${server.address().port}`\nconst proxyUrl = `http://localhost:${proxyServer.address().port}`\n\nproxyServer.authenticate = function (req) {\n  return req.headers['proxy-authorization'] === `Basic ${Buffer.from('user:pass').toString('base64')}`\n}\n\nserver.on('request', (req, res) => {\n  console.log(req.url) // '/hello?foo=bar'\n  res.setHeader('content-type', 'application/json')\n  res.end(JSON.stringify({ hello: 'world' }))\n})\n\nconst client = new Client(proxyUrl)\n\nconst response = await client.request({\n  method: 'GET',\n  path: serverUrl + '/hello?foo=bar',\n  headers: {\n    'proxy-authorization': `Basic ${Buffer.from('user:pass').toString('base64')}`\n  }\n})\n\nresponse.body.setEncoding('utf8')\nlet data = ''\nfor await (const chunk of response.body) {\n  data += chunk\n}\nconsole.log(response.statusCode) // 200\nconsole.log(JSON.parse(data)) // { hello: 'world' }\n\nserver.close()\nproxyServer.close()\nclient.close()\n\nfunction buildServer () {\n  return new Promise((resolve, reject) => {\n    const server = createServer()\n    server.listen(0, () => resolve(server))\n  })\n}\n\nfunction buildProxy () {\n  return new Promise((resolve, reject) => {\n    const server = createProxy(createServer())\n    server.listen(0, () => resolve(server))\n  })\n}\n```\n\n", "node_modules/undici/docs/docs/best-practices/mocking-request.md": "# Mocking Request\n\nUndici has its own mocking [utility](/docs/docs/api/MockAgent.md). It allow us to intercept undici HTTP requests and return mocked values instead. It can be useful for testing purposes.\n\nExample:\n\n```js\n// bank.mjs\nimport { request } from 'undici'\n\nexport async function bankTransfer(recipient, amount) {\n  const { body } = await request('http://localhost:3000/bank-transfer',\n    {\n      method: 'POST',\n      headers: {\n        'X-TOKEN-SECRET': 'SuperSecretToken',\n      },\n      body: JSON.stringify({\n        recipient,\n        amount\n      })\n    }\n  )\n  return await body.json()\n}\n```\n\nAnd this is what the test file looks like:\n\n```js\n// index.test.mjs\nimport { strict as assert } from 'node:assert'\nimport { MockAgent, setGlobalDispatcher, } from 'undici'\nimport { bankTransfer } from './bank.mjs'\n\nconst mockAgent = new MockAgent();\n\nsetGlobalDispatcher(mockAgent);\n\n// Provide the base url to the request\nconst mockPool = mockAgent.get('http://localhost:3000');\n\n// intercept the request\nmockPool.intercept({\n  path: '/bank-transfer',\n  method: 'POST',\n  headers: {\n    'X-TOKEN-SECRET': 'SuperSecretToken',\n  },\n  body: JSON.stringify({\n    recipient: '1234567890',\n    amount: '100'\n  })\n}).reply(200, {\n  message: 'transaction processed'\n})\n\nconst success = await bankTransfer('1234567890', '100')\n\nassert.deepEqual(success, { message: 'transaction processed' })\n\n// if you dont want to check whether the body or the headers contain the same value\n// just remove it from interceptor\nmockPool.intercept({\n  path: '/bank-transfer',\n  method: 'POST',\n}).reply(400, {\n  message: 'bank account not found'\n})\n\nconst badRequest = await bankTransfer('1234567890', '100')\n\nassert.deepEqual(badRequest, { message: 'bank account not found' })\n```\n\nExplore other MockAgent functionality [here](/docs/docs/api/MockAgent.md)\n\n## Access agent call history\n\nUsing a MockAgent also allows you to make assertions on the configuration used to make your request in your application.\n\nHere is an example :\n\n```js\n// index.test.mjs\nimport { strict as assert } from 'node:assert'\nimport { MockAgent, setGlobalDispatcher, fetch } from 'undici'\nimport { app } from './app.mjs'\n\n// given an application server running on http://localhost:3000\nawait app.start()\n\n// enable call history at instantiation\nconst mockAgent = new MockAgent({ enableCallHistory: true })\n// or after instantiation\nmockAgent.enableCallHistory()\n\nsetGlobalDispatcher(mockAgent)\n\n// this call is made (not intercepted)\nawait fetch(`http://localhost:3000/endpoint?query='hello'`, {\n  method: 'POST',\n  headers: { 'content-type': 'application/json' }\n  body: JSON.stringify({ data: '' })\n})\n\n// access to the call history of the MockAgent (which register every call made intercepted or not)\nassert.ok(mockAgent.getCallHistory()?.calls().length === 1)\nassert.strictEqual(mockAgent.getCallHistory()?.firstCall()?.fullUrl, `http://localhost:3000/endpoint?query='hello'`)\nassert.strictEqual(mockAgent.getCallHistory()?.firstCall()?.body, JSON.stringify({ data: '' }))\nassert.deepStrictEqual(mockAgent.getCallHistory()?.firstCall()?.searchParams, { query: 'hello' })\nassert.strictEqual(mockAgent.getCallHistory()?.firstCall()?.port, '3000')\nassert.strictEqual(mockAgent.getCallHistory()?.firstCall()?.host, 'localhost:3000')\nassert.strictEqual(mockAgent.getCallHistory()?.firstCall()?.method, 'POST')\nassert.strictEqual(mockAgent.getCallHistory()?.firstCall()?.path, '/endpoint')\nassert.deepStrictEqual(mockAgent.getCallHistory()?.firstCall()?.headers, { 'content-type': 'application/json' })\n\n// clear all call history logs\nmockAgent.clearCallHistory()\n\nassert.ok(mockAgent.getCallHistory()?.calls().length === 0)\n```\n\nCalling `mockAgent.close()` will automatically clear and delete every call history for you.\n\nExplore other MockAgent functionality [here](/docs/docs/api/MockAgent.md)\n\nExplore other MockCallHistory functionality [here](/docs/docs/api/MockCallHistory.md)\n\nExplore other MockCallHistoryLog functionality [here](/docs/docs/api/MockCallHistoryLog.md)\n\n## Debug Mock Value\n\nWhen the interceptor and the request options are not the same, undici will automatically make a real HTTP request. To prevent real requests from being made, use `mockAgent.disableNetConnect()`:\n\n```js\nconst mockAgent = new MockAgent();\n\nsetGlobalDispatcher(mockAgent);\nmockAgent.disableNetConnect()\n\n// Provide the base url to the request\nconst mockPool = mockAgent.get('http://localhost:3000');\n\nmockPool.intercept({\n  path: '/bank-transfer',\n  method: 'POST',\n}).reply(200, {\n  message: 'transaction processed'\n})\n\nconst badRequest = await bankTransfer('1234567890', '100')\n// Will throw an error\n// MockNotMatchedError: Mock dispatch not matched for path '/bank-transfer':\n// subsequent request to origin http://localhost:3000 was not allowed (net.connect disabled)\n```\n\n## Reply with data based on request\n\nIf the mocked response needs to be dynamically derived from the request parameters, you can provide a function instead of an object to `reply`:\n\n```js\nmockPool.intercept({\n  path: '/bank-transfer',\n  method: 'POST',\n  headers: {\n    'X-TOKEN-SECRET': 'SuperSecretToken',\n  },\n  body: JSON.stringify({\n    recipient: '1234567890',\n    amount: '100'\n  })\n}).reply(200, (opts) => {\n  // do something with opts\n\n  return { message: 'transaction processed' }\n})\n```\n\nin this case opts will be\n\n```\n{\n  method: 'POST',\n  headers: { 'X-TOKEN-SECRET': 'SuperSecretToken' },\n  body: '{\"recipient\":\"1234567890\",\"amount\":\"100\"}',\n  origin: 'http://localhost:3000',\n  path: '/bank-transfer'\n}\n```\n", "node_modules/undici/docs/docs/best-practices/undici-vs-builtin-fetch.md": "# Undici Module vs. Node.js Built-in Fetch\n\nNode.js has shipped a built-in `fetch()` implementation powered by undici since\nNode.js v18. This guide explains the relationship between the `undici` npm\npackage and the built-in `fetch`, and when you should install one versus relying\non the other.\n\n## Background\n\nThe `fetch()`, `Request`, `Response`, `Headers`, and `FormData` globals in\nNode.js v18+ are provided by a version of undici that is bundled into Node.js\nitself. You can check which version is bundled with:\n\n```js\nconsole.log(process.versions.undici); // e.g., \"7.5.0\"\n```\n\nWhen you install undici from npm, you get the full library with all of its\nadditional APIs, and potentially a newer release than what your Node.js version\nbundles.\n\n## Keep `fetch` and `FormData` from the same implementation\n\nWhen you send a `FormData` body, keep `fetch` and `FormData` together from the\nsame implementation.\n\nUse one of these patterns:\n\n### Built-in globals\n\n```js\nconst body = new FormData()\nbody.set('name', 'some')\nbody.set('someOtherProperty', '8000')\n\nawait fetch('https://example.com', {\n  method: 'POST',\n  body\n})\n```\n\n### `undici` module imports\n\n```js\nimport { fetch, FormData } from 'undici'\n\nconst body = new FormData()\nbody.set('name', 'some')\nbody.set('someOtherProperty', '8000')\n\nawait fetch('https://example.com', {\n  method: 'POST',\n  body\n})\n```\n\n### `undici.install()` globals\n\nIf you want the installed `undici` package to provide the globals, call\n[`install()`](/docs/api/GlobalInstallation.md):\n\n```js\nimport { install } from 'undici'\n\ninstall()\n\nconst body = new FormData()\nbody.set('name', 'some')\nbody.set('someOtherProperty', '8000')\n\nawait fetch('https://example.com', {\n  method: 'POST',\n  body\n})\n```\n\n`install()` replaces the global `fetch`, `Headers`, `Response`, `Request`, and\n`FormData` implementations with undici's versions, and also installs undici's\n`WebSocket`, `CloseEvent`, `ErrorEvent`, `MessageEvent`, and `EventSource`\nglobals.\n\nAvoid mixing implementations in the same request, for example:\n\n```js\nimport { fetch } from 'undici'\n\nconst body = new FormData()\n\nawait fetch('https://example.com', {\n  method: 'POST',\n  body\n})\n```\n\n```js\nimport { FormData } from 'undici'\n\nconst body = new FormData()\n\nawait fetch('https://example.com', {\n  method: 'POST',\n  body\n})\n```\n\nThose combinations may behave differently across Node.js and undici versions.\nUsing matching pairs keeps multipart handling predictable.\n\n## When you do NOT need to install undici\n\nIf all of the following are true, you can rely on the built-in globals and skip\nadding undici to your dependencies:\n\n- You only need the standard Fetch API (`fetch`, `Request`, `Response`,\n  `Headers`, `FormData`).\n- You are running Node.js v18 or later.\n- You do not depend on features or bug fixes introduced in a version of undici\n  newer than the one bundled with your Node.js release.\n- You want zero additional runtime dependencies.\n- You want cross-platform interoperability with browsers and other runtimes\n  (Deno, Bun, Cloudflare Workers, etc.) using the same Fetch API surface.\n\nThis is common in applications that make straightforward HTTP requests or in\nlibraries that target multiple JavaScript runtimes.\n\n## When you SHOULD install undici\n\nInstall undici from npm when you need capabilities beyond the standard Fetch API:\n\n### Advanced HTTP APIs\n\nundici exposes `request`, `stream`, `pipeline`, and `connect` methods that\nprovide lower-level control and significantly better performance than `fetch`:\n\n```js\nimport { request } from 'undici';\n\nconst { statusCode, headers, body } = await request('https://example.com');\nconst data = await body.json();\n```\n\n### Connection pooling and dispatchers\n\n`Client`, `Pool`, `BalancedPool`, `Agent`, and their configuration options\nlet you manage connection lifecycle, keep-alive behavior, pipelining depth,\nand concurrency limits:\n\n```js\nimport { Pool } from 'undici';\n\nconst pool = new Pool('https://example.com', { connections: 10 });\nconst { body } = await pool.request({ path: '/', method: 'GET' });\n```\n\n### Proxy support\n\n`ProxyAgent` and `EnvHttpProxyAgent` handle HTTP(S) proxying. Note that\nNode.js v22.21.0+ and v24.0.0+ support environment-variable-based proxy\nconfiguration for the built-in `fetch` via the `--use-env-proxy` flag (or\n`NODE_USE_ENV_PROXY=1`). However, undici's `ProxyAgent` still provides\nprogrammatic control through the dispatcher API:\n\n```js\nimport { ProxyAgent, fetch } from 'undici';\n\nconst proxyAgent = new ProxyAgent('https://my-proxy.example.com:8080');\nconst response = await fetch('https://example.com', { dispatcher: proxyAgent });\n```\n\n### Testing and mocking\n\n`MockAgent`, `MockClient`, and `MockPool` let you intercept and mock HTTP\nrequests without patching globals or depending on external libraries:\n\n```js\nimport { MockAgent, setGlobalDispatcher, fetch } from 'undici';\n\nconst mockAgent = new MockAgent();\nsetGlobalDispatcher(mockAgent);\n\nconst pool = mockAgent.get('https://example.com');\npool.intercept({ path: '/api' }).reply(200, { message: 'mocked' });\n```\n\n### Interceptors and middleware\n\nCustom dispatchers and interceptors (retry, redirect, cache, DNS) give you\nfine-grained control over how requests are processed.\n\n### Newer version than what Node.js bundles\n\nThe npm package often includes features, performance improvements, and bug fixes\nthat have not yet landed in a Node.js release. If you need a specific fix or\nfeature, you can install a newer version directly.\n\n## Version compatibility\n\n| Node.js version | Bundled undici version | Notes |\n|---|---|---|\n| v18.x | ~5.x | `fetch` is experimental (behind `--experimental-fetch` in early v18) |\n| v20.x | ~6.x | `fetch` is stable |\n| v22.x | ~6.x / ~7.x | `fetch` is stable |\n| v24.x | ~7.x | `fetch` is stable; env-proxy support via `--use-env-proxy` |\n\nYou can always check the exact bundled version at runtime with\n`process.versions.undici`.\n\nInstalling undici from npm does not replace the built-in globals. If you want\nyour installed version to replace the global `fetch` and related classes, use\n[`install()`](/docs/api/GlobalInstallation.md). Otherwise, import `fetch`\ndirectly from `'undici'`:\n\n```js\nimport { fetch } from 'undici' // uses your installed version, not the built-in\n```\n\n## Further reading\n\n- [API Reference: Fetch](/docs/api/Fetch.md)\n- [API Reference: Client](/docs/api/Client.md)\n- [API Reference: Pool](/docs/api/Pool.md)\n- [API Reference: ProxyAgent](/docs/api/ProxyAgent.md)\n- [API Reference: MockAgent](/docs/api/MockAgent.md)\n- [API Reference: Global Installation](/docs/api/GlobalInstallation.md)\n", "node_modules/undici/docs/docs/best-practices/writing-tests.md": "# Writing tests\n\nUndici is tuned for a production use case and its default will keep\na socket open for a few seconds after an HTTP request is completed to\nremove the overhead of opening up a new socket. These settings that makes\nUndici shine in production are not a good fit for using Undici in automated\ntests, as it will result in longer execution times.\n\nThe following are good defaults that will keep the socket open for only 10ms:\n\n```js\nimport { request, setGlobalDispatcher, Agent } from 'undici'\n\nconst agent = new Agent({\n  keepAliveTimeout: 10, // milliseconds\n  keepAliveMaxTimeout: 10 // milliseconds\n})\n\nsetGlobalDispatcher(agent)\n```\n\n## Guarding against unexpected disconnects\n\nUndici's `Client` automatically reconnects after a socket error. This means\na test can silently disconnect, reconnect, and still pass. Unfortunately, \nthis could mask bugs like unexpected parser errors or protocol violations.\nTo catch these silent reconnections, add a disconnect guard after creating \na `Client`:\n\n```js\nconst { Client } = require('undici')\nconst { test, after } = require('node:test')\nconst { tspl } = require('@matteo.collina/tspl')\n\ntest('example with disconnect guard', async (t) => {\n  t = tspl(t, { plan: 1 })\n\n  const client = new Client('http://localhost:3000')\n  after(() => client.close())\n\n  client.on('disconnect', () => {\n    if (!client.closed && !client.destroyed) {\n      t.fail('unexpected disconnect')\n    }\n  })\n\n  // ... test logic ...\n})\n```\n\n`client.close()` and `client.destroy()` both emit `'disconnect'` events, but\nthose are expected. The guard only fails when a disconnect happens during the\nactive test (i.e., `!client.closed && !client.destroyed` is true).\n\nSkip the guard for tests where a disconnect is expected behavior, such as:\n\n- Signal aborts (`signal.emit('abort')`, `ac.abort()`)\n- Server-side destruction (`res.destroy()`, `req.socket.destroy()`)\n- Client-side body destruction mid-stream (`data.body.destroy()`)\n- Timeout errors (`HeadersTimeoutError`, `BodyTimeoutError`)\n- Successful upgrades (the socket is detached from the `Client`)\n- Retry/reconnect tests where the disconnect triggers the retry\n- HTTP parser errors from malformed responses (`HTTPParserError`)\n", "node_modules/undici/docs/docs/best-practices/client-certificate.md": "# Client certificate\n\nClient certificate authentication can be configured with the `Client`, the required options are passed along through the `connect` option.\n\nThe client certificates must be signed by a trusted CA. The Node.js default is to trust the well-known CAs curated by Mozilla.\n\nSetting the server option `requestCert: true` tells the server to request the client certificate.\n\nThe server option `rejectUnauthorized: false` allows us to handle any invalid certificate errors in client code. The `authorized` property on the socket of the incoming request will show if the client certificate was valid. The `authorizationError` property will give the reason if the certificate was not valid.\n\n### Client Certificate Authentication\n\n```js\nconst { readFileSync } = require('node:fs')\nconst { join } = require('node:path')\nconst { createServer } = require('node:https')\nconst { Client } = require('undici')\n\nconst serverOptions = {\n  ca: [\n    readFileSync(join(__dirname, 'client-ca-crt.pem'), 'utf8')\n  ],\n  key: readFileSync(join(__dirname, 'server-key.pem'), 'utf8'),\n  cert: readFileSync(join(__dirname, 'server-crt.pem'), 'utf8'),\n  requestCert: true,\n  rejectUnauthorized: false\n}\n\nconst server = createServer(serverOptions, (req, res) => {\n  // true if client cert is valid\n  if(req.client.authorized === true) {\n    console.log('valid')\n  } else {\n    console.error(req.client.authorizationError)\n  }\n  res.end()\n})\n\nserver.listen(0, function () {\n  const tls = {\n    ca: [\n      readFileSync(join(__dirname, 'server-ca-crt.pem'), 'utf8')\n    ],\n    key: readFileSync(join(__dirname, 'client-key.pem'), 'utf8'),\n    cert: readFileSync(join(__dirname, 'client-crt.pem'), 'utf8'),\n    rejectUnauthorized: false,\n    servername: 'agent1'\n  }\n  const client = new Client(`https://localhost:${server.address().port}`, {\n    connect: tls\n  })\n\n  client.request({\n    path: '/',\n    method: 'GET'\n  }, (err, { body }) => {\n    body.on('data', (buf) => {})\n    body.on('end', () => {\n      client.close()\n      server.close()\n    })\n  })\n})\n```\n", "node_modules/undici/docs/docs/best-practices/crawling.md": "# Crawling\n\n[RFC 9309](https://datatracker.ietf.org/doc/html/rfc9309) defines crawlers as automated clients.\n\nSome web servers may reject requests that omit the `User-Agent` header or that use common defaults such as `'curl/7.79.1'`.\n\nIn **undici**, the default user agent is `'undici'`. Since undici is integrated into Node.js core as the implementation of `fetch()`, requests made via `fetch()` use `'node'` as the default user agent.\n\nIt is recommended to specify a **custom `User-Agent` header** when implementing crawlers. Providing a descriptive user agent allows servers to correctly identify the client and reduces the likelihood of requests being denied.\n\nA user agent string should include sufficient detail to identify the crawler and provide contact information. For example:\n\n```\nAcmeCo Crawler - acme.co - contact@acme.co\n```\n\nWhen adding contact details, avoid using personal identifiers such as your own name or a private email address\u2014especially in a professional or employment context. Instead, use a role-based or organizational contact (e.g., crawler-team@company.com) to protect individual privacy while still enabling communication.\n\nIf a crawler behaves unexpectedly\u2014for example, due to misconfiguration or implementation errors\u2014server administrators can use the information in the user agent to contact the operator and coordinate an appropriate resolution.\n\nThe `User-Agent` header can be set on individual requests or applied globally by configuring a custom dispatcher.\n\n**Example: setting a `User-Agent` per request**\n\n```js\nimport { fetch } from 'undici'\n\nconst headers = {\n  'User-Agent': 'AcmeCo Crawler - acme.co - contact@acme.co'\n}\n\nconst res = await fetch('https://example.com', { headers })\n```\n\n## Best Practices for Crawlers\n\nWhen developing a crawler, the following practices are recommended in addition to setting a descriptive `User-Agent` header:\n\n* **Respect `robots.txt`**\n  Follow the directives defined in the target site\u2019s `robots.txt` file, including disallowed paths and optional crawl-delay settings (see [W3C guidelines](https://www.w3.org/wiki/Write_Web_Crawler)).\n\n* **Rate limiting**\n  Regulate request frequency to avoid imposing excessive load on servers. Introduce delays between requests or limit the number of concurrent requests. The W3C suggests at least one second between requests.\n\n* **Error handling**\n  Implement retry logic with exponential backoff for transient failures, and stop requests when persistent errors occur (e.g., HTTP 403 or 429).\n\n* **Monitoring and logging**\n  Track request volume, response codes, and error rates to detect misbehavior and address issues proactively.\n\n* **Contact information**\n  Always include valid and current contact details in the `User-Agent` string so that administrators can reach the crawler operator if necessary.\n\n## References and Further Reading\n\n* [RFC 9309: The Robots Exclusion Protocol](https://datatracker.ietf.org/doc/html/rfc9309)\n* [W3C Wiki: Write Web Crawler](https://www.w3.org/wiki/Write_Web_Crawler)\n* [Ethical Web Crawling (WWW 2010 Conference Paper)](https://archives.iw3c2.org/www2010/proceedings/www/p1101.pdf)\n", "node_modules/undici/lib/web/subresource-integrity/Readme.md": "# Subresource Integrity\n\nbased on Editor\u2019s Draft, 12 June 2025\n\nThis module provides support for Subresource Integrity (SRI) in the context of web fetch operations. SRI is a security feature that allows clients to verify that fetched resources are delivered without unexpected manipulation.\n\n## Links\n\n- [Subresource Integrity](https://w3c.github.io/webappsec-subresource-integrity/)", "node_modules/undici/types/README.md": "# undici-types\n\nThis package is a dual-publish of the [undici](https://www.npmjs.com/package/undici) library types. The `undici` package **still contains types**. This package is for users who _only_ need undici types (such as for `@types/node`). It is published alongside every release of `undici`, so you can always use the same version.\n\n- [GitHub nodejs/undici](https://github.com/nodejs/undici)\n- [Undici Documentation](https://undici.nodejs.org/#/)\n", "node_modules/tldts/README.md": "# tldts - Blazing Fast URL Parsing\n\n`tldts` is a JavaScript library to extract hostnames, domains, public suffixes, top-level domains and subdomains from URLs.\n\n**Features**:\n\n1. Tuned for **performance** (order of 0.1 to 1 \u03bcs per input)\n2. Handles both URLs and hostnames\n3. Full Unicode/IDNA support\n4. Support parsing email addresses\n5. Detect IPv4 and IPv6 addresses\n6. Continuously updated version of the public suffix list\n7. **TypeScript**, ships with `umd`, `esm`, `cjs` bundles and _type definitions_\n8. Small bundles and small memory footprint\n9. Battle tested: full test coverage and production use\n\n# Install\n\n```bash\nnpm install --save tldts\n```\n\n# Usage\n\nUsing the command-line interface:\n\n```js\n$ npx tldts 'http://www.writethedocs.org/conf/eu/2017/'\n{\n  \"domain\": \"writethedocs.org\",\n  \"domainWithoutSuffix\": \"writethedocs\",\n  \"hostname\": \"www.writethedocs.org\",\n  \"isIcann\": true,\n  \"isIp\": false,\n  \"isPrivate\": false,\n  \"publicSuffix\": \"org\",\n  \"subdomain\": \"www\"\n}\n```\n\nProgrammatically:\n\n```js\nconst { parse } = require('tldts');\n\n// Retrieving hostname related informations of a given URL\nparse('http://www.writethedocs.org/conf/eu/2017/');\n// { domain: 'writethedocs.org',\n//   domainWithoutSuffix: 'writethedocs',\n//   hostname: 'www.writethedocs.org',\n//   isIcann: true,\n//   isIp: false,\n//   isPrivate: false,\n//   publicSuffix: 'org',\n//   subdomain: 'www' }\n```\n\nModern _ES6 modules import_ is also supported:\n\n```js\nimport { parse } from 'tldts';\n```\n\nAlternatively, you can try it _directly in your browser_ here: https://npm.runkit.com/tldts\n\n# API\n\n- `tldts.parse(url | hostname, options)`\n- `tldts.getHostname(url | hostname, options)`\n- `tldts.getDomain(url | hostname, options)`\n- `tldts.getPublicSuffix(url | hostname, options)`\n- `tldts.getSubdomain(url, | hostname, options)`\n- `tldts.getDomainWithoutSuffix(url | hostname, options)`\n\nThe behavior of `tldts` can be customized using an `options` argument for all\nthe functions exposed as part of the public API. This is useful to both change\nthe behavior of the library as well as fine-tune the performance depending on\nyour inputs.\n\n```js\n{\n  // Use suffixes from ICANN section (default: true)\n  allowIcannDomains: boolean;\n  // Use suffixes from Private section (default: false)\n  allowPrivateDomains: boolean;\n  // Extract and validate hostname (default: true)\n  // When set to `false`, inputs will be considered valid hostnames.\n  extractHostname: boolean;\n  // Validate hostnames after parsing (default: true)\n  // If a hostname is not valid, not further processing is performed. When set\n  // to `false`, inputs to the library will be considered valid and parsing will\n  // proceed regardless.\n  validateHostname: boolean;\n  // Perform IP address detection (default: true).\n  detectIp: boolean;\n  // Assume that both URLs and hostnames can be given as input (default: true)\n  // If set to `false` we assume only URLs will be given as input, which\n  // speed-ups processing.\n  mixedInputs: boolean;\n  // Specifies extra valid suffixes (default: null)\n  validHosts: string[] | null;\n}\n```\n\nThe `parse` method returns handy **properties about a URL or a hostname**.\n\n```js\nconst tldts = require('tldts');\n\ntldts.parse('https://spark-public.s3.amazonaws.com/dataanalysis/loansData.csv');\n// { domain: 'amazonaws.com',\n//   domainWithoutSuffix: 'amazonaws',\n//   hostname: 'spark-public.s3.amazonaws.com',\n//   isIcann: true,\n//   isIp: false,\n//   isPrivate: false,\n//   publicSuffix: 'com',\n//   subdomain: 'spark-public.s3' }\n\ntldts.parse(\n  'https://spark-public.s3.amazonaws.com/dataanalysis/loansData.csv',\n  { allowPrivateDomains: true },\n);\n// { domain: 'spark-public.s3.amazonaws.com',\n//   domainWithoutSuffix: 'spark-public',\n//   hostname: 'spark-public.s3.amazonaws.com',\n//   isIcann: false,\n//   isIp: false,\n//   isPrivate: true,\n//   publicSuffix: 's3.amazonaws.com',\n//   subdomain: '' }\n\ntldts.parse('gopher://domain.unknown/');\n// { domain: 'domain.unknown',\n//   domainWithoutSuffix: 'domain',\n//   hostname: 'domain.unknown',\n//   isIcann: false,\n//   isIp: false,\n//   isPrivate: false,\n//   publicSuffix: 'unknown',\n//   subdomain: '' }\n\ntldts.parse('https://192.168.0.0'); // IPv4\n// { domain: null,\n//   domainWithoutSuffix: null,\n//   hostname: '192.168.0.0',\n//   isIcann: null,\n//   isIp: true,\n//   isPrivate: null,\n//   publicSuffix: null,\n//   subdomain: null }\n\ntldts.parse('https://[::1]'); // IPv6\n// { domain: null,\n//   domainWithoutSuffix: null,\n//   hostname: '::1',\n//   isIcann: null,\n//   isIp: true,\n//   isPrivate: null,\n//   publicSuffix: null,\n//   subdomain: null }\n\ntldts.parse('tldts@emailprovider.co.uk'); // email\n// { domain: 'emailprovider.co.uk',\n//   domainWithoutSuffix: 'emailprovider',\n//   hostname: 'emailprovider.co.uk',\n//   isIcann: true,\n//   isIp: false,\n//   isPrivate: false,\n//   publicSuffix: 'co.uk',\n//   subdomain: '' }\n```\n\n| Property Name         | Type   | Description                                     |\n| :-------------------- | :----- | :---------------------------------------------- |\n| `hostname`            | `str`  | `hostname` of the input extracted automatically |\n| `domain`              | `str`  | Domain (tld + sld)                              |\n| `domainWithoutSuffix` | `str`  | Domain without public suffix                    |\n| `subdomain`           | `str`  | Sub domain (what comes after `domain`)          |\n| `publicSuffix`        | `str`  | Public Suffix (tld) of `hostname`               |\n| `isIcann`             | `bool` | Does TLD come from ICANN part of the list       |\n| `isPrivate`           | `bool` | Does TLD come from Private part of the list     |\n| `isIP`                | `bool` | Is `hostname` an IP address?                    |\n\n## Single purpose methods\n\nThese methods are shorthands if you want to retrieve only a single value (and\nwill perform better than `parse` because less work will be needed).\n\n### getHostname(url | hostname, options?)\n\nReturns the hostname from a given string.\n\n```javascript\nconst { getHostname } = require('tldts');\n\ngetHostname('google.com'); // returns `google.com`\ngetHostname('fr.google.com'); // returns `fr.google.com`\ngetHostname('fr.google.google'); // returns `fr.google.google`\ngetHostname('foo.google.co.uk'); // returns `foo.google.co.uk`\ngetHostname('t.co'); // returns `t.co`\ngetHostname('fr.t.co'); // returns `fr.t.co`\ngetHostname(\n  'https://user:password@example.co.uk:8080/some/path?and&query#hash',\n); // returns `example.co.uk`\n```\n\n### getDomain(url | hostname, options?)\n\nReturns the fully qualified domain from a given string.\n\n```javascript\nconst { getDomain } = require('tldts');\n\ngetDomain('google.com'); // returns `google.com`\ngetDomain('fr.google.com'); // returns `google.com`\ngetDomain('fr.google.google'); // returns `google.google`\ngetDomain('foo.google.co.uk'); // returns `google.co.uk`\ngetDomain('t.co'); // returns `t.co`\ngetDomain('fr.t.co'); // returns `t.co`\ngetDomain('https://user:password@example.co.uk:8080/some/path?and&query#hash'); // returns `example.co.uk`\n```\n\n### getDomainWithoutSuffix(url | hostname, options?)\n\nReturns the domain (as returned by `getDomain(...)`) without the public suffix part.\n\n```javascript\nconst { getDomainWithoutSuffix } = require('tldts');\n\ngetDomainWithoutSuffix('google.com'); // returns `google`\ngetDomainWithoutSuffix('fr.google.com'); // returns `google`\ngetDomainWithoutSuffix('fr.google.google'); // returns `google`\ngetDomainWithoutSuffix('foo.google.co.uk'); // returns `google`\ngetDomainWithoutSuffix('t.co'); // returns `t`\ngetDomainWithoutSuffix('fr.t.co'); // returns `t`\ngetDomainWithoutSuffix(\n  'https://user:password@example.co.uk:8080/some/path?and&query#hash',\n); // returns `example`\n```\n\n### getSubdomain(url | hostname, options?)\n\nReturns the complete subdomain for a given string.\n\n```javascript\nconst { getSubdomain } = require('tldts');\n\ngetSubdomain('google.com'); // returns ``\ngetSubdomain('fr.google.com'); // returns `fr`\ngetSubdomain('google.co.uk'); // returns ``\ngetSubdomain('foo.google.co.uk'); // returns `foo`\ngetSubdomain('moar.foo.google.co.uk'); // returns `moar.foo`\ngetSubdomain('t.co'); // returns ``\ngetSubdomain('fr.t.co'); // returns `fr`\ngetSubdomain(\n  'https://user:password@secure.example.co.uk:443/some/path?and&query#hash',\n); // returns `secure`\n```\n\n### getPublicSuffix(url | hostname, options?)\n\nReturns the [public suffix][] for a given string.\n\n```javascript\nconst { getPublicSuffix } = require('tldts');\n\ngetPublicSuffix('google.com'); // returns `com`\ngetPublicSuffix('fr.google.com'); // returns `com`\ngetPublicSuffix('google.co.uk'); // returns `co.uk`\ngetPublicSuffix('s3.amazonaws.com'); // returns `com`\ngetPublicSuffix('s3.amazonaws.com', { allowPrivateDomains: true }); // returns `s3.amazonaws.com`\ngetPublicSuffix('tld.is.unknown'); // returns `unknown`\n```\n\n# Troubleshooting\n\n## Retrieving subdomain of `localhost` and custom hostnames\n\n`tldts` methods `getDomain` and `getSubdomain` are designed to **work only with _known and valid_ TLDs**.\nThis way, you can trust what a domain is.\n\n`localhost` is a valid hostname but not a TLD. You can pass additional options to each method exposed by `tldts`:\n\n```js\nconst tldts = require('tldts');\n\ntldts.getDomain('localhost'); // returns null\ntldts.getSubdomain('vhost.localhost'); // returns null\n\ntldts.getDomain('localhost', { validHosts: ['localhost'] }); // returns 'localhost'\ntldts.getSubdomain('vhost.localhost', { validHosts: ['localhost'] }); // returns 'vhost'\n```\n\n## Updating the TLDs List\n\n`tldts` made the opinionated choice of shipping with a list of suffixes directly\nin its bundle. There is currently no mechanism to update the lists yourself, but\nwe make sure that the version shipped is always up-to-date.\n\nIf you keep `tldts` updated, the lists should be up-to-date as well!\n\n# Performance\n\n`tldts` is the _fastest JavaScript library_ available for parsing hostnames. It is able to parse _millions of inputs per second_ (typically 2-3M depending on your hardware and inputs). It also offers granular options to fine-tune the behavior and performance of the library depending on the kind of inputs you are dealing with (e.g.: if you know you only manipulate valid hostnames you can disable the hostname extraction step with `{ extractHostname: false }`).\n\nPlease see [this detailed comparison](./comparison/comparison.md) with other available libraries.\n\n## Contributors\n\n`tldts` is based upon the excellent `tld.js` library and would not exist without\nthe many contributors who worked on the project:\n<a href=\"graphs/contributors\"><img src=\"https://opencollective.com/tldjs/contributors.svg?width=890\" /></a>\n\nThis project would not be possible without the amazing Mozilla's\n[public suffix list][]. Thank you for your hard work!\n\n# License\n\n[MIT License](LICENSE).\n\n[badge-ci]: https://secure.travis-ci.org/remusao/tldts.svg?branch=master\n[badge-downloads]: https://img.shields.io/npm/dm/tldts.svg\n[public suffix list]: https://publicsuffix.org/list/\n[list the recent changes]: https://github.com/publicsuffix/list/commits/master\n[changes Atom Feed]: https://github.com/publicsuffix/list/commits/master.atom\n[public suffix]: https://publicsuffix.org/learn/\n", "node_modules/lru-cache/README.md": "# lru-cache\n\nA cache object that deletes the least-recently-used items.\n\nSpecify a max number of the most recently used items that you\nwant to keep, and this cache will keep that many of the most\nrecently accessed items.\n\nThis is not primarily a TTL cache, and does not make strong TTL\nguarantees. There is no preemptive pruning of expired items by\ndefault, but you _may_ set a TTL on the cache or on a single\n`set`. If you do so, it will treat expired items as missing, and\ndelete them when fetched. If you are more interested in TTL\ncaching than LRU caching, check out\n[@isaacs/ttlcache](http://npm.im/@isaacs/ttlcache).\n\nAs of version 7, this is one of the most performant LRU\nimplementations available in JavaScript, and supports a wide\ndiversity of use cases. However, note that using some of the\nfeatures will necessarily impact performance, by causing the\ncache to have to do more work. See the \"Performance\" section\nbelow.\n\n## Installation\n\n```bash\nnpm install lru-cache --save\n```\n\n## Usage\n\n```js\n// hybrid module, either works\nimport { LRUCache } from 'lru-cache'\n// or:\nconst { LRUCache } = require('lru-cache')\n// or in minified form for web browsers:\nimport { LRUCache } from 'http://unpkg.com/lru-cache@9/dist/mjs/index.min.mjs'\n\n// At least one of 'max', 'ttl', or 'maxSize' is required, to prevent\n// unsafe unbounded storage.\n//\n// In most cases, it's best to specify a max for performance, so all\n// the required memory allocation is done up-front.\n//\n// All the other options are optional, see the sections below for\n// documentation on what each one does.  Most of them can be\n// overridden for specific items in get()/set()\nconst options = {\n  max: 500,\n\n  // for use with tracking overall storage size\n  maxSize: 5000,\n  sizeCalculation: (value, key) => {\n    return 1\n  },\n\n  // for use when you need to clean up something when objects\n  // are evicted from the cache\n  dispose: (value, key, reason) => {\n    freeFromMemoryOrWhatever(value)\n  },\n\n  // for use when you need to know that an item is being inserted\n  // note that this does NOT allow you to prevent the insertion,\n  // it just allows you to know about it.\n  onInsert: (value, key, reason) => {\n    logInsertionOrWhatever(key, value)\n  },\n\n  // how long to live in ms\n  ttl: 1000 * 60 * 5,\n\n  // return stale items before removing from cache?\n  allowStale: false,\n\n  updateAgeOnGet: false,\n  updateAgeOnHas: false,\n\n  // async method to use for cache.fetch(), for\n  // stale-while-revalidate type of behavior\n  fetchMethod: async (key, staleValue, { options, signal, context }) => {},\n}\n\nconst cache = new LRUCache(options)\n\ncache.set('key', 'value')\ncache.get('key') // \"value\"\n\n// non-string keys ARE fully supported\n// but note that it must be THE SAME object, not\n// just a JSON-equivalent object.\nvar someObject = { a: 1 }\ncache.set(someObject, 'a value')\n// Object keys are not toString()-ed\ncache.set('[object Object]', 'a different value')\nassert.equal(cache.get(someObject), 'a value')\n// A similar object with same keys/values won't work,\n// because it's a different object identity\nassert.equal(cache.get({ a: 1 }), undefined)\n\ncache.clear() // empty the cache\n```\n\nIf you put more stuff in the cache, then less recently used items\nwill fall out. That's what an LRU cache is.\n\nFor full description of the API and all options, please see [the\nLRUCache typedocs](https://isaacs.github.io/node-lru-cache/)\n\n## Storage Bounds Safety\n\nThis implementation aims to be as flexible as possible, within\nthe limits of safe memory consumption and optimal performance.\n\nAt initial object creation, storage is allocated for `max` items.\nIf `max` is set to zero, then some performance is lost, and item\ncount is unbounded. Either `maxSize` or `ttl` _must_ be set if\n`max` is not specified.\n\nIf `maxSize` is set, then this creates a safe limit on the\nmaximum storage consumed, but without the performance benefits of\npre-allocation. When `maxSize` is set, every item _must_ provide\na size, either via the `sizeCalculation` method provided to the\nconstructor, or via a `size` or `sizeCalculation` option provided\nto `cache.set()`. The size of every item _must_ be a positive\ninteger.\n\nIf neither `max` nor `maxSize` are set, then `ttl` tracking must\nbe enabled. Note that, even when tracking item `ttl`, items are\n_not_ preemptively deleted when they become stale, unless\n`ttlAutopurge` is enabled. Instead, they are only purged the\nnext time the key is requested. Thus, if `ttlAutopurge`, `max`,\nand `maxSize` are all not set, then the cache will potentially\ngrow unbounded.\n\nIn this case, a warning is printed to standard error. Future\nversions may require the use of `ttlAutopurge` if `max` and\n`maxSize` are not specified.\n\nIf you truly wish to use a cache that is bound _only_ by TTL\nexpiration, consider using a `Map` object, and calling\n`setTimeout` to delete entries when they expire. It will perform\nmuch better than an LRU cache.\n\nHere is an implementation you may use, under the same\n[license](./LICENSE) as this package:\n\n```js\n// a storage-unbounded ttl cache that is not an lru-cache\nconst cache = {\n  data: new Map(),\n  timers: new Map(),\n  set: (k, v, ttl) => {\n    if (cache.timers.has(k)) {\n      clearTimeout(cache.timers.get(k))\n    }\n    cache.timers.set(\n      k,\n      setTimeout(() => cache.delete(k), ttl),\n    )\n    cache.data.set(k, v)\n  },\n  get: k => cache.data.get(k),\n  has: k => cache.data.has(k),\n  delete: k => {\n    if (cache.timers.has(k)) {\n      clearTimeout(cache.timers.get(k))\n    }\n    cache.timers.delete(k)\n    return cache.data.delete(k)\n  },\n  clear: () => {\n    cache.data.clear()\n    for (const v of cache.timers.values()) {\n      clearTimeout(v)\n    }\n    cache.timers.clear()\n  },\n}\n```\n\nIf that isn't to your liking, check out\n[@isaacs/ttlcache](http://npm.im/@isaacs/ttlcache).\n\n## Storing Undefined Values\n\nThis cache never stores undefined values, as `undefined` is used\ninternally in a few places to indicate that a key is not in the\ncache.\n\nYou may call `cache.set(key, undefined)`, but this is just\nan alias for `cache.delete(key)`. Note that this has the effect\nthat `cache.has(key)` will return _false_ after setting it to\nundefined.\n\n```js\ncache.set(myKey, undefined)\ncache.has(myKey) // false!\n```\n\nIf you need to track `undefined` values, and still note that the\nkey is in the cache, an easy workaround is to use a sigil object\nof your own.\n\n```js\nimport { LRUCache } from 'lru-cache'\nconst undefinedValue = Symbol('undefined')\nconst cache = new LRUCache(...)\nconst mySet = (key, value) =>\n  cache.set(key, value === undefined ? undefinedValue : value)\nconst myGet = (key, value) => {\n  const v = cache.get(key)\n  return v === undefinedValue ? undefined : v\n}\n```\n\n## Tracing and Observability\n\nMost methods can accept a `status` option, which is an\n[`LRUCache.Status`](https://isaacs.github.io/node-lru-cache/interfaces/LRUCache.LRUCache.Status.html)\nobject that will be decorated along the operation with\nindications about what was done and why.\n\nAdditionally, this library is instrumented using the\n[`node:diagnostics_channel`](https://nodejs.org/api/diagnostics_channel.html)\nmodule on Node and other platforms that support it. In order to\nget diagnostics metrics, listen on the\n`channel('lru-cache:metrics')`. To get Tracing Channel traces,\nsubscribe to the `tracingChannel('lru-cache')`. The\n[`LRUCache.Status`](https://isaacs.github.io/node-lru-cache/interfaces/LRUCache.LRUCache.Status.html)\nobjects will be provided as the message context to those channel\nlisteners.\n\nFor example, you could do the following to get comprehensive\ninformation about every LRUCache instance in your application:\n\n```ts\nimport { tracingChannel, subscribe } from 'node:diagnostics_channel'\n\nsubscribe('lru-cache:metrics', (message, name) => {\n  // name will always be 'lru-cache:metrics'\n  // message will be the LRUCache.Status object for whatever\n  // synchronous operation was performed.\n  console.error('LRUCache Metrics', message)\n})\n\ntracingChannel('lru-cache').subscribe({\n  start: status => {\n    // a traced operation is starting\n  },\n  asyncStart: status => {\n    // an async traced operation is starting\n  },\n  asyncEnd: status => {\n    // an async traced operation is ending\n  }\n  error: status => {\n    // a traced operation failed\n  },\n  end: status => {\n    // a traced operation is complete\n  },\n})\n```\n\nThe async `cache.fetch()` and `cache.forceFetch` methods are\ncovered by `tracingChannels`. All the other operations are\ncovered by the `lru-cache:metrics` channel, because they are\nstrictly synchronous, and thus don't have an asynchronous\nlifecycle to track.\n\nNote that using `status` objects or using\n`node:diagnostics_channel` listeners _will_ impose a modest\nperformance penalty. Creating data objects is not ever free; do\nnot believe anyone who tells you otherwise. But it is as small as\npossible.\n\n### Platform Compatibility Caveat\n\nNot all platforms support the `node:diagnostics_channel` module.\nCurrently, this is only available in Node, Bun, and Deno, and\nsome edge computing platforms that provide a Node compatibility\nlayer.\n\nTo work around this, if you are loading in a non-Node\nenvironment, the package.json exports will direct your module\nloader to pull in a version that starts out with a dummy\nimplementation, then does a conditional dynamic `import` of the\n`node:diagnostics_channel` module, and then swaps out those\ndummy objects with the real thing if it succeeds. This means that\ncache metrics and tracing channels started in the first load-time\ntick of your application will _not_ be covered, except in\nenvironments that load using the `require` import\ncondition, or both the `node` and `esm` import conditions\ntogether.\n\nTop-level await _could_ be used to remove this caveat, but that\nfeature is dead on arrival, unfortunately. See\n[#397](https://github.com/isaacs/node-lru-cache/issues/397) and\n[#398](https://github.com/isaacs/node-lru-cache/issues/398) for\nmore details.\n\n## Performance\n\nAs of April 2026, version 11 of this library is one of the most\nperformant LRU cache implementations in JavaScript.\n\nBenchmarks can be extremely difficult to get right. In\nparticular, the performance of set/get/delete operations on\nobjects will vary _wildly_ depending on the type of key used. V8\nis highly optimized for objects with keys that are short strings,\nespecially integer numeric strings. Thus any benchmark which\ntests _solely_ using numbers as keys will tend to find that an\nobject-based approach performs the best.\n\nNote that coercing _anything_ to strings to use as object keys is\nunsafe, unless you can be 100% certain that no other type of\nvalue will be used. For example:\n\n```js\nconst myCache = {}\nconst set = (k, v) => (myCache[k] = v)\nconst get = k => myCache[k]\n\nset({}, 'please hang onto this for me')\nset('[object Object]', 'oopsie')\n```\n\nAlso beware of \"Just So\" stories regarding performance. Garbage\ncollection of large (especially: deep) object graphs can be\nincredibly costly, with several \"tipping points\" where it\nincreases exponentially. As a result, putting that off until\nlater can make it much worse, and less predictable. If a library\nperforms well, but only in a scenario where the object graph is\nkept shallow, then that won't help you if you are using large\nobjects as keys.\n\nIn general, when attempting to use a library to improve\nperformance (such as a cache like this one), it's best to choose\nan option that will perform well in the sorts of scenarios where\nyou'll actually use it.\n\nThis library is optimized for repeated gets and minimizing\neviction time, since that is the expected need of a LRU. Set\noperations are somewhat slower on average than a few other\noptions, in part because of that optimization. It is assumed\nthat you'll be caching some costly operation, ideally as rarely\nas possible, so optimizing set over get would be unwise.\n\nIf performance matters to you:\n\n1. If it's at all possible to use small integer values as keys,\n   and you can guarantee that no other types of values will be\n   used as keys, then do that, and use a cache such as\n   [lru-fast](https://npmjs.com/package/lru-fast), or\n   [mnemonist's\n   LRUCache](https://yomguithereal.github.io/mnemonist/lru-cache)\n   which uses an Object as its data store.\n\n2. Failing that, if you can use short non-numeric strings (ie,\n   less than 256 characters) as your keys, and you do not need\n   any of the other features of this library, use [mnemonist's\n   LRUCache](https://yomguithereal.github.io/mnemonist/lru-cache).\n\n3. If the types of your keys will be anything else, especially\n   long strings, strings that look like floats, objects, or some\n   mix of types, or if you aren't sure, then this library will\n   work well for you.\n\n   If you do not need the features that this library provides\n   (like asynchronous fetching, a variety of TTL staleness\n   options, and so on), then [mnemonist's\n   LRUMap](https://yomguithereal.github.io/mnemonist/lru-map) is\n   also a very good option, and just slightly faster than this\n   module (since it does considerably less).\n\n4. Do not use a `dispose` function, size tracking, or especially\n   ttl behavior or observability features, unless absolutely\n   needed. These features are convenient, and necessary in some\n   use cases, and every attempt has been made to make the\n   performance impact minimal, but it isn't nothing.\n\n## Testing\n\nWhen writing tests that involve TTL-related functionality, note\nthat this module creates an internal reference to the global\n`performance` or `Date` objects at import time. If you import it\nstatically at the top level, those references cannot be mocked or\noverridden in your test environment.\n\nTo avoid this, dynamically import the package within your tests\nso that the references are captured after your mocks are applied.\nFor example:\n\n```ts\n// \u274c Not recommended\nimport { LRUCache } from 'lru-cache'\n// mocking timers, e.g. jest.useFakeTimers()\n\n// \u2705 Recommended for TTL tests\n// mocking timers, e.g. jest.useFakeTimers()\nconst { LRUCache } = await import('lru-cache')\n```\n\nThis ensures that your mocked timers or time sources are\nrespected when testing TTL behavior.\n\nAdditionally, you can pass in a `perf` option when creating your\nLRUCache instance. This option accepts any object with a `now`\nmethod that returns a number.\n\nFor example, this would be a very bare-bones time-mocking system\nyou could use in your tests, without any particular test\nframework:\n\n```ts\nimport { LRUCache } from 'lru-cache'\n\nlet myClockTime = 0\n\nconst cache = new LRUCache<string>({\n  max: 10,\n  ttl: 1000,\n  perf: {\n    now: () => myClockTime,\n  },\n})\n\n// run tests, updating myClockTime as needed\n```\n\n## Breaking Changes in Version 7\n\nThis library changed to a different algorithm and internal data\nstructure in version 7, yielding significantly better\nperformance, albeit with some subtle changes as a result.\n\nIf you were relying on the internals of LRUCache in version 6 or\nbefore, it probably will not work in version 7 and above.\n\n## Breaking Changes in Version 8\n\n- The `fetchContext` option was renamed to `context`, and may no\n  longer be set on the cache instance itself.\n- Rewritten in TypeScript, so pretty much all the types moved\n  around a lot.\n- The AbortController/AbortSignal polyfill was removed. For this\n  reason, **Node version 16.14.0 or higher is now required**.\n- Internal properties were moved to actual private class\n  properties.\n- Keys and values must not be `null` or `undefined`.\n- Minified export available at `'lru-cache/min'`, for both CJS\n  and MJS builds.\n\n## Breaking Changes in Version 9\n\n- Named export only, no default export.\n- AbortController polyfill returned, albeit with a warning when\n  used.\n\n## Breaking Changes in Version 10\n\n- `cache.fetch()` return type is now `Promise<V | undefined>`\n  instead of `Promise<V | void>`. This is an irrelevant change\n  practically speaking, but can require changes for TypeScript\n  users.\n\nFor more info, see the [change log](CHANGELOG.md).\n", "node_modules/lru-cache/LICENSE.md": "# Blue Oak Model License\n\nVersion 1.0.0\n\n## Purpose\n\nThis license gives everyone as much permission to work with\nthis software as possible, while protecting contributors\nfrom liability.\n\n## Acceptance\n\nIn order to receive this license, you must agree to its\nrules.  The rules of this license are both obligations\nunder that agreement and conditions to your license.\nYou must not do anything with this software that triggers\na rule that you cannot or will not follow.\n\n## Copyright\n\nEach contributor licenses you to do everything with this\nsoftware that would otherwise infringe that contributor's\ncopyright in it.\n\n## Notices\n\nYou must ensure that everyone who gets a copy of\nany part of this software from you, with or without\nchanges, also gets the text of this license or a link to\n<https://blueoakcouncil.org/license/1.0.0>.\n\n## Excuse\n\nIf anyone notifies you in writing that you have not\ncomplied with [Notices](#notices), you can keep your\nlicense by taking all practical steps to comply within 30\ndays after the notice.  If you do not do so, your license\nends immediately.\n\n## Patent\n\nEach contributor licenses you to do everything with this\nsoftware that would otherwise infringe any patent claims\nthey can license or become able to license.\n\n## Reliability\n\nNo contributor can revoke this license.\n\n## No Liability\n\n***As far as the law allows, this software comes as is,\nwithout any warranty or condition, and no contributor\nwill be liable to anyone for any damages related to this\nsoftware or this license, under any kind of legal claim.***\n", "node_modules/css-tree/README.md": "<img align=\"right\" width=\"111\" height=\"111\" alt=\"CSSTree logo\" src=\"assets/csstree-logo-rounded.svg\" />\n\n# CSSTree\n\n[![NPM version](https://img.shields.io/npm/v/css-tree.svg)](https://www.npmjs.com/package/css-tree)\n[![Build Status](https://github.com/csstree/csstree/actions/workflows/build.yml/badge.svg)](https://github.com/csstree/csstree/actions/workflows/build.yml)\n[![Coverage Status](https://coveralls.io/repos/github/csstree/csstree/badge.svg?branch=master)](https://coveralls.io/github/csstree/csstree?branch=master)\n[![NPM Downloads](https://img.shields.io/npm/dm/css-tree.svg)](https://www.npmjs.com/package/css-tree)\n[![Twitter](https://img.shields.io/badge/Twitter-@csstree-blue.svg)](https://twitter.com/csstree)\n\nCSSTree is a tool set for CSS: [fast](https://github.com/postcss/benchmark) detailed parser (CSS \u2192 AST), walker (AST traversal), generator (AST \u2192 CSS) and lexer (validation and matching) based on specs and browser implementations. The main goal is to be efficient and W3C spec compliant, with focus on CSS analyzing and source-to-source transforming tasks.\n\n## Features\n\n- **Detailed parsing with an adjustable level of detail**\n\n  By default CSSTree parses CSS as detailed as possible, i.e. each single logical part is representing with its own AST node (see [AST format](docs/ast.md) for all possible node types). The parsing detail level can be changed through [parser options](docs/parsing.md#parsesource-options), for example, you can disable parsing of selectors or declaration values for component parts.\n\n- **Tolerant to errors by design**\n\n  Parser behaves as [spec says](https://www.w3.org/TR/css-syntax-3/#error-handling): \"When errors occur in CSS, the parser attempts to recover gracefully, throwing away only the minimum amount of content before returning to parsing as normal\". The only thing the parser departs from the specification is that it doesn't throw away bad content, but wraps it in a special node type (`Raw`) that allows processing it later.\n\n- **Fast and efficient**\n\n  CSSTree is created with focus on performance and effective memory consumption. Therefore it's [one of the fastest CSS parsers](https://github.com/postcss/benchmark) at the moment.\n\n- **Syntax validation**\n\n  The built-in lexer can test CSS against syntaxes defined by W3C. CSSTree uses [mdn/data](https://github.com/mdn/data/) as a basis for lexer's dictionaries and extends it with vendor specific and legacy syntaxes. Lexer can only check the declaration values and at-rules currently, but this feature will be extended to other parts of the CSS in the future.\n\n## Projects using CSSTree\n\n- [Svelte](https://github.com/sveltejs/svelte) \u2013 Cybernetically enhanced web apps\n- [SVGO](https://github.com/svg/svgo) \u2013 Node.js tool for optimizing SVG files\n- [CSSO](https://github.com/css/csso) \u2013 CSS minifier with structural optimizations\n- [NativeScript](https://github.com/NativeScript/NativeScript) \u2013 NativeScript empowers you to access native APIs from JavaScript directly\n- [react-native-svg](https://github.com/react-native-svg/react-native-svg) \u2013 SVG library for React Native, React Native Web, and plain React web projects\n- [penthouse](https://github.com/pocketjoso/penthouse) \u2013 Critical Path CSS Generator\n- [Bit](https://github.com/teambit/bit) \u2013 Bit is the platform for collaborating on components\n- and more...\n\n## Documentation\n\n- [AST format](docs/ast.md)\n- [Parsing CSS \u2192 AST](docs/parsing.md)\n  - [parse(source[, options])](docs/parsing.md#parsesource-options)\n- [Serialization AST \u2192 CSS](docs/generate.md)\n  - [generate(ast[, options])](docs/generate.md#generateast-options)\n- [AST traversal](docs/traversal.md)\n  - [walk(ast, options)](docs/traversal.md#walkast-options)\n  - [find(ast, fn)](docs/traversal.md#findast-fn)\n  - [findLast(ast, fn)](docs/traversal.md#findlastast-fn)\n  - [findAll(ast, fn)](docs/traversal.md#findallast-fn)\n- [Util functions](docs/utils.md)\n  - Value encoding & decoding\n    - [property(name)](docs/utils.md#propertyname)\n    - [keyword(name)](docs/utils.md#keywordname)\n    - [ident](docs/utils.md#ident)\n    - [string](docs/utils.md#string)\n    - [url](docs/utils.md#url)\n  - [List class](docs/list.md)\n  - AST transforming\n    - [clone(ast)](docs/utils.md#cloneast)\n    - [fromPlainObject(object)](docs/utils.md#fromplainobjectobject)\n    - [toPlainObject(ast)](docs/utils.md#toplainobjectast)\n- [Value Definition Syntax](docs/definition-syntax.md)\n  - [parse(source)](docs/definition-syntax.md#parsesource)\n  - [walk(node, options, context)](docs/definition-syntax.md#walknode-options-context)\n  - [generate(node, options)](docs/definition-syntax.md#generatenode-options)\n  - [AST format](docs/definition-syntax.md#ast-format)\n\n## Tools\n\n* [AST Explorer](https://astexplorer.net/#/gist/244e2fb4da940df52bf0f4b94277db44/e79aff44611020b22cfd9708f3a99ce09b7d67a8) \u2013 explore CSSTree AST format with zero setup\n* [CSS syntax reference](https://csstree.github.io/docs/syntax.html)\n* [CSS syntax validator](https://csstree.github.io/docs/validator.html)\n\n## Related projects\n\n* [csstree-validator](https://github.com/csstree/validator) \u2013\u00a0NPM package to validate CSS\n* [stylelint-csstree-validator](https://github.com/csstree/stylelint-validator) \u2013 plugin for stylelint to validate CSS\n* [Grunt plugin](https://github.com/sergejmueller/grunt-csstree-validator)\n* [Gulp plugin](https://github.com/csstree/gulp-csstree)\n* [Sublime plugin](https://github.com/csstree/SublimeLinter-contrib-csstree)\n* [VS Code plugin](https://github.com/csstree/vscode-plugin)\n* [Atom plugin](https://github.com/csstree/atom-plugin)\n\n## Usage\n\nInstall with npm:\n\n```\nnpm install css-tree\n```\n\nBasic usage:\n\n```js\nimport * as csstree from 'css-tree';\n\n// parse CSS to AST\nconst ast = csstree.parse('.example { world: \"!\" }');\n\n// traverse AST and modify it\ncsstree.walk(ast, (node) => {\n    if (node.type === 'ClassSelector' && node.name === 'example') {\n        node.name = 'hello';\n    }\n});\n\n// generate CSS from AST\nconsole.log(csstree.generate(ast));\n// .hello{world:\"!\"}\n```\n\nSyntax matching:\n\n```js\n// parse CSS to AST as a declaration value\nconst ast = csstree.parse('red 1px solid', { context: 'value' });\n\n// match to syntax of `border` property\nconst matchResult = csstree.lexer.matchProperty('border', ast);\n\n// check first value node is a <color>\nconsole.log(matchResult.isType(ast.children.first, 'color'));\n// true\n\n// get a type list matched to a node\nconsole.log(matchResult.getTrace(ast.children.first));\n// [ { type: 'Property', name: 'border' },\n//   { type: 'Type', name: 'color' },\n//   { type: 'Type', name: 'named-color' },\n//   { type: 'Keyword', name: 'red' } ]\n```\n\n### Exports\n\nIs it possible to import just a needed part of library like a parser or a walker. That's might useful for loading time or bundle size optimisations. \n\n```js\nimport * as tokenizer from 'css-tree/tokenizer';\nimport * as parser from 'css-tree/parser';\nimport * as walker from 'css-tree/walker';\nimport * as lexer from 'css-tree/lexer';\nimport * as definitionSyntax from 'css-tree/definition-syntax';\nimport * as data from 'css-tree/definition-syntax-data';\nimport * as dataPatch from 'css-tree/definition-syntax-data-patch';\nimport * as utils from 'css-tree/utils';\n```\n\n### Using in a browser\n\nBundles are available for use in a browser:\n\n- `dist/csstree.js` \u2013 minified IIFE with `csstree` as global\n```html\n<script src=\"node_modules/css-tree/dist/csstree.js\"><\/script>\n<script>\n  csstree.parse('.example { color: green }');\n<\/script>\n```\n\n- `dist/csstree.esm.js` \u2013 minified ES module\n```html\n<script type=\"module\">\n  import { parse } from 'node_modules/css-tree/dist/csstree.esm.js'\n  parse('.example { color: green }');\n<\/script>\n```\n\nOne of CDN services like `unpkg` or `jsDelivr` can be used. By default (for short path) a ESM version is exposing. For IIFE version a full path to a bundle should be specified:\n\n```html\n<!-- ESM -->\n<script type=\"module\">\n  import * as csstree from 'https://cdn.jsdelivr.net/npm/css-tree';\n  import * as csstree from 'https://unpkg.com/css-tree';\n<\/script>\n\n<!-- IIFE with an export to global -->\n<script src=\"https://cdn.jsdelivr.net/npm/css-tree/dist/csstree.js\"><\/script>\n<script src=\"https://unpkg.com/css-tree/dist/csstree.js\"><\/script>\n```\n\n## Top level API\n\n![API map](https://cdn.rawgit.com/csstree/csstree/aaf327e/docs/api-map.svg)\n\n## License\n\nMIT\n", "node_modules/w3c-xmlserializer/README.md": "# w3c-xmlserializer\n\nAn XML serializer that follows the [W3C specification](https://w3c.github.io/DOM-Parsing/).\n\nThis package can be used in Node.js, as long as you feed it a DOM node, e.g. one produced by [jsdom](https://github.com/jsdom/jsdom).\n\n## Basic usage\n\nAssume you have a DOM tree rooted at a node `node`. In Node.js, you could create this using [jsdom](https://github.com/jsdom/jsdom) as follows:\n\n```js\nconst { JSDOM } = require(\"jsdom\");\n\nconst { document } = new JSDOM().window;\nconst node = document.createElement(\"akomaNtoso\");\n```\n\nThen, you use this package as follows:\n\n\n```js\nconst serialize = require(\"w3c-xmlserializer\");\n\nconsole.log(serialize(node));\n// => '<akomantoso xmlns=\"http://www.w3.org/1999/xhtml\"></akomantoso>'\n```\n\n## `requireWellFormed` option\n\nBy default the input DOM tree is not required to be \"well-formed\"; any given input will serialize to some output string. You can instead require well-formedness via\n\n```js\nserialize(node, { requireWellFormed: true });\n```\n\nwhich will cause `Error`s to be thrown when non-well-formed constructs are encountered. [Per the spec](https://w3c.github.io/DOM-Parsing/#dfn-require-well-formed), this largely is about imposing constraints on the names of elements, attributes, etc.\n\nAs a point of reference, on the web platform:\n\n* The [`innerHTML` getter](https://w3c.github.io/DOM-Parsing/#dom-innerhtml-innerhtml) uses the require-well-formed mode, i.e. trying to get the `innerHTML` of non-well-formed subtrees will throw.\n* The [`xhr.send()` method](https://xhr.spec.whatwg.org/#the-send()-method) does not require well-formedness, i.e. sending non-well-formed `Document`s will serialize and send them anyway.\n", "node_modules/w3c-xmlserializer/LICENSE.md": "The MIT License (MIT)\n=====================\n\nCopyright \u00a9 Sebastian Mayr\n\nPermission is hereby granted, free of charge, to any person\nobtaining a copy of this software and associated documentation\nfiles (the \u201cSoftware\u201d), to deal in the Software without\nrestriction, including without limitation the rights to use,\ncopy, modify, merge, publish, distribute, sublicense, and/or sell\ncopies of the Software, and to permit persons to whom the\nSoftware is furnished to do so, subject to the following\nconditions:\n\nThe above copyright notice and this permission notice shall be\nincluded in all copies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \u201cAS IS\u201d, WITHOUT WARRANTY OF ANY KIND,\nEXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES\nOF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND\nNONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT\nHOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY,\nWHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING\nFROM, OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR\nOTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/dompurify/README.md": "# DOMPurify\n\n[![npm](https://img.shields.io/npm/v/dompurify.svg)](https://www.npmjs.com/package/dompurify) [![License](https://img.shields.io/badge/license-MPL--2.0%20OR%20Apache--2.0-blue.svg)](https://github.com/cure53/DOMPurify/blob/main/LICENSE) [![Downloads](https://img.shields.io/npm/dm/dompurify.svg)](https://www.npmjs.com/package/dompurify) [![dependents](https://badgen.net/github/dependents-repo/cure53/dompurify?color=green&label=dependents)](https://github.com/cure53/DOMPurify/network/dependents) ![npm package minimized gzipped size (select exports)](https://img.shields.io/bundlejs/size/dompurify?color=%233C1&label=gzip)\n\n[![Build & Test](https://github.com/cure53/DOMPurify/actions/workflows/build-and-test.yml/badge.svg?branch=main)](https://github.com/cure53/DOMPurify/actions/workflows/build-and-test.yml) [![OpenSSF Best Practices](https://www.bestpractices.dev/projects/12162/badge)](https://www.bestpractices.dev/projects/12162) [![OpenSSF Scorecard](https://api.scorecard.dev/projects/github.com/cure53/DOMPurify/badge)](https://scorecard.dev/viewer/?uri=github.com/cure53/DOMPurify) [![Socket Badge](https://badge.socket.dev/npm/package/dompurify/latest)](https://badge.socket.dev/npm/package/dompurify/latest) [![Cloudback](https://app.cloudback.it/badge/cure53/DOMPurify)](https://cloudback.it)\n\nDOMPurify is a DOM-only, super-fast, uber-tolerant XSS sanitizer for HTML, MathML and SVG.\n\nIt's also very simple to use and get started with. DOMPurify was [started in February 2014](https://github.com/cure53/DOMPurify/commit/a630922616927373485e0e787ab19e73e3691b2b) and
