rs from jsdom itself. This is similar to how error messages often show up in web browser consoles, even if they are not initiated by `console.error`.\n\nAs mentioned above, the default behavior for jsdom is to send these to the Node.js console. This done via `console.error(jsdomError.message)`, or in the case of `\"unhandled-exception\"`-type jsdom errors that occur from scripts running in the jsdom, via `console.error(jsdomError.cause.stack)`. Using `forwardTo()` will give the same behavior. If you want a non-default behavior, you can customize it in the following ways:\n\n```js\n// Do not send any jsdom errors to the Node.js console:\nvirtualConsole.forwardTo(console, { jsdomErrors: \"none\" });\n\n// Send only certain jsdom errors to the Node.js console, ignoring others:\nvirtualConsole.forwardTo(console, { jsdomErrors: [\"unhandled-exception\", \"not-implemented\"]});\n\n// Customize the handling of all jsdom errors:\nvirtualConsole.forwardTo(console, { jsdomErrors: \"none\" });\nvirtualConsole.on(\"jsdomError\", err => {\n  switch (err.type) {\n    case \"unhandled-exception\": {\n      // ... process ...\n      break;\n    }\n    case \"css-parsing\": {\n      // ... process in some other way ...\n      break;\n    }\n    // ... etc. ...\n  }\n});\n```\n\nThe details for each type of jsdom error, listed by their `type` property, are:\n\n- `\"css-parsing\"`: an error parsing CSS stylesheets\n  - `cause`: the exception object from our CSS parser library, [`@acemir/cssom`](https://github.com/acemir/CSSOM)\n  - `sheetText`: the full text of the stylesheet that we attempted to parse\n- `\"not-implemented\"`: an error emitted when certain stub methods from [unimplemented parts of the web platform](#unimplemented-parts-of-the-web-platform) are called\n- `\"resource-loading\"`: an error [loading resources](#loading-subresources), e.g. due to a network error or a bad response code from the server\n  - `cause` property: the exception object from the internal Node.js network calls jsdom made when retrieving the resource, or from the developer's custom resource loader\n  - `url` property: the URL of the resource that was attempted to be fetched\n- `\"unhandled-exception\"`: a [script execution](#executing-scripts) error that was not handled by a `Window` `\"error\"` event listener\n  - `cause` property: contains the original exception object\n\n### Cookie jars\n\nLike web browsers, jsdom has the concept of a cookie jar, storing HTTP cookies. Cookies that have a URL on the same domain as the document, and are not marked HTTP-only, are accessible via the `document.cookie` API. Additionally, all cookies in the cookie jar will impact the fetching of subresources.\n\nBy default, the `JSDOM` constructor will return an instance with an empty cookie jar. To create your own cookie jar and pass it to jsdom, you can override this default by doing\n\n```js\nconst cookieJar = new jsdom.CookieJar(store, options);\nconst dom = new JSDOM(``, { cookieJar });\n```\n\nThis is mostly useful if you want to share the same cookie jar among multiple jsdoms, or prime the cookie jar with certain values ahead of time.\n\nCookie jars are provided by the [tough-cookie](https://www.npmjs.com/package/tough-cookie) package. The `jsdom.CookieJar` constructor is a subclass of the tough-cookie cookie jar which by default sets the `looseMode: true` option, since that [matches better how browsers behave](https://github.com/whatwg/html/issues/804). If you want to use tough-cookie's utilities and classes yourself, you can use the `jsdom.toughCookie` module export to get access to the tough-cookie module instance packaged with jsdom.\n\n### Intervening before parsing\n\njsdom allows you to intervene in the creation of a jsdom very early: after the `Window` and `Document` objects are created, but before any HTML is parsed to populate the document with nodes:\n\n```js\nconst dom = new JSDOM(`<p>Hello</p>`, {\n  beforeParse(window) {\n    window.document.childNodes.length === 0;\n    window.someCoolAPI = () => { /* ... */ };\n  }\n});\n```\n\nThis is especially useful if you are wanting to modify the environment in some way, for example adding shims for web platform APIs jsdom does not support.\n\n## `JSDOM` object API\n\nOnce you have constructed a `JSDOM` object, it will have the following useful capabilities:\n\n### Properties\n\nThe property `window` retrieves the `Window` object that was created for you.\n\nThe properties `virtualConsole` and `cookieJar` reflect the options you pass in, or the defaults created for you if nothing was passed in for those options.\n\n### Serializing the document with `serialize()`\n\nThe `serialize()` method will return the [HTML serialization](https://html.spec.whatwg.org/#html-fragment-serialisation-algorithm) of the document, including the doctype:\n\n```js\nconst dom = new JSDOM(`<!DOCTYPE html>hello`);\n\ndom.serialize() === \"<!DOCTYPE html><html><head></head><body>hello</body></html>\";\n\n// Contrast with:\ndom.window.document.documentElement.outerHTML === \"<html><head></head><body>hello</body></html>\";\n```\n\n### Getting the source location of a node with `nodeLocation(node)`\n\nThe `nodeLocation()` method will find where a DOM node is within the source document, returning the [parse5 location info](https://www.npmjs.com/package/parse5#options-locationinfo) for the node:\n\n```js\nconst dom = new JSDOM(\n  `<p>Hello\n    <img src=\"foo.jpg\">\n  </p>`,\n  { includeNodeLocations: true }\n);\n\nconst document = dom.window.document;\nconst bodyEl = document.body; // implicitly created\nconst pEl = document.querySelector(\"p\");\nconst textNode = pEl.firstChild;\nconst imgEl = document.querySelector(\"img\");\n\nconsole.log(dom.nodeLocation(bodyEl));   // null; it's not in the source\nconsole.log(dom.nodeLocation(pEl));      // { startOffset: 0, endOffset: 39, startTag: ..., endTag: ... }\nconsole.log(dom.nodeLocation(textNode)); // { startOffset: 3, endOffset: 13 }\nconsole.log(dom.nodeLocation(imgEl));    // { startOffset: 13, endOffset: 32 }\n```\n\nNote that this feature only works if you have set the `includeNodeLocations` option; node locations are off by default for performance reasons.\n\n### Interfacing with the Node.js `vm` module using `getInternalVMContext()`\n\nThe built-in [`vm`](https://nodejs.org/api/vm.html) module of Node.js is what underpins jsdom's script-running magic. Some advanced use cases, like pre-compiling a script and then running it multiple times, benefit from using the `vm` module directly with a jsdom-created `Window`.\n\nTo get access to the [contextified global object](https://nodejs.org/api/vm.html#vm_what_does_it_mean_to_contextify_an_object), suitable for use with the `vm` APIs, you can use the `getInternalVMContext()` method:\n\n```js\nconst { Script } = require(\"vm\");\n\nconst dom = new JSDOM(``, { runScripts: \"outside-only\" });\nconst script = new Script(`\n  if (!this.ran) {\n    this.ran = 0;\n  }\n\n  ++this.ran;\n`);\n\nconst vmContext = dom.getInternalVMContext();\n\nscript.runInContext(vmContext);\nscript.runInContext(vmContext);\nscript.runInContext(vmContext);\n\nconsole.assert(dom.window.ran === 3);\n```\n\nThis is somewhat-advanced functionality, and we advise sticking to normal DOM APIs (such as `window.eval()` or `document.createElement(\"script\")`) unless you have very specific needs.\n\nNote that this method will throw an exception if the `JSDOM` instance was created without `runScripts` set.\n\n### Reconfiguring the jsdom with `reconfigure(settings)`\n\nThe `top` property on `window` is marked `[Unforgeable]` in the spec, meaning it is a non-configurable own property and thus cannot be overridden or shadowed by normal code running inside the jsdom, even using `Object.defineProperty`.\n\nSimilarly, at present jsdom does not handle navigation (such as setting `window.location.href = \"https://example.com/\"`); doing so will cause the virtual console to emit a `\"jsdomError\"` explaining that this feature is not implemented, and nothing will change: there will be no new `Window` or `Document` object, and the existing `window`'s `location` object will still have all the same property values.\n\nHowever, if you're acting from outside the window, e.g. in some test framework that creates jsdoms, you can override one or both of these using the special `reconfigure()` method:\n\n```js\nconst dom = new JSDOM();\n\ndom.window.top === dom.window;\ndom.window.location.href === \"about:blank\";\n\ndom.reconfigure({ windowTop: myFakeTopForTesting, url: \"https://example.com/\" });\n\ndom.window.top === myFakeTopForTesting;\ndom.window.location.href === \"https://example.com/\";\n```\n\nNote that changing the jsdom's URL will impact all APIs that return the current document URL, such as `window.location`, `document.URL`, and `document.documentURI`, as well as the resolution of relative URLs within the document, and the same-origin checks and referrer used while fetching subresources. It will not, however, perform navigation to the contents of that URL; the contents of the DOM will remain unchanged, and no new instances of `Window`, `Document`, etc. will be created.\n\n## Convenience APIs\n\n### `fromURL()`\n\nIn addition to the `JSDOM` constructor itself, jsdom provides a promise-returning factory method for constructing a jsdom from a URL:\n\n```js\nJSDOM.fromURL(\"https://example.com/\", options).then(dom => {\n  console.log(dom.serialize());\n});\n```\n\nThe returned promise will fulfill with a `JSDOM` instance if the URL is valid and the request is successful. Any redirects will be followed to their ultimate destination.\n\nThe options provided to `fromURL()` are similar to those provided to the `JSDOM` constructor, with the following additional restrictions and consequences:\n\n- The `url` and `contentType` options cannot be provided.\n- The `referrer` option is used as the HTTP `Referer` request header of the initial request.\n- The `resources` option also affects the initial request; this is useful if you want to, for example, configure a proxy (see above).\n- The resulting jsdom's URL, content type, and referrer are determined from the response.\n- Any cookies set via HTTP `Set-Cookie` response headers are stored in the jsdom's cookie jar. Similarly, any cookies already in a supplied cookie jar are sent as HTTP `Cookie` request headers.\n\n### `fromFile()`\n\nSimilar to `fromURL()`, jsdom also provides a `fromFile()` factory method for constructing a jsdom from a filename:\n\n```js\nJSDOM.fromFile(\"stuff.html\", options).then(dom => {\n  console.log(dom.serialize());\n});\n```\n\nThe returned promise will fulfill with a `JSDOM` instance if the given file can be opened. As usual in Node.js APIs, the filename is given relative to the current working directory.\n\nThe options provided to `fromFile()` are similar to those provided to the `JSDOM` constructor, with the following additional defaults:\n\n- The `url` option will default to a file URL corresponding to the given filename, instead of to `\"about:blank\"`.\n- The `contentType` option will default to `\"application/xhtml+xml\"` if the given filename ends in `.xht`, `.xhtml`, or `.xml`; otherwise it will continue to default to `\"text/html\"`.\n\n### `fragment()`\n\nFor the very simplest of cases, you might not need a whole `JSDOM` instance with all its associated power. You might not even need a `Window` or `Document`! Instead, you just need to parse some HTML, and get a DOM object you can manipulate. For that, we have `fragment()`, which creates a `DocumentFragment` from a given string:\n\n```js\nconst frag = JSDOM.fragment(`<p>Hello</p><p><strong>Hi!</strong>`);\n\nfrag.childNodes.length === 2;\nfrag.querySelector(\"strong\").textContent === \"Hi!\";\n// etc.\n```\n\nHere `frag` is a [`DocumentFragment`](https://developer.mozilla.org/en-US/docs/Web/API/DocumentFragment) instance, whose contents are created by parsing the provided string. The parsing is done using a `<template>` element, so you can include any element there (including ones with weird parsing rules like `<td>`). It's also important to note that the resulting `DocumentFragment` will not have [an associated browsing context](https://html.spec.whatwg.org/multipage/#concept-document-bc): that is, elements' `ownerDocument` will have a null `defaultView` property, resources will not load, etc.\n\nAll invocations of the `fragment()` factory result in `DocumentFragment`s that share the same template owner `Document`. This allows many calls to `fragment()` with no extra overhead. But it also means that calls to `fragment()` cannot be customized with any options.\n\nNote that serialization is not as easy with `DocumentFragment`s as it is with full `JSDOM` objects. If you need to serialize your DOM, you should probably use the `JSDOM` constructor more directly. But for the special case of a fragment containing a single element, it's pretty easy to do through normal means:\n\n```js\nconst frag = JSDOM.fragment(`<p>Hello</p>`);\nconsole.log(frag.firstChild.outerHTML); // logs \"<p>Hello</p>\"\n```\n\n## Other noteworthy features\n\n### Canvas support\n\njsdom includes support for using the [`canvas`](https://www.npmjs.com/package/canvas) package to extend any `<canvas>` elements with the canvas API. To make this work, you need to include `canvas` as a dependency in your project, as a peer of `jsdom`. If jsdom can find version 3.x of the `canvas` package, it will use it, but if it's not present, then `<canvas>` elements will behave like `<div>`s.\n\n### Encoding sniffing\n\nIn addition to supplying a string, the `JSDOM` constructor can also be supplied binary data, in the form of a standard JavaScript binary data type like `ArrayBuffer`, `Uint8Array`, `DataView`, etc. When this is done, jsdom will [sniff the encoding](https://html.spec.whatwg.org/multipage/syntax.html#encoding-sniffing-algorithm) from the supplied bytes, scanning for `<meta charset>` tags just like a browser does.\n\nIf the supplied `contentType` option contains a `charset` parameter, that encoding will override the sniffed encoding\u2014unless a UTF-8 or UTF-16 BOM is present, in which case those take precedence. (Again, this is just like a browser.)\n\nThis encoding sniffing also applies to `JSDOM.fromFile()` and `JSDOM.fromURL()`. In the latter case, any `Content-Type` headers sent with the response will take priority, in the same fashion as the constructor's `contentType` option.\n\nNote that in many cases supplying bytes in this fashion can be better than supplying a string. For example, if you attempt to use Node.js's `buffer.toString(\"utf-8\")` API, Node.js will not strip any leading BOMs. If you then give this string to jsdom, it will interpret it verbatim, leaving the BOM intact. But jsdom's binary data decoding code will strip leading BOMs, just like a browser; in such cases, supplying `buffer` directly will give the desired result.\n\n### Closing down a jsdom\n\nTimers in the jsdom (set by `window.setTimeout()` or `window.setInterval()`) will, by definition, execute code in the future in the context of the window. Since there is no way to execute code in the future without keeping the process alive, outstanding jsdom timers will keep your Node.js process alive. Similarly, since there is no way to execute code in the context of an object without keeping that object alive, outstanding jsdom timers will prevent garbage collection of the window on which they are scheduled.\n\nIf you want to be sure to shut down a jsdom window, use `window.close()`, which will terminate all running timers (and also remove any event listeners on the window and document).\n\n### Debugging the DOM using Chrome DevTools\n\nIn Node.js you can debug programs using Chrome DevTools. See the [official documentation](https://nodejs.org/en/docs/inspector/) for how to get started.\n\nBy default jsdom elements are formatted as plain old JS objects in the console. To make it easier to debug, you can use [jsdom-devtools-formatter](https://github.com/jsdom/jsdom-devtools-formatter), which lets you inspect them like real DOM elements.\n\n## Caveats\n\n### Asynchronous script loading\n\nPeople often have trouble with asynchronous script loading when using jsdom. Many pages load scripts asynchronously, but there is no way to tell when they're done doing so, and thus when it's a good time to run your code and inspect the resulting DOM structure. This is a fundamental limitation; we cannot predict what scripts on the web page will do, and so cannot tell you when they are done loading more scripts.\n\nThis can be worked around in a few ways. The best way, if you control the page in question, is to use whatever mechanisms are given by the script loader to detect when loading is done. For example, if you're using a module loader like RequireJS, the code could look like:\n\n```js\n// On the Node.js side:\nconst window = (new JSDOM(...)).window;\nwindow.onModulesLoaded = () => {\n  console.log(\"ready to roll!\");\n};\n```\n\n```html\n<!-- Inside the HTML you supply to jsdom -->\n<script>\nrequirejs([\"entry-module\"], () => {\n  window.onModulesLoaded();\n});\n<\/script>\n```\n\nIf you do not control the page, you could try workarounds such as polling for the presence of a specific element.\n\nFor more details, see the discussion in [#640](https://github.com/jsdom/jsdom/issues/640), especially [@matthewkastor](https://github.com/matthewkastor)'s [insightful comment](https://github.com/jsdom/jsdom/issues/640#issuecomment-22216965).\n\n### Unimplemented parts of the web platform\n\nAlthough we enjoy adding new features to jsdom and keeping it up to date with the latest web specs, it has many missing APIs. Please feel free to file an issue for anything missing, but we're a small and busy team, so a pull request might work even better.\n\nSome features of jsdom are provided by our dependencies. Notable documentation in that regard includes the list of [supported CSS selectors](https://github.com/dperini/nwsapi/wiki/CSS-supported-selectors) for our CSS selector engine, [`nwsapi`](https://github.com/dperini/nwsapi).\n\nBeyond just features that we haven't gotten to yet, there are two major features that are currently outside the scope of jsdom. These are:\n\n- **Navigation**: the ability to change the global object, and all other objects, when clicking a link or assigning `location.href` or similar.\n- **Layout**: the ability to calculate where elements will be visually laid out as a result of CSS, which impacts methods like `getBoundingClientRects()` or properties like `offsetTop`.\n\nCurrently jsdom has dummy behaviors for some aspects of these features, such as sending a \"not implemented\" `\"jsdomError\"` to the virtual console for navigation, or returning zeros for many layout-related properties. Often you can work around these limitations in your code, e.g. by creating new `JSDOM` instances for each page you \"navigate\" to during a crawl, or using `Object.defineProperty()` to change what various layout-related getters and methods return.\n\nNote that other tools in the same space, such as PhantomJS, do support these features. On the wiki, we have a more complete writeup about [jsdom vs. PhantomJS](https://github.com/jsdom/jsdom/wiki/jsdom-vs.-PhantomJS).\n\n## Supporting jsdom\n\njsdom is a community-driven project maintained by a team of [volunteers](https://github.com/orgs/jsdom/people). You could support jsdom by:\n\n- [Getting professional support for jsdom](https://tidelift.com/subscription/pkg/npm-jsdom?utm_source=npm-jsdom&utm_medium=referral&utm_campaign=readme) as part of a Tidelift subscription. Tidelift helps making open source sustainable for us while giving teams assurances for maintenance, licensing, and security.\n- [Contributing](https://github.com/jsdom/jsdom/blob/main/Contributing.md) directly to the project.\n\n## Getting help\n\nIf you need help with jsdom, please feel free to use any of the following venues:\n\n- The [mailing list](https://groups.google.com/group/jsdom) (best for \"how do I\" questions)\n- The [issue tracker](https://github.com/jsdom/jsdom/issues) (best for bug reports)\n- The Matrix room: [#jsdom:matrix.org](https://matrix.to/#/#jsdom:matrix.org)\n", "node_modules/source-map-js/README.md": "# Source Map JS\n\n[![NPM](https://nodei.co/npm/source-map-js.png?downloads=true&downloadRank=true)](https://www.npmjs.com/package/source-map-js)\n\nDifference between original [source-map](https://github.com/mozilla/source-map):\n\n> TL,DR: it's fork of original source-map@0.6, but with perfomance optimizations.\n\nThis journey starts from [source-map@0.7.0](https://github.com/mozilla/source-map/blob/master/CHANGELOG.md#070). Some part of it was rewritten to Rust and WASM and API became async.\n\nIt's still a major block for many libraries like PostCSS or Sass for example because they need to migrate the whole API to the async way. This is the reason why 0.6.1 has 2x more downloads than 0.7.3 while it's faster several times.\n\n![Downloads count](media/downloads.png)\n\nMore important that WASM version has some optimizations in JS code too. This is why [community asked to create branch for 0.6 version](https://github.com/mozilla/source-map/issues/324) and port these optimizations but, sadly, the answer was \u00abno\u00bb. A bit later I discovered [the issue](https://github.com/mozilla/source-map/issues/370) created by [Ben Rothman (@benthemonkey)](https://github.com/benthemonkey) with no response at all.\n\n[Roman Dvornov (@lahmatiy)](https://github.com/lahmatiy) wrote a [serveral posts](https://t.me/gorshochekvarit/76) (russian, only, sorry) about source-map library in his own Telegram channel. He mentioned the article [\u00abMaybe you don't need Rust and WASM to speed up your JS\u00bb](https://mrale.ph/blog/2018/02/03/maybe-you-dont-need-rust-to-speed-up-your-js.html) written by [Vyacheslav Egorov (@mraleph)](https://github.com/mraleph). This article contains optimizations and hacks that lead to almost the same performance compare to WASM implementation.\n\nI decided to fork the original source-map and port these optimizations from the article and several others PR from the original source-map.\n\n---------\n\nThis is a library to generate and consume the source map format\n[described here][format].\n\n[format]: https://docs.google.com/document/d/1U1RGAehQwRypUTovF1KRlpiOFze0b-_2gc6fAH0KY0k/edit\n\n## Use with Node\n\n    $ npm install source-map-js\n\n<!-- ## Use on the Web\n\n    <script src=\"https://raw.githubusercontent.com/mozilla/source-map/master/dist/source-map.min.js\" defer><\/script> -->\n\n--------------------------------------------------------------------------------\n\n<!-- `npm run toc` to regenerate the Table of Contents -->\n\n<!-- START doctoc generated TOC please keep comment here to allow auto update -->\n<!-- DON'T EDIT THIS SECTION, INSTEAD RE-RUN doctoc TO UPDATE -->\n## Table of Contents\n\n- [Examples](#examples)\n  - [Consuming a source map](#consuming-a-source-map)\n  - [Generating a source map](#generating-a-source-map)\n    - [With SourceNode (high level API)](#with-sourcenode-high-level-api)\n    - [With SourceMapGenerator (low level API)](#with-sourcemapgenerator-low-level-api)\n- [API](#api)\n  - [SourceMapConsumer](#sourcemapconsumer)\n    - [new SourceMapConsumer(rawSourceMap)](#new-sourcemapconsumerrawsourcemap)\n    - [SourceMapConsumer.prototype.computeColumnSpans()](#sourcemapconsumerprototypecomputecolumnspans)\n    - [SourceMapConsumer.prototype.originalPositionFor(generatedPosition)](#sourcemapconsumerprototypeoriginalpositionforgeneratedposition)\n    - [SourceMapConsumer.prototype.generatedPositionFor(originalPosition)](#sourcemapconsumerprototypegeneratedpositionfororiginalposition)\n    - [SourceMapConsumer.prototype.allGeneratedPositionsFor(originalPosition)](#sourcemapconsumerprototypeallgeneratedpositionsfororiginalposition)\n    - [SourceMapConsumer.prototype.hasContentsOfAllSources()](#sourcemapconsumerprototypehascontentsofallsources)\n    - [SourceMapConsumer.prototype.sourceContentFor(source[, returnNullOnMissing])](#sourcemapconsumerprototypesourcecontentforsource-returnnullonmissing)\n    - [SourceMapConsumer.prototype.eachMapping(callback, context, order)](#sourcemapconsumerprototypeeachmappingcallback-context-order)\n  - [SourceMapGenerator](#sourcemapgenerator)\n    - [new SourceMapGenerator([startOfSourceMap])](#new-sourcemapgeneratorstartofsourcemap)\n    - [SourceMapGenerator.fromSourceMap(sourceMapConsumer)](#sourcemapgeneratorfromsourcemapsourcemapconsumer)\n    - [SourceMapGenerator.prototype.addMapping(mapping)](#sourcemapgeneratorprototypeaddmappingmapping)\n    - [SourceMapGenerator.prototype.setSourceContent(sourceFile, sourceContent)](#sourcemapgeneratorprototypesetsourcecontentsourcefile-sourcecontent)\n    - [SourceMapGenerator.prototype.applySourceMap(sourceMapConsumer[, sourceFile[, sourceMapPath]])](#sourcemapgeneratorprototypeapplysourcemapsourcemapconsumer-sourcefile-sourcemappath)\n    - [SourceMapGenerator.prototype.toString()](#sourcemapgeneratorprototypetostring)\n  - [SourceNode](#sourcenode)\n    - [new SourceNode([line, column, source[, chunk[, name]]])](#new-sourcenodeline-column-source-chunk-name)\n    - [SourceNode.fromStringWithSourceMap(code, sourceMapConsumer[, relativePath])](#sourcenodefromstringwithsourcemapcode-sourcemapconsumer-relativepath)\n    - [SourceNode.prototype.add(chunk)](#sourcenodeprototypeaddchunk)\n    - [SourceNode.prototype.prepend(chunk)](#sourcenodeprototypeprependchunk)\n    - [SourceNode.prototype.setSourceContent(sourceFile, sourceContent)](#sourcenodeprototypesetsourcecontentsourcefile-sourcecontent)\n    - [SourceNode.prototype.walk(fn)](#sourcenodeprototypewalkfn)\n    - [SourceNode.prototype.walkSourceContents(fn)](#sourcenodeprototypewalksourcecontentsfn)\n    - [SourceNode.prototype.join(sep)](#sourcenodeprototypejoinsep)\n    - [SourceNode.prototype.replaceRight(pattern, replacement)](#sourcenodeprototypereplacerightpattern-replacement)\n    - [SourceNode.prototype.toString()](#sourcenodeprototypetostring)\n    - [SourceNode.prototype.toStringWithSourceMap([startOfSourceMap])](#sourcenodeprototypetostringwithsourcemapstartofsourcemap)\n\n<!-- END doctoc generated TOC please keep comment here to allow auto update -->\n\n## Examples\n\n### Consuming a source map\n\n```js\nvar rawSourceMap = {\n  version: 3,\n  file: 'min.js',\n  names: ['bar', 'baz', 'n'],\n  sources: ['one.js', 'two.js'],\n  sourceRoot: 'http://example.com/www/js/',\n  mappings: 'CAAC,IAAI,IAAM,SAAUA,GAClB,OAAOC,IAAID;CCDb,IAAI,IAAM,SAAUE,GAClB,OAAOA'\n};\n\nvar smc = new SourceMapConsumer(rawSourceMap);\n\nconsole.log(smc.sources);\n// [ 'http://example.com/www/js/one.js',\n//   'http://example.com/www/js/two.js' ]\n\nconsole.log(smc.originalPositionFor({\n  line: 2,\n  column: 28\n}));\n// { source: 'http://example.com/www/js/two.js',\n//   line: 2,\n//   column: 10,\n//   name: 'n' }\n\nconsole.log(smc.generatedPositionFor({\n  source: 'http://example.com/www/js/two.js',\n  line: 2,\n  column: 10\n}));\n// { line: 2, column: 28 }\n\nsmc.eachMapping(function (m) {\n  // ...\n});\n```\n\n### Generating a source map\n\nIn depth guide:\n[**Compiling to JavaScript, and Debugging with Source Maps**](https://hacks.mozilla.org/2013/05/compiling-to-javascript-and-debugging-with-source-maps/)\n\n#### With SourceNode (high level API)\n\n```js\nfunction compile(ast) {\n  switch (ast.type) {\n  case 'BinaryExpression':\n    return new SourceNode(\n      ast.location.line,\n      ast.location.column,\n      ast.location.source,\n      [compile(ast.left), \" + \", compile(ast.right)]\n    );\n  case 'Literal':\n    return new SourceNode(\n      ast.location.line,\n      ast.location.column,\n      ast.location.source,\n      String(ast.value)\n    );\n  // ...\n  default:\n    throw new Error(\"Bad AST\");\n  }\n}\n\nvar ast = parse(\"40 + 2\", \"add.js\");\nconsole.log(compile(ast).toStringWithSourceMap({\n  file: 'add.js'\n}));\n// { code: '40 + 2',\n//   map: [object SourceMapGenerator] }\n```\n\n#### With SourceMapGenerator (low level API)\n\n```js\nvar map = new SourceMapGenerator({\n  file: \"source-mapped.js\"\n});\n\nmap.addMapping({\n  generated: {\n    line: 10,\n    column: 35\n  },\n  source: \"foo.js\",\n  original: {\n    line: 33,\n    column: 2\n  },\n  name: \"christopher\"\n});\n\nconsole.log(map.toString());\n// '{\"version\":3,\"file\":\"source-mapped.js\",\"sources\":[\"foo.js\"],\"names\":[\"christopher\"],\"mappings\":\";;;;;;;;;mCAgCEA\"}'\n```\n\n## API\n\nGet a reference to the module:\n\n```js\n// Node.js\nvar sourceMap = require('source-map');\n\n// Browser builds\nvar sourceMap = window.sourceMap;\n\n// Inside Firefox\nconst sourceMap = require(\"devtools/toolkit/sourcemap/source-map.js\");\n```\n\n### SourceMapConsumer\n\nA SourceMapConsumer instance represents a parsed source map which we can query\nfor information about the original file positions by giving it a file position\nin the generated source.\n\n#### new SourceMapConsumer(rawSourceMap)\n\nThe only parameter is the raw source map (either as a string which can be\n`JSON.parse`'d, or an object). According to the spec, source maps have the\nfollowing attributes:\n\n* `version`: Which version of the source map spec this map is following.\n\n* `sources`: An array of URLs to the original source files.\n\n* `names`: An array of identifiers which can be referenced by individual\n  mappings.\n\n* `sourceRoot`: Optional. The URL root from which all sources are relative.\n\n* `sourcesContent`: Optional. An array of contents of the original source files.\n\n* `mappings`: A string of base64 VLQs which contain the actual mappings.\n\n* `file`: Optional. The generated filename this source map is associated with.\n\n```js\nvar consumer = new sourceMap.SourceMapConsumer(rawSourceMapJsonData);\n```\n\n#### SourceMapConsumer.prototype.computeColumnSpans()\n\nCompute the last column for each generated mapping. The last column is\ninclusive.\n\n```js\n// Before:\nconsumer.allGeneratedPositionsFor({ line: 2, source: \"foo.coffee\" })\n// [ { line: 2,\n//     column: 1 },\n//   { line: 2,\n//     column: 10 },\n//   { line: 2,\n//     column: 20 } ]\n\nconsumer.computeColumnSpans();\n\n// After:\nconsumer.allGeneratedPositionsFor({ line: 2, source: \"foo.coffee\" })\n// [ { line: 2,\n//     column: 1,\n//     lastColumn: 9 },\n//   { line: 2,\n//     column: 10,\n//     lastColumn: 19 },\n//   { line: 2,\n//     column: 20,\n//     lastColumn: Infinity } ]\n\n```\n\n#### SourceMapConsumer.prototype.originalPositionFor(generatedPosition)\n\nReturns the original source, line, and column information for the generated\nsource's line and column positions provided. The only argument is an object with\nthe following properties:\n\n* `line`: The line number in the generated source.  Line numbers in\n  this library are 1-based (note that the underlying source map\n  specification uses 0-based line numbers -- this library handles the\n  translation).\n\n* `column`: The column number in the generated source.  Column numbers\n  in this library are 0-based.\n\n* `bias`: Either `SourceMapConsumer.GREATEST_LOWER_BOUND` or\n  `SourceMapConsumer.LEAST_UPPER_BOUND`. Specifies whether to return the closest\n  element that is smaller than or greater than the one we are searching for,\n  respectively, if the exact element cannot be found.  Defaults to\n  `SourceMapConsumer.GREATEST_LOWER_BOUND`.\n\nand an object is returned with the following properties:\n\n* `source`: The original source file, or null if this information is not\n  available.\n\n* `line`: The line number in the original source, or null if this information is\n  not available.  The line number is 1-based.\n\n* `column`: The column number in the original source, or null if this\n  information is not available.  The column number is 0-based.\n\n* `name`: The original identifier, or null if this information is not available.\n\n```js\nconsumer.originalPositionFor({ line: 2, column: 10 })\n// { source: 'foo.coffee',\n//   line: 2,\n//   column: 2,\n//   name: null }\n\nconsumer.originalPositionFor({ line: 99999999999999999, column: 999999999999999 })\n// { source: null,\n//   line: null,\n//   column: null,\n//   name: null }\n```\n\n#### SourceMapConsumer.prototype.generatedPositionFor(originalPosition)\n\nReturns the generated line and column information for the original source,\nline, and column positions provided. The only argument is an object with\nthe following properties:\n\n* `source`: The filename of the original source.\n\n* `line`: The line number in the original source.  The line number is\n  1-based.\n\n* `column`: The column number in the original source.  The column\n  number is 0-based.\n\nand an object is returned with the following properties:\n\n* `line`: The line number in the generated source, or null.  The line\n  number is 1-based.\n\n* `column`: The column number in the generated source, or null.  The\n  column number is 0-based.\n\n```js\nconsumer.generatedPositionFor({ source: \"example.js\", line: 2, column: 10 })\n// { line: 1,\n//   column: 56 }\n```\n\n#### SourceMapConsumer.prototype.allGeneratedPositionsFor(originalPosition)\n\nReturns all generated line and column information for the original source, line,\nand column provided. If no column is provided, returns all mappings\ncorresponding to a either the line we are searching for or the next closest line\nthat has any mappings. Otherwise, returns all mappings corresponding to the\ngiven line and either the column we are searching for or the next closest column\nthat has any offsets.\n\nThe only argument is an object with the following properties:\n\n* `source`: The filename of the original source.\n\n* `line`: The line number in the original source.  The line number is\n  1-based.\n\n* `column`: Optional. The column number in the original source.  The\n  column number is 0-based.\n\nand an array of objects is returned, each with the following properties:\n\n* `line`: The line number in the generated source, or null.  The line\n  number is 1-based.\n\n* `column`: The column number in the generated source, or null.  The\n  column number is 0-based.\n\n```js\nconsumer.allGeneratedpositionsfor({ line: 2, source: \"foo.coffee\" })\n// [ { line: 2,\n//     column: 1 },\n//   { line: 2,\n//     column: 10 },\n//   { line: 2,\n//     column: 20 } ]\n```\n\n#### SourceMapConsumer.prototype.hasContentsOfAllSources()\n\nReturn true if we have the embedded source content for every source listed in\nthe source map, false otherwise.\n\nIn other words, if this method returns `true`, then\n`consumer.sourceContentFor(s)` will succeed for every source `s` in\n`consumer.sources`.\n\n```js\n// ...\nif (consumer.hasContentsOfAllSources()) {\n  consumerReadyCallback(consumer);\n} else {\n  fetchSources(consumer, consumerReadyCallback);\n}\n// ...\n```\n\n#### SourceMapConsumer.prototype.sourceContentFor(source[, returnNullOnMissing])\n\nReturns the original source content for the source provided. The only\nargument is the URL of the original source file.\n\nIf the source content for the given source is not found, then an error is\nthrown. Optionally, pass `true` as the second param to have `null` returned\ninstead.\n\n```js\nconsumer.sources\n// [ \"my-cool-lib.clj\" ]\n\nconsumer.sourceContentFor(\"my-cool-lib.clj\")\n// \"...\"\n\nconsumer.sourceContentFor(\"this is not in the source map\");\n// Error: \"this is not in the source map\" is not in the source map\n\nconsumer.sourceContentFor(\"this is not in the source map\", true);\n// null\n```\n\n#### SourceMapConsumer.prototype.eachMapping(callback, context, order)\n\nIterate over each mapping between an original source/line/column and a\ngenerated line/column in this source map.\n\n* `callback`: The function that is called with each mapping. Mappings have the\n  form `{ source, generatedLine, generatedColumn, originalLine, originalColumn,\n  name }`\n\n* `context`: Optional. If specified, this object will be the value of `this`\n  every time that `callback` is called.\n\n* `order`: Either `SourceMapConsumer.GENERATED_ORDER` or\n  `SourceMapConsumer.ORIGINAL_ORDER`. Specifies whether you want to iterate over\n  the mappings sorted by the generated file's line/column order or the\n  original's source/line/column order, respectively. Defaults to\n  `SourceMapConsumer.GENERATED_ORDER`.\n\n```js\nconsumer.eachMapping(function (m) { console.log(m); })\n// ...\n// { source: 'illmatic.js',\n//   generatedLine: 1,\n//   generatedColumn: 0,\n//   originalLine: 1,\n//   originalColumn: 0,\n//   name: null }\n// { source: 'illmatic.js',\n//   generatedLine: 2,\n//   generatedColumn: 0,\n//   originalLine: 2,\n//   originalColumn: 0,\n//   name: null }\n// ...\n```\n### SourceMapGenerator\n\nAn instance of the SourceMapGenerator represents a source map which is being\nbuilt incrementally.\n\n#### new SourceMapGenerator([startOfSourceMap])\n\nYou may pass an object with the following properties:\n\n* `file`: The filename of the generated source that this source map is\n  associated with.\n\n* `sourceRoot`: A root for all relative URLs in this source map.\n\n* `skipValidation`: Optional. When `true`, disables validation of mappings as\n  they are added. This can improve performance but should be used with\n  discretion, as a last resort. Even then, one should avoid using this flag when\n  running tests, if possible.\n\n* `ignoreInvalidMapping`: Optional. When `true`, instead of throwing error on\n  invalid mapping, it will be ignored.\n\n```js\nvar generator = new sourceMap.SourceMapGenerator({\n  file: \"my-generated-javascript-file.js\",\n  sourceRoot: \"http://example.com/app/js/\"\n});\n```\n\n#### SourceMapGenerator.fromSourceMap(sourceMapConsumer, sourceMapGeneratorOptions)\n\nCreates a new `SourceMapGenerator` from an existing `SourceMapConsumer` instance.\n\n* `sourceMapConsumer` The SourceMap.\n\n* `sourceMapGeneratorOptions` options that will be passed to the SourceMapGenerator constructor which used under the hood.\n\n```js\nvar generator = sourceMap.SourceMapGenerator.fromSourceMap(consumer, {\n  ignoreInvalidMapping: true,\n});\n```\n\n#### SourceMapGenerator.prototype.addMapping(mapping)\n\nAdd a single mapping from original source line and column to the generated\nsource's line and column for this source map being created. The mapping object\nshould have the following properties:\n\n* `generated`: An object with the generated line and column positions.\n\n* `original`: An object with the original line and column positions.\n\n* `source`: The original source file (relative to the sourceRoot).\n\n* `name`: An optional original token name for this mapping.\n\n```js\ngenerator.addMapping({\n  source: \"module-one.scm\",\n  original: { line: 128, column: 0 },\n  generated: { line: 3, column: 456 }\n})\n```\n\n#### SourceMapGenerator.prototype.setSourceContent(sourceFile, sourceContent)\n\nSet the source content for an original source file.\n\n* `sourceFile` the URL of the original source file.\n\n* `sourceContent` the content of the source file.\n\n```js\ngenerator.setSourceContent(\"module-one.scm\",\n                           fs.readFileSync(\"path/to/module-one.scm\"))\n```\n\n#### SourceMapGenerator.prototype.applySourceMap(sourceMapConsumer[, sourceFile[, sourceMapPath]])\n\nApplies a SourceMap for a source file to the SourceMap.\nEach mapping to the supplied source file is rewritten using the\nsupplied SourceMap. Note: The resolution for the resulting mappings\nis the minimum of this map and the supplied map.\n\n* `sourceMapConsumer`: The SourceMap to be applied.\n\n* `sourceFile`: Optional. The filename of the source file.\n  If omitted, sourceMapConsumer.file will be used, if it exists.\n  Otherwise an error will be thrown.\n\n* `sourceMapPath`: Optional. The dirname of the path to the SourceMap\n  to be applied. If relative, it is relative to the SourceMap.\n\n  This parameter is needed when the two SourceMaps aren't in the same\n  directory, and the SourceMap to be applied contains relative source\n  paths. If so, those relative source paths need to be rewritten\n  relative to the SourceMap.\n\n  If omitted, it is assumed that both SourceMaps are in the same directory,\n  thus not needing any rewriting. (Supplying `'.'` has the same effect.)\n\n#### SourceMapGenerator.prototype.toString()\n\nRenders the source map being generated to a string.\n\n```js\ngenerator.toString()\n// '{\"version\":3,\"sources\":[\"module-one.scm\"],\"names\":[],\"mappings\":\"...snip...\",\"file\":\"my-generated-javascript-file.js\",\"sourceRoot\":\"http://example.com/app/js/\"}'\n```\n\n### SourceNode\n\nSourceNodes provide a way to abstract over interpolating and/or concatenating\nsnippets of generated JavaScript source code, while maintaining the line and\ncolumn information associated between those snippets and the original source\ncode. This is useful as the final intermediate representation a compiler might\nuse before outputting the generated JS and source map.\n\n#### new SourceNode([line, column, source[, chunk[, name]]])\n\n* `line`: The original line number associated with this source node, or null if\n  it isn't associated with an original line.  The line number is 1-based.\n\n* `column`: The original column number associated with this source node, or null\n  if it isn't associated with an original column.  The column number\n  is 0-based.\n\n* `source`: The original source's filename; null if no filename is provided.\n\n* `chunk`: Optional. Is immediately passed to `SourceNode.prototype.add`, see\n  below.\n\n* `name`: Optional. The original identifier.\n\n```js\nvar node = new SourceNode(1, 2, \"a.cpp\", [\n  new SourceNode(3, 4, \"b.cpp\", \"extern int status;\\n\"),\n  new SourceNode(5, 6, \"c.cpp\", \"std::string* make_string(size_t n);\\n\"),\n  new SourceNode(7, 8, \"d.cpp\", \"int main(int argc, char** argv) {}\\n\"),\n]);\n```\n\n#### SourceNode.fromStringWithSourceMap(code, sourceMapConsumer[, relativePath])\n\nCreates a SourceNode from generated code and a SourceMapConsumer.\n\n* `code`: The generated code\n\n* `sourceMapConsumer` The SourceMap for the generated code\n\n* `relativePath` The optional path that relative sources in `sourceMapConsumer`\n  should be relative to.\n\n```js\nvar consumer = new SourceMapConsumer(fs.readFileSync(\"path/to/my-file.js.map\", \"utf8\"));\nvar node = SourceNode.fromStringWithSourceMap(fs.readFileSync(\"path/to/my-file.js\"),\n                                              consumer);\n```\n\n#### SourceNode.prototype.add(chunk)\n\nAdd a chunk of generated JS to this source node.\n\n* `chunk`: A string snippet of generated JS code, another instance of\n   `SourceNode`, or an array where each member is one of those things.\n\n```js\nnode.add(\" + \");\nnode.add(otherNode);\nnode.add([leftHandOperandNode, \" + \", rightHandOperandNode]);\n```\n\n#### SourceNode.prototype.prepend(chunk)\n\nPrepend a chunk of generated JS to this source node.\n\n* `chunk`: A string snippet of generated JS code, another instance of\n   `SourceNode`, or an array where each member is one of those things.\n\n```js\nnode.prepend(\"/** Build Id: f783haef86324gf **/\\n\\n\");\n```\n\n#### SourceNode.prototype.setSourceContent(sourceFile, sourceContent)\n\nSet the source content for a source file. This will be added to the\n`SourceMap` in the `sourcesContent` field.\n\n* `sourceFile`: The filename of the source file\n\n* `sourceContent`: The content of the source file\n\n```js\nnode.setSourceContent(\"module-one.scm\",\n                      fs.readFileSync(\"path/to/module-one.scm\"))\n```\n\n#### SourceNode.prototype.walk(fn)\n\nWalk over the tree of JS snippets in this node and its children. The walking\nfunction is called once for each snippet of JS and is passed that snippet and\nthe its original associated source's line/column location.\n\n* `fn`: The traversal function.\n\n```js\nvar node = new SourceNode(1, 2, \"a.js\", [\n  new SourceNode(3, 4, \"b.js\", \"uno\"),\n  \"dos\",\n  [\n    \"tres\",\n    new SourceNode(5, 6, \"c.js\", \"quatro\")\n  ]\n]);\n\nnode.walk(function (code, loc) { console.log(\"WALK:\", code, loc); })\n// WALK: uno { source: 'b.js', line: 3, column: 4, name: null }\n// WALK: dos { source: 'a.js', line: 1, column: 2, name: null }\n// WALK: tres { source: 'a.js', line: 1, column: 2, name: null }\n// WALK: quatro { source: 'c.js', line: 5, column: 6, name: null }\n```\n\n#### SourceNode.prototype.walkSourceContents(fn)\n\nWalk over the tree of SourceNodes. The walking function is called for each\nsource file content and is passed the filename and source content.\n\n* `fn`: The traversal function.\n\n```js\nvar a = new SourceNode(1, 2, \"a.js\", \"generated from a\");\na.setSourceContent(\"a.js\", \"original a\");\nvar b = new SourceNode(1, 2, \"b.js\", \"generated from b\");\nb.setSourceContent(\"b.js\", \"original b\");\nvar c = new SourceNode(1, 2, \"c.js\", \"generated from c\");\nc.setSourceContent(\"c.js\", \"original c\");\n\nvar node = new SourceNode(null, null, null, [a, b, c]);\nnode.walkSourceContents(function (source, contents) { console.log(\"WALK:\", source, \":\", contents); })\n// WALK: a.js : original a\n// WALK: b.js : original b\n// WALK: c.js : original c\n```\n\n#### SourceNode.prototype.join(sep)\n\nLike `Array.prototype.join` except for SourceNodes. Inserts the separator\nbetween each of this source node's children.\n\n* `sep`: The separator.\n\n```js\nvar lhs = new SourceNode(1, 2, \"a.rs\", \"my_copy\");\nvar operand = new SourceNode(3, 4, \"a.rs\", \"=\");\nvar rhs = new SourceNode(5, 6, \"a.rs\", \"orig.clone()\");\n\nvar node = new SourceNode(null, null, null, [ lhs, operand, rhs ]);\nvar joinedNode = node.join(\" \");\n```\n\n#### SourceNode.prototype.replaceRight(pattern, replacement)\n\nCall `String.prototype.replace` on the very right-most source snippet. Useful\nfor trimming white space from the end of a source node, etc.\n\n* `pattern`: The pattern to replace.\n\n* `replacement`: The thing to replace the pattern with.\n\n```js\n// Trim trailing white space.\nnode.replaceRight(/\\s*$/, \"\");\n```\n\n#### SourceNode.prototype.toString()\n\nReturn the string representation of this source node. Walks over the tree and\nconcatenates all the various snippets together to one string.\n\n```js\nvar node = new SourceNode(1, 2, \"a.js\", [\n  new SourceNode(3, 4, \"b.js\", \"uno\"),\n  \"dos\",\n  [\n    \"tres\",\n    new SourceNode(5, 6, \"c.js\", \"quatro\")\n  ]\n]);\n\nnode.toString()\n// 'unodostresquatro'\n```\n\n#### SourceNode.prototype.toStringWithSourceMap([startOfSourceMap])\n\nReturns the string representation of this tree of source nodes, plus a\nSourceMapGenerator which contains all the mappings between the generated and\noriginal sources.\n\nThe arguments are the same as those to `new SourceMapGenerator`.\n\n```js\nvar node = new SourceNode(1, 2, \"a.js\", [\n  new SourceNode(3, 4, \"b.js\", \"uno\"),\n  \"dos\",\n  [\n    \"tres\",\n    new SourceNode(5, 6, \"c.js\", \"quatro\")\n  ]\n]);\n\nnode.toStringWithSourceMap({ file: \"my-output-file.js\" })\n// { code: 'unodostresquatro',\n//   map: [object SourceMapGenerator] }\n```\n", "node_modules/@asamuzakjp/generational-cache/README.md": "# generational-cache\n\n[![CI](https://github.com/asamuzaK/generationalCache/actions/workflows/ci.yaml/badge.svg)](https://github.com/asamuzaK/generationalCache/actions/workflows/ci.yaml)\n[![CodeQL](https://github.com/asamuzaK/generationalCache/actions/workflows/github-code-scanning/codeql/badge.svg)](https://github.com/asamuzaK/generationalCache/actions/workflows/github-code-scanning/codeql)\n[![npm (scoped)](https://img.shields.io/npm/v/@asamuzakjp/generational-cache)](https://www.npmjs.com/package/@asamuzakjp/generational-cache)\n\nA lightweight, **generational pseudo-LRU (Least Recently Used) cache** with strict maximum size limits.\n\n## How it Works\n\n`GenerationalCache` maintains two internal `Map` objects: `current` and `old`.\n\n1.  **Insertion**: New items are always added to the `current` generation.\n2.  **Promotion**: If you `get` an item that exists in the `old` generation, it is promoted to the `current` generation to ensure it stays in the cache longer.\n3.  **Generation Swapping**: Once the `current` generation reaches the boundary size ($max / 2$), the `old` generation is discarded, the `current` generation becomes the `old` generation, and a new empty `current` generation is created.\n\nThis \"pseudo-LRU\" approach avoids the overhead of updating timestamps or complex linked list pointers on every single access.\n\n## Installation\n```bash\nnpm i @asamuzakjp/generational-cache\n```\n\n## Usage\n```javascript\nimport { GenerationalCache } from '@asamuzakjp/generational-cache';\n\n// Initialize with a max capacity of 1024 items\nconst cache = new GenerationalCache(1024);\n```\n\n## API\n\n### `new GenerationalCache(max)`\n\nCreates a new cache instance.\n\n* **`max`** *(number)*: The maximum number of items the cache can hold.\n  If the specified value is less than 4, or if an invalid value is specified, the default value of 4 will be used.\n\n### Properties\n\n* **`cache.size`** *(number, read-only)*: Returns the total number of *entries* currently in the cache.\n  **Note:** To optimize for write speed, this library allows temporary key duplication between generations.\n  Therefore, this value may not always reflect the exact count of unique *keys*.\n* **`cache.max`** *(number)*: Gets or sets the maximum capacity.\n  **Note:** Updating this property dynamically will invoke `cache.clear()` to safely recalculate boundaries.\n\n### Methods\n\n* **`cache.get(key)`**\n  Retrieves an item.\n  If the item is found in the older generation, it is automatically promoted to the current generation to prevent it from being evicted during the next swap.\n    * **Returns:** The value associated with the key, or `undefined`.\n* **`cache.set(key, value)`**\n  Adds or updates an item. If adding this item pushes the current generation's size to the boundary threshold (`max / 2`), a generation swap is triggered, and the old generation is discarded.\n    * **Returns:** The cache instance itself (allows chaining).\n* **`cache.has(key)`**\n  Checks if a key exists in the cache (in either generation).\n    * **Returns:** `true` if the key exists, otherwise `false`.\n* **`cache.delete(key)`**\n  Removes an item from the cache.\n    * **Returns:** `true` if the item existed and was removed, otherwise `false`.\n* **`cache.clear()`**\n  Empties all items from the cache by dropping references to the internal Maps.\n\n## Performance\n\nBenchmarks are divided into two states to simulate real-world conditions:\n- **Cold State**: Measured with aggressive internal Garbage Collection to observe performance before full V8 TurboFan optimizations.\n- **Warm State**: Measured after sufficient warmup, representing sustained throughput under optimal JIT compilation.\n\n*The results below reflect the sustained operations per second (ops/sec), calculated from the average latency (`ns/iter`). Higher values indicate better performance.*\n\n### Benchmark Environment\n- **Engine:** Node.js v24.x (V8)\n- **Measurement:** [mitata](https://github.com/evanwashere/mitata).\n- **Comparison:** [LRUCache](https://www.npmjs.com/package/lru-cache) (v11.x), [QuickLRU](https://www.npmjs.com/package/quick-lru) (v7.x), [Mnemonist](https://www.npmjs.com/package/mnemonist) (v0.40.x)\n\n### 1. Small Cache (Max Size = 512)\n| Scenario | State | **GenerationalCache** | LRUCache | QuickLRU | Mnemonist |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| **Set** | Cold | **17,733,640 ops/sec** | 4,933,885 ops/sec | 13,506,212 ops/sec | **17,229,496 ops/sec** |\n| | Warm | **23,030,861 ops/sec** | 15,216,068 ops/sec | 18,175,209 ops/sec | 19,409,937 ops/sec |\n| **Get** | Cold | 17,717,930 ops/sec | 7,633,587 ops/sec | 13,734,377 ops/sec | **30,731,407 ops/sec** |\n| | Warm | 21,724,961 ops/sec | 24,148,756 ops/sec | 16,385,384 ops/sec | **35,688,793 ops/sec** |\n| **Eviction** | Cold | **16,700,066 ops/sec** | 6,953,619 ops/sec | 13,285,505 ops/sec | 4,925,865 ops/sec |\n| | Warm | **23,148,148 ops/sec** | 9,040,773 ops/sec | 16,903,313 ops/sec | 8,037,293 ops/sec |\n\n### 2. Medium Cache (Max Size = 2,048)\n| Scenario | State | **GenerationalCache** | LRUCache | QuickLRU | Mnemonist |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| **Set** | Cold | **15,987,210 ops/sec** | 4,874,957 ops/sec | 11,849,745 ops/sec | **15,309,246 ops/sec** |\n| | Warm | **19,716,088 ops/sec** | 13,345,789 ops/sec | 14,755,791 ops/sec | 17,325,017 ops/sec |\n| **Get** | Cold | 14,994,751 ops/sec | 7,950,389 ops/sec | 11,503,508 ops/sec | **23,651,844 ops/sec** |\n| | Warm | 17,825,311 ops/sec | 18,789,928 ops/sec | 13,838,915 ops/sec | **31,289,111 ops/sec** |\n| **Eviction** | Cold | **16,355,904 ops/sec** | 6,757,669 ops/sec | 12,074,378 ops/sec | 5,175,983 ops/sec |\n| | Warm | **21,982,853 ops/sec** | 8,089,305 ops/sec | 15,309,246 ops/sec | 7,132,158 ops/sec |\n\n### 3. Large Cache (Max Size = 8,192)\n| Scenario | State | **GenerationalCache** | LRUCache | QuickLRU | Mnemonist |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| **Set** | Cold | **13,679,890 ops/sec** | 3,954,288 ops/sec | 8,126,777 ops/sec | 10,972,130 ops/sec |\n| | Warm | **20,593,080 ops/sec** | 12,054,001 ops/sec | 12,995,451 ops/sec | 15,600,624 ops/sec |\n| **Get** | Cold | 11,918,951 ops/sec | 5,785,363 ops/sec | 9,067,827 ops/sec | **16,784,155 ops/sec** |\n| | Warm | 16,781,339 ops/sec | 17,247,326 ops/sec | 12,733,987 ops/sec | **31,436,655 ops/sec** |\n| **Eviction** | Cold | **13,561,160 ops/sec** | 5,510,249 ops/sec | 9,642,271 ops/sec | 4,040,404 ops/sec |\n| | Warm | **21,128,248 ops/sec** | 7,082,152 ops/sec | 13,208,294 ops/sec | 6,023,007 ops/sec |\n\n### 4. Cyclic Access (Max Size = 8,192 / Working Set = 5,000)\n| Metric | **GenerationalCache** | LRUCache | QuickLRU | Mnemonist |\n| :--- | :--- | :--- | :--- | :--- |\n| **Hit Rate** | 78.30% | **100.00%** | **100.00%** | **100.00%** |\n| **Throughput** | 10,365,916 ops/sec | 40,832,993 ops/sec | 40,950,040 ops/sec | **48,426,150 ops/sec** |\n\n## Key Characteristics\n\n* **High Eviction Efficiency**: `GenerationalCache` demonstrates strong throughput during high-turnover workloads, maintaining a performance margin compared to standard LRU designs in large-scale eviction scenarios.\n* **Predictable Scalability**: While other libraries may experience performance degradation as cache size increases, `GenerationalCache` maintains consistent throughput due to its generational swap mechanism.\n* **Balanced Read/Write**: It provides stable and competitive performance across all basic operations (`get`, `set`), making it suitable for both read-heavy and write-heavy environments.\n* **Trade-offs**: In cyclic access patterns where the working set is greater than `max / 2` but smaller than `max`, `GenerationalCache` will experience frequent generation swaps and cache misses. To maximize the performance benefits of `GenerationalCache`, it is often better to keep the `max` size small enough to allow some evictions, rather than trying to fit the entire working set.\n\n## License\n\nMIT\n", "node_modules/@asamuzakjp/css-color/README.md": "# CSS color\n\n[![build](https://github.com/asamuzaK/cssColor/actions/workflows/node.js.yml/badge.svg)](https://github.com/asamuzaK/cssColor/actions/workflows/node.js.yml)\n[![CodeQL](https://github.com/asamuzaK/cssColor/actions/workflows/github-code-scanning/codeql/badge.svg)](https://github.com/asamuzaK/cssColor/actions/workflows/github-code-scanning/codeql)\n[![npm (scoped)](https://img.shields.io/npm/v/@asamuzakjp/css-color)](https://www.npmjs.com/package/@asamuzakjp/css-color)\n\nResolve and convert CSS colors.\n\n## Install\n\n```console\nnpm i @asamuzakjp/css-color\n```\n\n## Usage\n\n```javascript\nimport { convert, resolve, utils } from '@asamuzakjp/css-color';\n\nconst resolvedValue = resolve(\n  'color-mix(in oklab, lch(67.5345 42.5 258.2), color(srgb 0 0.5 0))'\n);\n// 'oklab(0.620754 -0.0931934 -0.00374881)'\n\nconst convertedValue = convert.colorToHex('lab(46.2775% -47.5621 48.5837)');\n// '#008000'\n\nconst result = utils.isColor('green');\n// true\n```\n\n<!-- Generated by documentation.js. Update this documentation by updating the source code. -->\n\n### resolve(color, opt)\n\nresolves CSS color\n\n#### Parameters\n\n- `color` **[string][133]** color value\n  - system colors are not supported\n- `opt` **[object][135]?** options (optional, default `{}`)\n  - `opt.currentColor` **[string][133]?**\n    - color to use for `currentcolor` keyword\n    - if omitted, it will be treated as a missing color,\n      i.e. `rgb(none none none / none)`\n  - `opt.customProperty` **[object][135]?**\n    - custom properties\n    - pair of `--` prefixed property name as a key and it's value,\n      e.g.\n      ```javascript\n      const opt = {\n        customProperty: {\n          '--some-color': '#008000',\n          '--some-length': '16px'\n        }\n      };\n      ```\n    - and/or `callback` function to get the value of the custom property,\n      e.g.\n      ```javascript\n      const node = document.getElementById('foo');\n      const opt = {\n        customProperty: {\n          callback: node.style.getPropertyValue\n        }\n      };\n      ```\n  - `opt.dimension` **[object][135]?**\n    - dimension, e.g. for converting relative length to pixels\n    - pair of unit as a key and number in pixels as it's value,\n      e.g. suppose `1em === 12px`, `1rem === 16px` and `100vw === 1024px`, then\n      ```javascript\n      const opt = {\n        dimension: {\n          em: 12,\n          rem: 16,\n          vw: 10.24\n        }\n      };\n      ```\n    - and/or `callback` function to get the value as a number in pixels,\n      e.g.\n      ```javascript\n      const opt = {\n        dimension: {\n          callback: unit => {\n            switch (unit) {\n              case 'em':\n                return 12;\n              case 'rem':\n                return 16;\n              case 'vw':\n                return 10.24;\n              default:\n                return;\n            }\n          }\n        }\n      };\n      ```\n  - `opt.format` **[string][133]?**\n    - output format, one of below\n      - `computedValue` (default), [computed value][139] of the color\n      - `specifiedValue`, [specified value][140] of the color\n      - `hex`, hex color notation, i.e. `#rrggbb`\n      - `hexAlpha`, hex color notation with alpha channel, i.e. `#rrggbbaa`\n\nReturns **[string][133]?** one of `rgba?()`, `#rrggbb(aa)?`, `color-name`, `color(color-space r g b / alpha)`, `color(color-space x y z / alpha)`, `(ok)?lab(l a b / alpha)`, `(ok)?lch(l c h / alpha)`, `'(empty-string)'`, `null`\n\n- in `computedValue`, values are numbers, however `rgb()` values are integers\n- in `specifiedValue`, returns `empty string` for unknown and/or invalid color\n- in `hex`, returns `null` for `transparent`, and also returns `null` if any of `r`, `g`, `b`, `alpha` is not a number\n- in `hexAlpha`, returns `#00000000` for `transparent`, however returns `null` if any of `r`, `g`, `b`, `alpha` is not a number\n\n### convert\n\nContains various color conversion functions.\n\n### convert.numberToHex(value)\n\nconvert number to hex string\n\n#### Parameters\n\n- `value` **[number][134]** color value\n\nReturns **[string][133]** hex string: 00..ff\n\n### convert.colorToHex(value, opt)\n\nconvert color to hex\n\n#### Parameters\n\n- `value` **[string][133]** color value\n- `opt` **[object][135]?** options (optional, default `{}`)\n  - `opt.alpha` **[boolean][136]?** return in #rrggbbaa notation\n  - `opt.customProperty` **[object][135]?**\n    - custom properties, see `resolve()` function above\n  - `opt.dimension` **[object][135]?**\n    - dimension, see `resolve()` function above\n\nReturns **[string][133]** #rrggbb(aa)?\n\n### convert.colorToHsl(value, opt)\n\nconvert color to hsl\n\n#### Parameters\n\n- `value` **[string][133]** color value\n- `opt` **[object][135]?** options (optional, default `{}`)\n  - `opt.customProperty` **[object][135]?**\n    - custom properties, see `resolve()` function above\n  - `opt.dimension` **[object][135]?**\n    - dimension, see `resolve()` function above\n\nReturns **[Array][137]<[number][134]>** \\[h, s, l, alpha]\n\n### convert.colorToHwb(value, opt)\n\nconvert color to hwb\n\n#### Parameters\n\n- `value` **[string][133]** color value\n- `opt` **[object][135]?** options (optional, default `{}`)\n  - `opt.customProperty` **[object][135]?**\n    - custom properties, see `resolve()` function above\n  - `opt.dimension` **[object][135]?**\n    - dimension, see `resolve()` function above\n\nReturns **[Array][137]<[number][134]>** \\[h, w, b, alpha]\n\n### convert.colorToLab(value, opt)\n\nconvert color to lab\n\n#### Parameters\n\n- `value` **[string][133]** color value\n- `opt` **[object][135]?** options (optional, default `{}`)\n  - `opt.customProperty` **[object][135]?**\n    - custom properties, see `resolve()` function above\n  - `opt.dimension` **[object][135]?**\n    - dimension, see `resolve()` function above\n\nReturns **[Array][137]<[number][134]>** \\[l, a, b, alpha]\n\n### convert.colorToLch(value, opt)\n\nconvert color to lch\n\n#### Parameters\n\n- `value` **[string][133]** color value\n- `opt` **[object][135]?** options (optional, default `{}`)\n  - `opt.customProperty` **[object][135]?**\n    - custom properties, see `resolve()` function above\n  - `opt.dimension` **[object][135]?**\n    - dimension, see `resolve()` function above\n\nReturns **[Array][137]<[number][134]>** \\[l, c, h, alpha]\n\n### convert.colorToOklab(value, opt)\n\nconvert color to oklab\n\n#### Parameters\n\n- `value` **[string][133]** color value\n- `opt` **[object][135]?** options (optional, default `{}`)\n  - `opt.customProperty` **[object][135]?**\n    - custom properties, see `resolve()` function above\n  - `opt.dimension` **[object][135]?**\n    - dimension, see `resolve()` function above\n\nReturns **[Array][137]<[number][134]>** \\[l, a, b, alpha]\n\n### convert.colorToOklch(value, opt)\n\nconvert color to oklch\n\n#### Parameters\n\n- `value` **[string][133]** color value\n- `opt` **[object][135]?** options (optional, default `{}`)\n  - `opt.customProperty` **[object][135]?**\n    - custom properties, see `resolve()` function above\n  - `opt.dimension` **[object][135]?**\n    - dimension, see `resolve()` function above\n\nReturns **[Array][137]<[number][134]>** \\[l, c, h, alpha]\n\n### convert.colorToRgb(value, opt)\n\nconvert color to rgb\n\n#### Parameters\n\n- `value` **[string][133]** color value\n- `opt` **[object][135]?** options (optional, default `{}`)\n  - `opt.customProperty` **[object][135]?**\n    - custom properties, see `resolve()` function above\n  - `opt.dimension` **[object][135]?**\n    - dimension, see `resolve()` function above\n\nReturns **[Array][137]<[number][134]>** \\[r, g, b, alpha]\n\n### convert.colorToXyz(value, opt)\n\nconvert color to xyz\n\n#### Parameters\n\n- `value` **[string][133]** color value\n- `opt` **[object][135]?** options (optional, default `{}`)\n  - `opt.customProperty` **[object][135]?**\n    - custom properties, see `resolve()` function above\n  - `opt.dimension` **[object][135]?**\n    - dimension, see `resolve()` function above\n  - `opt.d50` **[boolean][136]?** xyz in d50 white point\n\nReturns **[Array][137]<[number][134]>** \\[x, y, z, alpha]\n\n### convert.colorToXyzD50(value, opt)\n\nconvert color to xyz-d50\n\n#### Parameters\n\n- `value` **[string][133]** color value\n- `opt` **[object][135]?** options (optional, default `{}`)\n  - `opt.customProperty` **[object][135]?**\n    - custom properties, see `resolve()` function above\n  - `opt.dimension` **[object][135]?**\n    - dimension, see `resolve()` function above\n\nReturns **[Array][137]<[number][134]>** \\[x, y, z, alpha]\n\n### utils\n\nContains utility functions.\n\n### utils.isColor(color)\n\nis valid color type\n\n#### Parameters\n\n- `color` **[string][133]** color value\n  - system colors are not supported\n\nReturns **[boolean][136]**\n\n## Acknowledgments\n\nThe following resources have been of great help in the development of the CSS color.\n\n- [csstools/postcss-plugins](https://github.com/csstools/postcss-plugins)\n- [lru-cache](https://github.com/isaacs/node-lru-cache)\n\n---\n\nCopyright (c) 2024 [asamuzaK (Kazz)](https://github.com/asamuzaK/)\n\n[133]: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/String\n[134]: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/Number\n[135]: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/Object\n[136]: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/Boolean\n[137]: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/Array\n[138]: https://w3c.github.io/csswg-drafts/css-color-4/#color-conversion-code\n[139]: https://developer.mozilla.org/en-US/docs/Web/CSS/computed_value\n[140]: https://developer.mozilla.org/en-US/docs/Web/CSS/specified_value\n[141]: https://www.npmjs.com/package/@csstools/css-calc\n", "node_modules/@asamuzakjp/dom-selector/README.md": "# DOM Selector\n\n[![build](https://github.com/asamuzaK/domSelector/actions/workflows/node.js.yml/badge.svg)](https://github.com/asamuzaK/domSelector/actions/workflows/node.js.yml)\n[![CodeQL](https://github.com/asamuzaK/domSelector/actions/workflows/github-code-scanning/codeql/badge.svg)](https://github.com/asamuzaK/domSelector/actions/workflows/github-code-scanning/codeql)\n[![npm (scoped)](https://img.shields.io/npm/v/@asamuzakjp/dom-selector)](https://www.npmjs.com/package/@asamuzakjp/dom-selector)\n\nA CSS selector engine.\n\n## Install\n\n```console\nnpm i @asamuzakjp/dom-selector\n```\n\n## Usage\n\n```javascript\nimport { DOMSelector } from '@asamuzakjp/dom-selector';\nimport { JSDOM } from 'jsdom';\n\nconst { window } = new JSDOM();\nconst {\n  closest, matches, querySelector, querySelectorAll\n} = new DOMSelector(window);\n```\n\n<!-- Generated by documentation.js. Update this documentation by updating the source code. -->\n\n### matches(selector, node, opt)\n\nmatches - equivalent to [Element.matches()][64]\n\n#### Parameters\n\n- `selector` **[string][59]** CSS selector\n- `node` **[object][60]** Element node\n- `opt` **[object][60]?** options\n  - `opt.noexcept` **[boolean][61]?** no exception\n  - `opt.warn` **[boolean][61]?** console warn e.g. unsupported pseudo-class\n\nReturns **[boolean][61]** `true` if matched, `false` otherwise\n\n\n### closest(selector, node, opt)\n\nclosest - equivalent to [Element.closest()][65]\n\n#### Parameters\n\n- `selector` **[string][59]** CSS selector\n- `node` **[object][60]** Element node\n- `opt` **[object][60]?** options\n  - `opt.noexcept` **[boolean][61]?** no exception\n  - `opt.warn` **[boolean][61]?** console warn e.g. unsupported pseudo-class\n\nReturns **[object][60]?** matched node\n\n\n### querySelector(selector, node, opt)\n\nquerySelector - equivalent to [Document.querySelector()][66], [DocumentFragment.querySelector()][67] and [Element.querySelector()][68]\n\n#### Parameters\n\n- `selector` **[string][59]** CSS selector\n- `node` **[object][60]** Document, DocumentFragment or Element node\n- `opt` **[object][60]?** options\n  - `opt.noexcept` **[boolean][61]?** no exception\n  - `opt.warn` **[boolean][61]?** console warn e.g. unsupported pseudo-class\n\nReturns **[object][60]?** matched node\n\n\n### querySelectorAll(selector, node, opt)\n\nquerySelectorAll - equivalent to [Document.querySelectorAll()][69], [DocumentFragment.querySelectorAll()][70] and [Element.querySelectorAll()][71]  \n**NOTE**: returns Array, not NodeList\n\n#### Parameters\n\n- `selector` **[string][59]** CSS selector\n- `node` **[object][60]** Document, DocumentFragment or Element node\n- `opt` **[object][60]?** options\n  - `opt.noexcept` **[boolean][61]?** no exception\n  - `opt.warn` **[boolean][61]?** console warn e.g. unsupported pseudo-class\n\nReturns **[Array][62]&lt;([object][60] \\| [undefined][63])>** array of matched nodes\n\n\n## Monkey patch jsdom\n\n``` javascript\nimport { DOMSelector } from '@asamuzakjp/dom-selector';\nimport { JSDOM } from 'jsdom';\n\nconst dom = new JSDOM('', {\n  runScripts: 'dangerously',\n  url: 'http://localhost/',\n  beforeParse: window => {\n    const domSelector = new DOMSelector(window);\n\n    const matches = domSelector.matches.bind(domSelector);\n    window.Element.prototype.matches = function (...args) {\n      if (!args.length) {\n        throw new window.TypeError('1 argument required, but only 0 present.');\n      }\n      const [selector] = args;\n      return matches(selector, this);\n    };\n\n    const closest = domSelector.closest.bind(domSelector);\n    window.Element.prototype.closest = function (...args) {\n      if (!args.length) {\n        throw new window.TypeError('1 argument required, but only 0 present.');\n      }\n      const [selector] = args;\n      return closest(selector, this);\n    };\n\n    const querySelector = domSelector.querySelector.bind(domSelector);\n    window.Document.prototype.querySelector = function (...args) {\n      if (!args.length) {\n        throw new window.TypeError('1 argument required, but only 0 present.');\n      }\n      const [selector] = args;\n      return querySelector(selector, this);\n    };\n    window.DocumentFragment.prototype.querySelector = function (...args) {\n      if (!args.length) {\n        throw new window.TypeError('1 argument required, but only 0 present.');\n      }\n      const [selector] = args;\n      return querySelector(selector, this);\n    };\n    window.Element.prototype.querySelector = function (...args) {\n      if (!args.length) {\n        throw new window.TypeError('1 argument required, but only 0 present.');\n      }\n      const [selector] = args;\n      return querySelector(selector, this);\n    };\n\n    const querySelectorAll = domSelector.querySelectorAll.bind(domSelector);\n    window.Document.prototype.querySelectorAll = function (...args) {\n      if (!args.length) {\n        throw new window.TypeError('1 argument required, but only 0 present.');\n      }\n      const [selector] = args;\n      return querySelectorAll(selector, this);\n    };\n    window.DocumentFragment.prototype.querySelectorAll = function (...args) {\n      if (!args.length) {\n        throw new window.TypeError('1 argument required, but only 0 present.');\n      }\n      const [selector] = args;\n      return querySelectorAll(selector, this);\n    };\n    window.Element.prototype.querySelectorAll = function (...args) {\n      if (!args.length) {\n        throw new window.TypeError('1 argument required, but only 0 present.');\n      }\n      const [selector] = args;\n      return querySelectorAll(selector, this);\n    };\n  }\n});\n```\n\n\n## Supported CSS selectors\n\n|Pattern|Supported|Note|\n|:--------|:-------:|:--------|\n|\\*|\u2713| |\n|E|\u2713| |\n|ns\\|E|\u2713| |\n|\\*\\|E|\u2713| |\n|\\|E|\u2713| |\n|E&nbsp;F|\u2713| |\n|E > F|\u2713| |\n|E + F|\u2713| |\n|E ~ F|\u2713| |\n|F \\|\\| E|Unsupported| |\n|E.warning|\u2713| |\n|E#myid|\u2713| |\n|E\\[foo\\]|\u2713| |\n|E\\[foo=\"bar\"\\]|\u2713| |\n|E\\[foo=\"bar\"&nbsp;i\\]|\u2713| |\n|E\\[foo=\"bar\"&nbsp;s\\]|\u2713| |\n|E\\[foo~=\"bar\"\\]|\u2713| |\n|E\\[foo^=\"bar\"\\]|\u2713| |\n|E\\[foo$=\"bar\"\\]|\u2713| |\n|E\\[foo*=\"bar\"\\]|\u2713| |\n|E\\[foo\\|=\"en\"\\]|\u2713| |\n|E:is(s1, s2, \u2026)|\u2713| |\n|E:not(s1, s2, \u2026)|\u2713| |\n|E:where(s1, s2, \u2026)|\u2713| |\n|E:has(rs1, rs2, \u2026)|\u2713| |\n|E:defined|Partially supported|Matching with MathML is not yet supported.|\n|E:dir(ltr)|\u2713| |\n|E:lang(en)|\u2713| |\n|E:any&#8209;link|\u2713| |\n|E:link|\u2713| |\n|E:visited|\u2713|Returns `false` or `null` to prevent fingerprinting.|\n|E:local&#8209;link|\u2713| |\n|E:target|\u2713| |\n|E:target&#8209;within|\u2713| |\n|E:scope|\u2713| |\n|E:hover|\u2713| |\n|E:active|\u2713| |\n|E:focus|\u2713| |\n|E:focus&#8209;visible|\u2713| |\n|E:focus&#8209;within|\u2713| |\n|E:current|Unsupported| |\n|E:current(s)|Unsupported| |\n|E:past|Unsupported| |\n|E:future|Unsupported| |\n|E:open<br>E:closed|Partially supported|Matching with &lt;select&gt;, e.g. `select:open`, is not supported.|\n|E:popover-open|Unsupported| |\n|E:enabled<br>E:disabled|\u2713| |\n|E:read&#8209;write<br>E:read&#8209;only|\u2713| |\n|E:placeholder&#8209;shown|\u2713| |\n|E:default|\u2713| |\n|E:checked|\u2713| |\n|E:indeterminate|\u2713| |\n|E:blank|Unsupported| |\n|E:valid<br>E:invalid|\u2713| |\n|E:in-range<br>E:out-of-range|\u2713| |\n|E:required<br>E:optional|\u2713| |\n|E:user&#8209;valid<br>E:user&#8209;invalid|Unsupported| |\n|E:root|\u2713| |\n|E:empty|\u2713| |\n|E:nth&#8209;child(n&nbsp;[of&nbsp;S]?)|\u2713| |\n|E:nth&#8209;last&#8209;child(n&nbsp;[of&nbsp;S]?)|\u2713| |\n|E:first&#8209;child|\u2713| |\n|E:last&#8209;child|\u2713| |\n|E:only&#8209;child|\u2713| |\n|E:nth&#8209;of&#8209;type(n)|\u2713| |\n|E:nth&#8209;last&#8209;of&#8209;type(n)|\u2713| |\n|E:first&#8209;of&#8209;type|\u2713| |\n|E:last&#8209;of&#8209;type|\u2713| |\n|E:only&#8209;of&#8209;type|\u2713| |\n|E:nth&#8209;col(n)|Unsupported| |\n|E:nth&#8209;last&#8209;col(n)|Unsupported| |\n|CE:state(v)|\u2713|*1|\n|:host|\u2713| |\n|:host(s)|\u2713| |\n|:host(:state(v))|\u2713|*1|\n|:host:has(rs1, rs2, ...)|\u2713| |\n|:host(s):has(rs1, rs2, ...)|\u2713| |\n|:host&#8209;context(s)|\u2713| |\n|:host&#8209;context(s):has(rs1, rs2, ...)|\u2713| |\n|&amp;|\u2713|Only supports outermost `&`, i.e. equivalent to `:scope`|\n\n*1: `ElementInternals.states`, i.e. `CustomStateSet`, is not implemented in jsdom, so you need to apply a patch in the custom element constructor.\n\n``` javascript\nclass LabeledCheckbox extends window.HTMLElement {\n  #internals;\n  constructor() {\n    super();\n    this.#internals = this.attachInternals();\n    // patch CustomStateSet\n    if (!this.#internals.states) {\n      this.#internals.states = new Set();\n    }\n    this.addEventListener('click', this._onClick.bind(this));\n  }\n  get checked() {\n    return this.#internals.states.has('checked');\n  }\n  set checked(flag) {\n    if (flag) {\n      this.#internals.states.add('checked');\n    } else {\n      this.#internals.states.delete('checked');\n    }\n  }\n  _onClick(event) {\n    this.checked = !this.checked;\n  }\n}\n```\n\n\n## Performance\n\nSee [benchmark](https://github.com/asamuzaK/domSelector/actions/workflows/benchmark.yml) for the latest results.\n\n\n## Acknowledgments\n\nThe following resources have been of great help in the development of the DOM Selector.\n\n- [CSSTree](https://github.com/csstree/csstree)\n- [selery](https://github.com/danburzo/selery)\n- [jsdom](https://github.com/jsdom/jsdom)\n- [nwsapi](https://github.com/dperini/nwsapi)\n\n---\nCopyright (c) 2023 [asamuzaK (Kazz)](https://github.com/asamuzaK/)\n\n\n[1]: #matches\n[2]: #parameters\n[3]: #closest\n[4]: #parameters-1\n[5]: #queryselector\n[6]: #parameters-2\n[7]: #queryselectorall\n[8]: #parameters-3\n[59]: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/String\n[60]: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/Object\n[61]: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/Boolean\n[62]: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/Array\n[63]: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/undefined\n[64]: https://developer.mozilla.org/docs/Web/API/Element/matches\n[65]: https://developer.mozilla.org/docs/Web/API/Element/closest\n[66]: https://developer.mozilla.org/docs/Web/API/Document/querySelector\n[67]: https://developer.mozilla.org/docs/Web/API/DocumentFragment/querySelector\n[68]: https://developer.mozilla.org/docs/Web/API/Element/querySelector\n[69]: https://developer.mozilla.org/docs/Web/API/Document/querySelectorAll\n[70]: https://developer.mozilla.org/docs/Web/API/DocumentFragment/querySelectorAll\n[71]: https://developer.mozilla.org/docs/Web/API/Element/querySelectorAll\n", "node_modules/@asamuzakjp/nwsapi/README.md": "# [NWSAPI](http://dperini.github.io/nwsapi/)\n\nFast CSS Selectors API Engine\n\n![](https://img.shields.io/npm/v/nwsapi.svg?colorB=orange&style=flat) ![](https://img.shields.io/github/tag/dperini/nwsapi.svg?style=flat) ![](https://img.shields.io/npm/dw/nwsapi.svg?style=flat) ![](https://img.shields.io/github/issues/dperini/nwsapi.svg?style=flat)\n\nNWSAPI is the development progress of [NWMATCHER](https://github.com/dperini/nwmatcher) aiming at [Selectors Level 4](https://www.w3.org/TR/selectors-4/) conformance. It has been completely reworked to be easily extended and maintained. It is a right-to-left selector parser and compiler written in pure Javascript with no external dependencies. It was initially thought as a cross browser library to improve event delegation and web page scraping in various frameworks but it has become a popular replacement of the native CSS selection and matching functionality in newer browsers and headless environments.\n\nIt uses [regular expressions](https://en.wikipedia.org/wiki/Regular_expression) to parse CSS selector strings and [metaprogramming](https://en.wikipedia.org/wiki/Metaprogramming) to transforms these selector strings into Javascript function resolvers. This process is executed only once for each selector string allowing memoization of the function resolvers and achieving unmatched performances.\n\n## Installation\n\nTo include NWSAPI in a standard web page:\n\n```html\n<script type=\"text/javascript\" src=\"nwsapi.js\"><\/script>\n```\n\nTo include NWSAPI in a standard web page and automatically replace the native QSA:\n\n```html\n<script type=\"text/javascript\" src=\"nwsapi.js\" onload=\"NW.Dom.install()\"><\/script>\n```\n\nTo use NWSAPI with Node.js:\n\n```\n$ npm install nwsapi\n```\n\nNWSAPI currently supports browsers (as a global, `NW.Dom`) and headless environments (as a CommonJS module).\n\n\n## Supported Selectors\n\nHere is a list of all the CSS2/CSS3/CSS4 [Supported selectors](https://github.com/dperini/nwsapi/wiki/CSS-supported-selectors).\n\n\n## Features and Compliance\n\nYou can read more about NWSAPI [features and compliance](https://github.com/dperini/nwsapi/wiki/Features-and-compliance) on the wiki.\n\n\n## API\n\n### DOM Selection\n\n#### `ancestor( selector, context, callback )`\n\nReturns a reference to the nearest ancestor element matching `selector`, starting at `context`. Returns `null` if no element is found. If `callback` is provided, it is invoked for the matched element.\n\n#### `first( selector, context, callback )`\n\nReturns a reference to the first element matching `selector`, starting at `context`. Returns `null` if no element matches. If `callback` is provided, it is invoked for the matched element.\n\n#### `match( selector, element, callback )`\n\nReturns `true` if `element` matches `selector`, starting at `context`; returns `false` otherwise. If `callback` is provided, it is invoked for the matched element.\n\n#### `select( selector, context, callback )`\n\nReturns an array of all the elements matching `selector`, starting at `context`; returns empty `Array` otherwise. If `callback` is provided, it is invoked for each matching element.\n\n\n### DOM Helpers\n\n#### `byId( id, from )`\n\nReturns a reference to the first element with ID `id`, optionally filtered to descendants of the element `from`.\n\n#### `byTag( tag, from )`\n\nReturns an array of elements having the specified tag name `tag`, optionally filtered to descendants of the element `from`.\n\n#### `byClass( class, from
