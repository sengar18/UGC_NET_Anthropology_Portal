nse.\n\n   8. Limitation of Liability. In no event and under no legal theory,\n      whether in tort (including negligence), contract, or otherwise,\n      unless required by applicable law (such as deliberate and grossly\n      negligent acts) or agreed to in writing, shall any Contributor be\n      liable to You for damages, including any direct, indirect, special,\n      incidental, or consequential damages of any character arising as a\n      result of this License or out of the use or inability to use the\n      Work (including but not limited to damages for loss of goodwill,\n      work stoppage, computer failure or malfunction, or any and all\n      other commercial damages or losses), even if such Contributor\n      has been advised of the possibility of such damages.\n\n   9. Accepting Warranty or Additional Liability. While redistributing\n      the Work or Derivative Works thereof, You may choose to offer,\n      and charge a fee for, acceptance of support, warranty, indemnity,\n      or other liability obligations and/or rights consistent with this\n      License. However, in accepting such obligations, You may act only\n      on Your own behalf and on Your sole responsibility, not on behalf\n      of any other Contributor, and only if You agree to indemnify,\n      defend, and hold each Contributor harmless for any liability\n      incurred by, or claims asserted against, such Contributor by reason\n      of your accepting any such warranty or additional liability.\n\n   END OF TERMS AND CONDITIONS\n", "node_modules/xml-name-validator/README.md": "# Validate XML Names and Qualified Names\n\nThis package simply tells you whether or not a string matches the [`Name`](http://www.w3.org/TR/xml/#NT-Name) or [`QName`](http://www.w3.org/TR/xml-names/#NT-QName) productions in the XML Namespaces specification. We use it for implementing the [validate](https://dom.spec.whatwg.org/#validate) algorithm in jsdom, but you can use it for whatever you want.\n\n## Usage\n\nThis package's main module exports two functions, `name()` and `qname()`. Both take a string and return a boolean indicating whether or not the string matches the relevant production.\n\n```js\n\"use strict\":\nconst xnv = require(\"xml-name-validator\");\n\n// Will return true\nxnv.name(\"x\");\nxnv.name(\":\");\nxnv.name(\"a:0\");\nxnv.name(\"a:b:c\");\n\n// Will return false\nxnv.name(\"\\\\\");\nxnv.name(\"'\");\nxnv.name(\"0\");\nxnv.name(\"a!\");\n\n// Will return true\nxnv.qname(\"x\");\nxnv.qname(\"a0\");\nxnv.qname(\"a:b\");\n\n// Will return false\nxnv.qname(\":a\");\nxnv.qname(\":b\");\nxnv.qname(\"a:b:c\");\nxnv.qname(\"a:0\");\n```\n", "node_modules/html-encoding-sniffer/LICENSE.txt": "Copyright \u00a9 Domenic Denicola <d@domenic.me>\n\nPermission is hereby granted, free of charge, to any person obtaining a copy of this software and associated documentation files (the \"Software\"), to deal in the Software without restriction, including without limitation the rights to use, copy, modify, merge, publish, distribute, sublicense, and/or sell copies of the Software, and to permit persons to whom the Software is furnished to do so, subject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all copies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/html-encoding-sniffer/README.md": "# Determine the Encoding of a HTML Byte Stream\n\nThis package implements the HTML Standard's [encoding sniffing algorithm](https://html.spec.whatwg.org/multipage/syntax.html#encoding-sniffing-algorithm) in all its glory. The most interesting part of this is how it pre-scans the first 1024 bytes in order to search for certain `<meta charset>`-related patterns.\n\n```js\nconst htmlEncodingSniffer = require(\"html-encoding-sniffer\");\nconst fs = require(\"fs\");\n\nconst htmlBytes = fs.readFileSync(\"./html-page.html\");\nconst sniffedEncoding = htmlEncodingSniffer(htmlBytes);\n```\n\nThe passed bytes are given as a `Uint8Array`; the Node.js `Buffer` subclass of `Uint8Array` will also work, as shown above.\n\nThe returned value will be a canonical [encoding name](https://encoding.spec.whatwg.org/#names-and-labels) (not a label). You might then combine this with the [`@exodus/bytes`](https://github.com/ExodusOSS/bytes/) package to decode the result:\n\n```js\nconst { TextDecoder } = require(\"@exodus/bytes\");\nconst htmlString = (new TextDecoder(sniffedEncoding)).decode(htmlBytes);\n```\n\n## Options\n\nYou can pass the following options to `htmlEncodingSniffer`:\n\n```js\nconst sniffedEncoding = htmlEncodingSniffer(htmlBytes, {\n  xml,\n  transportLayerEncodingLabel,\n  defaultEncoding,\n});\n```\n\nThe `xml` option is a boolean, defaulting to `false`. If set to `true`, then we bypass the [HTML encoding sniffing algorithm](https://html.spec.whatwg.org/multipage/syntax.html#encoding-sniffing-algorithm) and compute the encoding based on the presence of a BOM, or the other options provided. (In the future, we may perform sniffing of the `<?xml?>` declaration, but for now that is not implemented.)\n\nThe `transportLayerEncodingLabel` is an encoding label that is obtained from the \"transport layer\" (probably a HTTP `Content-Type` header), which overrides everything but a BOM.\n\nThe `defaultEncoding` is the ultimate fallback encoding used if no valid encoding is supplied by the transport layer, and no encoding is sniffed from the bytes. For HTML, it defaults to `\"windows-1252\"`, as recommended by the algorithm's table of suggested defaults for \"All other locales\" (including the `en` locale). For XML, it defaults to `\"UTF-8\"`.\n\n## Credits\n\nThis package was originally based on the excellent work of [@nicolashenry](https://github.com/nicolashenry), [in jsdom](https://github.com/tmpvar/jsdom/blob/16fd85618f2705d181232f6552125872a37164bc/lib/jsdom/living/helpers/encoding.js). It has since been pulled out into this separate package.\n", "node_modules/@exodus/bytes/README.md": "# @exodus/bytes\n\n[![](https://img.shields.io/npm/v/@exodus/bytes?style=flat-square)](https://npmjs.org/package/@exodus/bytes)\n[![](https://img.shields.io/github/release/ExodusOSS/bytes?style=flat-square&logo=github)](https://github.com/ExodusOSS/bytes/releases)\n[![](https://img.shields.io/npm/dm/@exodus/bytes?style=flat-square)](https://www.npmcharts.com/compare/@exodus/bytes?minimal=true)\n[![](https://img.shields.io/npm/l/@exodus/bytes?style=flat-square&color=blue)](https://github.com/ExodusOSS/bytes/blob/HEAD/LICENSE)\n[![](https://img.shields.io/github/check-runs/ExodusOSS/bytes/main?style=flat-square&logo=github)](https://github.com/ExodusOSS/bytes/actions/workflows/test.yml?query=branch%3Amain)\n[![](https://img.shields.io/badge/Documentation-3178c6?style=flat-square&logo=TypeScript&logoColor=fff)](https://exodusoss.github.io/bytes/)\n\n`Uint8Array` conversion to and from `base64`, `base32`, `base58`, `hex`, `utf8`, `utf16`, `bech32` and `wif`\n\nAnd a [`TextEncoder` / `TextDecoder` polyfill](#textencoder--textdecoder-polyfill)\n\nSee [documentation](https://exodusoss.github.io/bytes/).\n\n## Strict\n\nPerforms proper input validation, ensures no garbage-in-garbage-out\n\nTested in CI with [@exodus/test](https://github.com/ExodusMovement/test#exodustest) on:\n\n[![Node.js](https://img.shields.io/badge/Node.js-338750?style=for-the-badge&logo=Node.js&logoColor=FFF)](https://nodejs.org/api/test.html)\n[![Deno](https://img.shields.io/badge/Deno-121417?style=for-the-badge&logo=Deno&logoColor=FFF)](https://deno.com/)\n[![Bun](https://img.shields.io/badge/Bun-F472B6?style=for-the-badge&logo=Bun&logoColor=FFF)](https://bun.sh/)\n[![Electron](https://img.shields.io/badge/Electron-2F3242?style=for-the-badge&logo=Electron&logoColor=A2ECFB)](http://electronjs.org/)\n[![workerd](https://img.shields.io/badge/workerd-F38020?style=for-the-badge&logo=cloudflareworkers&logoColor=FFF)](https://github.com/cloudflare/workerd)\\\n[![Chrome](https://img.shields.io/badge/Chrome-4285F4?style=for-the-badge&logo=GoogleChrome&logoColor=FFF)](https://www.chromium.org/Home/)\n[![WebKit](https://img.shields.io/badge/WebKit-006CFF?style=for-the-badge&logo=Safari&logoColor=FFF)](http://webkit.org/)\n[![Firefox](https://img.shields.io/badge/Firefox-FF7139?style=for-the-badge&logo=Firefox&logoColor=FFF)](https://github.com/mozilla-firefox)\n[![Servo](https://img.shields.io/badge/Servo-009D9A?style=for-the-badge)](https://servo.org/)\\\n[![Hermes](https://img.shields.io/badge/Hermes-282C34?style=for-the-badge&logo=React)](https://hermesengine.dev)\n[![V8](https://img.shields.io/badge/V8-4285F4?style=for-the-badge&logo=V8&logoColor=white)](https://v8.dev/docs/d8)\n[![JavaScriptCore](https://img.shields.io/badge/JavaScriptCore-006CFF?style=for-the-badge)](https://docs.webkit.org/Deep%20Dive/JSC/JavaScriptCore.html)\n[![SpiderMonkey](https://img.shields.io/badge/SpiderMonkey-FFD681?style=for-the-badge)](https://spidermonkey.dev/)\\\n[![QuickJS](https://img.shields.io/badge/QuickJS-E58200?style=for-the-badge)](https://github.com/quickjs-ng/quickjs)\n[![XS](https://img.shields.io/badge/XS-0B307A?style=for-the-badge)](https://github.com/Moddable-OpenSource/moddable)\n[![GraalJS](https://img.shields.io/badge/GraalJS-C74634?style=for-the-badge)](https://github.com/oracle/graaljs)\n\n## Fast\n\n* `10-20x` faster than `Buffer` polyfill\n* `2-10x` faster than `iconv-lite`\n\nThe above was for the js fallback\n\nIt's up to `100x` when native impl is available \\\ne.g. in `utf8fromString` on Hermes / React Native or `fromHex` in Chrome\n\nAlso:\n* `3-8x` faster than `bs58`\n* `10-30x` faster than `@scure/base` (or `>100x` on Node.js <25)\n* Faster in `utf8toString` / `utf8fromString` than `Buffer` or `TextDecoder` / `TextEncoder` on Node.js\n\nSee [Performance](./Performance.md) for more info\n\n## TextEncoder / TextDecoder polyfill\n\n```js\nimport { TextDecoder, TextEncoder } from '@exodus/bytes/encoding.js'\nimport { TextDecoderStream, TextEncoderStream } from '@exodus/bytes/encoding.js' // Requires Streams\n```\n\nLess than half the bundle size of [text-encoding](https://npmjs.com/text-encoding), [whatwg-encoding](https://npmjs.com/whatwg-encoding) or [iconv-lite](https://npmjs.com/iconv-lite) (gzipped or not).\\\nAlso [much faster](#fast) than all of those.\n\n> [!TIP]\n> See also the [lite version](#lite-version) to get this down to 8 KiB gzipped.\n\nSpec compliant, passing WPT and covered with extra tests.\\\nMoreover, tests for this library uncovered [bugs in all major implementations](https://docs.google.com/spreadsheets/d/1pdEefRG6r9fZy61WHGz0TKSt8cO4ISWqlpBN5KntIvQ/edit).\\\nIncluding all three major browser engines being wrong at UTF-8.\\\nSee [WPT pull request](https://github.com/web-platform-tests/wpt/pull/56892).\n\nIt works correctly even in environments that have native implementations broken (that's all of them currently).\\\nRuns (and passes WPT) on Node.js built without ICU.\n\n> [!NOTE]\n> [Faster than Node.js native implementation on Node.js](https://github.com/nodejs/node/issues/61041#issuecomment-3649242024).\n>\n> The JS multi-byte version is as fast as native impl in Node.js and browsers, but (unlike them) returns correct results.\n>\n> For encodings where native version is known to be fast and correct, it is automatically used.\\\n> Some single-byte encodings are faster than native in all three major browser engines.\n\nSee [analysis table](https://docs.google.com/spreadsheets/d/1pdEefRG6r9fZy61WHGz0TKSt8cO4ISWqlpBN5KntIvQ/edit) for more info.\n\n### Caveat: `TextDecoder` / `TextEncoder` APIs are lossy by default per spec\n\n_These are only provided as a compatibility layer, prefer hardened APIs instead in new code._\n\n * `TextDecoder` can (and should) be used with `{ fatal: true }` option for all purposes demanding correctness / lossless transforms\n\n * `TextEncoder` does not support a fatal mode per spec, it always performs replacement.\n\n   That is not suitable for hashing, cryptography or consensus applications.\\\n   Otherwise there would be non-equal strings with equal signatures and hashes \u2014 the collision is caused by the lossy transform of a JS string to bytes.\n   Those also survive e.g. `JSON.stringify`/`JSON.parse` or being sent over network.\n\n   Use strict APIs in new applications, see `utf8fromString` / `utf16fromString` below.\\\n   Those throw on non-well-formed strings by default.\n\n### Lite version\n\nAlternate exports exist that can help reduce bundle size, see comparison:\n\n| import | size |\n| - | - |\n| [@exodus/bytes/encoding-browser.js](#exodusbytesencoding-browserjs-) | <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/encoding-browser.js?style=flat-square)</sub> |\n| [@exodus/bytes/encoding-lite.js](#exodusbytesencoding-litejs-) | <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/encoding-lite.js?style=flat-square)</sub> |\n| [@exodus/bytes/encoding.js](#exodusbytesencodingjs-) | <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/encoding.js?style=flat-square)</sub> |\n| `text-encoding` | <sub>![](https://img.shields.io/bundlejs/size/text-encoding?style=flat-square)</sub> |\n| `iconv-lite` | <sub>![](https://img.shields.io/bundlejs/size/iconv-lite/lib/index.js?style=flat-square)</sub> |\n| `whatwg-encoding` | <sub>![](https://img.shields.io/bundlejs/size/whatwg-encoding?style=flat-square)</sub> |\n\nLibraries are advised to use single-purpose hardened `@exodus/bytes/utf8.js` / `@exodus/bytes/utf16.js` APIs for Unicode.\n\nApplications (including React Native apps) are advised to load either `@exodus/bytes/encoding-lite.js` or `@exodus/bytes/encoding.js`\n(depending on whether legacy multi-byte support is needed) and use that as a global polyfill.\n\n#### `@exodus/bytes/encoding-lite.js`\n\nIf you don't need support for legacy multi-byte encodings.\n\nReduces the bundle size ~12x, while still keeping `utf-8`, `utf-16le`, `utf-16be` and all single-byte encodings specified by the spec.\nThe only difference is support for legacy multi-byte encodings.\n\nSee [the list of encodings](https://encoding.spec.whatwg.org/#names-and-labels).\n\nThis can be useful for example in React Native global TextDecoder polyfill,\nif you are sure that you don't need legacy multi-byte encodings support.\n\n#### `@exodus/bytes/encoding-browser.js`\n\nResolves to a tiny import in browser bundles, preferring native `TextDecoder` / `TextEncoder`.\n\nFor non-browsers (Node.js, React Native), loads a full implementation.\n\n> [!NOTE]\n> This is not the default behavior for `@exodus/bytes/encoding.js` because all major browser implementations have bugs,\n> which `@exodus/bytes/encoding.js` fixes. Only use if you are ok with that.\n\n## API\n\n### @exodus/bytes/utf8.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/utf8.js?style=flat-square)</sub>\n\nUTF-8 encoding/decoding\n\n```js\nimport { utf8fromString, utf8toString } from '@exodus/bytes/utf8.js'\n\n// loose\nimport { utf8fromStringLoose, utf8toStringLoose } from '@exodus/bytes/utf8.js'\n```\n\n_These methods by design encode/decode BOM (codepoint `U+FEFF` Byte Order Mark) as-is._\\\n_If you need BOM handling or detection, use `@exodus/bytes/encoding.js`_\n\n#### `utf8fromString(string, format = 'uint8')`\n\nEncode a string to UTF-8 bytes (strict mode)\n\nThrows on invalid Unicode (unpaired surrogates)\n\nThis is similar to the following snippet (but works on all engines):\n```js\n// Strict encode, requiring Unicode codepoints to be valid\nif (typeof string !== 'string' || !string.isWellFormed()) throw new TypeError()\nreturn new TextEncoder().encode(string)\n```\n\n#### `utf8fromStringLoose(string, format = 'uint8')`\n\nEncode a string to UTF-8 bytes (loose mode)\n\nReplaces invalid Unicode (unpaired surrogates) with replacement codepoints `U+FFFD`\nper [WHATWG Encoding](https://encoding.spec.whatwg.org/) specification.\n\n_Such replacement is a non-injective function, is irreversable and causes collisions.\\\nPrefer using strict throwing methods for cryptography applications._\n\nThis is similar to the following snippet (but works on all engines):\n```js\n// Loose encode, replacing invalid Unicode codepoints with U+FFFD\nif (typeof string !== 'string') throw new TypeError()\nreturn new TextEncoder().encode(string)\n```\n\n#### `utf8toString(arr)`\n\nDecode UTF-8 bytes to a string (strict mode)\n\nThrows on invalid UTF-8 byte sequences\n\nThis is similar to `new TextDecoder('utf-8', { fatal: true, ignoreBOM: true }).decode(arr)`,\nbut works on all engines.\n\n#### `utf8toStringLoose(arr)`\n\nDecode UTF-8 bytes to a string (loose mode)\n\nReplaces invalid UTF-8 byte sequences with replacement codepoints `U+FFFD`\nper [WHATWG Encoding](https://encoding.spec.whatwg.org/) specification.\n\n_Such replacement is a non-injective function, is irreversable and causes collisions.\\\nPrefer using strict throwing methods for cryptography applications._\n\nThis is similar to `new TextDecoder('utf-8', { ignoreBOM: true }).decode(arr)`,\nbut works on all engines.\n\n### @exodus/bytes/utf16.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/utf16.js?style=flat-square)</sub>\n\nUTF-16 encoding/decoding\n\n```js\nimport { utf16fromString, utf16toString } from '@exodus/bytes/utf16.js'\n\n// loose\nimport { utf16fromStringLoose, utf16toStringLoose } from '@exodus/bytes/utf16.js'\n```\n\n_These methods by design encode/decode BOM (codepoint `U+FEFF` Byte Order Mark) as-is._\\\n_If you need BOM handling or detection, use `@exodus/bytes/encoding.js`_\n\n#### `utf16fromString(string, format = 'uint16')`\n\nEncode a string to UTF-16 bytes (strict mode)\n\nThrows on invalid Unicode (unpaired surrogates)\n\n#### `utf16fromStringLoose(string, format = 'uint16')`\n\nEncode a string to UTF-16 bytes (loose mode)\n\nReplaces invalid Unicode (unpaired surrogates) with replacement codepoints `U+FFFD`\nper [WHATWG Encoding](https://encoding.spec.whatwg.org/) specification.\n\n_Such replacement is a non-injective function, is irreversible and causes collisions.\\\nPrefer using strict throwing methods for cryptography applications._\n\n#### `utf16toString(arr, format = 'uint16')`\n\nDecode UTF-16 bytes to a string (strict mode)\n\nThrows on invalid UTF-16 byte sequences\n\nThrows on non-even byte length.\n\n#### `utf16toStringLoose(arr, format = 'uint16')`\n\nDecode UTF-16 bytes to a string (loose mode)\n\nReplaces invalid UTF-16 byte sequences with replacement codepoints `U+FFFD`\nper [WHATWG Encoding](https://encoding.spec.whatwg.org/) specification.\n\n_Such replacement is a non-injective function, is irreversible and causes collisions.\\\nPrefer using strict throwing methods for cryptography applications._\n\nThrows on non-even byte length.\n\n### @exodus/bytes/bigint.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/bigint.js?style=flat-square)</sub>\n\nConvert between BigInt and Uint8Array\n\n```js\nimport { fromBigInt, toBigInt } from '@exodus/bytes/bigint.js'\n```\n\n#### `fromBigInt(bigint, { length, format = 'uint8' })`\n\nConvert a BigInt to a Uint8Array or Buffer\n\nThe output bytes are in big-endian format.\n\nThrows if the BigInt is negative or cannot fit into the specified length.\n\n#### `toBigInt(arr)`\n\nConvert a Uint8Array or Buffer to a BigInt\n\nThe bytes are interpreted as a big-endian unsigned integer.\n\n### @exodus/bytes/hex.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/hex.js?style=flat-square)</sub>\n\nImplements Base16 from [RFC4648](https://datatracker.ietf.org/doc/html/rfc4648)\n(no differences from [RFC3548](https://datatracker.ietf.org/doc/html/rfc4648)).\n\n```js\nimport { fromHex, toHex } from '@exodus/bytes/hex.js'\n```\n\n#### `fromHex(string, format = 'uint8')`\n\nDecode a hex string to bytes\n\nUnlike `Buffer.from()`, throws on invalid input\n\n#### `toHex(arr)`\n\nEncode a `Uint8Array` to a lowercase hex string\n\n### @exodus/bytes/base64.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/base64.js?style=flat-square)</sub>\n\nImplements base64 and base64url from [RFC4648](https://datatracker.ietf.org/doc/html/rfc4648)\n(no differences from [RFC3548](https://datatracker.ietf.org/doc/html/rfc4648)).\n\n```js\nimport { fromBase64, toBase64 } from '@exodus/bytes/base64.js'\nimport { fromBase64url, toBase64url } from '@exodus/bytes/base64.js'\nimport { fromBase64any } from '@exodus/bytes/base64.js'\n```\n\n#### `fromBase64(string, { format = 'uint8', padding = 'both' })`\n\nDecode a base64 string to bytes\n\nOperates in strict mode for last chunk, does not allow whitespace\n\n#### `fromBase64url(string, { format = 'uint8', padding = false })`\n\nDecode a base64url string to bytes\n\nOperates in strict mode for last chunk, does not allow whitespace\n\n#### `fromBase64any(string, { format = 'uint8', padding = 'both' })`\n\nDecode either base64 or base64url string to bytes\n\nAutomatically detects the variant based on characters present\n\n#### `toBase64(arr, { padding = true })`\n\nEncode a `Uint8Array` to a base64 string (RFC 4648)\n\n#### `toBase64url(arr, { padding = false })`\n\nEncode a `Uint8Array` to a base64url string (RFC 4648)\n\n### @exodus/bytes/base32.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/base32.js?style=flat-square)</sub>\n\nImplements base32 and base32hex from [RFC4648](https://datatracker.ietf.org/doc/html/rfc4648)\n(no differences from [RFC3548](https://datatracker.ietf.org/doc/html/rfc4648)).\n\n```js\nimport { fromBase32, toBase32 } from '@exodus/bytes/base32.js'\nimport { fromBase32hex, toBase32hex } from '@exodus/bytes/base32.js'\n```\n\n#### `fromBase32(string, { format = 'uint8', padding = 'both' })`\n\nDecode a base32 string to bytes\n\nOperates in strict mode for last chunk, does not allow whitespace\n\n#### `fromBase32hex(string, { format = 'uint8', padding = 'both' })`\n\nDecode a base32hex string to bytes\n\nOperates in strict mode for last chunk, does not allow whitespace\n\n#### `fromBase32crockford(string, options)`\n\nDecode a Crockford base32 string to bytes\n\nOperates in strict mode for last chunk, does not allow whitespace\n\nCrockford base32 decoding follows extra mapping per spec: `LIli -> 1, Oo -> 0`\n\n#### `toBase32(arr, { padding = false })`\n\nEncode a `Uint8Array` to a base32 string (RFC 4648)\n\n#### `toBase32hex(arr, { padding = false })`\n\nEncode a `Uint8Array` to a base32hex string (RFC 4648)\n\n#### `toBase32crockford(arr, options)`\n\nEncode a `Uint8Array` to a Crockford base32 string\n\n### @exodus/bytes/bech32.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/bech32.js?style=flat-square)</sub>\n\nImplements bech32 and bech32m from\n[BIP-0173](https://github.com/bitcoin/bips/blob/master/bip-0173.mediawiki#specification)\nand [BIP-0350](https://github.com/bitcoin/bips/blob/master/bip-0350.mediawiki#specification).\n\n```js\nimport { fromBech32, toBech32 } from '@exodus/bytes/bech32.js'\nimport { fromBech32m, toBech32m } from '@exodus/bytes/bech32.js'\nimport { getPrefix } from '@exodus/bytes/bech32.js'\n```\n\n#### `getPrefix(string, limit = 90)`\n\nExtract the prefix from a bech32 or bech32m string without full validation\n\nThis is a quick check that skips most validation.\n\n#### `fromBech32(string, limit = 90)`\n\nDecode a bech32 string to bytes\n\n#### `toBech32(prefix, bytes, limit = 90)`\n\nEncode bytes to a bech32 string\n\n#### `fromBech32m(string, limit = 90)`\n\nDecode a bech32m string to bytes\n\n#### `toBech32m(prefix, bytes, limit = 90)`\n\nEncode bytes to a bech32m string\n\n### @exodus/bytes/base58.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/base58.js?style=flat-square)</sub>\n\nImplements [base58](https://www.ietf.org/archive/id/draft-msporny-base58-03.txt) encoding.\n\nSupports both standard base58 and XRP variant alphabets.\n\n```js\nimport { fromBase58, toBase58 } from '@exodus/bytes/base58.js'\nimport { fromBase58xrp, toBase58xrp } from '@exodus/bytes/base58.js'\n```\n\n#### `fromBase58(string, format = 'uint8')`\n\nDecode a base58 string to bytes\n\nUses the standard Bitcoin base58 alphabet\n\n#### `toBase58(arr)`\n\nEncode a `Uint8Array` to a base58 string\n\nUses the standard Bitcoin base58 alphabet\n\n#### `fromBase58xrp(string, format = 'uint8')`\n\nDecode a base58 string to bytes using XRP alphabet\n\nUses the XRP variant base58 alphabet\n\n#### `toBase58xrp(arr)`\n\nEncode a `Uint8Array` to a base58 string using XRP alphabet\n\nUses the XRP variant base58 alphabet\n\n### @exodus/bytes/base58check.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/base58check.js?style=flat-square)</sub>\n\nImplements [base58check](https://en.bitcoin.it/wiki/Base58Check_encoding) encoding.\n\n```js\nimport { fromBase58check, toBase58check } from '@exodus/bytes/base58check.js'\nimport { fromBase58checkSync, toBase58checkSync } from '@exodus/bytes/base58check.js'\nimport { makeBase58check } from '@exodus/bytes/base58check.js'\n```\n\nOn non-Node.js, requires peer dependency [@noble/hashes](https://www.npmjs.com/package/@noble/hashes) to be installed.\n\n#### `async fromBase58check(string, format = 'uint8')`\n\nDecode a base58check string to bytes asynchronously\n\nValidates the checksum using double SHA-256\n\n#### `async toBase58check(arr)`\n\nEncode bytes to base58check string asynchronously\n\nUses double SHA-256 for checksum calculation\n\n#### `fromBase58checkSync(string, format = 'uint8')`\n\nDecode a base58check string to bytes synchronously\n\nValidates the checksum using double SHA-256\n\n#### `toBase58checkSync(arr)`\n\nEncode bytes to base58check string synchronously\n\nUses double SHA-256 for checksum calculation\n\n#### `makeBase58check(hashAlgo, hashAlgoSync)`\n\nCreate a base58check encoder/decoder with custom hash functions\n\n### @exodus/bytes/wif.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/wif.js?style=flat-square)</sub>\n\nWallet Import Format (WIF) encoding and decoding.\n\n```js\nimport { fromWifString, toWifString } from '@exodus/bytes/wif.js'\nimport { fromWifStringSync, toWifStringSync } from '@exodus/bytes/wif.js'\n```\n\nOn non-Node.js, requires peer dependency [@noble/hashes](https://www.npmjs.com/package/@noble/hashes) to be installed.\n\n#### `async fromWifString(string[, version])`\n\nDecode a WIF string to WIF data\n\nReturns a promise that resolves to an object with `{ version, privateKey, compressed }`.\n\nThe optional `version` parameter validates the version byte.\n\nThrows if the WIF string is invalid or version doesn't match.\n\n#### `fromWifStringSync(string[, version])`\n\nDecode a WIF string to WIF data (synchronous)\n\nReturns an object with `{ version, privateKey, compressed }`.\n\nThe optional `version` parameter validates the version byte.\n\nThrows if the WIF string is invalid or version doesn't match.\n\n#### `async toWifString({ version, privateKey, compressed })`\n\nEncode WIF data to a WIF string\n\n#### `toWifStringSync({ version, privateKey, compressed })`\n\nEncode WIF data to a WIF string (synchronous)\n\n### @exodus/bytes/array.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/array.js?style=flat-square)</sub>\n\nTypedArray utils and conversions.\n\n```js\nimport { typedCopyBytes, typedView } from '@exodus/bytes/array.js'\n```\n\n#### `typedCopyBytes(arr, format = 'uint8')`\n\nCreate a copy of TypedArray underlying bytes in the specified format (`'uint8'`, `'buffer'`, or `'arraybuffer'`)\n\nThis does not copy _values_, but copies the underlying bytes.\nThe result is similar to that of `typedView()`, but this function provides a copy, not a view of the same memory.\n\n> [!WARNING]\n> Copying underlying bytes from `Uint16Array` (or other with `BYTES_PER_ELEMENT > 1`)\n> is platform endianness-dependent.\n\n> [!NOTE]\n> Buffer might be pooled.\n> Uint8Array return values are not pooled and match their underlying ArrayBuffer.\n\n#### `typedView(arr, format = 'uint8')`\n\nCreate a view of a TypedArray in the specified format (`'uint8'` or `'buffer'`)\n\n> [!IMPORTANT]\n> Does not copy data, returns a view on the same underlying buffer\n\n> [!WARNING]\n> Viewing `Uint16Array` (or other with `BYTES_PER_ELEMENT > 1`) as bytes\n> is platform endianness-dependent.\n\n### @exodus/bytes/encoding.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/encoding.js?style=flat-square)</sub>\n\nImplements the [Encoding standard](https://encoding.spec.whatwg.org/):\n[TextDecoder](https://encoding.spec.whatwg.org/#interface-textdecoder),\n[TextEncoder](https://encoding.spec.whatwg.org/#interface-textencoder),\n[TextDecoderStream](https://encoding.spec.whatwg.org/#interface-textdecoderstream),\n[TextEncoderStream](https://encoding.spec.whatwg.org/#interface-textencoderstream),\nsome [hooks](https://encoding.spec.whatwg.org/#specification-hooks).\n\n```js\nimport { TextDecoder, TextEncoder } from '@exodus/bytes/encoding.js'\nimport { TextDecoderStream, TextEncoderStream } from '@exodus/bytes/encoding.js' // Requires Streams\nimport { isomorphicDecode, isomorphicEncode } from '@exodus/bytes/encoding.js'\n\n// Hooks for standards\nimport { getBOMEncoding, legacyHookDecode, labelToName, normalizeEncoding } from '@exodus/bytes/encoding.js'\n```\n\n#### `new TextDecoder(label = 'utf-8', { fatal = false, ignoreBOM = false })`\n\n[TextDecoder](https://encoding.spec.whatwg.org/#interface-textdecoder) implementation/polyfill.\n\nDecode bytes to strings according to [WHATWG Encoding](https://encoding.spec.whatwg.org) specification.\n\n#### `new TextEncoder()`\n\n[TextEncoder](https://encoding.spec.whatwg.org/#interface-textencoder) implementation/polyfill.\n\nEncode strings to UTF-8 bytes according to [WHATWG Encoding](https://encoding.spec.whatwg.org) specification.\n\n#### `new TextDecoderStream(label = 'utf-8', { fatal = false, ignoreBOM = false })`\n\n[TextDecoderStream](https://encoding.spec.whatwg.org/#interface-textdecoderstream) implementation/polyfill.\n\nA [Streams](https://streams.spec.whatwg.org/) wrapper for `TextDecoder`.\n\nRequires [Streams](https://streams.spec.whatwg.org/) to be either supported by the platform or\n[polyfilled](https://npmjs.com/package/web-streams-polyfill).\n\n#### `new TextEncoderStream()`\n\n[TextEncoderStream](https://encoding.spec.whatwg.org/#interface-textencoderstream) implementation/polyfill.\n\nA [Streams](https://streams.spec.whatwg.org/) wrapper for `TextEncoder`.\n\nRequires [Streams](https://streams.spec.whatwg.org/) to be either supported by the platform or\n[polyfilled](https://npmjs.com/package/web-streams-polyfill).\n\n#### `isomorphicDecode(input)`\n\nImplements [isomorphic decode](https://infra.spec.whatwg.org/#isomorphic-decode).\n\nGiven a `TypedArray` or an `ArrayBuffer` instance `input`, creates a string of the same length\nas input byteLength, using bytes from input as codepoints.\n\nE.g. for `Uint8Array` input, this is similar to `String.fromCodePoint(...input)`.\n\nWider `TypedArray` inputs, e.g. `Uint16Array`, are interpreted as underlying _bytes_.\n\n#### `isomorphicEncode(str)`\n\nImplements [isomorphic encode](https://infra.spec.whatwg.org/#isomorphic-encode).\n\nGiven a string, creates an `Uint8Array` of the same length with the string codepoints as byte values.\n\nAccepts only [isomorphic string](https://infra.spec.whatwg.org/#isomorphic-string) input\nand asserts that, throwing on any strings containing codepoints higher than `U+00FF`.\n\n#### `labelToName(label)`\n\nImplements [get an encoding from a string `label`](https://encoding.spec.whatwg.org/#concept-encoding-get).\n\nConvert an encoding [label](https://encoding.spec.whatwg.org/#names-and-labels) to its name,\nas a case-sensitive string.\n\nIf an encoding with that label does not exist, returns `null`.\n\nAll encoding names are also valid labels for corresponding encodings.\n\n#### `normalizeEncoding(label)`\n\nConvert an encoding [label](https://encoding.spec.whatwg.org/#names-and-labels) to its name,\nas an ASCII-lowercased string.\n\nIf an encoding with that label does not exist, returns `null`.\n\nThis is the same as [`decoder.encoding` getter](https://encoding.spec.whatwg.org/#dom-textdecoder-encoding),\nexcept that it:\n 1. Supports [`replacement` encoding](https://encoding.spec.whatwg.org/#replacement) and its\n    [labels](https://encoding.spec.whatwg.org/#ref-for-replacement%E2%91%A1)\n 2. Does not throw for invalid labels and instead returns `null`\n\nIt is identical to:\n```js\nlabelToName(label)?.toLowerCase() ?? null\n```\n\nAll encoding names are also valid labels for corresponding encodings.\n\n#### `getBOMEncoding(input)`\n\nImplements [BOM sniff](https://encoding.spec.whatwg.org/#bom-sniff) legacy hook.\n\nGiven a `TypedArray` or an `ArrayBuffer` instance `input`, returns either of:\n- `'utf-8'`, if `input` starts with UTF-8 byte order mark.\n- `'utf-16le'`, if `input` starts with UTF-16LE byte order mark.\n- `'utf-16be'`, if `input` starts with UTF-16BE byte order mark.\n- `null` otherwise.\n\n#### `legacyHookDecode(input, fallbackEncoding = 'utf-8')`\n\nImplements [decode](https://encoding.spec.whatwg.org/#decode) legacy hook.\n\nGiven a `TypedArray` or an `ArrayBuffer` instance `input` and an optional `fallbackEncoding`\nencoding [label](https://encoding.spec.whatwg.org/#names-and-labels),\nsniffs encoding from BOM with `fallbackEncoding` fallback and then\ndecodes the `input` using that encoding, skipping BOM if it was present.\n\nNotes:\n\n- BOM-sniffed encoding takes precedence over `fallbackEncoding` option per spec.\n  Use with care.\n- Always operates in non-fatal [mode](https://encoding.spec.whatwg.org/#textdecoder-error-mode),\n  aka replacement. It can convert different byte sequences to equal strings.\n\nThis method is similar to the following code, except that it doesn't support encoding labels and\nonly expects lowercased encoding name:\n\n```js\nnew TextDecoder(getBOMEncoding(input) ?? fallbackEncoding).decode(input)\n```\n\n### @exodus/bytes/encoding-lite.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/encoding-lite.js?style=flat-square)</sub>\n\nThe exact same exports as `@exodus/bytes/encoding.js` are also exported as\n`@exodus/bytes/encoding-lite.js`, with the difference that the lite version does not load\nmulti-byte `TextDecoder` encodings by default to reduce bundle size ~12x.\n\n```js\nimport { TextDecoder, TextEncoder } from '@exodus/bytes/encoding-lite.js'\nimport { TextDecoderStream, TextEncoderStream } from '@exodus/bytes/encoding-lite.js' // Requires Streams\nimport { isomorphicDecode, isomorphicEncode } from '@exodus/bytes/encoding-lite.js'\n\n// Hooks for standards\nimport { getBOMEncoding, legacyHookDecode, labelToName, normalizeEncoding } from '@exodus/bytes/encoding-lite.js'\n```\n\nThe only affected encodings are: `gbk`, `gb18030`, `big5`, `euc-jp`, `iso-2022-jp`, `shift_jis`\nand their [labels](https://encoding.spec.whatwg.org/#names-and-labels) when used with `TextDecoder`.\n\nLegacy single-byte encodingds are loaded by default in both cases.\n\n`TextEncoder` and hooks for standards (including `labelToName` / `normalizeEncoding`) do not have any behavior\ndifferences in the lite version and support full range if inputs.\n\nTo avoid inconsistencies, the exported classes and methods are exactly the same objects.\n\n```console\n> lite = require('@exodus/bytes/encoding-lite.js')\n[Module: null prototype] {\n  TextDecoder: [class TextDecoder],\n  TextDecoderStream: [class TextDecoderStream],\n  TextEncoder: [class TextEncoder],\n  TextEncoderStream: [class TextEncoderStream],\n  getBOMEncoding: [Function: getBOMEncoding],\n  labelToName: [Function: labelToName],\n  legacyHookDecode: [Function: legacyHookDecode],\n  normalizeEncoding: [Function: normalizeEncoding]\n}\n> new lite.TextDecoder('big5').decode(Uint8Array.of(0x25))\nUncaught:\nError: Legacy multi-byte encodings are disabled in /encoding-lite.js, use /encoding.js for full encodings range support\n\n> full = require('@exodus/bytes/encoding.js')\n[Module: null prototype] {\n  TextDecoder: [class TextDecoder],\n  TextDecoderStream: [class TextDecoderStream],\n  TextEncoder: [class TextEncoder],\n  TextEncoderStream: [class TextEncoderStream],\n  getBOMEncoding: [Function: getBOMEncoding],\n  labelToName: [Function: labelToName],\n  legacyHookDecode: [Function: legacyHookDecode],\n  normalizeEncoding: [Function: normalizeEncoding]\n}\n> full.TextDecoder === lite.TextDecoder\ntrue\n> new full.TextDecoder('big5').decode(Uint8Array.of(0x25))\n'%'\n> new lite.TextDecoder('big5').decode(Uint8Array.of(0x25))\n'%'\n```\n\n### @exodus/bytes/encoding-browser.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/encoding-browser.js?style=flat-square)</sub>\n\nSame as `@exodus/bytes/encoding.js`, but in browsers instead of polyfilling just uses whatever the\nbrowser provides, drastically reducing the bundle size (to less than 2 KiB gzipped).\n\nDoes not provide `isomorphicDecode` and `isomorphicEncode` exports.\n\n```js\nimport { TextDecoder, TextEncoder } from '@exodus/bytes/encoding-browser.js'\nimport { TextDecoderStream, TextEncoderStream } from '@exodus/bytes/encoding-browser.js' // Requires Streams\n\n// Hooks for standards\nimport { getBOMEncoding, legacyHookDecode, labelToName, normalizeEncoding } from '@exodus/bytes/encoding-browser.js'\n```\n\nUnder non-browser engines (Node.js, React Native, etc.) a full polyfill is used as those platforms\ndo not provide sufficiently complete / non-buggy `TextDecoder` APIs.\n\n> [!NOTE]\n> Implementations in browsers [have bugs](https://docs.google.com/spreadsheets/d/1pdEefRG6r9fZy61WHGz0TKSt8cO4ISWqlpBN5KntIvQ/edit),\n> but they are fixing them and the expected update window is short.\\\n> If you want to circumvent browser bugs, use full `@exodus/bytes/encoding.js` import.\n\n### @exodus/bytes/whatwg.js <sub>![](https://img.shields.io/bundlejs/size/@exodus/bytes/whatwg.js?style=flat-square)</sub>\n\nWHATWG helpers\n\n```js\nimport '@exodus/bytes/encoding.js' // For full legacy multi-byte encodings support\nimport { percentEncodeAfterEncoding } from '@exodus/bytes/whatwg.js'\n```\n\n#### `percentEncodeAfterEncoding(encoding, input, percentEncodeSet, spaceAsPlus = false)`\n\nImplements [percent-encode after encoding](https://url.spec.whatwg.org/#string-percent-encode-after-encoding)\nper WHATWG URL specification.\n\n> [!IMPORTANT]\n> You must import `@exodus/bytes/encoding.js` for this API to accept legacy multi-byte encodings.\n\nEncodings `utf16-le`, `utf16-be`, and `replacement` are not accepted.\n\n[C0 control percent-encode set](https://url.spec.whatwg.org/#c0-control-percent-encode-set) is\nalways percent-encoded.\n\n`percentEncodeSet` is an addition to that, and must be a string of unique increasing codepoints\nin range 0x20 - 0x7e, e.g. `' \"#<>'`.\n\nThis method accepts [DOMStrings](https://webidl.spec.whatwg.org/#idl-DOMString) and converts them\nto [USVStrings](https://webidl.spec.whatwg.org/#idl-USVString).\nThis is different from e.g. `encodeURI` and `encodeURIComponent` which throw on surrogates:\n```js\n> percentEncodeAfterEncoding('utf8', '\\ud800', ' \"#$%&+,/:;<=>?@[\\\\]^`{|}') // component\n'%EF%BF%BD'\n> encodeURIComponent('\\ud800')\nUncaught URIError: URI malformed\n```\n\n## Changelog\n\nSee [GitHub Releases](https://github.com/ExodusOSS/bytes/releases) tab\n\n## License\n\n[MIT](./LICENSE)\n", "node_modules/tough-cookie/README.md": "# Tough Cookie &middot; [![RFC6265][rfc6265-badge]][rfc6265-tracker] [![RFC6265bis][rfc6265bis-badge]][rfc6265bis-tracker] [![npm version][npm-badge]][npm-repo] [![CI on Github Actions: salesforce/tough-cookie][ci-badge]][ci-url] ![PRs Welcome][prs-welcome-badge]\n\nA Node.js implementation of [RFC6265][rfc6265-tracker] for cookie parsing, storage, and retrieval.\n\n## Getting Started\n\nInstall Tough Cookie using [`npm`][npm-repo]:\n\n```shell\nnpm install tough-cookie\n```\n\nor [`yarn`][yarn-repo]:\n\n```shell\nyarn add tough-cookie\n```\n\n## Usage\n\n```typescript\nimport { Cookie, CookieJar } from 'tough-cookie'\n\n// parse a `Cookie` request header\nconst reqCookies = 'ID=298zf09hf012fh2; csrf=u32t4o3tb3gg43; _gat=1'\n  .split(';')\n  .map(Cookie.parse)\n// generate a `Cookie` request header\nconst cookieHeader = reqCookies.map((cookie) => cookie.cookieString()).join(';')\n\n// parse a Set-Cookie response header\nconst resCookie = Cookie.parse(\n  'foo=bar; Domain=example.com; Path=/; Expires=Tue, 21 Oct 2025 00:00:00 GMT',\n)\n// generate a Set-Cookie response header\nconst setCookieHeader = cookie.toString()\n\n// store and retrieve cookies\nconst cookieJar = new CookieJar() // uses the in-memory store by default\nawait cookieJar.setCookie(resCookie, 'https://example.com/')\nconst matchingCookies = await cookieJar.getCookies('https://example.com/')\n```\n\n> [!IMPORTANT]\n> For more detailed usage information, refer to the [API docs](./api/docs/tough-cookie.md).\n\n## RFC6265bis\n\nSupport for [RFC6265bis][rfc6265bis-tracker] is being developed. As these revisions to [RFC6252][rfc6265-tracker] are\nstill in `Active Internet-Draft` state, the areas of support that follow are subject to change.\n\n### SameSite Cookies\n\nThis change makes it possible for servers, and supporting clients, to mitigate certain types of CSRF\nattacks by disallowing `SameSite` cookies from being sent cross-origin.\n\n#### Example\n\n```typescript\nimport { CookieJar } from 'tough-cookie'\n\nconst cookieJar = new CookieJar() // uses the in-memory store by default\n\n// storing cookies with various SameSite attributes\nawait cookieJar.setCookie(\n  'strict=authorized; SameSite=strict',\n  'http://example.com/index.html',\n)\nawait cookieJar.setCookie(\n  'lax=okay; SameSite=lax',\n  'http://example.com/index.html',\n)\nawait cookieJar.setCookie('normal=whatever', 'http://example.com/index.html')\n\n// retrieving cookies using a SameSite context\nconst laxCookies = await cookieJar.getCookies('http://example.com/index.html', {\n  // the first cookie (strict=authorized) will not be returned if the context is 'lax'\n  // but the other two cookies will be returned\n  sameSiteContext: 'lax',\n})\n```\n\n> [!NOTE]\n> It is highly recommended that you read [RFC6265bis - Section 8.8][samesite-implementation] for more details on SameSite cookies, security considerations, and defense in depth.\n\n### Cookie Prefixes\n\nCookie prefixes are a way to indicate that a given cookie was set with a set of attributes simply by\ninspecting the first few characters of the cookie's name.\n\nTwo prefixes are defined:\n\n- `\"__Secure-\"`\n\n  If a cookie's name begins with a case-sensitive match for the string `__Secure-`, then the cookie was set with a \"Secure\" attribute.\n\n- `\"__Host-\"`\n\n  If a cookie's name begins with a case-sensitive match for the string `__Host-`, then the cookie was set with a \"Secure\" attribute, a \"Path\" attribute with a value of \"/\", and no \"Domain\" attribute.\n\nIf `prefixSecurity` is enabled for `CookieJar`, then cookies that match the prefixes defined above but do\nnot obey the attribute restrictions are not added.\n\nYou can define this functionality by passing in the `prefixSecurity` option to `CookieJar`. It can be one of 3 values:\n\n1. `silent`: (**default**) Enable cookie prefix checking but silently fail to add the cookie if conditions are not met.\n2. `strict`: Enable cookie prefix checking and error out if conditions are not met.\n3. `unsafe-disabled`: Disable cookie prefix checking.\n\n> If `ignoreError` is passed in as `true` when setting a cookie then the error is silent regardless of the `prefixSecurity` option (assuming it's enabled).\n\n#### Example\n\n```typescript\nimport { CookieJar, MemoryCookieStore } from 'tough-cookie'\n\nconst cookieJar = new CookieJar(new MemoryCookieStore(), {\n  prefixSecurity: 'silent',\n})\n\n// this cookie will be silently ignored since the url is insecure (http)\nawait cookieJar.setCookie(\n  '__Secure-SID=12345; Domain=example.com; Secure;',\n  'http://example.com',\n)\n\n// this cookie will be stored since the url is secure (https)\nawait cookieJar.setCookie(\n  '__Secure-SID=12345; Domain=example.com; Secure;',\n  'https://example.com',\n)\n```\n\n> [!NOTE]\n> It is highly recommended that you read [RFC6265bis - Section 4.1.3][cookie-prefixes-implementation] for more details on Cookie Prefixes.\n\n### Potentially Trustworthy Origins are considered \"Secure\"\n\nThe definition of a \"Secure\" connection is not explicitly defined by [RFC6265bis][rfc6265bis-tracker] but the following text is\nprovided in [RFC6265bis - Section 5.8.3][secure-connection-note]:\n\n> [!NOTE]\n> Typically, user agents consider a connection secure if the connection makes use of transport-layer security, such as\n> SSL or TLS, or if the host is trusted. For example, most user agents consider \"https\" to be a scheme that denotes a\n> secure protocol and \"localhost\" to be trusted host.\n\nAs well as a note to [Appendix A. Changes from RFC6265][secure-connection-appendix-a] which refers to **\"potentially trustworthy\norigins\"** which are defined in the [Secure Contexts - W3C Candidate Recommendation Draft][potentially-trustworthy-origin]:\n\n> [!Note]\n> Considers potentially trustworthy origins as \"secure\".\n\nSince most web browsers treat `localhost` as a trustworthy origin, by default, so does `tough-cookie`. To disable this\nbehavior, the `CookieStore` must be configured with:\n\n```typescript\nimport { CookieJar, MemoryCookieStore } from 'tough-cookie'\n\nconst cookieJar = new CookieJar(new MemoryCookieStore(), {\n  // add configuration so localhost will not be considered trustworthy\n  // (fyi - this doesn't apply to https cookies on localhost as those use a secure protocol)\n  allowSecureOnLocal: false,\n})\n\n// this cookie will be persisted to storage\nawait cookieJar.setCookie(\n  'SID=12345; Domain=localhost; Secure;',\n  'http://localhost',\n)\n\n// but, on retrieval, it will not be returned\nawait cookieJar.getCookiesSync('http://localhost')\n```\n\n## Node.js Version Support\n\nWe follow the [Node.js release schedule](https://github.com/nodejs/Release#release-schedule) and support\nall versions that are in Active LTS or Maintenance. We will always do a major release when dropping support\nfor older versions of node, and we will do so in consultation with our community.\n\n[npm-badge]: https://img.shields.io/npm/v/tough-cookie.svg?style=flat\n[npm-repo]: https://www.npmjs.com/package/tough-cookie\n[ci-badge]: https://github.com/salesforce/tough-cookie/actions/workflows/ci.yaml/badge.svg\n[ci-url]: https://github.com/salesforce/tough-cookie/actions/workflows/ci.yaml\n[rfc6265-badge]: https://img.shields.io/badge/RFC-6265-flat?labelColor=000000&color=666666\n[rfc6265-tracker]: https://datatracker.ietf.org/doc/rfc6265/\n[rfc6265bis-badge]: https://img.shields.io/badge/RFC-6265bis-flat?labelColor=000000&color=666666\n[rfc6265bis-tracker]: https://datatracker.ietf.org/doc/draft-ietf-httpbis-rfc6265bis/\n[samesite-implementation]: https://datatracker.ietf.org/doc/html/draft-ietf-httpbis-rfc6265bis-02#section-8.8\n[cookie-prefixes-implementation]: https://datatracker.ietf.org/doc/html/draft-ietf-httpbis-rfc6265bis-02#section-4.1.3\n[secure-connection-note]: https://datatracker.ietf.org/doc/html/draft-ietf-httpbis-rfc6265bis-19#section-5.8.3-2.1.2.3.1\n[secure-connection-appendix-a]: https://datatracker.ietf.org/doc/html/draft-ietf-httpbis-rfc6265bis-19#appendix-A-1.7.1\n[potentially-trustworthy-origin]: https://www.w3.org/TR/secure-contexts/#is-origin-trustworthy\n[prs-welcome-badge]: https://img.shields.io/badge/PRs-welcome-brightgreen.svg\n[yarn-repo]: https://yarnpkg.com/package?name=tough-cookie\n", "node_modules/webidl-conversions/README.md": "# Web IDL Type Conversions on JavaScript Values\n\nThis package implements, in JavaScript, the algorithms to convert a given JavaScript value according to a given [Web IDL](https://webidl.spec.whatwg.org/) [type](https://webidl.spec.whatwg.org/#idl-types).\n\nThe goal is that you should be able to write code like\n\n```js\n\"use strict\";\nconst conversions = require(\"webidl-conversions\");\n\nfunction doStuff(x, y) {\n    x = conversions[\"boolean\"](x);\n    y = conversions[\"unsigned long\"](y);\n    // actual algorithm code here\n}\n```\n\nand your function `doStuff` will behave the same as a Web IDL operation declared as\n\n```webidl\nundefined doStuff(boolean x, unsigned long y);\n```\n\n## API\n\nThis package's main module's default export is an object with a variety of methods, each corresponding to a different Web IDL type. Each method, when invoked on a JavaScript value, will give back the new JavaScript value that results after passing through the Web IDL conversion rules. (See below for more details on what that means.) Alternately, the method could throw an error, if the Web IDL algorithm is specified to do so: for example `conversions[\"float\"](NaN)` [will throw a `TypeError`](https://webidl.spec.whatwg.org/#js-float).\n\nEach method also accepts a second, optional, parameter for miscellaneous options. For conversion methods that throw errors, a string option `{ context }` may be provided to provide more information in the error message. (For example, `conversions[\"float\"](NaN, { context: \"Argument 1 of Interface's operation\" })` will throw an error with message `\"Argument 1 of Interface's operation is not a finite floating-point value.\"`)\n\nIf we are dealing with multiple JavaScript realms (such as those created using Node.js' [vm](https://nodejs.org/api/vm.html) module or the HTML `iframe` element), and exceptions from another realm need to be thrown, one can supply an object option `globals` containing the following properties:\n\n```js\n{\n  globals: {\n    Number,\n    String,\n    TypeError\n  }\n}\n```\n\nThose specific functions will be used when throwing exceptions.\n\nSpecific conversions may also accept other options, the details of which can be found below.\n\n## Conversions implemented\n\nConversions for all of the basic types from the Web IDL specification are implemented:\n\n- [`any`](https://webidl.spec.whatwg.org/#js-any)\n- [`undefined`](https://webidl.spec.whatwg.org/#js-undefined)\n- [`boolean`](https://webidl.spec.whatwg.org/#js-boolean)\n- [Integer types](https://webidl.spec.whatwg.org/#js-integer-types), which can additionally be provided with the boolean options `{ clamp, enforceRange }` as a second parameter\n- [`float`](https://webidl.spec.whatwg.org/#js-float), [`unrestricted float`](https://webidl.spec.whatwg.org/#js-unrestricted-float)\n- [`double`](https://webidl.spec.whatwg.org/#js-double), [`unrestricted double`](https://webidl.spec.whatwg.org/#js-unrestricted-double)\n- [`DOMString`](https://webidl.spec.whatwg.org/#js-DOMString), which can additionally be provided the boolean option `{ treatNullAsEmptyString }` as a second parameter\n- [`ByteString`](https://webidl.spec.whatwg.org/#js-ByteString), [`USVString`](https://webidl.spec.whatwg.org/#js-USVString)\n- [`object`](https://webidl.spec.whatwg.org/#js-object)\n- [Buffer source types](https://webidl.spec.whatwg.org/#js-buffer-source-types), some of which can additionally be provided with the boolean options `{ allowShared, allowResizable }` as a second parameter\n\nAdditionally, for convenience, the following derived type definitions are implemented:\n\n- [`ArrayBufferView`](https://webidl.spec.whatwg.org/#ArrayBufferView), which can additionally be provided with the boolean options `{ allowShared, allowResizable }` as a second parameter\n- [`BufferSource`](https://webidl.spec.whatwg.org/#BufferSource)\n- [`DOMTimeStamp`](https://webidl.spec.whatwg.org/#DOMTimeStamp)\n\nDerived types, such as nullable types, promise types, sequences, records, etc. are not handled by this library. You may wish to investigate the [webidl2js](https://github.com/jsdom/webidl2js) project.\n\n### A note on the `long long` types\n\nThe `long long` and `unsigned long long` Web IDL types can hold values that cannot be stored in JavaScript numbers. Conversions are still accurate as we make use of BigInt in the conversion process, but in the case of `unsigned long long` we simply cannot represent some possible output values in JavaScript. For example, converting the JavaScript number `-1` to a Web IDL `unsigned long long` is supposed to produce the Web IDL value `18446744073709551615`. Since we are representing our Web IDL values in JavaScript, we can't represent `18446744073709551615`, so we instead the best we could do is `18446744073709551616` as the output.\n\nTo mitigate this, we could return the raw BigInt value from the conversion function, but right now it is not implemented. If your use case requires such precision, [file an issue](https://github.com/jsdom/webidl-conversions/issues/new).\n\nOn the other hand, `long long` conversion is always accurate, since the input value can never be more precise than the output value.\n\n### A note on `BufferSource` types\n\nAll of the `BufferSource` types will throw when the relevant `ArrayBuffer` has been detached. This technically is not part of the [specified conversion algorithm](https://webidl.spec.whatwg.org/#js-buffer-source-types), but instead part of the [getting a reference/getting a copy](https://webidl.spec.whatwg.org/#ref-for-dfn-get-buffer-source-reference%E2%91%A0) algorithms. We've consolidated them here for convenience and ease of implementation, but if there is a need to separate them in the future, please open an issue so we can investigate.\n\n## Background\n\nWhat's actually going on here, conceptually, is pretty weird. Let's try to explain.\n\nWeb IDL has its own type system. When people write algorithms in web platform specs, they usually operate on Web IDL values, i.e. instances of Web IDL types. For example, if they were specifying the algorithm for our `doStuff` operation above, they would treat `x` as a Web IDL value of [Web IDL type `boolean`](https://webidl.spec.whatwg.org/#idl-boolean). Crucially, they would _not_ treat `x` as a JavaScript variable whose value is either the JavaScript `true` or `false`. They're instead working in a different type system altogether, with its own rules.\n\nSeparately from its type system, Web IDL defines a [\"binding\"](https://webidl.spec.whatwg.org/#javascript-binding) of the type system into JavaScript. This contains rules like: when you pass a JavaScript value to the JavaScript method that manifests a given Web IDL operation, how does that get converted into a Web IDL value? For example, a JavaScript `true` passed in the position of a Web IDL `boolean` argument becomes a Web IDL `true`. But, a JavaScript `true` passed in the position of a [Web IDL `unsigned long`](https://webidl.spec.whatwg.org/#idl-unsigned-long) becomes a Web IDL `1`. And so on.\n\nFinally, we have the actual implementation code. This is usually C++ ([or Rust](https://github.com/servo/servo)). The implementation, of course, has its own type system. So when they implement the Web IDL algorithms, they don't actually use Web IDL values, since those aren't \"real\" outside of specs. Instead, implementations apply the Web IDL binding rules in such a way as to convert incoming JavaScript values into C++ values. For example, if code in the browser called `doStuff(true, true)`, then the implementation code would eventually receive a C++ `bool` containing `true` and a C++ `uint32_t` containing `1`.\n\nThe upside of all this is that implementations can abstract all the conversion logic away, letting Web IDL handle it, and focus on implementing the relevant methods in C++ with values of the correct type already provided. That is payoff of Web IDL, in a nutshell.\n\nAnd getting to that payoff is the goal of _this_ project\u2014but for JavaScript implementations, instead of C++ ones. That is, this library is designed to make it easier for JavaScript developers to write functions that behave like a given Web IDL operation. So conceptually, the conversion pipeline, which in its general form is JavaScript values \u21a6 Web IDL values \u21a6 implementation-language values, in this case becomes JavaScript values \u21a6 Web IDL values \u21a6 JavaScript values. And that intermediate step is where all the logic is performed: a JavaScript `true` becomes a Web IDL `1` in an unsigned long context, which then becomes a JavaScript `1`.\n\n## Don't use this\n\nSeriously, why would you ever use this? You really shouldn't. Web IDL is \u2026 strange, and you shouldn't be emulating its semantics. If you're looking for a generic argument-processing library, you should find one with better rules than those from Web IDL. In general, your JavaScript should not be trying to become more like Web IDL; if anything, we should fix Web IDL to make it more like JavaScript.\n\nThe _only_ people who should use this are those trying to create faithful implementations (or polyfills) of web platform interfaces defined in Web IDL. Its main consumer is the [jsdom](https://github.com/jsdom/jsdom) project.\n", "node_modules/webidl-conversions/LICENSE.md": "# The BSD 2-Clause License\n\nCopyright (c) 2014, Domenic Denicola\nAll rights reserved.\n\nRedistribution and use in source and binary forms, with or without modification, are permitted provided that the following conditions are met:\n\n1. Redistributions of source code must retain the above copyright notice, this list of conditions and the following disclaimer.\n\n2. Redistributions in binary form must reproduce the above sstree/csstree/) CSS parser.\n\nThere's a top-level directory for each broad area covered: for example, `api` and `css`.\nInside each of these directories is one or more JSON files containing the data.\n\n### api\n\nContains data about Web APIs:\n\n- API inheritance (interface inheritance and mixin implementations)\n\n### css\n\nContains data about:\n\n- CSS at-rules\n- CSS functions\n- CSS properties\n- CSS selectors\n- CSS syntaxes\n- CSS types\n- CSS units\n\nFor more information, see the [CSS data](./css/README.md) documentation and the [Updating CSS JSON DB](./docs/updating_css_json.md) guide.\n\n### l10n\n\nThe l10n folder contains localization strings that are used in the various\njson files throughout this repository.\n\n## Problems?\n\nIf you find a problem, please [file an issue](https://github.com/mdn/data/issues/new).\n\n## Contributing\n\nWe're very happy to accept contributions to this data.\nPlease familiarize yourself with the schema for the data you're editing, and send us a pull request.\nSee the [CONTRIBUTING.md](./CONTRIBUTING.md) document for more information.\n\n## See also\n\n- [https://github.com/mdn/browser-compat-data](https://github.com/mdn/browser-compat-data)\n  for compatibility data for Web technologies\n", "node_modules/require-from-string/readme.md": "# require-from-string [![Build Status](https://travis-ci.org/floatdrop/require-from-string.svg?branch=master)](https://travis-ci.org/floatdrop/require-from-string)\n\nLoad module from string in Node.\n\n## Install\n\n```\n$ npm install --save require-from-string\n```\n\n\n## Usage\n\n```js\nvar requireFromString = require('require-from-string');\n\nrequireFromString('module.exports = 1');\n//=> 1\n```\n\n\n## API\n\n### requireFromString(code, [filename], [options])\n\n#### code\n\n*Required*  \nType: `string`\n\nModule code.\n\n#### filename\nType: `string`  \nDefault: `''`\n\nOptional filename.\n\n\n#### options\nType: `object`\n\n##### appendPaths\nType: `Array`\n\nList of `paths`, that will be appended to module `paths`. Useful, when you want\nto be able require modules from these paths.\n\n##### prependPaths\nType: `Array`\n\nSame as `appendPaths`, but paths will be prepended.\n\n## License\n\nMIT \u00a9 [Vsevolod Strukchinsky](http://github.com/floatdrop)\n", "node_modules/tldts-core/README.md": "# `tldts-core`\n\n> core building blocks of tldts, used by both `tldts` and `tldts-experimental` packages.\n", "node_modules/undici/README.md": "# undici\n\n[![Node CI](https://github.com/nodejs/undici/actions/workflows/ci.yml/badge.svg)](https://github.com/nodejs/undici/actions/workflows/nodejs.yml) [![neostandard javascript style](https://img.shields.io/badge/neo-standard-7fffff?style=flat\\&labelColor=ff80ff)](https://github.com/neostandard/neostandard) [![npm version](https://badge.fury.io/js/undici.svg)](https://badge.fury.io/js/undici) [![codecov](https://codecov.io/gh/nodejs/undici/branch/main/graph/badge.svg?token=yZL6LtXkOA)](https://codecov.io/gh/nodejs/undici)\n\nAn HTTP/1.1 client, written from scratch for Node.js.\n\n> Undici means eleven in Italian. 1.1 -> 11 -> Eleven -> Undici.\nIt is also a Stranger Things reference.\n\n## How to get involved\n\nHave a question about using Undici? Open a [Q&A Discussion](https://github.com/nodejs/undici/discussions/new) or join our official OpenJS [Slack](https://openjs-foundation.slack.com/archives/C01QF9Q31QD) channel.\n\nLooking to contribute? Start by reading the [contributing guide](./CONTRIBUTING.md)\n\n## Install\n\n```\nnpm i undici\n```\n\n## Benchmarks\n\nThe benchmark is a simple getting data [example](https://github.com/nodejs/undici/blob/main/benchmarks/benchmark.js) using a\n50 TCP connections with a pipelining depth of 10 running on Node 22.11.0.\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  Tests                 \u2502 Samples \u2502 Result             \u2502 Tolerance  \u2502 Difference with slowest \u2502\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502  'axios'               \u2502 15      \u2502 '5708.26 req/sec'  \u2502 '\u00b1 2.91 %' \u2502 '-'                     \u2502\n\u2502  'http - no keepalive' \u2502 10      \u2502 '5809.80 req/sec'  \u2502 '\u00b1 2.30 %' \u2502 '+ 1.78 %'              \u2502\n\u2502  'request'             \u2502 30      \u2502 '5828.80 req/sec'  \u2502 '\u00b1 2.91 %' \u2502 '+ 2.11 %'              \u2502\n\u2502  'undici - fetch'      \u2502 40      \u2502 '5903.78 req/sec'  \u2502 '\u00b1 2.87 %' \u2502 '+ 3.43 %'              \u2502\n\u2502  'node-fetch'          \u2502 10      \u2502 '5945.40 req/sec'  \u2502 '\u00b1 2.13 %' \u2502 '+ 4.15 %'              \u2502\n\u2502  'got'                 \u2502 35      \u2502 '6511.45 req/sec'  \u2502 '\u00b1 2.84 %' \u2502 '+ 14.07 %'             \u2502\n\u2502  'http - keepalive'    \u2502 65      \u2502 '9193.24 req/sec'  \u2502 '\u00b1 2.92 %' \u2502 '+ 61.05 %'             \u2502\n\u2502  'superagent'          \u2502 35      \u2502 '9339.43 req/sec'  \u2502 '\u00b1 2.95 %' \u2502 '+ 63.61 %'             \u2502\n\u2502  'undici - pipeline'   \u2502 50      \u2502 '13364.62 req/sec' \u2502 '\u00b1 2.93 %' \u2502 '+ 134.13 %'            \u2502\n\u2502  'undici - stream'     \u2502 95      \u2502 '18245.36 req/sec' \u2502 '\u00b1 2.99 %' \u2502 '+ 219.63 %'            \u2502\n\u2502  'undici - request'    \u2502 50      \u2502 '18340.17 req/sec' \u2502 '\u00b1 2.84 %' \u2502 '+ 221.29 %'            \u2502\n\u2502  'undici - dispatch'   \u2502 40      \u2502 '22234.42 req/sec' \u2502 '\u00b1 2.94 %' \u2502 '+ 289.51 %'            \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Undici vs. Fetch\n\n### Overview\n\nNode.js includes a built-in `fetch()` implementation powered by undici starting from Node.js v18. However, there are important differences between using the built-in fetch and installing undici as a separate module.\n\n### Built-in Fetch (Node.js v18+)\n\nNode.js's built-in fetch is powered by a bundled version of undici:\n\n```js\n// Available globally in Node.js v18+\nconst response = await fetch('https://api.example.com/data');\nconst data = await response.json();\n\n// Check the bundled undici version\nconsole.log(process.versions.undici); // e.g., \"5.28.4\"\n```\n\n**Pros:**\n- No additional dependencies required\n- Works across different JavaScript runtimes\n- Automatic compression handling (gzip, deflate, br)\n- Built-in caching support (in development)\n\n**Cons:**\n- Limited to the undici version bundled with your Node.js version\n- Less control over connection pooling and advanced features\n- Error handling follows Web API standards (errors wrapped in `TypeError`)\n- Performance overhead due to Web Streams implementation\n\n### Undici Module\n\nInstalling undici as a separate module gives you access to the latest features and APIs:\n\n```bash\nnpm install undici\n```\n\n```js\nimport { request, fetch, Agent, setGlobalDispatcher } from 'undici';\n\n// Use undici.request for maximum performance\nconst { statusCode, headers, body } = await request('https://api.example.com/data');\nconst data = await body.json();\n\n// Or use undici.fetch with custom configuration\nconst agent = new Agent({ keepAliveTimeout: 10000 });\nsetGlobalDispatcher(agent);\nconst response = await fetch('https://api.example.com/data');\n```\n\n**Pros:**\n- Latest undici features and bug fixes\n- Access to advanced APIs (`request`, `stream`, `pipeline`)\n- Fine-grained control over connection pooling\n- Better error handling with clearer error messages\n- Superior performance, especially with `undici.request`\n- HTTP/1.1 pipelining support\n- Custom interceptors and middleware\n- Advanced features like `ProxyAgent`, `Socks5Agent`, `MockAgent`\n\n**Cons:**\n- Additional dependency to manage\n- Larger bundle size\n\n### When to Use Each\n\n#### Use Built-in Fetch When:\n- You want zero dependencies\n- Building isomorphic code that runs in browsers and Node.js\n- Publishing to npm and want to maximize compatibility with JS runtimes\n- Simple HTTP requests without advanced configuration\n- You're publishing to npm and you want to maximize compatiblity\n- You don't depend on features from a specific version of undici\n\n#### Use Undici Module When:\n- You need the latest undici features and performance improvements\n- You require advanced connection pooling configuration\n- You need APIs not available in the built-in fetch (`ProxyAgent`, `Socks5Agent`, `MockAgent`, etc.)\n- Performance is critical (use `undici.request` for maximum speed)\n- You want better error handling and debugging capabilities\n- You need HTTP/1.1 pipelining or advanced interceptors\n- You prefer decoupled protocol and API interfaces\n\n### Performance Comparison\n\nBased on benchmarks, here's the typical performance hierarchy:\n\n1. **`undici.request()`** - Fastest, most efficient\n2. **`undici.fetch()`** - Good performance, standard compliance\n3. **Node.js `http`/`https`** - Baseline performance\n\n### Migration Guide\n\nIf you're currently using built-in fetch and want to migrate to undici:\n\n```js\n// Before: Built-in fetch\nconst response = await fetch('https://api.example.com/data');\n\n// After: Undici fetch (drop-in replacement)\nimport { fetch } from 'undici';\nconst response = await fetch('https://api.example.com/data');\n\n// Or: Undici request (better performance)\nimport { request } from 'undici';\nconst { statusCode, body } = await request('https://api.example.com/data');\nconst data = await body.json();\n```\n\n### Keep `fetch` and `FormData` together\n\nWhen you send a `FormData` body, keep `fetch` and `FormData` from the same\nimplementation.\n\nUse one of these patterns:\n\n```js\n// Built-in globals\nconst body = new FormData()\nbody.set('name', 'some')\nawait fetch('https://example.com', {\n  method: 'POST',\n  body\n})\n```\n\n```js\n// undici module imports\nimport { fetch, FormData } from 'undici'\n\nconst body = new FormData()\nbody.set('name', 'some')\nawait fetch('https://example.com', {\n  method: 'POST',\n  body\n})\n```\n\nIf you want the installed `undici` package to provide the globals, call\n`install()` first:\n\n```js\nimport { install } from 'undici'\n\ninstall()\n\nconst body = new FormData()\nbody.set('name', 'some')\nawait fetch('https://example.com', {\n  method: 'POST',\n  body\n})\n```\n\n`install()` replaces the global `fetch`, `Headers`, `Response`, `Request`, and\n`FormData` implementations with undici's versions, so they all match.\n\nAvoid mixing a global `FormData` with `undici.fetch()`, or `undici.FormData`\nwith the built-in global `fetch()`.\n\n### Version Compatibility\n\nYou can check which version of undici is bundled with your Node.js version:\n\n```js\nconsole.log(process.versions.undici);\n```\n\nInstalling undici as a module allows you to use a newer version than what's bundled with Node.js, giving you access to the latest features and performance improvements.\n\n## Quick Start\n\n### Basic Request\n\n```js\nimport { request } from 'undici'\n\nconst {\n  statusCode,\n  headers,\n  trailers,\n  body\n} = await request('http://localhost:3000/foo')\n\nconsole.log('response received', statusCode)\nconsole.log('headers', headers)\n\nfor await (const data of body) { console.log('data', data) }\n\nconsole.log('trailers', trailers)\n```\n\n### Using Cache Interceptor\n\nUndici provides a powerful HTTP caching interceptor that follows HTTP caching best practices. Here's how to use it:\n\n```js\nimport { fetch, Agent, interceptors, cacheStores } from 'undici';\n\n// Create a client with cache interceptor\nconst client = new Agent().compose(interceptors.cache({\n  // Optional: Configure cache store (defaults to MemoryCacheStore)\n  store: new cacheStores.MemoryCacheStore({\n    maxSize: 100 * 1024 * 1024, // 100MB\n    maxCount: 1000,\n    maxEntrySize: 5 * 1024 * 1024 // 5MB\n  }),\n  \n  // Optional: Specify which HTTP methods to cache (default: ['GET', 'HEAD'])\n  methods: ['GET', 'HEAD']\n}));\n\n// Set the global dispatcher to use our caching client\nsetGlobalDispatcher(client);\n\n// Now all fetch requests will use the cache\nasync function getData() {\n  const response = await fetch('https://api.example.com/data');\n  // The server should set appropriate Cache-Control headers in the response\n  // which the cache will respect based on the cache policy\n  return response.json();\n}\n\n// First request - fetches from origin\nconst data1 = await getData();\n\n// Second request - served from cache if within max-age\nconst data2 = await getData();\n```\n\n#### Key Features:\n- **Automatic Caching**: Respects `Cache-Control` and `Expires` headers\n- **Validation**: Supports `ETag` and `Last-Modified` validation\n- **Storage Options**: In-memory or persistent SQLite storage\n- **Flexible**: Configure cache size, TTL, and more\n\n## Global Installation\n\nUndici provides an `install()` function to add all WHATWG fetch classes to `globalThis`, making them available globally:\n\n```js\nimport { install } from 'undici'\n\n// Install all WHATWG fetch classes globally\ninstall()\n\n// Now you can use fetch classes globally without importing\nconst response = await fetch('https://api.example.com/data')\nconst data = await response.json()\n\n// All classes are available globally:\nconst headers = new Headers([['content-type', 'application/json']])\nconst request = new Request('https://example.com')\nconst formData = new FormData()\nconst ws = new WebSocket('wss://example.com')\nconst eventSource = new EventSource('https://example.com/events')\n```\n\nThe `install()` function adds the following classes to `globalThis`:\n\n- `fetch` - The fetch function\n- `Headers` - HTTP headers management\n- `Response` - HTTP response representation\n- `Request` - HTTP request representation\n- `FormData` - Form data handling\n- `WebSocket` - WebSocket client\n- `CloseEvent`, `ErrorEvent`, `MessageEvent` - WebSocket events\n- `EventSource` - Server-sent events client\n\nWhen you call `install()`, these globals come from the same undici\nimplementation. For example, global `fetch` and global `FormData` will both be\nundici's versions, which is the recommended setup if you want to use undici\nthrough globals.\n\nThis is useful for:\n- Polyfilling environments that don't have fetch\n- Ensuring consistent fetch behavior across different Node.js versions\n- Making undici's implementations available globally for libraries that expect them\n\n## Body Mixins\n\nThe `body` mixins are the most common way to format the request/response body. Mixins include:\n\n- [`.arrayBuffer()`](https://fetch.spec.whatwg.org/#dom-body-arraybuffer)\n- [`.blob()`](https://fetch.spec.whatwg.org/#dom-body-blob)\n- [`.bytes()`](https://fetch.spec.whatwg.org/#dom-body-bytes)\n- [`.json()`](https://fetch.spec.whatwg.org/#dom-body-json)\n- [`.text()`](https://fetch.spec.whatwg.org/#dom-body-text)\n\n> [!NOTE]\n> The body returned from `undici.request` does not implement `.formData()`.\n\nExample usage:\n\n```js\nimport { request } from 'undici'\n\nconst {\n  statusCode,\n  headers,\n  trailers,\n  body\n} = await request('http://localhost:3000/foo')\n\nconsole.log('response received', statusCode)\nconsole.log('headers', headers)\nconsole.log('data', await body.json())\nconsole.log('trailers', trailers)\n```\n\n_Note: Once a mixin has been called then the body cannot be reused, thus calling additional mixins on `.body`, e.g. `.body.json(); .body.text()` will result in an error `TypeError: unusable` being thrown and returned through the `Promise` rejection._\n\nShould you need to access the `body` in plain-text after using a mixin, the best practice is to use the `.text()` mixin first and then manually parse the text to the desired format.\n\nFor more information about their behavior, please reference the body mixin from the [Fetch Standard](https://fetch.spec.whatwg.org/#body-mixin).\n\n## Common API Methods\n\nThis section documents our most commonly used API methods. Additional APIs are documented in their own files within the [docs](./docs/) folder and are accessible via the navigation list on the left side of the docs site.\n\n### `undici.request([url, options]): Promise`\n\nArguments:\n\n* **url** `string | URL | UrlObject`\n* **options** [`RequestOptions`](./docs/docs/api/Dispatcher.md#parameter-requestoptions)\n  * **dispatcher** `Dispatcher` - Default: [getGlobalDispatcher](#undicigetglobaldispatcher)\n  * **method** `String` - Default: `PUT` if `options.body`, otherwise `GET`\n\nReturns a promise with the result of the `Dispatcher.request` method.\n\nCalls `options.dispatcher.request(options)`.\n\nSee [Dispatcher.request](./docs/docs/api/Dispatcher.md#dispatcherrequestoptions-callback) for more details, and [request examples](./docs/examples/README.md) for examples.\n\n### `undici.stream([url, options, ]factory): Promise`\n\nArguments:\n\n* **url** `string | URL | UrlObject`\n* **options** [`StreamOptions`](./docs/docs/api/Dispatcher.md#parameter-streamoptions)\n  * **dispatcher** `Dispatcher` - Default: [getGlobalDispatcher](#undicigetglobaldispatcher)\n  * **method** `String` - Default: `PUT` if `options.body`, otherwise `GET`\n* **factory** `Dispatcher.stream.factory`\n\nReturns a promise with the result of the `Dispatcher.stream` method.\n\nCalls `options.dispatcher.stream(options, factory)`.\n\nSee [Dispatcher.stream](./docs/docs/api/Dispatcher.md#dispatcherstreamoptions-factory-callback) for more details.\n\n### `undici.pipeline([url, options, ]handler): Duplex`\n\nArguments:\n\n* **url** `string | URL | UrlObject`\n* **options** [`PipelineOptions`](./docs/docs/api/Dispatcher.md#parameter-pipelineoptions)\n  * **dispatcher** `Dispatcher` - Default: [getGlobalDispatcher](#undicigetglobaldispatcher)\n  * **method** `String` - Default: `PUT` if `options.body`, otherwise `GET`\n* **handler** `Dispatcher.pipeline.handler`\n\nReturns: `stream.Duplex`\n\nCalls `options.dispatch.pipeline(options, handler)`.\n\nSee [Dispatcher.pipeline](./docs/docs/api/Dispatcher.md#dispatcherpipelineoptions-handler) for more details.\n\n### `undici.connect([url, options]): Promise`\n\nStarts two-way communications with the requested resource using [HTTP CONNECT](https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods/CONNECT).\n\nArguments:\n\n* **url** `string | URL | UrlObject`\n* **options** [`ConnectOptions`](./docs/docs/api/Dispatcher.md#parameter-connectoptions)\n  * **dispatcher** `Dispatcher` - Default: [getGlobalDispatcher](#undicigetglobaldispatcher)\n* **callback** `(err: Error | null, data: ConnectData | null) => void` (optional)\n\nReturns a promise with the result of the `Dispatcher.connect` method.\n\nCalls `options.dispatch.connect(options)`.\n\nSee [Dispatcher.connect](./docs/docs/api/Dispatcher.md#dispatcherconnectoptions-callback) for more details.\n\n### `undici.fetch(input[, init]): Promise`\n\nImplements [fetch](https://fetch.spec.whatwg.org/#fetch-method).\n\n* https://developer.mozilla.org/en-US/docs/Web/API/WindowOrWorkerGlobalScope/fetch\n* https://fetch.spec.whatwg.org/#fetch-method\n\nBasic usage example:\n\n```js\nimport { fetch } from 'undici'\n\n\nconst res = await fetch('https://example.com')\nconst json = await res.json()\nconsole.log(json)\n```\n\nYou can pass an optional dispatcher to `fetch` as:\n\n```js\nimport { fetch, Agent } from 'undici'\n\nconst res = await fetch('https://example.com', {\n  // Mocks are also supported\n  dispatcher: new Agent({\n    keepAliveTimeout: 10,\n    keepAliveMaxTimeout: 10\n  })\n})\nconst json = await res.json()\nconsole.log(json)\n```\n\n#### `request.body`\n\nA body can be of the following types:\n\n- ArrayBuffer\n- ArrayBufferView\n- AsyncIterables\n- Blob\n- Iterables\n- String\n- URLSearchParams\n- FormData\n\nIn this implementation of fetch, ```request.body``` now accepts ```Async Iterables```. It is not present in the [Fetch Standard](https://fetch.spec.whatwg.org).\n\n```js\nimport { fetch } from 'undici'\n\nconst data = {\n  async *[Symbol.asyncIterator]() {\n    yield 'hello'\n    yield 'world'\n  },\n}\n\nawait fetch('https://example.com', { body: data, method: 'POST', duplex: 'half' })\n```\n\n[FormData](https://developer.mozilla.org/en-US/docs/Web/API/FormData) besides text data and buffers can also utilize streams via [Blob](https://developer.mozilla.org/en-US/docs/Web/API/Blob) objects:\n\n```js\nimport { openAsBlob } from 'node:fs'\n\nc
