)`\n\nReturns an array of elements having the specified class name `class`, optionally filtered to descendants of the element `from`.\n\n\n### Engine Configuration\n\n#### `configure( options )`\n\nThe following is the list of currently available configuration options, their default values and descriptions, they are boolean flags that can be set to `true` or `false`:\n\n* `IDS_DUPES`: true  - true to allow using multiple elements having the same id, false to disallow\n* `LIVECACHE`: true  - true for caching both results and resolvers, false for caching only resolvers\n* `MIXEDCASE`: true  - true to match tag names case insensitive, false to match using case sensitive\n* `LOGERRORS`: true  - true to print errors and warnings to the console, false to mute both of them\n\n\n### Examples on extending the basic functionalities\n\n#### `configure( { <configuration-flag>: [ true | false ] } )`\n\nDisable logging errors/warnings to console, disallow duplicate ids. Example:\n\n```js\nNW.Dom.configure( { LOGERRORS: false, IDS_DUPES: false } );\n```\nNOTE: NW.Dom.configure() without parameters return the current configuration.\n\n#### `registerCombinator( symbol, resolver )`\n\nRegisters a new symbol and its matching resolver in the combinators table. Example:\n\n```js\nNW.Dom.registerCombinator( '^', 'e.parentElement' );\n```\n\n#### `registerOperator( symbol, resolver )`\n\nRegisters a new symbol and its matching resolver in the attribute operators table. Example:\n\n```js\nNW.Dom.registerOperator( '!=', { p1: '^', p2: '$', p3: 'false' } );\n```\n\n#### `registerSelector( name, rexp, func )`\n\nRegisters a new selector, the matching RE and the resolver function, in the selectors table. Example:\n\n```js\nNW.Dom.registerSelector('Controls', /^\\:(control)(.*)/i,\n  (function(global) {\n    return function(match, source, mode, callback) {\n      var status = true;\n      source = 'if(/^(button|input|select|textarea)/i.test(e.nodeName)){' + source + '}';\n      return { 'source': source, 'status': status };\n    };\n  })(this));\n```\n", "node_modules/data-urls/LICENSE.txt": "Copyright \u00a9 Domenic Denicola <d@domenic.me>\n\nPermission is hereby granted, free of charge, to any person obtaining a copy of this software and associated documentation files (the \"Software\"), to deal in the Software without restriction, including without limitation the rights to use, copy, modify, merge, publish, distribute, sublicense, and/or sell copies of the Software, and to permit persons to whom the Software is furnished to do so, subject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all copies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/data-urls/README.md": "# Parse `data:` URLs\n\nThis package helps you parse `data:` URLs [according to the WHATWG Fetch Standard](https://fetch.spec.whatwg.org/#data-urls):\n\n```js\nconst parseDataURL = require(\"data-urls\");\n\nconst textExample = parseDataURL(\"data:,Hello%2C%20World!\");\nconsole.log(textExample.mimeType.toString()); // \"text/plain;charset=US-ASCII\"\nconsole.log(textExample.body);                // Uint8Array(13) [ 72, 101, 108, 108, 111, 44, \u2026 ]\n\nconst htmlExample = parseDataURL(\"data:text/html,%3Ch1%3EHello%2C%20World!%3C%2Fh1%3E\");\nconsole.log(htmlExample.mimeType.toString()); // \"text/html\"\nconsole.log(htmlExample.body);                // Uint8Array(22) [ 60, 104, 49, 62, 72, 101, \u2026 ]\n\nconst pngExample = parseDataURL(\"data:image/png;base64,iVBORw0KGgoAAA\" +\n                                \"ANSUhEUgAAAAUAAAAFCAYAAACNbyblAAAAHElEQVQI12P4\" +\n                                \"//8/w38GIAXDIBKE0DHxgljNBAAO9TXL0Y4OHwAAAABJRU\" +\n                                \"5ErkJggg==\");\nconsole.log(pngExample.mimeType.toString()); // \"image/png\"\nconsole.log(pngExample.body);                // Uint8Array(85) [ 137, 80, 78, 71, 13, 10, \u2026 ]\n```\n\n## API\n\nThis package's main module's default export is a function that accepts a string and returns a `{ mimeType, body }` object, or `null` if the result cannot be parsed as a `data:` URL.\n\n- The `mimeType` property is an instance of [whatwg-mimetype](https://www.npmjs.com/package/whatwg-mimetype)'s `MIMEType` class.\n- The `body` property is a `Uint8Array` instance.\n\nAs shown in the examples above, you can easily get a stringified version of the MIME type using its `toString()` method. Read on for more on getting the stringified version of the body.\n\n### Decoding the body\n\nTo decode the body bytes of a parsed data URL, you'll need to use the `charset` parameter of the MIME type, if any. This contains an encoding [label](https://encoding.spec.whatwg.org/#label); there are [various possible labels](https://encoding.spec.whatwg.org/#names-and-labels) for a given encoding. You can use the [`TextDecoder`](https://developer.mozilla.org/en-US/docs/Web/API/TextDecoder) API for this:\n\n```js\nconst parseDataURL = require(\"data-urls\");\n\nconst dataURL = parseDataURL(arbitraryString);\n\n// If there's no charset parameter, e.g. if `arbitraryString` is `\"data:text/plain,H%C3%A9llo!\"`,\n// then let's guess UTF-8.\nconst encodingLabel = dataURL.mimeType.parameters.get(\"charset\") ?? \"utf-8\";\nconst decoder = new TextDecoder(encodingLabel);\n\nconst bodyDecoded = decoder.decode(dataURL.body);\n```\n\n(Note that as of the time of this writing in 2026-01, Node.js's built-in `TextDecoder` has many correctness bugs, so we suggest using the polyfill from the [`@exodus/bytes`](https://www.npmjs.com/package/@exodus/bytes) package until they are fixed.)\n\nUsing the parsed charset is quite important, since [the spec requires](https://fetch.spec.whatwg.org/#data-url-processor) that if no parseable MIME type is given, the default is `\"US-ASCII\"`, [aka windows-1252](https://encoding.spec.whatwg.org/#note-latin1-ascii)\u2014not UTF-8, like you might asume. So for example, given an `arbitraryString` of `\"data:,H%E9llo!\"`, the above code snippet will correctly produce a `bodyDecoded` of `\"H\u00e9llo!\"` by using the windows-1252 decoder, whereas if you used a UTF-8 decoder you'd get back `\"H\ufffdllo!\"`.\n\n### Advanced functionality: parsing from a URL record\n\nIf you are using the [`whatwg-url`](https://www.npmjs.com/package/whatwg-url) package, you may already have a \"URL record\" object on hand, as produced by that package's `parseURL` export. In that case, you can use this package's `fromURLRecord` export to save a bit of work:\n\n```js\nconst { parseURL } = require(\"whatwg-url\");\nconst dataURLFromURLRecord = require(\"data-urls\").fromURLRecord;\n\nconst urlRecord = parseURL(\"data:,Hello%2C%20World!\");\nconst dataURL = dataURLFromURLRecord(urlRecord);\n```\n\nIn practice, we expect this functionality only to be used by consumers like [jsdom](https://www.npmjs.com/package/jsdom), which are using these packages at a very low level.\n", "node_modules/saxes/README.md": "# saxes\n\nA sax-style non-validating parser for XML.\n\nSaxes is a fork of [sax](https://github.com/isaacs/sax-js) 1.2.4. All mentions\nof sax in this project's documentation are references to sax 1.2.4.\n\nDesigned with [node](http://nodejs.org/) in mind, but should work fine in the\nbrowser or other CommonJS implementations.\n\nSaxes does not support Node versions older than 10.\n\n## Notable Differences from Sax.\n\n* Saxes aims to be much stricter than sax with regards to XML\n  well-formedness. Sax, even in its so-called \"strict mode\", is not strict. It\n  silently accepts structures that are not well-formed XML. Projects that need\n  better compliance with well-formedness constraints cannot use sax as-is.\n\n  Consequently, saxes does not support HTML, or pseudo-XML, or bad XML. Saxes\n  will report well-formedness errors in all these cases but it won't try to\n  extract data from malformed documents like sax does.\n\n* Saxes is much much faster than sax, mostly because of a substantial redesign\n  of the internal parsing logic. The speed improvement is not merely due to\n  removing features that were supported by sax. That helped a bit, but saxes\n  adds some expensive checks in its aim for conformance with the XML\n  specification. Redesigning the parsing logic is what accounts for most of the\n  performance improvement.\n\n* Saxes does not aim to support antiquated platforms. We will not pollute the\n  source or the default build with support for antiquated platforms. If you want\n  support for IE 11, you are welcome to produce a PR that adds a *new build*\n  transpiled to ES5.\n\n* Saxes handles errors differently from sax: it provides a default onerror\n  handler which throws. You can replace it with your own handler if you want. If\n  your handler does nothing, there is no `resume` method to call.\n\n* There's no `Stream` API. A revamped API may be introduced later. (It is still\n  a \"streaming parser\" in the general sense that you write a character stream to\n  it.)\n\n* Saxes does not have facilities for limiting the size the data chunks passed to\n  event handlers. See the FAQ entry for more details.\n\n## Conformance\n\nSaxes supports:\n\n* [XML 1.0 fifth edition](https://www.w3.org/TR/2008/REC-xml-20081126/)\n* [XML 1.1 second edition](https://www.w3.org/TR/2006/REC-xml11-20060816/)\n* [Namespaces in XML 1.0 (Third Edition)](https://www.w3.org/TR/2009/REC-xml-names-20091208/).\n* [Namespaces in XML 1.1 (Second Edition)](https://www.w3.org/TR/2006/REC-xml-names11-20060816/).\n\n## Limitations\n\nThis is a non-validating parser so it only verifies whether the document is\nwell-formed. We do aim to raise errors for all malformed constructs\nencountered. However, this parser does not thorougly parse the contents of\nDTDs. So most malformedness errors caused by errors **in DTDs** cannot be\nreported.\n\n## Regarding `<!DOCTYPE` and `<!ENTITY`\n\nThe parser will handle the basic XML entities in text nodes and attribute\nvalues: `&amp; &lt; &gt; &apos; &quot;`. It's possible to define additional\nentities in XML by putting them in the DTD. This parser doesn't do anything with\nthat. If you want to listen to the `doctype` event, and then fetch the\ndoctypes, and read the entities and add them to `parser.ENTITIES`, then be my\nguest.\n\n## Documentation\n\nThe source code contains JSDOC comments. Use them. What follows is a brief\nsummary of what is available. The final authority is the source code.\n\n**PAY CLOSE ATTENTION TO WHAT IS PUBLIC AND WHAT IS PRIVATE.**\n\nThe move to TypeScript makes it so that everything is now formally private,\nprotected, or public.\n\nIf you use anything not public, that's at your own peril.\n\nIf there's a mistake in the documentation, raise an issue. If you just assume,\nyou may assume incorrectly.\n\n## Summary Usage Information\n\n### Example\n\n```javascript\nvar saxes = require(\"./lib/saxes\"),\n  parser = new saxes.SaxesParser();\n\nparser.on(\"error\", function (e) {\n  // an error happened.\n});\nparser.on(\"text\", function (t) {\n  // got some text.  t is the string of text.\n});\nparser.on(\"opentag\", function (node) {\n  // opened a tag.  node has \"name\" and \"attributes\"\n});\nparser.on(\"end\", function () {\n  // parser stream is done, and ready to have more stuff written to it.\n});\n\nparser.write('<xml>Hello, <who name=\"world\">world</who>!</xml>').close();\n```\n\n### Constructor Arguments\n\nSettings supported:\n\n* `xmlns` - Boolean. If `true`, then namespaces are supported. Default\n  is `false`.\n\n* `position` - Boolean. If `false`, then don't track line/col/position. Unset is\n  treated as `true`. Default is unset. Currently, setting this to `false` only\n  results in a cosmetic change: the errors reported do not contain position\n  information. sax-js would literally turn off the position-computing logic if\n  this flag was set to false. The notion was that it would optimize\n  execution. In saxes at least it turns out that continually testing this flag\n  causes a cost that offsets the benefits of turning off this logic.\n\n* `fileName` - String. Set a file name for error reporting. This is useful only\n  when tracking positions. You may leave it unset.\n\n* `fragment` - Boolean. If `true`, parse the XML as an XML fragment. Default is\n  `false`.\n\n* `additionalNamespaces` - A plain object whose key, value pairs define\n   namespaces known before parsing the XML file. It is not legal to pass\n   bindings for the namespaces `\"xml\"` or `\"xmlns\"`.\n\n* `defaultXMLVersion` - The default version of the XML specification to use if\n  the document contains no XML declaration. If the document does contain an XML\n  declaration, then this setting is ignored. Must be `\"1.0\"` or `\"1.1\"`. The\n  default is `\"1.0\"`.\n\n* `forceXMLVersion` - Boolean. A flag indicating whether to force the XML\n  version used for parsing to the value of ``defaultXMLVersion``. When this flag\n  is ``true``, ``defaultXMLVersion`` must be specified. If unspecified, the\n  default value of this flag is ``false``.\n\n  Example: suppose you are parsing a document that has an XML declaration\n  specifying XML version 1.1.\n\n  If you set ``defaultXMLVersion`` to ``\"1.0\"`` without setting\n  ``forceXMLVersion`` then the XML declaration will override the value of\n  ``defaultXMLVersion`` and the document will be parsed according to XML 1.1.\n\n  If you set ``defaultXMLVersion`` to ``\"1.0\"`` and set ``forceXMLVersion`` to\n  ``true``, then the XML declaration will be ignored and the document will be\n  parsed according to XML 1.0.\n\n### Methods\n\n`write` - Write bytes onto the stream. You don't have to pass the whole document\nin one `write` call. You can read your source chunk by chunk and call `write`\nwith each chunk.\n\n`close` - Close the stream. Once closed, no more data may be written until it is\ndone processing the buffer, which is signaled by the `end` event.\n\n### Properties\n\nThe parser has the following properties:\n\n`line`, `column`, `columnIndex`, `position` - Indications of the position in the\nXML document where the parser currently is looking. The `columnIndex` property\ncounts columns as if indexing into a JavaScript string, whereas the `column`\nproperty counts Unicode characters.\n\n`closed` - Boolean indicating whether or not the parser can be written to.  If\nit's `true`, then wait for the `ready` event to write again.\n\n`opt` - Any options passed into the constructor.\n\n`xmlDecl` - The XML declaration for this document. It contains the fields\n`version`, `encoding` and `standalone`. They are all `undefined` before\nencountering the XML declaration. If they are undefined after the XML\ndeclaration, the corresponding value was not set by the declaration. There is no\nevent associated with the XML declaration. In a well-formed document, the XML\ndeclaration may be preceded only by an optional BOM. So by the time any event\ngenerated by the parser happens, the declaration has been processed if present\nat all. Otherwise, you have a malformed document, and as stated above, you\ncannot rely on the parser data!\n\n### Error Handling\n\nThe parser continues to parse even upon encountering errors, and does its best\nto continue reporting errors. You should heed all errors reported. After an\nerror, however, saxes may interpret your document incorrectly. For instance\n``<foo a=bc=\"d\"/>`` is invalid XML. Did you mean to have ``<foo a=\"bc=d\"/>`` or\n``<foo a=\"b\" c=\"d\"/>`` or some other variation?  For the sake of continuing to\nprovide errors, saxes will continue parsing the document, but the structure it\nreports may be incorrect. It is only after the errors are fixed in the document\nthat saxes can provide a reliable interpretation of the document.\n\nThat leaves you with two rules of thumb when using saxes:\n\n* Pay attention to the errors that saxes report. The default `onerror` handler\n  throws, so by default, you cannot miss errors.\n\n* **ONCE AN ERROR HAS BEEN ENCOUNTERED, STOP RELYING ON THE EVENT HANDLERS OTHER\n  THAN `onerror`.** As explained above, when saxes runs into a well-formedness\n  problem, it makes a guess in order to continue reporting more errors. The guess\n  may be wrong.\n\n### Events\n\nTo listen to an event, override `on<eventname>`. The list of supported events\nare also in the exported `EVENTS` array.\n\nSee the JSDOC comments in the source code for a description of each supported\nevent.\n\n### Parsing XML Fragments\n\nThe XML specification does not define any method by which to parse XML\nfragments. However, there are usage scenarios in which it is desirable to parse\nfragments. In order to allow this, saxes provides three initialization options.\n\nIf you pass the option `fragment: true` to the parser constructor, the parser\nwill expect an XML fragment. It essentially starts with a parsing state\nequivalent to the one it would be in if `parser.write(\"<foo\">)` had been called\nright after initialization. In other words, it expects content which is\nacceptable inside an element. This also turns off well-formedness checks that\nare inappropriate when parsing a fragment.\n\nThe option `additionalNamespaces` allows you to define additional prefix-to-URI\nbindings known before parsing starts. You would use this over `resolvePrefix` if\nyou have at the ready a series of namespaces bindings to use.\n\nThe option `resolvePrefix` allows you to pass a function which saxes will use if\nit is unable to resolve a namespace prefix by itself. You would use this over\n`additionalNamespaces` in a context where getting a complete list of defined\nnamespaces is onerous.\n\nNote that you can use `additionalNamespaces` and `resolvePrefix` together if you\nwant. `additionalNamespaces` applies before `resolvePrefix`.\n\nThe options `additionalNamespaces` and `resolvePrefix` are really meant to be\nused for parsing fragments. However, saxes won't prevent you from using them\nwith `fragment: false`. Note that if you do this, your document may parse\nwithout errors and yet be malformed because the document can refer to namespaces\nwhich are not defined *in* the document.\n\nOf course, `additionalNamespaces` and `resolvePrefix` are used only if `xmlns`\nis `true`. If you are parsing a fragment that does not use namespaces, there's\nno point in setting these options.\n\n### Performance Tips\n\n* saxes works faster on files that use newlines (``\\u000A``) as end of line\n  markers than files that use other end of line markers (like ``\\r`` or\n  ``\\r\\n``). The XML specification requires that conformant applications behave\n  as if all characters that are to be treated as end of line characters are\n  converted to ``\\u000A`` prior to parsing. The optimal code path for saxes is a\n  file in which all end of line characters are already ``\\u000A``.\n\n* Don't split Unicode strings you feed to saxes across surrogates. When you\n  naively split a string in JavaScript, you run the risk of splitting a Unicode\n  character into two surrogates. e.g.  In the following example ``a`` and ``b``\n  each contain half of a single Unicode character: ``const a = \"\\u{1F4A9}\"[0];\n  const b = \"\\u{1F4A9}\"[1]`` If you feed such split surrogates to versions of\n  saxes prior to 4, you'd get errors. Saxes version 4 and over are able to\n  detect when a chunk of data ends with a surrogate and carry over the surrogate\n  to the next chunk. However this operation entails slicing and concatenating\n  strings. If you can feed your data in a way that does not split surrogates,\n  you should do it. (Obviously, feeding all the data at once with a single write\n  is fastest.)\n\n* Don't set event handlers you don't need. Saxes has always aimed to avoid doing\n  work that will just be tossed away but future improvements hope to do this\n  more aggressively. One way saxes knows whether or not some data is needed is\n  by checking whether a handler has been set for a specific event.\n\n## FAQ\n\nQ. Why has saxes dropped support for limiting the size of data chunks passed to\nevent handlers?\n\nA. With sax you could set ``MAX_BUFFER_LENGTH`` to cause the parser to limit the\nsize of data chunks passed to event handlers. So if you ran into a span of text\nabove the limit, multiple ``text`` events with smaller data chunks were fired\ninstead of a single event with a large chunk.\n\nHowever, that functionality had some problematic characteristics. It had an\narbitrary default value. It was library-wide so all parsers created from a\nsingle instance of the ``sax`` library shared it. This could potentially cause\nconflicts among libraries running in the same VM but using sax for different\npurposes.\n\nThese issues could have been easily fixed, but there were larger issues. The\nbuffer limit arbitrarily applied to some events but not others. It would split\n``text``, ``cdata`` and ``script`` events. However, if a ``comment``,\n``doctype``, ``attribute`` or ``processing instruction`` were more than the\nlimit, the parser would generate an error and you were left picking up the\npieces.\n\nIt was not intuitive to use. You'd think setting the limit to 1K would prevent\nchunks bigger than 1K to be passed to event handlers. But that was not the\ncase. A comment in the source code told you that you might go over the limit if\nyou passed large chunks to ``write``. So if you want a 1K limit, don't pass 64K\nchunks to ``write``. Fair enough. You know what limit you want so you can\ncontrol the size of the data you pass to ``write``. So you limit the chunks to\n``write`` to 1K at a time. Even if you do this, your event handlers may get data\nchunks that are 2K in size. Suppose on the previous ``write`` the parser has\njust finished processing an open tag, so it is ready for text. Your ``write``\npasses 1K of text. You are not above the limit yet, so no event is generated\nyet. The next ``write`` passes another 1K of text. It so happens that sax checks\nbuffer limits only once per ``write``, after the chunk of data has been\nprocessed. Now you've hit the limit and you get a ``text`` event with 2K of\ndata. So even if you limit your ``write`` calls to the buffer limit you've set,\nyou may still get events with chunks at twice the buffer size limit you've\nspecified.\n\nWe may consider reinstating an equivalent functionality, provided that it\naddresses the issues above and does not cause a huge performance drop for\nuse-case scenarios that don't need it.\n", "node_modules/symbol-tree/README.md": "symbol-tree\n===========\n[![Travis CI Build Status](https://api.travis-ci.org/jsdom/js-symbol-tree.svg?branch=master)](https://travis-ci.org/jsdom/js-symbol-tree) [![Coverage Status](https://coveralls.io/repos/github/jsdom/js-symbol-tree/badge.svg?branch=master)](https://coveralls.io/github/jsdom/js-symbol-tree?branch=master)\n\nTurn any collection of objects into its own efficient tree or linked list using `Symbol`.\n\nThis library has been designed to provide an efficient backing data structure for DOM trees. You can also use this library as an efficient linked list. Any meta data is stored on your objects directly, which ensures any kind of insertion or deletion is performed in constant time. Because an ES6 `Symbol` is used, the meta data does not interfere with your object in any way.\n\nNode.js 4+, io.js and modern browsers are supported.\n\nExample\n-------\nA linked list:\n\n```javascript\nconst SymbolTree = require('symbol-tree');\nconst tree = new SymbolTree();\n\nlet a = {foo: 'bar'}; // or `new Whatever()`\nlet b = {foo: 'baz'};\nlet c = {foo: 'qux'};\n\ntree.insertBefore(b, a); // insert a before b\ntree.insertAfter(b, c); // insert c after b\n\nconsole.log(tree.nextSibling(a) === b);\nconsole.log(tree.nextSibling(b) === c);\nconsole.log(tree.previousSibling(c) === b);\n\ntree.remove(b);\nconsole.log(tree.nextSibling(a) === c);\n```\n\nA tree:\n\n```javascript\nconst SymbolTree = require('symbol-tree');\nconst tree = new SymbolTree();\n\nlet parent = {};\nlet a = {};\nlet b = {};\nlet c = {};\n\ntree.prependChild(parent, a); // insert a as the first child\ntree.appendChild(parent,c ); // insert c as the last child\ntree.insertAfter(a, b); // insert b after a, it now has the same parent as a\n\nconsole.log(tree.firstChild(parent) === a);\nconsole.log(tree.nextSibling(tree.firstChild(parent)) === b);\nconsole.log(tree.lastChild(parent) === c);\n\nlet grandparent = {};\ntree.prependChild(grandparent, parent);\nconsole.log(tree.firstChild(tree.firstChild(grandparent)) === a);\n```\n\nSee [api.md](api.md) for more documentation.\n\nTesting\n-------\nMake sure you install the dependencies first:\n\n    npm install\n\nYou can now run the unit tests by executing:\n\n    npm test\n\nThe line and branch coverage should be 100%.\n\nAPI Documentation\n-----------------\n<a name=\"module_symbol-tree\"></a>\n\n## symbol-tree\n**Author**: Joris van der Wel <joris@jorisvanderwel.com>  \n\n* [symbol-tree](#module_symbol-tree)\n    * [SymbolTree](#exp_module_symbol-tree--SymbolTree) \u23cf\n        * [new SymbolTree([description])](#new_module_symbol-tree--SymbolTree_new)\n        * [.initialize(object)](#module_symbol-tree--SymbolTree+initialize) \u21d2 <code>Object</code>\n        * [.hasChildren(object)](#module_symbol-tree--SymbolTree+hasChildren) \u21d2 <code>Boolean</code>\n        * [.firstChild(object)](#module_symbol-tree--SymbolTree+firstChild) \u21d2 <code>Object</code>\n        * [.lastChild(object)](#module_symbol-tree--SymbolTree+lastChild) \u21d2 <code>Object</code>\n        * [.previousSibling(object)](#module_symbol-tree--SymbolTree+previousSibling) \u21d2 <code>Object</code>\n        * [.nextSibling(object)](#module_symbol-tree--SymbolTree+nextSibling) \u21d2 <code>Object</code>\n        * [.parent(object)](#module_symbol-tree--SymbolTree+parent) \u21d2 <code>Object</code>\n        * [.lastInclusiveDescendant(object)](#module_symbol-tree--SymbolTree+lastInclusiveDescendant) \u21d2 <code>Object</code>\n        * [.preceding(object, [options])](#module_symbol-tree--SymbolTree+preceding) \u21d2 <code>Object</code>\n        * [.following(object, [options])](#module_symbol-tree--SymbolTree+following) \u21d2 <code>Object</code>\n        * [.childrenToArray(parent, [options])](#module_symbol-tree--SymbolTree+childrenToArray) \u21d2 <code>Array.&lt;Object&gt;</code>\n        * [.ancestorsToArray(object, [options])](#module_symbol-tree--SymbolTree+ancestorsToArray) \u21d2 <code>Array.&lt;Object&gt;</code>\n        * [.treeToArray(root, [options])](#module_symbol-tree--SymbolTree+treeToArray) \u21d2 <code>Array.&lt;Object&gt;</code>\n        * [.childrenIterator(parent, [options])](#module_symbol-tree--SymbolTree+childrenIterator) \u21d2 <code>Object</code>\n        * [.previousSiblingsIterator(object)](#module_symbol-tree--SymbolTree+previousSiblingsIterator) \u21d2 <code>Object</code>\n        * [.nextSiblingsIterator(object)](#module_symbol-tree--SymbolTree+nextSiblingsIterator) \u21d2 <code>Object</code>\n        * [.ancestorsIterator(object)](#module_symbol-tree--SymbolTree+ancestorsIterator) \u21d2 <code>Object</code>\n        * [.treeIterator(root, options)](#module_symbol-tree--SymbolTree+treeIterator) \u21d2 <code>Object</code>\n        * [.index(child)](#module_symbol-tree--SymbolTree+index) \u21d2 <code>Number</code>\n        * [.childrenCount(parent)](#module_symbol-tree--SymbolTree+childrenCount) \u21d2 <code>Number</code>\n        * [.compareTreePosition(left, right)](#module_symbol-tree--SymbolTree+compareTreePosition) \u21d2 <code>Number</code>\n        * [.remove(removeObject)](#module_symbol-tree--SymbolTree+remove) \u21d2 <code>Object</code>\n        * [.insertBefore(referenceObject, newObject)](#module_symbol-tree--SymbolTree+insertBefore) \u21d2 <code>Object</code>\n        * [.insertAfter(referenceObject, newObject)](#module_symbol-tree--SymbolTree+insertAfter) \u21d2 <code>Object</code>\n        * [.prependChild(referenceObject, newObject)](#module_symbol-tree--SymbolTree+prependChild) \u21d2 <code>Object</code>\n        * [.appendChild(referenceObject, newObject)](#module_symbol-tree--SymbolTree+appendChild) \u21d2 <code>Object</code>\n\n<a name=\"exp_module_symbol-tree--SymbolTree\"></a>\n\n### SymbolTree \u23cf\n**Kind**: Exported class  \n<a name=\"new_module_symbol-tree--SymbolTree_new\"></a>\n\n#### new SymbolTree([description])\n\n| Param | Type | Default | Description |\n| --- | --- | --- | --- |\n| [description] | <code>string</code> | <code>&quot;&#x27;SymbolTree data&#x27;&quot;</code> | Description used for the Symbol |\n\n<a name=\"module_symbol-tree--SymbolTree+initialize\"></a>\n\n#### symbolTree.initialize(object) \u21d2 <code>Object</code>\nYou can use this function to (optionally) initialize an object right after its creation,\nto take advantage of V8's fast properties. Also useful if you would like to\nfreeze your object.\n\n`O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Object</code> - object  \n\n| Param | Type |\n| --- | --- |\n| object | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+hasChildren\"></a>\n\n#### symbolTree.hasChildren(object) \u21d2 <code>Boolean</code>\nReturns `true` if the object has any children. Otherwise it returns `false`.\n\n* `O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type |\n| --- | --- |\n| object | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+firstChild\"></a>\n\n#### symbolTree.firstChild(object) \u21d2 <code>Object</code>\nReturns the first child of the given object.\n\n* `O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type |\n| --- | --- |\n| object | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+lastChild\"></a>\n\n#### symbolTree.lastChild(object) \u21d2 <code>Object</code>\nReturns the last child of the given object.\n\n* `O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type |\n| --- | --- |\n| object | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+previousSibling\"></a>\n\n#### symbolTree.previousSibling(object) \u21d2 <code>Object</code>\nReturns the previous sibling of the given object.\n\n* `O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type |\n| --- | --- |\n| object | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+nextSibling\"></a>\n\n#### symbolTree.nextSibling(object) \u21d2 <code>Object</code>\nReturns the next sibling of the given object.\n\n* `O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type |\n| --- | --- |\n| object | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+parent\"></a>\n\n#### symbolTree.parent(object) \u21d2 <code>Object</code>\nReturn the parent of the given object.\n\n* `O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type |\n| --- | --- |\n| object | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+lastInclusiveDescendant\"></a>\n\n#### symbolTree.lastInclusiveDescendant(object) \u21d2 <code>Object</code>\nFind the inclusive descendant that is last in tree order of the given object.\n\n* `O(n)` (worst case) where `n` is the depth of the subtree of `object`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type |\n| --- | --- |\n| object | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+preceding\"></a>\n\n#### symbolTree.preceding(object, [options]) \u21d2 <code>Object</code>\nFind the preceding object (A) of the given object (B).\nAn object A is preceding an object B if A and B are in the same tree\nand A comes before B in tree order.\n\n* `O(n)` (worst case)\n* `O(1)` (amortized when walking the entire tree)\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type | Description |\n| --- | --- | --- |\n| object | <code>Object</code> |  |\n| [options] | <code>Object</code> |  |\n| [options.root] | <code>Object</code> | If set, `root` must be an inclusive ancestor        of the return value (or else null is returned). This check _assumes_        that `root` is also an inclusive ancestor of the given `object` |\n\n<a name=\"module_symbol-tree--SymbolTree+following\"></a>\n\n#### symbolTree.following(object, [options]) \u21d2 <code>Object</code>\nFind the following object (A) of the given object (B).\nAn object A is following an object B if A and B are in the same tree\nand A comes after B in tree order.\n\n* `O(n)` (worst case) where `n` is the amount of objects in the entire tree\n* `O(1)` (amortized when walking the entire tree)\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type | Default | Description |\n| --- | --- | --- | --- |\n| object | <code>Object</code> |  |  |\n| [options] | <code>Object</code> |  |  |\n| [options.root] | <code>Object</code> |  | If set, `root` must be an inclusive ancestor        of the return value (or else null is returned). This check _assumes_        that `root` is also an inclusive ancestor of the given `object` |\n| [options.skipChildren] | <code>Boolean</code> | <code>false</code> | If set, ignore the children of `object` |\n\n<a name=\"module_symbol-tree--SymbolTree+childrenToArray\"></a>\n\n#### symbolTree.childrenToArray(parent, [options]) \u21d2 <code>Array.&lt;Object&gt;</code>\nAppend all children of the given object to an array.\n\n* `O(n)` where `n` is the amount of children of the given `parent`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type | Default | Description |\n| --- | --- | --- | --- |\n| parent | <code>Object</code> |  |  |\n| [options] | <code>Object</code> |  |  |\n| [options.array] | <code>Array.&lt;Object&gt;</code> | <code>[]</code> |  |\n| [options.filter] | <code>function</code> |  | Function to test each object before it is added to the array.                            Invoked with arguments (object). Should return `true` if an object                            is to be included. |\n| [options.thisArg] | <code>\\*</code> |  | Value to use as `this` when executing `filter`. |\n\n<a name=\"module_symbol-tree--SymbolTree+ancestorsToArray\"></a>\n\n#### symbolTree.ancestorsToArray(object, [options]) \u21d2 <code>Array.&lt;Object&gt;</code>\nAppend all inclusive ancestors of the given object to an array.\n\n* `O(n)` where `n` is the amount of ancestors of the given `object`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type | Default | Description |\n| --- | --- | --- | --- |\n| object | <code>Object</code> |  |  |\n| [options] | <code>Object</code> |  |  |\n| [options.array] | <code>Array.&lt;Object&gt;</code> | <code>[]</code> |  |\n| [options.filter] | <code>function</code> |  | Function to test each object before it is added to the array.                            Invoked with arguments (object). Should return `true` if an object                            is to be included. |\n| [options.thisArg] | <code>\\*</code> |  | Value to use as `this` when executing `filter`. |\n\n<a name=\"module_symbol-tree--SymbolTree+treeToArray\"></a>\n\n#### symbolTree.treeToArray(root, [options]) \u21d2 <code>Array.&lt;Object&gt;</code>\nAppend all descendants of the given object to an array (in tree order).\n\n* `O(n)` where `n` is the amount of objects in the sub-tree of the given `object`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type | Default | Description |\n| --- | --- | --- | --- |\n| root | <code>Object</code> |  |  |\n| [options] | <code>Object</code> |  |  |\n| [options.array] | <code>Array.&lt;Object&gt;</code> | <code>[]</code> |  |\n| [options.filter] | <code>function</code> |  | Function to test each object before it is added to the array.                            Invoked with arguments (object). Should return `true` if an object                            is to be included. |\n| [options.thisArg] | <code>\\*</code> |  | Value to use as `this` when executing `filter`. |\n\n<a name=\"module_symbol-tree--SymbolTree+childrenIterator\"></a>\n\n#### symbolTree.childrenIterator(parent, [options]) \u21d2 <code>Object</code>\nIterate over all children of the given object\n\n* `O(1)` for a single iteration\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Object</code> - An iterable iterator (ES6)  \n\n| Param | Type | Default |\n| --- | --- | --- |\n| parent | <code>Object</code> |  | \n| [options] | <code>Object</code> |  | \n| [options.reverse] | <code>Boolean</code> | <code>false</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+previousSiblingsIterator\"></a>\n\n#### symbolTree.previousSiblingsIterator(object) \u21d2 <code>Object</code>\nIterate over all the previous siblings of the given object. (in reverse tree order)\n\n* `O(1)` for a single iteration\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Object</code> - An iterable iterator (ES6)  \n\n| Param | Type |\n| --- | --- |\n| object | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+nextSiblingsIterator\"></a>\n\n#### symbolTree.nextSiblingsIterator(object) \u21d2 <code>Object</code>\nIterate over all the next siblings of the given object. (in tree order)\n\n* `O(1)` for a single iteration\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Object</code> - An iterable iterator (ES6)  \n\n| Param | Type |\n| --- | --- |\n| object | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+ancestorsIterator\"></a>\n\n#### symbolTree.ancestorsIterator(object) \u21d2 <code>Object</code>\nIterate over all inclusive ancestors of the given object\n\n* `O(1)` for a single iteration\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Object</code> - An iterable iterator (ES6)  \n\n| Param | Type |\n| --- | --- |\n| object | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+treeIterator\"></a>\n\n#### symbolTree.treeIterator(root, options) \u21d2 <code>Object</code>\nIterate over all descendants of the given object (in tree order).\n\nWhere `n` is the amount of objects in the sub-tree of the given `root`:\n\n* `O(n)` (worst case for a single iteration)\n* `O(n)` (amortized, when completing the iterator)\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Object</code> - An iterable iterator (ES6)  \n\n| Param | Type | Default |\n| --- | --- | --- |\n| root | <code>Object</code> |  | \n| options | <code>Object</code> |  | \n| [options.reverse] | <code>Boolean</code> | <code>false</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+index\"></a>\n\n#### symbolTree.index(child) \u21d2 <code>Number</code>\nFind the index of the given object (the number of preceding siblings).\n\n* `O(n)` where `n` is the amount of preceding siblings\n* `O(1)` (amortized, if the tree is not modified)\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Number</code> - The number of preceding siblings, or -1 if the object has no parent  \n\n| Param | Type |\n| --- | --- |\n| child | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+childrenCount\"></a>\n\n#### symbolTree.childrenCount(parent) \u21d2 <code>Number</code>\nCalculate the number of children.\n\n* `O(n)` where `n` is the amount of children\n* `O(1)` (amortized, if the tree is not modified)\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type |\n| --- | --- |\n| parent | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+compareTreePosition\"></a>\n\n#### symbolTree.compareTreePosition(left, right) \u21d2 <code>Number</code>\nCompare the position of an object relative to another object. A bit set is returned:\n\n<ul>\n    <li>DISCONNECTED : 1</li>\n    <li>PRECEDING : 2</li>\n    <li>FOLLOWING : 4</li>\n    <li>CONTAINS : 8</li>\n    <li>CONTAINED_BY : 16</li>\n</ul>\n\nThe semantics are the same as compareDocumentPosition in DOM, with the exception that\nDISCONNECTED never occurs with any other bit.\n\nwhere `n` and `m` are the amount of ancestors of `left` and `right`;\nwhere `o` is the amount of children of the lowest common ancestor of `left` and `right`:\n\n* `O(n + m + o)` (worst case)\n* `O(n + m)` (amortized, if the tree is not modified)\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n\n| Param | Type |\n| --- | --- |\n| left | <code>Object</code> | \n| right | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+remove\"></a>\n\n#### symbolTree.remove(removeObject) \u21d2 <code>Object</code>\nRemove the object from this tree.\nHas no effect if already removed.\n\n* `O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Object</code> - removeObject  \n\n| Param | Type |\n| --- | --- |\n| removeObject | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+insertBefore\"></a>\n\n#### symbolTree.insertBefore(referenceObject, newObject) \u21d2 <code>Object</code>\nInsert the given object before the reference object.\n`newObject` is now the previous sibling of `referenceObject`.\n\n* `O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Object</code> - newObject  \n**Throws**:\n\n- <code>Error</code> If the newObject is already present in this SymbolTree\n\n\n| Param | Type |\n| --- | --- |\n| referenceObject | <code>Object</code> | \n| newObject | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+insertAfter\"></a>\n\n#### symbolTree.insertAfter(referenceObject, newObject) \u21d2 <code>Object</code>\nInsert the given object after the reference object.\n`newObject` is now the next sibling of `referenceObject`.\n\n* `O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Object</code> - newObject  \n**Throws**:\n\n- <code>Error</code> If the newObject is already present in this SymbolTree\n\n\n| Param | Type |\n| --- | --- |\n| referenceObject | <code>Object</code> | \n| newObject | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+prependChild\"></a>\n\n#### symbolTree.prependChild(referenceObject, newObject) \u21d2 <code>Object</code>\nInsert the given object as the first child of the given reference object.\n`newObject` is now the first child of `referenceObject`.\n\n* `O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Object</code> - newObject  \n**Throws**:\n\n- <code>Error</code> If the newObject is already present in this SymbolTree\n\n\n| Param | Type |\n| --- | --- |\n| referenceObject | <code>Object</code> | \n| newObject | <code>Object</code> | \n\n<a name=\"module_symbol-tree--SymbolTree+appendChild\"></a>\n\n#### symbolTree.appendChild(referenceObject, newObject) \u21d2 <code>Object</code>\nInsert the given object as the last child of the given reference object.\n`newObject` is now the last child of `referenceObject`.\n\n* `O(1)`\n\n**Kind**: instance method of [<code>SymbolTree</code>](#exp_module_symbol-tree--SymbolTree)  \n**Returns**: <code>Object</code> - newObject  \n**Throws**:\n\n- <code>Error</code> If the newObject is already present in this SymbolTree\n\n\n| Param | Type |\n| --- | --- |\n| referenceObject | <code>Object</code> | \n| newObject | <code>Object</code> | \n\n", "node_modules/is-potential-custom-element-name/LICENSE-MIT.txt": "Copyright Mathias Bynens <https://mathiasbynens.be/>\n\nPermission is hereby granted, free of charge, to any person obtaining\na copy of this software and associated documentation files (the\n\"Software\"), to deal in the Software without restriction, including\nwithout limitation the rights to use, copy, modify, merge, publish,\ndistribute, sublicense, and/or sell copies of the Software, and to\npermit persons to whom the Software is furnished to do so, subject to\nthe following conditions:\n\nThe above copyright notice and this permission notice shall be\nincluded in all copies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND,\nEXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF\nMERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND\nNONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE\nLIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION\nOF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION\nWITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/is-potential-custom-element-name/README.md": "# is-potential-custom-element-name [![Build status](https://travis-ci.org/mathiasbynens/is-potential-custom-element-name.svg?branch=master)](https://travis-ci.org/mathiasbynens/is-potential-custom-element-name)\n\n_is-potential-custom-element-name_ checks whether a given string matches [the `PotentialCustomElementName` production](https://html.spec.whatwg.org/multipage/scripting.html#prod-potentialcustomelementname) as defined in the HTML Standard.\n\n## Installation\n\nTo use _is-potential-custom-element-name_ programmatically, install it as a dependency via [npm](https://www.npmjs.com/):\n\n```bash\n$ npm install is-potential-custom-element-name\n```\n\nThen, `require` it:\n\n```js\nconst isPotentialCustomElementName = require('is-potential-custom-element-name');\n```\n\n## Usage\n\n```js\nisPotentialCustomElementName('foo-bar');\n// \u2192 true\nisPotentialCustomElementName('Foo-bar');\n// \u2192 false\nisPotentialCustomElementName('baz-\u00a9');\n// \u2192 false\nisPotentialCustomElementName('annotation-xml');\n// \u2192 true\n```\n\n## Author\n\n| [![twitter/mathias](https://gravatar.com/avatar/24e08a9ea84deb17ae121074d0f17125?s=70)](https://twitter.com/mathias \"Follow @mathias on Twitter\") |\n|---|\n| [Mathias Bynens](https://mathiasbynens.be/) |\n\n## License\n\n_is-potential-custom-element-name_ is available under the [MIT](https://mths.be/mit) license.\n", "node_modules/@types/trusted-types/README.md": "# Installation\n> `npm install --save @types/trusted-types`\n\n# Summary\nThis package contains type definitions for trusted-types (https://github.com/WICG/trusted-types).\n\n# Details\nFiles were exported from https://github.com/DefinitelyTyped/DefinitelyTyped/tree/master/types/trusted-types.\n\n### Additional Details\n * Last updated: Mon, 20 Nov 2023 23:36:24 GMT\n * Dependencies: none\n\n# Credits\nThese definitions were written by [Jakub Vrana](https://github.com/vrana), [Damien Engels](https://github.com/engelsdamien), [Emanuel Tesar](https://github.com/siegrift), [Bjarki](https://github.com/bjarkler), and [Sebastian Silbermann](https://github.com/eps1lon).\n", "node_modules/punycode/LICENSE-MIT.txt": "Copyright Mathias Bynens <https://mathiasbynens.be/>\n\nPermission is hereby granted, free of charge, to any person obtaining\na copy of this software and associated documentation files (the\n\"Software\"), to deal in the Software without restriction, including\nwithout limitation the rights to use, copy, modify, merge, publish,\ndistribute, sublicense, and/or sell copies of the Software, and to\npermit persons to whom the Software is furnished to do so, subject to\nthe following conditions:\n\nThe above copyright notice and this permission notice shall be\nincluded in all copies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND,\nEXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF\nMERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND\nNONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE\nLIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION\nOF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION\nWITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/punycode/README.md": "# Punycode.js [![punycode on npm](https://img.shields.io/npm/v/punycode)](https://www.npmjs.com/package/punycode) [![](https://data.jsdelivr.com/v1/package/npm/punycode/badge)](https://www.jsdelivr.com/package/npm/punycode)\n\nPunycode.js is a robust Punycode converter that fully complies to [RFC 3492](https://tools.ietf.org/html/rfc3492) and [RFC 5891](https://tools.ietf.org/html/rfc5891).\n\nThis JavaScript library is the result of comparing, optimizing and documenting different open-source implementations of the Punycode algorithm:\n\n* [The C example code from RFC 3492](https://tools.ietf.org/html/rfc3492#appendix-C)\n* [`punycode.c` by _Markus W. Scherer_ (IBM)](http://opensource.apple.com/source/ICU/ICU-400.42/icuSources/common/punycode.c)\n* [`punycode.c` by _Ben Noordhuis_](https://github.com/bnoordhuis/punycode/blob/master/punycode.c)\n* [JavaScript implementation by _some_](http://stackoverflow.com/questions/183485/can-anyone-recommend-a-good-free-javascript-for-punycode-to-unicode-conversion/301287#301287)\n* [`punycode.js` by _Ben Noordhuis_](https://github.com/joyent/node/blob/426298c8c1c0d5b5224ac3658c41e7c2a3fe9377/lib/punycode.js) (note: [not fully compliant](https://github.com/joyent/node/issues/2072))\n\nThis project was [bundled](https://github.com/joyent/node/blob/master/lib/punycode.js) with Node.js from [v0.6.2+](https://github.com/joyent/node/compare/975f1930b1...61e796decc) until [v7](https://github.com/nodejs/node/pull/7941) (soft-deprecated).\n\nThis project provides a CommonJS module that uses ES2015+ features and JavaScript module, which work in modern Node.js versions and browsers. For the old Punycode.js version that offers the same functionality in a UMD build with support for older pre-ES2015 runtimes, including Rhino, Ringo, and Narwhal, see [v1.4.1](https://github.com/mathiasbynens/punycode.js/releases/tag/v1.4.1).\n\n## Installation\n\nVia [npm](https://www.npmjs.com/):\n\n```bash\nnpm install punycode --save\n```\n\nIn [Node.js](https://nodejs.org/):\n\n> \u26a0\ufe0f Note that userland modules don't hide core modules.\n> For example, `require('punycode')` still imports the deprecated core module even if you executed `npm install punycode`.\n> Use `require('punycode/')` to import userland modules rather than core modules.\n\n```js\nconst punycode = require('punycode/');\n```\n\n## API\n\n### `punycode.decode(string)`\n\nConverts a Punycode string of ASCII symbols to a string of Unicode symbols.\n\n```js\n// decode domain name parts\npunycode.decode('maana-pta'); // 'ma\u00f1ana'\npunycode.decode('--dqo34k'); // '\u2603-\u2318'\n```\n\n### `punycode.encode(string)`\n\nConverts a string of Unicode symbols to a Punycode string of ASCII symbols.\n\n```js\n// encode domain name parts\npunycode.encode('ma\u00f1ana'); // 'maana-pta'\npunycode.encode('\u2603-\u2318'); // '--dqo34k'\n```\n\n### `punycode.toUnicode(input)`\n\nConverts a Punycode string representing a domain name or an email address to Unicode. Only the Punycoded parts of the input will be converted, i.e. it doesn\u2019t matter if you call it on a string that has already been converted to Unicode.\n\n```js\n// decode domain names\npunycode.toUnicode('xn--maana-pta.com');\n// \u2192 'ma\u00f1ana.com'\npunycode.toUnicode('xn----dqo34k.com');\n// \u2192 '\u2603-\u2318.com'\n\n// decode email addresses\npunycode.toUnicode('\u0434\u0436\u0443\u043c\u043b\u0430@xn--p-8sbkgc5ag7bhce.xn--ba-lmcq');\n// \u2192 '\u0434\u0436\u0443\u043c\u043b\u0430@\u0434\u0436p\u0443\u043c\u043b\u0430\u0442\u0435\u0441\u0442.b\u0440\u0444a'\n```\n\n### `punycode.toASCII(input)`\n\nConverts a lowercased Unicode string representing a domain name or an email address to Punycode. Only the non-ASCII parts of the input will be converted, i.e. it doesn\u2019t matter if you call it with a domain that\u2019s already in ASCII.\n\n```js\n// encode domain names\npunycode.toASCII('ma\u00f1ana.com');\n// \u2192 'xn--maana-pta.com'\npunycode.toASCII('\u2603-\u2318.com');\n// \u2192\u00a0'xn----dqo34k.com'\n\n// encode email addresses\npunycode.toASCII('\u0434\u0436\u0443\u043c\u043b\u0430@\u0434\u0436p\u0443\u043c\u043b\u0430\u0442\u0435\u0441\u0442.b\u0440\u0444a');\n// \u2192 '\u0434\u0436\u0443\u043c\u043b\u0430@xn--p-8sbkgc5ag7bhce.xn--ba-lmcq'\n```\n\n### `punycode.ucs2`\n\n#### `punycode.ucs2.decode(string)`\n\nCreates an array containing the numeric code point values of each Unicode symbol in the string. While [JavaScript uses UCS-2 internally](https://mathiasbynens.be/notes/javascript-encoding), this function will convert a pair of surrogate halves (each of which UCS-2 exposes as separate characters) into a single code point, matching UTF-16.\n\n```js\npunycode.ucs2.decode('abc');\n// \u2192 [0x61, 0x62, 0x63]\n// surrogate pair for U+1D306 TETRAGRAM FOR CENTRE:\npunycode.ucs2.decode('\\uD834\\uDF06');\n// \u2192 [0x1D306]\n```\n\n#### `punycode.ucs2.encode(codePoints)`\n\nCreates a string based on an array of numeric code point values.\n\n```js\npunycode.ucs2.encode([0x61, 0x62, 0x63]);\n// \u2192 'abc'\npunycode.ucs2.encode([0x1D306]);\n// \u2192 '\\uD834\\uDF06'\n```\n\n### `punycode.version`\n\nA string representing the current Punycode.js version number.\n\n## For maintainers\n\n### How to publish a new release\n\n1. On the `main` branch, bump the version number in `package.json`:\n\n    ```sh\n    npm version patch -m 'Release v%s'\n    ```\n\n    Instead of `patch`, use `minor` or `major` [as needed](https://semver.org/).\n\n    Note that this produces a Git commit + tag.\n\n1. Push the release commit and tag:\n\n    ```sh\n    git push && git push --tags\n    ```\n\n    Our CI then automatically publishes the new release to npm, under both the [`punycode`](https://www.npmjs.com/package/punycode) and [`punycode.js`](https://www.npmjs.com/package/punycode.js) names.\n\n## Author\n\n| [![twitter/mathias](https://gravatar.com/avatar/24e08a9ea84deb17ae121074d0f17125?s=70)](https://twitter.com/mathias \"Follow @mathias on Twitter\") |\n|---|\n| [Mathias Bynens](https://mathiasbynens.be/) |\n\n## License\n\nPunycode.js is available under the [MIT](https://mths.be/mit) license.\n", "node_modules/whatwg-mimetype/LICENSE.txt": "Copyright \u00a9 Domenic Denicola <d@domenic.me>\n\nPermission is hereby granted, free of charge, to any person obtaining a copy of this software and associated documentation files (the \"Software\"), to deal in the Software without restriction, including without limitation the rights to use, copy, modify, merge, publish, distribute, sublicense, and/or sell copies of the Software, and to permit persons to whom the Software is furnished to do so, subject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all copies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/whatwg-mimetype/README.md": "# Parse, serialize, manipulate, and sniff MIME types\n\nThis package will parse [MIME types](https://mimesniff.spec.whatwg.org/#understanding-mime-types) into a structured format, which can then be manipulated and serialized:\n\n```js\nconst { MIMEType } = require(\"whatwg-mimetype\");\n\nconst mimeType = new MIMEType(`Text/HTML;Charset=\"utf-8\"`);\n\nconsole.assert(mimeType.toString() === \"text/html;charset=utf-8\");\n\nconsole.assert(mimeType.type === \"text\");\nconsole.assert(mimeType.subtype === \"html\");\nconsole.assert(mimeType.essence === \"text/html\");\nconsole.assert(mimeType.parameters.get(\"charset\") === \"utf-8\");\n\nmimeType.parameters.set(\"charset\", \"windows-1252\");\nconsole.assert(mimeType.parameters.get(\"charset\") === \"windows-1252\");\nconsole.assert(mimeType.toString() === \"text/html;charset=windows-1252\");\n\nconsole.assert(mimeType.isHTML() === true);\nconsole.assert(mimeType.isXML() === false);\n```\n\nIt can also [determine the MIME type of a resource](https://mimesniff.spec.whatwg.org/#determining-the-computed-mime-type-of-a-resource) by sniffing its contents:\n\n```js\nconst { computedMIMEType } = require(\"whatwg-mimetype\");\n\nconst pngBytes = new Uint8Array([0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A]);\n\ncomputedMIMEType(pngBytes).essence;                                    // \"image/png\"\ncomputedMIMEType(pngBytes, { contentTypeHeader: \"image/gif\" }).essence // \"image/png\"\ncomputedMIMEType(pngBytes, { contentTypeHeader: \"text/html\" }).essence // \"text/html\"\n```\n\nParsing, serialization, and sniffing are all fairly complex processes; see the specification for more details:\n\n* [parsing](https://mimesniff.spec.whatwg.org/#parsing-a-mime-type)\n* [serialization](https://mimesniff.spec.whatwg.org/#serializing-a-mime-type)\n* [sniffing](https://mimesniff.spec.whatwg.org/#determining-the-computed-mime-type-of-a-resource)\n\nThis package's algorithms conform to those of the WHATWG [MIME Sniffing Standard](https://mimesniff.spec.whatwg.org/), as of [commit `e7594d5`](https://github.com/whatwg/mimesniff/commit/e7594d531819053508447f688a3bde465531aca5).\n\n## APIs\n\n### `MIMEType`\n\nThe `MIMEType` class's constructor takes a string which it will attempt to parse into a MIME type; if parsing fails, an `Error` will be thrown.\n\n#### The `parse()` static factory method\n\nAs an alternative to the constructor, you can use `MIMEType.parse(string)`. The only difference is that `parse()` will return `null` on failed parsing, whereas the constructor will throw. It thus makes the most sense to use the constructor in cases where unparseable MIME types would be exceptional, and use `parse()` when dealing with input from some unconstrained source.\n\n#### Properties\n\n* `type`: the MIME type's [type](https://mimesniff.spec.whatwg.org/#mime-type-type), e.g. `\"text\"`\n* `subtype`: the MIME type's [subtype](https://mimesniff.spec.whatwg.org/#mime-type-subtype), e.g. `\"html\"`\n* `essence`: the MIME type's [essence](https://mimesniff.spec.whatwg.org/#mime-type-essence), e.g. `\"text/html\"`\n* `parameters`: an instance of `MIMETypeParameters`, containing this MIME type's [parameters](https://mimesniff.spec.whatwg.org/#mime-type-parameters)\n\n`type` and `subtype` can be changed. They will be validated to be non-empty and only contain [HTTP token code points](https://mimesniff.spec.whatwg.org/#http-token-code-point).\n\n`essence` is only a getter, and cannot be changed.\n\n`parameters` is also a getter, but the contents of the `MIMETypeParameters` object are mutable, as described below.\n\n#### Methods\n\n* `toString()` serializes the MIME type to a string\n* `isHTML()`: returns true if this instance represents [a HTML MIME type](https://mimesniff.spec.whatwg.org/#html-mime-type)\n* `isXML()`: returns true if this instance represents [an XML MIME type](https://mimesniff.spec.whatwg.org/#xml-mime-type)\n* `isJavaScript({ prohibitParameters })`: returns true if this instance represents [a JavaScript MIME type](https://html.spec.whatwg.org/multipage/scripting.html#javascript-mime-type). `prohibitParameters` can be set to true to disallow any parameters, i.e. to test if the MIME type's serialization is a [JavaScript MIME type essence match](https://mimesniff.spec.whatwg.org/#javascript-mime-type-essence-match).\n\n_Note: the `isHTML()`, `isXML()`, and `isJavaScript()` methods are speculative, and may be removed or changed in future major versions. See [whatwg/mimesniff#48](https://github.com/whatwg/mimesniff/issues/48) for brainstorming in this area. Currently we implement these mainly because they are useful in jsdom._\n\n### `MIMETypeParameters`\n\nThe `MIMETypeParameters` class, instances of which are returned by `mimeType.parameters`, has equivalent surface API to a [JavaScript `Map`](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Map).\n\nHowever, `MIMETypeParameters` methods will always interpret their arguments as appropriate for MIME types, so e.g. parameter names will be lowercased, and attempting to set invalid characters will throw.\n\nSome examples:\n\n```js\nconst { MIMEType } = require(\"whatwg-mimetype\");\n\nconst mimeType = new MIMEType(`x/x;a=b;c=D;E=\"F\"`);\n\n// Logs:\n// a b\n// c D\n// e F\nfor (const [name, value] of mimeType.parameters) {\n  console.log(name, value);\n}\n\nconsole.assert(mimeType.parameters.has(\"a\"));\nconsole.assert(mimeType.parameters.has(\"A\"));\nconsole.assert(mimeType.parameters.get(\"A\") === \"b\");\n\nmimeType.parameters.set(\"Q\", \"X\");\nconsole.assert(mimeType.parameters.get(\"q\") === \"X\");\nconsole.assert(mimeType.toString() === \"x/x;a=b;c=d;e=F;q=X\");\n\n// Throws:\nmimeType.parameters.set(\"@\", \"x\");\n```\n\n### `computedMIMEType()`\n\nThe `computedMIMEType(resource, options)` function determines a resource's MIME type using the full [MIME type sniffing algorithm](https://mimesniff.spec.whatwg.org/#determining-the-computed-mime-type-of-a-resource). This includes:\n\n* complexities around how the supplied `Content-Type` header or other external information interacts with (but usually does not override) the sniffing process;\n* the ability to set a \"no-sniff\" flag, like the one used when `X-Content-Type-Options: nosniff` is present, which mostly (but not entirely) prevents sniffing; and\n* the \"Apache bug\" check which occurs when the `Content-Type` header is one of several specific values.\n\nThat is, this doesn't just implement the [rules for identifying an unknown MIME type](https://mimesniff.spec.whatwg.org/#rules-for-identifying-an-unknown-mime-type). It gives you everything you need for a full browser-compatible MIME sniffing procedure.\n\n#### Arguments\n\n* **`resource`** (`Uint8Array`): The resource bytes.\n* **`options.contentTypeHeader`** (`string`): The Content-Type header value, for HTTP resources.\n* **`options.providedType`** (`string`): The MIME type from the filesystem or another protocol (like FTP), for non-HTTP resources.\n* **`options.noSniff`** (`boolean`, default `false`): Whether the `X-Content-Type-Options: nosniff` header was present.\n* **`options.isSupported`** (`function`, default `() => true`): A predicate called with a `MIMEType` instance to check if an image/audio/video MIME type is supported by the user agent. If it returns `false`, sniffing is skipped for that type.\n\nThe `contentTypeHeader` and `providedType` options will be stringified, so you could also supply a `MIMEType` (or a [Node.js `util` module `MIMEType`](https://nodejs.org/api/util.html#class-utilmimetype)).\n\n#### Return value\n\nA `MIMEType` instance representing the computed MIME type.\n", "node_modules/parse5/README.md": "<p align=\"center\">\n    <a href=\"https://github.com/inikulin/parse5\">\n        <img src=\"https://raw.github.com/inikulin/parse5/master/media/logo.png\" alt=\"parse5\" />\n    </a>\n</p>\n\n<div align=\"center\">\n<h1>parse5</h1>\n<i><b>HTML parser and serializer.</b></i>\n</div>\n<br>\n\n<div align=\"center\">\n<code>npm install --save parse5</code>\n</div>\n<br>\n\n<p align=\"center\">\n  \ud83d\udcd6 <a href=\"https://parse5.js.org/modules/parse5.html\"><b>Documentation</b></a> \ud83d\udcd6\n</p>\n\n---\n\n<p align=\"center\">\n  <a href=\"https://github.com/inikulin/parse5/tree/master/docs/list-of-packages.md\">List of parse5 toolset packages</a>\n</p>\n\n<p align=\"center\">\n    <a href=\"https://github.com/inikulin/parse5\">GitHub</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"http://astexplorer.net/#/1CHlCXc4n4\">Online playground</a>\n</p>\n\n<p align=\"center\">\n    <a href=\"https://github.com/inikulin/parse5/releases\">Changelog</a>\n</p>\n", "node_modules/whatwg-url/LICENSE.txt": "The MIT License (MIT)\n\nCopyright (c) Sebastian Mayr\n\nPermission is hereby granted, free of charge, to any person obtaining a copy\nof this software and associated documentation files (the \"Software\"), to deal\nin the Software without restriction, including without limitation the rights\nto use, copy, modify, merge, publish, distribute, sublicense, and/or sell\ncopies of the Software, and to permit persons to whom the Software is\nfurnished to do so, subject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in\nall copies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,\nFITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\nAUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\nLIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\nOUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN\nTHE SOFTWARE.\n", "node_modules/whatwg-url/README.md": "\ufeff# whatwg-url\n\nwhatwg-url is a full implementation of the WHATWG [URL Standard](https://url.spec.whatwg.org/). It can be used standalone, but it also exposes a lot of the internal algorithms that are useful for integrating a URL parser into a project like [jsdom](https://github.com/jsdom/jsdom).\n\n## Specification conformance\n\nwhatwg-url is currently up to date with the URL spec up to commit [b6b3251](https://github.com/whatwg/url/commit/b6b3251fe911ab33d68fb051efe0e4d39ae4145e).\n\nFor `file:` URLs, whose [origin is left unspecified](https://url.spec.whatwg.org/#concept-url-origin), whatwg-url chooses to use a new opaque origin (which serializes to `\"null\"`).\n\n## API\n\n### The `URL` and `URLSearchParams` classes\n\nThe main API is provided by the [`URL`](https://url.spec.whatwg.org/#url-class) and [`URLSearchParams`](https://url.spec.whatwg.org/#interface-urlsearchparams) exports, which follows the spec's behavior in all ways (including e.g. `USVString` conversion). Most consumers of this library will want to use these.\n\n### Low-level URL Standard API\n\nThe following methods are exported for use by places like jsdom that need to implement things like [`HTMLHyperlinkElementUtils`](https://html.spec.whatwg.org/#htmlhyperlinkelementutils). They mostly operate on or return an \"internal URL\" or [\"URL record\"](https://url.spec.whatwg.org/#concept-url) type.\n\n- [URL parser](https://url.spec.whatwg.org/#concept-url-parser): `parseURL(input, { baseURL, encoding = \"UTF-8\" })`\n- [Basic URL parser](https://url.spec.whatwg.org/#concept-basic-url-parser): `basicURLParse(input, { baseURL, url, stateOverride, encoding = \"UTF-8\" })`\n- [URL serializer](https://url.spec.whatwg.org/#concept-url-serializer): `serializeURL(urlRecord, excludeFragment)`\n- [Host serializer](https://url.spec.whatwg.org/#concept-host-serializer): `serializeHost(hostFromURLRecord)`\n- [URL path serializer](https://url.spec.whatwg.org/#url-path-serializer): `serializePath(urlRecord)`\n- [Serialize an integer](https://url.spec.whatwg.org/#serialize-an-integer): `serializeInteger(number)`\n- [Origin](https://url.spec.whatwg.org/#concept-url-origin) [serializer](https://html.spec.whatwg.org/multipage/origin.html#ascii-serialisation-of-an-origin): `serializeURLOrigin(urlRecord)`\n- [Set the username](https://url.spec.whatwg.org/#set-the-username): `setTheUsername(urlRecord, usernameString)`\n- [Set the password](https://url.spec.whatwg.org/#set-the-password): `setThePassword(urlRecord, passwordString)`\n- [Has an opaque path](https://url.spec.whatwg.org/#url-opaque-path): `hasAnOpaquePath(urlRecord)`\n- [Cannot have a username/password/port](https://url.spec.whatwg.org/#cannot-have-a-username-password-port): `cannotHaveAUsernamePasswordPort(urlRecord)`\n- [Percent decode bytes](https://url.spec.whatwg.org/#percent-decode): `percentDecodeBytes(uint8Array)`\n- [Percent decode a string](https://url.spec.whatwg.org/#string-percent-decode): `percentDecodeString(string)`\n\nThe `stateOverride` parameter is one of the following strings:\n\n- [`\"scheme start\"`](https://url.spec.whatwg.org/#scheme-start-state)\n- [`\"scheme\"`](https://url.spec.whatwg.org/#scheme-state)\n- [`\"no scheme\"`](https://url.spec.whatwg.org/#no-scheme-state)\n- [`\"special relative or authority\"`](https://url.spec.whatwg.org/#special-relative-or-authority-state)\n- [`\"path or authority\"`](https://url.spec.whatwg.org/#path-or-authority-state)\n- [`\"relative\"`](https://url.spec.whatwg.org/#relative-state)\n- [`\"relative slash\"`](https://url.spec.whatwg.org/#relative-slash-state)\n- [`\"special authority slashes\"`](https://url.spec.whatwg.org/#special-authority-slashes-state)\n- [`\"special authority ignore slashes\"`](https://url.spec.whatwg.org/#special-authority-ignore-slashes-state)\n- [`\"authority\"`](https://url.spec.whatwg.org/#authority-state)\n- [`\"host\"`](https://url.spec.whatwg.org/#host-state)\n- [`\"hostname\"`](https://url.spec.whatwg.org/#hostname-state)\n- [`\"port\"`](https://url.spec.whatwg.org/#port-state)\n- [`\"file\"`](https://url.spec.whatwg.org/#file-state)\n- [`\"file slash\"`](https://url.spec.whatwg.org/#file-slash-state)\n- [`\"file host\"`](https://url.spec.whatwg.org/#file-host-state)\n- [`\"path start\"`](https://url.spec.whatwg.org/#path-start-state)\n- [`\"path\"`](https://url.spec.whatwg.org/#path-state)\n- [`\"opaque path\"`](https://url.spec.whatwg.org/#cannot-be-a-base-url-path-state)\n- [`\"query\"`](https://url.spec.whatwg.org/#query-state)\n- [`\"fragment\"`](https://url.spec.whatwg.org/#fragment-state)\n\nThe URL record type has the following API:\n\n- [`scheme`](https://url.spec.whatwg.org/#concept-url-scheme)\n- [`username`](https://url.spec.whatwg.org/#concept-url-username)\n- [`password`](https://url.spec.whatwg.org/#concept-url-password)\n- [`host`](https://url.spec.whatwg.org/#concept-url-host)\n- [`port`](https://url.spec.whatwg.org/#concept-url-port)\n- [`path`](https://url.spec.whatwg.org/#concept-url-path) (as an array of strings, or a string)\n- [`query`](https://url.spec.whatwg.org/#concept-url-query)\n- [`fragment`](https://url.spec.whatwg.org/#concept-url-fragment)\n\nThese properties should be treated with care, as in general changing them will cause the URL record to be in an inconsistent state until the appropriate invocation of `basicURLParse` is used to fix it up. You can see examples of this in the URL Standard, where there are many step sequences like \"4. Set context object\u2019s url\u2019s fragment to the empty string. 5. Basic URL parse _input_ with context object\u2019s url as _url_ and fragment state as _state override_.\" In between those two steps, a URL record is in an unusable state.\n\nThe return value of \"failure\" in the spec is represented by `null`. That is, functions like `parseURL` and `basicURLParse` can return _either_ a URL record _or_ `null`.\n\n### `whatwg-url/webidl2js-wrapper` module\n\nThis module exports the `URL` and `URLSearchParams` [interface wrappers API](https://github.com/jsdom/webidl2js#for-interfaces) generated by [webidl2js](https://github.com/jsdom/webidl2js).\n\n## Development instructions\n\nFirst, install [Node.js](https://nodejs.org/). Then, fetch the dependencies of whatwg-url, by running from this directory:\n\n    npm install\n\nTo run tests:\n\n    npm test\n\nTo generate a coverage report:\n\n    npm run coverage\n\nTo build and run the live viewer:\n\n    npm run prepare\n    npm run build-live-viewer\n\nServe the contents of the `live-viewer` directory using any web server.\n\n## Supporting whatwg-url\n\nThe jsdom project (including whatwg-url) is a community-driven project maintained by a team of [volunteers](https://github.com/orgs/jsdom/people). You could support us by:\n\n- [Getting professional support for whatwg-url](https://tidelift.com/subscription/pkg/npm-whatwg-url?utm_source=npm-whatwg-url&utm_medium=referral&utm_campaign=readme) as part of a Tidelift subscription. Tidelift helps making open source sustainable for us while giving teams assurances for maintenance, licensing, and security.\n- Contributing directly to the project.\n", "node_modules/xmlchars/README.md": "Utilities for determining whether characters belong to character classes defined\nby the XML specs.\n\n## Organization\n\nIt used to be that the library was contained in a single file and you could just\nimport/require/what-have-you the `xmlchars` module. However, that setup did not\nwork well for people who cared about code optimization. Importing `xmlchars`\nmeant importing *all* of the library and because of the way the code was\ngenerated there was no way to shake the resulting code tree.\n\nDifferent modules cover different standards. At the time this documentation was\nlast updated, we had:\n\n* `xmlchars/xml/1.0/ed5` which covers XML 1.0 edition 5.\n* `xmlchars/xml/1.0/ed4` which covers XML 1.0 edition 4.\n* `xmlchars/xml/1.1/ed2` which covers XML 1.0 edition 2.\n* `xmlchars/xmlns/1.0/ed3` which covers XML Namespaces 1.0 edition 3.\n\n## Features\n\nThe \"things\" each module contains can be categorized as follows:\n\n1. \"Fragments\": these are parts and pieces of regular expressions that\ncorrespond to the productions defined in the standard that the module\ncovers. You'd use these to *build regular expressions*.\n\n2. Regular expressions that correspond to the productions defined in the\nstandard that the module covers.\n\n3. Lists: these are arrays of characters that correspond to the productions.\n\n4. Functions that test code points to verify whether they fit a production.\n", "node_modules/xml-name-validator/LICENSE.txt": "                                 Apache License\n                           Version 2.0, January 2004\n                        http://www.apache.org/licenses/\n\n   TERMS AND CONDITIONS FOR USE, REPRODUCTION, AND DISTRIBUTION\n\n   1. Definitions.\n\n      \"License\" shall mean the terms and conditions for use, reproduction,\n      and distribution as defined by Sections 1 through 9 of this document.\n\n      \"Licensor\" shall mean the copyright owner or entity authorized by\n      the copyright owner that is granting the License.\n\n      \"Legal Entity\" shall mean the union of the acting entity and all\n      other entities that control, are controlled by, or are under common\n      control with that entity. For the purposes of this definition,\n      \"control\" means (i) the power, direct or indirect, to cause the\n      dir
