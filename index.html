            <div class=\"week-content\">\n              <div class=\"topic-box\">\n                <h4>Research Methods in Anthropology</h4>\n                <ul>\n                  <li>Fieldwork: Malinowski as pioneer \u2014 prolonged stay, learning local language, participant observation</li>\n                  <li>Participant observation: emic vs etic perspectives; reflexivity; observer's paradox</li>\n                  <li>Ethnographic methods: interview (structured, semi-structured, unstructured), genealogical method (Rivers), life history method, case study, network analysis</li>\n                  <li>PRA (Participatory Rural Appraisal) and RRA (Rapid Rural Appraisal) \u2014 tools used in development projects</li>\n                  <li>Sampling: random, stratified, purposive, snowball, quota \u2014 when to use each</li>\n                  <li>Triangulation: using multiple methods to validate findings</li>\n                  <li>Ethics: informed consent, anonymity, IRB approval, FPIC (Free Prior Informed Consent) for tribal communities</li>\n                </ul>\n                <div class=\"daily-note\">\u23f1 1.5 hrs theory \u2014 focus on concept identification, not deep theory</div>\n              </div>\n              <div class=\"topic-box rust\">\n                <h4>Basic Statistics & Applied Anthropology</h4>\n                <ul>\n                  <li>Measures of central tendency: mean, median, mode \u2014 when each is appropriate</li>\n                  <li>Measures of dispersion: range, standard deviation, variance</li>\n                  <li>Chi-square test: for categorical data association, formula \u03c7\u00b2=\u03a3(O-E)\u00b2/E, degrees of freedom</li>\n                  <li>Correlation coefficient (Pearson's r): strength and direction of linear relationship</li>\n                  <li>Null hypothesis vs alternative hypothesis; p-value; Type I and Type II errors</li>\n                  <li><strong>Applied Anthropology:</strong> Action anthropology (Tax), Development anthropology, Advocacy anthropology, Policy-oriented research</li>\n                  <li>Forensic anthropology applications: skeletal identification, age/sex/ancestry estimation, trauma analysis, bite mark analysis</li>\n                  <li>Medical anthropology: explanatory models of illness (Kleinman), ethno-medicine, biocultural approach to disease</li>\n                </ul>\n                <div class=\"daily-note\">\ud83d\udcdd Practice 5 chi-square calculations manually \u2014 understand the logic, not just the formula</div>\n              </div>\n            </div>\n          </div>\n\n          <!-- WEEK 12 -->\n          <div class=\"week-block\">\n            <div class=\"week-label\">Week 12 \u2014 Paper 1 Intensive & Remaining Units (Days 82\u201390)</div>\n            <div class=\"week-content\">\n              <div class=\"topic-box forest\">\n                <h4>Religion, Ritual, Economic & Political Anthropology</h4>\n                <ul>\n                  <li><strong>Religion:</strong> Tylor's animism, Frazer's magic vs religion, Durkheim's sacred/profane and elementary forms, Malinowski's function of religion, Weber's Protestantism & capitalism</li>\n                  <li><strong>Ritual:</strong> Van Gennep's rites of passage (separation \u2192 liminality \u2192 incorporation), Turner's communitas and anti-structure, sacrifice theory (Hubert & Mauss)</li>\n                  <li><strong>Economic Anthropology:</strong> Mauss's The Gift, Polanyi's substantivism vs Formalism debate (Leclair), Kula ring, Potlatch, modes of exchange \u2014 reciprocity (generalised, balanced, negative), redistribution, market exchange</li>\n                  <li><strong>Political Anthropology:</strong> Evans-Pritchard's Nuer (acephalous society), Fortes & Evans-Pritchard's African Political Systems, Band-Tribe-Chiefdom-State typology (Service), Segmentary lineage system</li>\n                  <li><strong>Ecological Anthropology:</strong> Steward's cultural ecology, cultural core concept, Rappaport's Pigs for Ancestors (ritual regulation of ecosystem)</li>\n                </ul>\n                <div class=\"daily-note\">\u23f1 3 hrs \u2014 these units are medium yield but consistently present; don't skip</div>\n              </div>\n              <div class=\"topic-box slate\" id=\"paper1topics\">\n                <h4>Paper 1: Key Topics to Target</h4>\n                <ul>\n                  <li><strong>Teaching Aptitude:</strong> Levels of teaching (memory, understanding, reflective), Methods (lecture, seminar, project, problem-solving), ICT in education, evaluation techniques, formative vs summative assessment</li>\n                  <li><strong>Research Aptitude:</strong> Types of research (basic, applied, action, descriptive, experimental), Steps in research, Hypothesis, Variables (dependent/independent/confounding), Research design</li>\n                  <li><strong>Logical Reasoning:</strong> Syllogisms, analogy, series completion, coding-decoding, blood relations \u2014 practice 20 per day</li>\n                  <li><strong>Data Interpretation:</strong> Bar graphs, pie charts, tables, line graphs \u2014 quick calculation practice</li>\n                  <li><strong>Mathematical Reasoning:</strong> Number series, ratios, percentages, average, profit-loss \u2014 at arithmetic level only</li>\n                  <li><strong>ICT:</strong> Computer basics, internet, e-learning, digital libraries, cyber security basics</li>\n                  <li><strong>Environment:</strong> Biodiversity, greenhouse gases, sustainable development, key international conventions (Kyoto, Paris, CBD)</li>\n                  <li><strong>Higher Education:</strong> UGC, NAAC, NBA, NEP 2020 key provisions, Acts governing universities</li>\n                </ul>\n                <div class=\"daily-note\">\ud83d\udcdd Paper 1 deserves 1.5 hrs daily this week \u2014 it's 100 marks most aspirants waste</div>\n              </div>\n            </div>\n          </div>\n\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 6: MONTH 4 -->\n<div class=\"section\" id=\"month4\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">06</div>\n      <div class=\"section-title-block\">\n        <h2>Month 4 \u2014 Revision, Mock Drilling & Peak Performance</h2>\n        <div class=\"divider\"></div>\n        <p>Weeks 13\u201316: Transforming knowledge into exam marks through aggressive practice</p>\n      </div>\n    </div>\n\n    <div class=\"month-grid\">\n      <div class=\"month-card\">\n        <div class=\"month-header\">\n          <div class=\"month-num-block\"><div class=\"mnum\">4</div><div class=\"mlabel\">Month</div></div>\n          <div class=\"month-header-info\">\n            <h3>Accelerated Revision, Error Elimination & Exam Simulation</h3>\n            <div class=\"month-theme\">\"No new learning \u2014 only sharpening what you know into surgical precision\"</div>\n            <div class=\"month-goal\">Target: Score 215\u2013230+/300 consistently in full mocks by Week 15 \u2014 actual cutoff is ~210 for General</div>\n          </div>\n        </div>\n        <div class=\"month-body\">\n\n          <div class=\"week-block\">\n            <div class=\"week-label\">Week 13 \u2014 Rapid Revision Blitz (Days 91\u201397)</div>\n            <div class=\"week-content\">\n              <div class=\"topic-box\">\n                <h4>Revision Strategy</h4>\n                <ul>\n                  <li>Day 91: Revise all evolution notes + fossil flash cards (3 hrs) + 30 PYQs from evolution</li>\n                  <li>Day 92: Revise all genetics notes + H-W problems (2 hrs) + 25 PYQs genetics</li>\n                  <li>Day 93: Revise entire theory table \u2014 all theorists, schools, key works (3 hrs) + 40 PYQs theory</li>\n                  <li>Day 94: Revise kinship diagrams + marriage types (2 hrs) + 30 PYQs kinship</li>\n                  <li>Day 95: Revise Indian tribes + PVTG list + constitutional provisions (3 hrs) + 25 PYQs Indian Anthropology</li>\n                  <li>Day 96: Revise archaeology period-site table + dating methods (2 hrs) + 25 PYQs archaeology</li>\n                  <li>Day 97: Revise research methods + stats + applied anthropology (2 hrs) + Full Paper 1 mock</li>\n                </ul>\n                <div class=\"daily-note\">\ud83c\udfaf Use the \"Look away and recall\" technique \u2014 read a page, close it, write everything you remember</div>\n              </div>\n              <div class=\"topic-box rust\">\n                <h4>Error Log Management</h4>\n                <ul>\n                  <li>By now your error log should have 200\u2013300 entries \u2014 this IS your personal exam guide</li>\n                  <li>Categorise errors: Conceptual confusion / Never learned / Silly mistake / Trap question</li>\n                  <li>Conceptual confusion errors: revisit source material, make one clean comparison note</li>\n                  <li>Never learned: if low frequency topic, read it once and mark \"awareness level only\"</li>\n                  <li>Trap questions: document the exact trap \u2014 examiners repeat the same traps</li>\n                  <li>Revise error log every morning for 20 minutes \u2014 this alone is worth 15\u201320 marks on exam day</li>\n                </ul>\n                <div class=\"daily-note\">\ud83d\udcdd Colour-code your error log by unit \u2014 spot your weakest units visually</div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"week-block\">\n            <div class=\"week-label\">Week 14 \u2014 PYQ Deep Dive & Pattern Recognition (Days 98\u2013104)</div>\n            <div class=\"week-content\">\n              <div class=\"topic-box forest\">\n                <h4>PYQ Drilling Protocol</h4>\n                <ul>\n                  <li>Solve last 10 years (2013\u20132024) in chronological order \u2014 notice how repeat concepts evolve in how they're asked</li>\n                  <li>2013 paper: heavy on evolution and classical theory \u2014 foundational knowledge</li>\n                  <li>2016\u20132018 papers: increased Indian anthropology questions \u2014 tribal movements, constitutional articles</li>\n                  <li>2019\u20132022 papers: more genetics, molecular anthropology, and research methods emerging</li>\n                  <li>2023\u20132024 papers: post-modern theory, feminist anthropology, applied themes increasing</li>\n                  <li>Track: which 10 theorists appear in every paper \u2014 these are your guaranteed questions</li>\n                  <li>Track: which fossil comparisons are repeated \u2014 A. afarensis vs A. africanus is perennial</li>\n                </ul>\n                <div class=\"daily-note\">\u23f1 2 full PYQ papers per day (Paper 1 + Paper 2) \u2014 score and analyse immediately</div>\n              </div>\n              <div class=\"topic-box slate\">\n                <h4>Trap Question Patterns to Know</h4>\n                <ul>\n                  <li>Confusing Malinowski's functionalism with Radcliffe-Brown's structural functionalism \u2014 a very common trap</li>\n                  <li>\"Who coined the term X\" \u2014 examiners love testing original coinages: Tylor coined \"Culture\", Mauss coined \"Gift\", Boas coined \"cultural relativism\"</li>\n                  <li>Schedule 5 vs Schedule 6 \u2014 confused by almost 60% of aspirants; know every distinction</li>\n                  <li>Morgan's kinship terminology vs his evolutionary stages \u2014 separate these clearly</li>\n                  <li>C-14 half-life: some questions say 5568 years (original Libby), some say 5730 (corrected) \u2014 know both</li>\n                  <li>Alliance theory vs descent theory proponents \u2014 L\u00e9vi-Strauss = Alliance; Fortes/Evans-Pritchard = Descent</li>\n                  <li>Ethnography of Speaking (Hymes) vs Ethnomethodology (Garfinkel) \u2014 commonly confused</li>\n                </ul>\n                <div class=\"daily-note\">\ud83d\udcdd Compile a \"Trap Traps\" document \u2014 50 common wrong-answer patterns</div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"week-block\">\n            <div class=\"week-label\">Week 15 \u2014 Full Mock Exam Marathon (Days 105\u2013111)</div>\n            <div class=\"week-content\">\n              <div class=\"topic-box\">\n                <h4>Mock Marathon Protocol</h4>\n                <ul>\n                  <li>Do 1 complete mock (Paper 1 + Paper 2) every day under strict exam conditions \u2014 3 hours, no interruptions, phone away</li>\n                  <li>Target score: 175\u2013200/300 consistently \u2014 if you're hitting this, qualification is certain</li>\n                  <li>Time management practice: allocate 70 min for Paper 1, 110 min for Paper 2; review in remaining 40 min</li>\n                  <li>In Paper 2: start with your strongest unit (likely theory or biology) \u2014 build momentum and confidence early</li>\n                  <li>Mark questions in 3 categories: \u2713 Confident | ? Unsure (attempt) | \u2717 Skip (attempt at end)</li>\n                  <li>Post-mock review: spend 45 minutes analysing each wrong answer \u2014 never just score and move on</li>\n                </ul>\n                <div class=\"daily-note\">\ud83c\udfaf 7 full mocks in 7 days = 700 questions of exam simulation \u2014 irreplaceable preparation</div>\n              </div>\n              <div class=\"topic-box rust\">\n                <h4>Score Trend Analysis</h4>\n                <ul>\n                  <li>Track your daily scores on a graph \u2014 a rising trend means the preparation is working</li>\n                  <li>Your target is 215\u2013225/300 in mocks by Week 15 \u2014 the actual cutoff is ~210 for General category</li>\n                  <li>If a specific unit's accuracy is below 60% after 14 mocks \u2014 do a targeted 90-min emergency revision of that unit</li>\n                  <li>Identify your \"signature wrong answers\" \u2014 questions that you consistently get wrong despite reviewing</li>\n                  <li>Note your time per question \u2014 if averaging more than 90 seconds/question, practice faster decision-making</li>\n                  <li>Your Paper 1 vs Paper 2 split should be approximately 80\u201385/100 in P1 and 130\u2013145/200 in P2 for safe qualification</li>\n                </ul>\n                <div class=\"daily-note\">\ud83d\udcca A score graph motivates and reveals patterns \u2014 maintain it religiously</div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"week-block\">\n            <div class=\"week-label\">Week 16 \u2014 Final Polish & Exam Day Readiness (Days 112\u2013120)</div>\n            <div class=\"week-content\">\n              <div class=\"topic-box forest\">\n                <h4>Last 7 Days Protocol</h4>\n                <ul>\n                  <li>Day 112\u2013113: Only revise \u2014 no new learning, no new mocks. Read your entire summary notes once</li>\n                  <li>Day 114: Revise error log + theory comparison table + kinship diagrams</li>\n                  <li>Day 115: Revise fossil table + PVTG list + dating methods + constitutional provisions</li>\n                  <li>Day 116: Do 1 gentle half-mock (60 questions) to stay sharp without burning out</li>\n                  <li>Day 117: Rest day \u2014 light reading of summary notes only. Sleep 8 hours.</li>\n                  <li>Day 118 (Exam eve): Read only your one-liners and flash cards. Eat well. Sleep by 10 PM. Lay out your documents.</li>\n                  <li>Exam Day: Wake up 2 hours early. Light breakfast. Read one-liners once. Arrive 45 min before exam.</li>\n                </ul>\n                <div class=\"daily-note\">\ud83c\udfaf Trust your preparation. Anxiety loses marks \u2014 confidence earns them.</div>\n              </div>\n              <div class=\"topic-box slate\">\n                <h4>Exam Day Attempt Strategy</h4>\n                <ul>\n                  <li>Read instructions calmly for 2 minutes \u2014 check serial number alignment, dark circles properly</li>\n                  <li>Attempt Paper 1 first in your mental allocation \u2014 50 questions in 65\u201370 minutes, move on</li>\n                  <li>Paper 2: start with highest-confidence unit; skip no questions (no negative marking!)</li>\n                  <li>For guesses: eliminate 2 wrong options, choose between remaining 2 \u2014 statistical advantage</li>\n                  <li>If stuck on a question for 90+ seconds, mark your best guess and move \u2014 return if time permits</li>\n                  <li>Last 10 minutes: verify all bubbles are correctly filled; check for any unmarked questions</li>\n                  <li>Target: 145+ questions attempted with 70\u201375% accuracy = qualification secured (cutoff ~210/300)</li>\n                  <li>In Paper 2 alone: aim for 140+/200 to ensure you clear even with a moderate Paper 1 score</li>\n                </ul>\n                <div class=\"daily-note\">\ud83d\udcdd At 70% accuracy on 150 questions = 225 marks \u2014 well above the ~210 cutoff with buffer</div>\n              </div>\n            </div>\n          </div>\n\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 7: DAILY SCHEDULE -->\n<div class=\"section\" id=\"daily\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">07</div>\n      <div class=\"section-title-block\">\n        <h2>The Non-Negotiable Daily Schedule</h2>\n        <div class=\"divider\"></div>\n        <p>5.5\u20136 hours daily, structured for maximum retention and sustainability</p>\n      </div>\n    </div>\n\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 24px;\">\n      <div>\n        <h3 style=\"font-family: 'Playfair Display', serif; color: var(--gold-light); margin-bottom: 16px; font-size: 1.1rem;\">Weekday Schedule (Mon\u2013Fri)</h3>\n        <table class=\"schedule-table\">\n          <thead><tr><th>Time Slot</th><th>Activity</th><th>Duration</th></tr></thead>\n          <tbody>\n            <tr><td class=\"time-col\">6:00 \u2013 6:20 AM</td><td>Review previous day's error log + flash cards</td><td>20 min</td></tr>\n            <tr><td class=\"time-col\">6:20 \u2013 9:00 AM</td><td>Deep theory reading (fresh morning mind)</td><td>2.5 hrs</td></tr>\n            <tr><td class=\"time-col\">9:00 \u2013 9:30 AM</td><td>Breakfast break (no studying)</td><td>30 min</td></tr>\n            <tr><td class=\"time-col\">9:30 \u2013 11:00 AM</td><td>MCQ practice from current week's unit</td><td>1.5 hrs</td></tr>\n            <tr><td class=\"time-col\">11:00 AM \u2013 1:00 PM</td><td>Free / other commitments / rest</td><td>2 hrs</td></tr>\n            <tr><td class=\"time-col\">1:00 \u2013 2:30 PM</td><td>PYQ drilling (focused on high-priority topics)</td><td>1.5 hrs</td></tr>\n            <tr><td class=\"time-col\">2:30 \u2013 4:00 PM</td><td>Nap / break (critical for memory consolidation)</td><td>\u2014</td></tr>\n            <tr><td class=\"time-col\">4:00 \u2013 5:00 PM</td><td>Note-making / summary writing / diagrams</td><td>1 hr</td></tr>\n            <tr><td class=\"time-col\">5:00 \u2013 6:00 PM</td><td>Paper 1 practice (do not neglect this)</td><td>1 hr</td></tr>\n            <tr><td class=\"time-col\">9:00 \u2013 9:30 PM</td><td>Night review: next day planning + light reading</td><td>30 min</td></tr>\n          </tbody>\n        </table>\n      </div>\n      <div>\n        <h3 style=\"font-family: 'Playfair Display', serif; color: var(--gold-light); margin-bottom: 16px; font-size: 1.1rem;\">Weekend Schedule (Sat\u2013Sun)</h3>\n        <table class=\"schedule-table\">\n          <thead><tr><th>Time Slot</th><th>Activity</th><th>Duration</th></tr></thead>\n          <tbody>\n            <tr><td class=\"time-col\">7:00 \u2013 7:30 AM</td><td>Flash card and one-liner review</td><td>30 min</td></tr>\n            <tr><td class=\"time-col\">7:30 \u2013 10:30 AM</td><td>Full mock test (Paper 1 + partial Paper 2)</td><td>3 hrs</td></tr>\n            <tr><td class=\"time-col\">10:30 \u2013 11:30 AM</td><td>Mock analysis \u2014 categorise every wrong answer</td><td>1 hr</td></tr>\n            <tr><td class=\"time-col\">11:30 AM \u2013 1:00 PM</td><td>Targeted revision of weakest topic from mock</td><td>1.5 hrs</td></tr>\n            <tr><td class=\"time-col\">2:00 \u2013 4:00 PM</td><td>Complete the unit you couldn't finish on weekdays</td><td>2 hrs</td></tr>\n            <tr><td class=\"time-col\">4:00 \u2013 5:00 PM</td><td>PVTG / theory table active recall drill</td><td>1 hr</td></tr>\n            <tr><td class=\"time-col\">Evening</td><td>Rest \u2014 social time, no guilt. Brain needs to reset.</td><td>\u2014</td></tr>\n          </tbody>\n        </table>\n        <div class=\"callout\" style=\"margin-top: 16px;\">\n          <p><strong>Weekly non-negotiables:</strong> 1 full mock test minimum, error log updated, theory comparison table reviewed, PVTG list rehearsed, and 1 hour of Paper 1 practice every single day without exception.</p>\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 8: THEORY QUICK-REF -->\n<div class=\"section\" id=\"theories\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">08</div>\n      <div class=\"section-title-block\">\n        <h2>Theorist Quick-Reference Master Sheet</h2>\n        <div class=\"divider\"></div>\n        <p>Every major theorist, their school, key concept, and key work \u2014 the exam's most tested territory</p>\n      </div>\n    </div>\n\n    <div class=\"theorist-grid\">\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Edward Burnett Tylor</div><div class=\"theorist-school\">Unilinear Evolutionism</div><p>Defined culture as \"complex whole\"; coined Animism as earliest religion; theory of Survivals (remnants of earlier cultural stages)</p><div class=\"theorist-works\">Primitive Culture (1871) \u00b7 Anthropology (1881)</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Lewis Henry Morgan</div><div class=\"theorist-school\">Unilinear Evolutionism</div><p>Savagery\u2192Barbarism\u2192Civilization stages; first systematic study of kinship; classified kinship into descriptive and classificatory</p><div class=\"theorist-works\">Ancient Society (1877) \u00b7 Systems of Consanguinity (1871)</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">James George Frazer</div><div class=\"theorist-school\">Evolutionism / Armchair</div><p>Magic\u2192Religion\u2192Science evolution; Contagious and Imitative magic; Golden Bough as comparative mythology masterwork</p><div class=\"theorist-works\">The Golden Bough (1890) \u00b7 Totemism & Exogamy</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Franz Boas</div><div class=\"theorist-school\">Historical Particularism</div><p>Cultural relativism; critique of unilinear evolution; each culture must be understood in its own terms; 4-field approach to anthropology</p><div class=\"theorist-works\">The Mind of Primitive Man (1911) \u00b7 Race, Language & Culture</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Bronis\u0142aw Malinowski</div><div class=\"theorist-school\">Biopsychological Functionalism</div><p>7 basic needs theory; long-term participant observation pioneer; Kula ring analysis; charter myth theory</p><div class=\"theorist-works\">Argonauts of Western Pacific \u00b7 Crime & Custom in Savage Society</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">A.R. Radcliffe-Brown</div><div class=\"theorist-school\">Structural Functionalism</div><p>Society as organism; social structure as primary unit; synchronic analysis; kinship as total social phenomenon</p><div class=\"theorist-works\">Andaman Islanders \u00b7 Structure & Function in Primitive Society</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Claude L\u00e9vi-Strauss</div><div class=\"theorist-school\">Structuralism</div><p>Binary oppositions; deep structures of culture and myth; alliance theory in kinship; Savage Mind \u2014 bricoleur concept</p><div class=\"theorist-works\">Elementary Structures of Kinship \u00b7 Mythologiques \u00b7 Totemism \u00b7 La Pens\u00e9e Sauvage</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Clifford Geertz</div><div class=\"theorist-school\">Interpretive / Symbolic</div><p>Thick description; culture as text; religion as cultural system; anti-relativism; Balinese cock fight analysis</p><div class=\"theorist-works\">Interpretation of Cultures (1973) \u00b7 Islam Observed \u00b7 Works & Lives</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Victor Turner</div><div class=\"theorist-school\">Symbolic / Process</div><p>Liminality (threshold state); communitas (unstructured fellowship); anti-structure; social drama; symbols as multivocal</p><div class=\"theorist-works\">Forest of Symbols \u00b7 Ritual Process \u00b7 Drums of Affliction</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Marcel Mauss</div><div class=\"theorist-school\">French Sociology</div><p>The Gift \u2014 three obligations: give, receive, reciprocate; total social fact; body techniques; mana concept</p><div class=\"theorist-works\">The Gift (1925) \u00b7 Techniques of the Body</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Ruth Benedict</div><div class=\"theorist-school\">Culture & Personality</div><p>Patterns of culture; Apollonian (Pueblo) vs Dionysian (Kwakiutl) culture patterns; cultural configuration</p><div class=\"theorist-works\">Patterns of Culture (1934) \u00b7 The Chrysanthemum & the Sword</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Margaret Mead</div><div class=\"theorist-school\">Culture & Personality</div><p>Cultural determinism of gender roles; adolescence as cultural not biological; critiqued by Freeman</p><div class=\"theorist-works\">Coming of Age in Samoa (1928) \u00b7 Sex & Temperament (1935)</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Julian Steward</div><div class=\"theorist-school\">Cultural Ecology</div><p>Multilinear evolution; culture core (techno-economic elements); levels of sociocultural integration; culture-environment interaction</p><div class=\"theorist-works\">Theory of Culture Change (1955) \u00b7 Area Research</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Leslie White</div><div class=\"theorist-school\">Neo-Evolutionism</div><p>Culture as energy capture: E \u00d7 T \u2192 C; Basic Law: culture evolves as energy harnessing increases; symbolate concept</p><div class=\"theorist-works\">The Science of Culture (1949) \u00b7 Evolution of Culture</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Pierre Bourdieu</div><div class=\"theorist-school\">Practice Theory</div><p>Habitus (internalized dispositions); field (structured social space); capitals (economic, social, cultural, symbolic); doxa</p><div class=\"theorist-works\">Outline of a Theory of Practice (1977) \u00b7 Distinction \u00b7 Logic of Practice</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">E.E. Evans-Pritchard</div><div class=\"theorist-school\">British Structural-Functionalism</div><p>Nuer acephalous society; segmentary lineage system; witchcraft beliefs as rational; social anthropology vs ethnology distinction</p><div class=\"theorist-works\">Witchcraft, Oracles & Magic Among Azande \u00b7 The Nuer \u00b7 Kinship & Marriage Among Nuer</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Meyer Fortes</div><div class=\"theorist-school\">Descent Theory</div><p>Descent theory vs alliance theory debate; complementary filiation; domestic vs politico-jural domains; jural perspective on kinship</p><div class=\"theorist-works\">Web of Kinship Among Tallensi \u00b7 Kinship & Social Order</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Fredrik Barth</div><div class=\"theorist-school\">Transactionalism / Processualism</div><p>Ethnic boundaries maintained by interaction not isolation; ethnic identity as process; transactionalist model of human action</p><div class=\"theorist-works\">Ethnic Groups & Boundaries (1969) \u00b7 Models of Social Organisation</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Arnold van Gennep</div><div class=\"theorist-school\">Ritual Studies</div><p>Rites of passage: separation \u2192 liminal period (margin) \u2192 incorporation (aggregation); universal cross-cultural pattern</p><div class=\"theorist-works\">Rites of Passage (1909)</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Marshall Sahlins</div><div class=\"theorist-school\">Economic Anthropology / Neo-Evolution</div><p>Original affluent society (hunter-gatherers); three modes of reciprocity; critique of Western economic rationality in tribal contexts</p><div class=\"theorist-works\">Stone Age Economics (1972) \u00b7 Culture & Practical Reason</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Karl Polanyi</div><div class=\"theorist-school\">Substantivism</div><p>Economy embedded in society; three forms of integration: reciprocity, redistribution, market exchange; critique of market economy universalism</p><div class=\"theorist-works\">The Great Transformation (1944) \u00b7 Trade & Market in Early Empires</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Arjun Appadurai</div><div class=\"theorist-school\">Globalization / Cultural Studies</div><p>Five scapes of global cultural flows: ethnoscapes, mediascapes, technoscapes, financescapes, ideoscapes; disjuncture of global economy</p><div class=\"theorist-works\">Modernity at Large (1996) \u00b7 The Social Life of Things</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">Sherry Ortner</div><div class=\"theorist-school\">Feminist Anthropology / Practice Theory</div><p>Woman/nature :: Man/culture argument; universal subordination of women; connects Bourdieu and Geertz; practice theory synthesis</p><div class=\"theorist-works\">Making Gender (1996) \u00b7 Anthropology & Social Theory</div></div>\n      <div class=\"theorist-card\"><div class=\"theorist-name\">\u00c9mile Durkheim</div><div class=\"theorist-school\">French Sociology / Functionalism</div><p>Sacred/profane distinction; elementary forms of religious life; totemism as first religion; mechanical vs organic solidarity; collective effervescence</p><div class=\"theorist-works\">Elementary Forms of Religious Life (1912) \u00b7 Division of Labour in Society</div></div>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 9: HUMAN EVOLUTION DETAIL -->\n<div class=\"section\" id=\"evolution\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">09</div>\n      <div class=\"section-title-block\">\n        <h2>Human Evolution \u2014 Fossil Reference Guide</h2>\n        <div class=\"divider\"></div>\n        <p>Complete fossil-to-feature-to-site mapping \u2014 the most tested unit in Paper 2</p>\n      </div>\n    </div>\n\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 28px;\">\n      <div>\n        <h3 style=\"font-family:'Playfair Display',serif; color:var(--gold-light); margin-bottom:16px; font-size:1.1rem;\">Hominid Evolutionary Timeline</h3>\n        <div class=\"fossil-timeline\">\n          <div class=\"fossil-item\">\n            <div class=\"fossil-mya\">~7 MYA \u2014 Chad</div>\n            <h4>Sahelanthropus tchadensis</h4>\n            <p>Oldest known hominid; found by Michel Brunet; small canines, foramen magnum position suggests bipedalism; nicknamed \"Touma\u00ef\"</p>\n          </div>\n          <div class=\"fossil-item\">\n            <div class=\"fossil-mya\">~6 MYA \u2014 Kenya</div>\n            <h4>Orrorin tugenensis</h4>\n            <p>Found by Brigitte Senut & Martin Pickford; femoral anatomy suggests bipedalism; called \"Millennium Man\"</p>\n          </div>\n          <div class=\"fossil-item\">\n            <div class=\"fossil-mya\">~4.4 MYA \u2014 Ethiopia</div>\n            <h4>Ardipithecus ramidus</h4>\n            <p>Found by Tim White; \"Ardi\" specimen (ARA-VP-6/500); facultative biped; small canines; woodland habitat (challenges savanna hypothesis)</p>\n          </div>\n          <div class=\"fossil-item\">\n            <div class=\"fossil-mya\">~3.9\u20132.9 MYA \u2014 Ethiopia, Tanzania</div>\n            <h4>Australopithecus afarensis</h4>\n            <p>\"Lucy\" (AL-288-1) found by Donald Johanson; knee joint confirms bipedalism; laetoli footprints (3.6 MYA); small brain ~450cc; Hadar, Ethiopia; gracile</p>\n          </div>\n          <div class=\"fossil-item\">\n            <div class=\"fossil-mya\">~3.3\u20132.1 MYA \u2014 South Africa</div>\n            <h4>Australopithecus africanus</h4>\n            <p>\"Taung Child\" found by Raymond Dart (1924); first African hominid fossil; gracile; Sterkfontein, Makapansgat sites</p>\n          </div>\n          <div class=\"fossil-item\">\n            <div class=\"fossil-mya\">~2.7\u20131.2 MYA \u2014 East & South Africa</div>\n            <h4>Paranthropus robustus & boisei</h4>\n            <p>Robust australopithecines; massive sagittal crest; large molars for tough plant food; P. boisei found by Mary Leakey at Olduvai (1959) \u2014 \"Nutcracker Man\" / Zinjanthropus</p>\n          </div>\n          <div class=\"fossil-item\">\n            <div class=\"fossil-mya\">~2.4\u20131.4 MYA \u2014 East Africa</div>\n            <h4>Homo habilis</h4>\n            <p>First Homo; \"handy man\"; associated with Oldowan tools; ~600cc brain; found by Louis & Mary Leakey at Olduvai Gorge; Homo habilis formal name by Leakey, Tobias & Napier (1964)</p>\n          </div>\n          <div class=\"fossil-item\">\n            <div class=\"fossil-mya\">~1.89\u20130.14 MYA \u2014 Africa, Asia, Europe</div>\n            <h4>Homo erectus</h4>\n            <p>Java Man (Dubois, 1891) & Peking Man (Davidson Black, 1927); first to leave Africa; Acheulean tools; controlled fire; ~900cc brain; Sangiran site (Java), Zhoukoudian (China)</p>\n          </div>\n          <div class=\"fossil-item\">\n            <div class=\"fossil-mya\">~700,000\u2013200,000 BP</div>\n            <h4>Archaic Homo sapiens / H. heidelbergensis</h4>\n            <p>Transitional; Mauer mandible (Germany, 1907); Boxgrove (UK); large brain ~1200cc; used Acheulean tools; hunted large game; ancestor of both Neanderthals and modern humans</p>\n          </div>\n          <div class=\"fossil-item\">\n            <div class=\"fossil-mya\">~430,000\u201340,000 BP \u2014 Europe, W. Asia</div>\n            <h4>Homo neanderthalensis</h4>\n            <p>Neanderthal Valley, Germany (1856); robust build for cold climate; Mousterian tools; evidence of burial, ochre use, symbolic behavior; 1\u20134% DNA in non-African modern humans (interbreeding proven)</p>\n          </div>\n          <div class=\"fossil-item\">\n            <div class=\"fossil-mya\">~300,000 BP \u2014 Present</div>\n            <h4>Homo sapiens</h4>\n            <p>Jebel Irhoud, Morocco (oldest H. sapiens, ~315,000 BP); Omo Kibish, Ethiopia (~195,000 BP); fully modern behavior ~70,000 BP (Upper Palaeolithic revolution); global dispersal from Africa</p>\n          </div>\n        </div>\n      </div>\n      <div>\n        <h3 style=\"font-family:'Playfair Display',serif; color:var(--gold-light); margin-bottom:16px; font-size:1.1rem;\">Evolutionary Trends to Memorise</h3>\n        <div class=\"genetics-grid\" style=\"grid-template-columns: 1fr;\">\n          <div class=\"gen-card\">\n            <h4>Brain Size Progression</h4>\n            <p>A. afarensis (~450cc) \u2192 H. habilis (~600cc) \u2192 H. erectus (~900cc) \u2192 H. heidelbergensis (~1200cc) \u2192 H. neanderthalensis (~1450cc) \u2192 H. sapiens (~1350cc avg)</p>\n            <div class=\"gen-formula\">Note: Neanderthals had LARGER average brain than modern humans</div>\n          </div>\n          <div class=\"gen-card\">\n            <h4>Tool Industries Sequence</h4>\n            <p>Oldowan (Mode 1) \u2192 Acheulean (Mode 2) \u2192 Mousterian (Mode 3) \u2192 Upper Palaeolithic (Mode 4: blades) \u2192 Microlithic (Mode 5)</p>\n            <div class=\"gen-formula\">Oldowan = H. habilis | Acheulean = H. erectus | Mousterian = Neanderthal</div>\n          </div>\n          <div class=\"gen-card\">\n            <h4>Anatomical Evolutionary Trends</h4>\n            <p>Increased cranial capacity \u00b7 Reduced prognathism \u00b7 Reduction in tooth and jaw size \u00b7 Loss of sagittal crest \u00b7 Chin development (only in H. sapiens) \u00b7 Foramen magnum shifts to center \u00b7 Brow ridges reduce \u00b7 Femur angles change for bipedalism</p>\n          </div>\n          <div class=\"gen-card\">\n            <h4>Bipedalism Evidence</h4>\n            <p>Valgus knee, angled femur, adducted hallux, arched foot, S-curved spine, bowl-shaped pelvis, centrally-placed foramen magnum, shorter arms relative to legs</p>\n            <div class=\"gen-formula\">Laetoli footprints (3.6 MYA) = earliest confirmed bipedalism evidence</div>\n          </div>\n          <div class=\"gen-card\">\n            <h4>Out of Africa \u2014 Key Evidence</h4>\n            <p>Mitochondrial DNA studies show common female ancestor ~150,000 BP in Africa. Y-chromosome Adam ~200,000+ BP. Complete replacement model vs admixture model. Modern non-Africans carry 1\u20134% Neanderthal DNA \u2014 proving some interbreeding.</p>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 10: KINSHIP -->\n<div class=\"section\" id=\"kinship\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">10</div>\n      <div class=\"section-title-block\">\n        <h2>Kinship & Marriage Systems \u2014 Master Reference</h2>\n        <div class=\"divider\"></div>\n        <p>The single most confusing unit for aspirants \u2014 made clear and exam-ready</p>\n      </div>\n    </div>\n\n    <table class=\"kinship-table\">\n      <thead>\n        <tr>\n          <th>System / Type</th>\n          <th>Definition</th>\n          <th>Examples / Who Uses</th>\n          <th>Key Theorist</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr><td>Patrilineal Descent</td><td>Descent traced through father's line; membership in father's kin group; property and name pass through males</td><td>Nuer (Sudan), Tallensi (Ghana), most caste groups in North India</td><td>Fortes, Evans-Pritchard</td></tr>\n        <tr><td>Matrilineal Descent</td><td>Descent through mother's line; a man's heirs are his sister's sons, not his own children</td><td>Nayar (Kerala), Khasi (Meghalaya), Minangkabau, Ashanti (Ghana)</td><td>Audrey Richards, Kathleen Gough</td></tr>\n        <tr><td>Bilateral Descent</td><td>Descent from both mother and father's line; ego-centred kindred; no permanent groups formed</td><td>Most modern Western societies, Eskimo / Inuit, many Filipino groups</td><td>Goodenough</td></tr>\n        <tr><td>Double / Bilineal Descent</td><td>Both patrilineal AND matrilineal groups coexist for different purposes (e.g., property through father, ritual through mother)</td><td>Yako of Nigeria (Forde), Herero of Namibia</td><td>Daryll Forde</td></tr>\n        <tr><td>Eskimo Kinship Terminology</td><td>Nuclear family distinguished from other relatives; cousins all called \"cousin\" regardless of side; used in bilateral societies</td><td>Euro-Americans, Inuit</td><td>Morgan's classification</td></tr>\n        <tr><td>Hawaiian Kinship Terminology</td><td>All relatives of same sex and generation called same term; most generational, least lineal</td><td>Hawaii, Polynesia; associated with ambilineal descent</td><td>Morgan</td></tr>\n        <tr><td>Iroquois Kinship Terminology</td><td>Parallel cousins = siblings; cross-cousins distinguished; associated with unilineal descent + cross-cousin marriage</td><td>Iroquois, many Indian tribal groups</td><td>Morgan, L\u00e9vi-Strauss</td></tr>\n        <tr><td>Crow Kinship Terminology</td><td>Matrilineal; father's sister's children (patrilateral cross-cousins) classified with father's generation</td><td>Crow Nation, many matrilineal societies</td><td>Lounsbury</td></tr>\n        <tr><td>Omaha Kinship Terminology</td><td>Patrilineal; mother's brother's children classified with mother's generation; mirror of Crow</td><td>Omaha, many patrilineal societies including several Indian tribes</td><td>Lounsbury</td></tr>\n        <tr><td>Sudanese Kinship Terminology</td><td>Most descriptive; every relative has a distinct term; associated with complex stratified societies</td><td>Sudanese Arabs, Romans historically</td><td>Morgan</td></tr>\n        <tr><td>Cross-cousin Marriage</td><td>Marriage between father's sister's child OR mother's brother's child; creates alliances between groups</td><td>Dravidian South India, many tribal groups</td><td>L\u00e9vi-Strauss (alliance theory)</td></tr>\n        <tr><td>Parallel Cousin Marriage</td><td>Marriage between father's brother's child or mother's sister's child; generally prohibited in most cultures; preferential among some Arab groups</td><td>Arab Muslims (FBD marriage), Bedouin</td><td>Murphy & Kasdan</td></tr>\n        <tr><td>Levirate Marriage</td><td>Widow marries deceased husband's brother; ensures continuation of lineage and protection of widow</td><td>Nuer (Sudan), traditional Jewish law, many patrilineal societies</td><td>Evans-Pritchard</td></tr>\n        <tr><td>Sororate Marriage</td><td>Widower marries deceased wife's sister; maintains alliance between the two kin groups</td><td>Many Native American groups, some South Asian communities</td><td>Lowie</td></tr>\n        <tr><td>Fraternal Polyandry</td><td>Woman married to two or more brothers simultaneously; limits land fragmentation</td><td>Toda (Nilgiris, India), Tibetan plateau communities</td><td>W.H.R. Rivers (Todas)</td></tr>\n        <tr><td>Ghost Marriage</td><td>Marriage in name of a dead man to continue lineage; wife's children belong to dead man's lineage</td><td>Nuer (Sudan)</td><td>Evans-Pritchard</td></tr>\n      </tbody>\n    </table>\n  </div>\n</div>\n\n<!-- SECTION 11: GENETICS -->\n<div class=\"section\" id=\"genetics\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">11</div>\n      <div class=\"section-title-block\">\n        <h2>Genetics & Molecular Anthropology \u2014 Concept Reference</h2>\n        <div class=\"divider\"></div>\n        <p>All key formulae, concepts and facts needed for genetics questions</p>\n      </div>\n    </div>\n\n    <div class=\"genetics-grid\">\n      <div class=\"gen-card\">\n        <h4>Hardy-Weinberg Equilibrium</h4>\n        <p>Allele frequencies remain constant generation to generation in absence of evolutionary forces. Five conditions: no mutation, random mating, no natural selection, large population, no gene flow</p>\n        <div class=\"gen-formula\">p\u00b2 + 2pq + q\u00b2 = 1 &nbsp;|&nbsp; p + q = 1</div>\n      </div>\n      <div class=\"gen-card\">\n        <h4>ABO Blood Group System</h4>\n        <p>Three alleles: I\u1d2c (dominant), I\u1d2e (dominant), i (recessive). Type AB = codominance. Universal donor: O (ii). Universal recipient: AB. Rh+ indicates presence of D antigen.</p>\n        <div class=\"gen-formula\">I\u1d2c I\u1d2c or I\u1d2c i = Type A &nbsp;|&nbsp; I\u1d2e I\u1d2e or I\u1d2e i = Type B</div>\n      </div>\n      <div class=\"gen-card\">\n        <h4>Sickle Cell Anaemia</h4>\n        <p>HbS mutation: valine substitutes glutamic acid in beta-globin chain. HbAS (sickle cell trait): resistant to malaria. HbSS: severe anaemia. High frequency in sub-Saharan Africa and parts of India (Odisha, M.P.) \u2014 balancing selection.</p>\n        <div class=\"gen-formula\">Heterozygote advantage = Balanced Polymorphism</div>\n      </div>\n      <div class=\"gen-card\">\n        <h4>Genetic Drift</h4>\n        <p>Random change in allele frequency in small populations. Founder Effect: new population from small group (eg: Amish, island populations). Bottleneck Effect: population crash reduces genetic diversity.</p>\n        <div class=\"gen-formula\">Effect \u2191 as population size \u2193</div>\n      </div>\n      <div class=\"gen-card\">\n        <h4>mtDNA & Y-Chromosome</h4>\n        <p>mtDNA inherited only from mother \u2014 traces matrilineal lineage. Y-chromosome inherited only from father \u2014 traces patrilineal lineage. mtDNA Eve: ~150,000\u2013200,000 BP, East Africa. Y-chromosome Adam: ~200,000\u2013340,000 BP.</p>\n        <div class=\"gen-formula\">mtDNA mutation rate ~2\u20134% per million years</div>\n      </div>\n      <div class=\"gen-card\">\n        <h4>Natural Selection Types</h4>\n        <p>Directional selection: shifts mean towards one extreme. Stabilising selection: favours average phenotype (most common). Disruptive selection: favours two extreme phenotypes, against middle. Sexual selection: Darwin's mechanism.</p>\n        <div class=\"gen-formula\">Fitness (w) = relative reproductive success</div>\n      </div>\n      <div class=\"gen-card\">\n        <h4>Gene Flow</h4>\n        <p>Transfer of alleles between populations through migration. Reduces genetic differences between populations. Clines (gradual variation in allele frequency over geographic distance) largely result from gene flow. Example: Duffy antigen (malaria resistance) cline in Africa.</p>\n        <div class=\"gen-formula\">More gene flow \u2192 populations more similar</div>\n      </div>\n      <div class=\"gen-card\">\n        <h4>Consanguinity & Inbreeding</h4>\n        <p>Coefficient of inbreeding (F): probability that both alleles at a locus are identical by descent. First cousin marriage: F = 0.0625. Uncle-niece: F = 0.125. Effects: increased homozygosity, expression of recessive disorders (inbreeding depression).</p>\n        <div class=\"gen-formula\">First cousins share 12.5% of genes on average</div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 12: ARCHAEOLOGY -->\n<div class=\"section\" id=\"archaeology\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">12</div>\n      <div class=\"section-title-block\">\n        <h2>Archaeological Sites \u2014 India Master Reference</h2>\n        <div class=\"divider\"></div>\n        <p>Period \u00b7 Site \u00b7 State \u00b7 Excavator \u00b7 Distinctive Features \u2014 all in one place</p>\n      </div>\n    </div>\n\n    <div class=\"sites-grid\">\n      <div class=\"site-card\"><div class=\"site-name\">Bhimbetka</div><div class=\"site-period\">Lower Palaeolithic \u2192 Mesolithic | Madhya Pradesh</div><p>Rock shelters with cave paintings; discovered by V.S. Wakankar (1957\u201358); UNESCO World Heritage Site; paintings depict hunting, dancing, animals</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Attirampakkam</div><div class=\"site-period\">Lower Palaeolithic | Tamil Nadu</div><p>Acheulean tools; excavated by Prehistoric Unit, ASI; evidence of early human activity in South India ~1.5 MYA according to recent studies</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Langhnaj</div><div class=\"site-period\">Mesolithic | Gujarat</div><p>Human burials with microliths; H.D. Sankalia's excavations; evidence of proto-Neolithic transition; pottery and animal remains found</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Bagor</div><div class=\"site-period\">Mesolithic | Rajasthan</div><p>Excavated by V.N. Misra; one of India's largest Mesolithic sites; Kothari River; evidence of mixed hunting-gathering and early herding</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Burzahom</div><div class=\"site-period\">Neolithic | Jammu & Kashmir</div><p>Pit dwellings (unique in India); domesticated dog buried with human; bone harpoons; Neolithic and later phases; excavated by De Terra & Paterson then ASI</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Mehrgarh</div><div class=\"site-period\">Neolithic / Pre-Harappan | Balochistan</div><p>Earliest farming site in South Asia (~7000 BCE); wheat, barley, cotton; mud-brick buildings; excavated by Jean-Fran\u00e7ois Jarrige</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Harappa</div><div class=\"site-period\">Mature IVC | Punjab, Pakistan</div><p>First IVC site excavated (1921); Daya Ram Sahni; Ravi River; two mounds (AB + F); granaries; inscribed seals; workers' quarters</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Mohenjo-daro</div><div class=\"site-period\">Mature IVC | Sindh, Pakistan</div><p>R.D. Banerji (1922); \"Mound of the Dead\"; Great Bath; College or Granary; bronze Dancing Girl; Priest-King statue; 40,000 residents at peak</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Dholavira</div><div class=\"site-period\">IVC | Gujarat, India</div><p>R.S. Bisht; unique 3-part town plan (citadel, middle town, lower town); elaborate water conservation system; 10-sign inscription (largest IVC inscription); UNESCO site (2021)</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Lothal</div><div class=\"site-period\">Mature IVC | Gujarat, India</div><p>A.R. Rao (1954\u201362); world's earliest known dockyard; bead-making factory; double-burial; rice husks found; unique warehouse structure</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Kalibangan</div><div class=\"site-period\">Early & Mature IVC | Rajasthan</div><p>B.B. Lal & B.K. Thapar; fire altars (earliest evidence of fire worship); ploughed field (earliest in world); pre-Harappan phase documented</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Rakhigarhi</div><div class=\"site-period\">IVC | Haryana, India</div><p>Amarendra Nath; largest IVC site in Indian territory (covering ~350 hectares); recent DNA study (2019) on ancient skeleton \u2014 significant genetic findings</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Inamgaon</div><div class=\"site-period\">Chalcolithic (Jorwe phase) | Maharashtra</div><p>M.K. Dhavalikar; well-preserved Chalcolithic village; evidence of social hierarchy in burial patterns; pre-Harappan and Malwa phases; storage pits</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Brahmagiri</div><div class=\"site-period\">Neolithic \u2192 Megalithic \u2192 Iron Age | Karnataka</div><p>Mortimer Wheeler (1947); three sequential cultural periods in one site; establishes South Indian prehistoric sequence; dolmens, stone circles</p></div>\n      <div class=\"site-card\"><div class=\"site-name\">Adichanallur</div><div class=\"site-period\">Iron Age / Megalithic | Tamil Nadu</div><p>Urn burials; iron objects; early Tamil culture; ~3000 urns found; recent excavations (2018) pushed date back to 1000 BCE</p></div>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 13: TRIBES -->\n<div class=\"section\" id=\"tribes\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">13</div>\n      <div class=\"section-title-block\">\n        <h2>Particularly Vulnerable Tribal Groups (PVTGs)</h2>\n        <div class=\"divider\"></div>\n        <p>All 75 PVTGs by state \u2014 the most memorization-intensive but high-scoring topic in Indian Anthropology</p>\n      </div>\n    </div>\n\n    <div class=\"callout\">\n      <p><strong>Criteria for PVTG designation:</strong> Pre-agricultural level of technology \u00b7 Stagnant or declining population \u00b7 Extremely low literacy \u00b7 Subsistence economy \u00b7 Originally identified in 1973 (52 groups by Dhebar Commission); expanded to 75 in 1993</p>\n    </div>\n\n    <div class=\"pvtg-grid\" style=\"margin-top: 24px;\">\n      <!-- Andaman & Nicobar -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Great Andamanese</div><div class=\"state\">Andaman & Nicobar Islands</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Jarawa</div><div class=\"state\">Andaman & Nicobar Islands</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Onge</div><div class=\"state\">Andaman & Nicobar Islands</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Sentinelese</div><div class=\"state\">Andaman & Nicobar Islands</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Shompen</div><div class=\"state\">Andaman & Nicobar Islands</div></div>\n      <!-- Andhra Pradesh -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Bodo Gadaba</div><div class=\"state\">Andhra Pradesh / Odisha</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Chenchu</div><div class=\"state\">Andhra Pradesh / Telangana</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Gutob Gadaba</div><div class=\"state\">Andhra Pradesh</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Khond Porja</div><div class=\"state\">Andhra Pradesh</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Kondareddi</div><div class=\"state\">Andhra Pradesh</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Saora / Sora</div><div class=\"state\">Andhra Pradesh / Odisha</div></div>\n      <!-- Chhattisgarh -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Abujhmaria</div><div class=\"state\">Chhattisgarh</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Baiga</div><div class=\"state\">Chhattisgarh / M.P. / Jharkhand</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Birhor</div><div class=\"state\">Jharkhand / Chhattisgarh</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Kamar</div><div class=\"state\">Chhattisgarh</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Paharia (Sauria/Mal)</div><div class=\"state\">Jharkhand / Chhattisgarh</div></div>\n      <!-- Gujarat -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Kathodia/Kotwalia</div><div class=\"state\">Gujarat</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Padhar</div><div class=\"state\">Gujarat</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Siddi</div><div class=\"state\">Gujarat / Karnataka / Goa</div></div>\n      <!-- Himachal Pradesh -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Lahaula</div><div class=\"state\">Himachal Pradesh</div></div>\n      <!-- Jharkhand -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Asur</div><div class=\"state\">Jharkhand</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Birjia</div><div class=\"state\">Jharkhand</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Birhore (Birhor)</div><div class=\"state\">Jharkhand</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Hill Kharia</div><div class=\"state\">Jharkhand</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Korwa</div><div class=\"state\">Jharkhand / Chhattisgarh</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Mal Paharia</div><div class=\"state\">Jharkhand</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Sauria Paharia</div><div class=\"state\">Jharkhand</div></div>\n      <!-- Karnataka -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Jenu Kuruba</div><div class=\"state\">Karnataka</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Koraga</div><div class=\"state\">Karnataka / Kerala</div></div>\n      <!-- Kerala -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Cholanaikkan</div><div class=\"state\">Kerala</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Kadar</div><div class=\"state\">Kerala</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Kurumba (Kurumbas)</div><div class=\"state\">Kerala / Tamil Nadu</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Paniyans</div><div class=\"state\">Kerala</div></div>\n      <!-- Madhya Pradesh -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Baiga</div><div class=\"state\">M.P. / Chhattisgarh</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Bharia</div><div class=\"state\">M.P.</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Saharia</div><div class=\"state\">M.P. / Rajasthan</div></div>\n      <!-- Manipur -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Maram Naga</div><div class=\"state\">Manipur</div></div>\n      <!-- Meghalaya & NE -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Reang / Bru</div><div class=\"state\">Tripura / Mizoram</div></div>\n      <!-- Odisha -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Bondo Poraja</div><div class=\"state\">Odisha</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Didayi</div><div class=\"state\">Odisha</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Dongaria Kondh</div><div class=\"state\">Odisha</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Hill Kharia (Odisha)</div><div class=\"state\">Odisha</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Juang</div><div class=\"state\">Odisha</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Kutia Kondh</div><div class=\"state\">Odisha</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Lanjia Saura</div><div class=\"state\">Odisha</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Lodha / Lodhi</div><div class=\"state\">Odisha / W.Bengal</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Mankirdia</div><div class=\"state\">Odisha</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Paudi Bhuiyan</div><div class=\"state\">Odisha</div></div>\n      <!-- Rajasthan -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Saharia</div><div class=\"state\">Rajasthan / M.P.</div></div>\n      <!-- Tamil Nadu -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Irula</div><div class=\"state\">Tamil Nadu / Kerala</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Kattunaicken</div><div class=\"state\">Tamil Nadu</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Kota</div><div class=\"state\">Tamil Nadu</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Kurumba</div><div class=\"state\">Tamil Nadu</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Paliyar</div><div class=\"state\">Tamil Nadu</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Toda</div><div class=\"state\">Tamil Nadu (Nilgiris)</div></div>\n      <!-- Tripura -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Reang</div><div class=\"state\">Tripura</div></div>\n      <!-- Uttarakhand -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Buksa</div><div class=\"state\">Uttarakhand</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Raji</div><div class=\"state\">Uttarakhand</div></div>\n      <!-- West Bengal -->\n      <div class=\"pvtg-item\"><div class=\"tribe\">Birhor</div><div class=\"state\">W.Bengal / Jharkhand</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Lodha</div><div class=\"state\">W.Bengal / Odisha</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Savar</div><div class=\"state\">W.Bengal / Odisha</div></div>\n      <div class=\"pvtg-item\"><div class=\"tribe\">Toto</div><div class=\"state\">W.Bengal (Alipurduar)</div></div>\n    </div>\n\n    <div class=\"callout\" style=\"margin-top: 28px;\">\n      <p><strong>Exam tip:</strong> Questions often ask about specific PVTGs and their states. The Andaman tribes (Sentinelese, Jarawa, Onge) appear in almost every exam. Toda (polyandry), Chenchu (Andhra), Dongaria Kondh (Niyamgiri mining controversy), and Birhor (itinerant hunter-gatherers) are recurring favourites.</p>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 14: PAPER 1 -->\n<div class=\"section\" id=\"paper1\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">14</div>\n      <div class=\"section-title-block\">\n        <h2>Paper 1 \u2014 Complete Coverage Guide</h2>\n        <div class=\"divider\"></div>\n        <p>100 marks that most aspirants sacrifice \u2014 don't make that mistake</p>\n      </div>\n    </div>\n\n    <div class=\"callout warning\">\n      <p><strong>Paper 1 is Non-Negotiable:</strong> With a cutoff of ~210/300, you cannot afford to score below <strong>80/100 in Paper 1</strong>. That means you need roughly 130+/200 in Paper 2 as well \u2014 both papers must be strong. Most aspirants score only 60\u201365 in Paper 1 through neglect, which forces them to score an unrealistic 150+/200 in Paper 2. Balance is essential. Target: <strong>82\u201385/100 in Paper 1</strong>.</p>\n    </div>\n\n    <div class=\"paper1-grid\" style=\"margin-top: 24px;\">\n      <div class=\"p1-card\">\n        <h4>Unit I: Teaching Aptitude</h4>\n        <ul>\n          <li>Teaching: Levels (memory, understanding, reflective), Maxims of teaching, Characteristics of good teacher</li>\n          <li>Methods: Lecture, Discussion, Demonstration, Problem-solving, Project, Seminar, Workshop</li>\n          <li>Bloom's Taxonomy: Knowledge \u2192 Comprehension \u2192 Application \u2192 Analysis \u2192 Synthesis \u2192 Evaluation</li>\n          <li>Student-centred vs teacher-centred learning; constructivism (Piaget, Vygotsky)</li>\n          <li>Classroom management, motivation theories (Maslow's hierarchy), learning styles (VAK model)</li>\n          <li>Formative assessment (ongoing) vs Summative assessment (final); criterion vs norm-referenced</li>\n        </ul>\n      </div>\n      <div class=\"p1-card\">\n        <h4>Unit II: Research Aptitude</h4>\n        <ul>\n          <li>Types: Basic/Pure, Applied, Action research, Descriptive, Experimental, Historical</li>\n          <li>Research process: Problem identification \u2192 Review \u2192 Hypothesis \u2192 Design \u2192 Data collection \u2192 Analysis \u2192 Conclusion</li>\n          <li>Variables: Independent, Dependent, Extraneous/Confounding, Control</li>\n          <li>Hypothesis: Null (H\u2080) vs Alternative (H\u2081), directional vs non-directional</li>\n          <li>Validity (internal vs external) and Reliability \u2014 key concepts for MCQ</li>\n          <li>Research designs: Survey, Case study, Experimental, Quasi-experimental, Action research</li>\n        </ul>\n      </div>\n      <div class=\"p1-card\">\n        <h4>Unit III\u2013IV: Comprehension & Communication</h4>\n        <ul>\n          <li>Reading comprehension: 5 questions on an unseen passage \u2014 practice inference and vocabulary questions</li>\n          <li>Communication: Verbal and non-verbal, formal vs informal, barriers to communication</li>\n          <li>Types: Intrapersonal, Interpersonal, Group, Mass communication</li>\n          <li>Effective communication: feedback, clarity, empathy, timing, channel appropriateness</li>\n          <li>Classroom communication: questioning techniques, active listening</li>\n        </ul>\n      </div>\n      <div class=\"p1-card\">\n        <h4>Unit V\u2013VI: Mathematical & Logical Reasoning</h4>\n        <ul>\n          <li>Number series, Letter series \u2014 spot the pattern</li>\n          <li>Blood relations: 5\u20136 relationships chain problems</li>\n          <li>Direction sense, seating arrangements</li>\n          <li>Syllogisms: All A is B type \u2014 use Venn diagrams to solve visually</li>\n          <li>Coding-decoding: letter shift patterns</li>\n          <li>Analogies: word :: word type \u2014 identify the relationship category</li>\n        </ul>\n      </div>\n      <div class=\"p1-card\">\n        <h4>Unit VII: Data Interpretation</h4>\n        <ul>\n          <li>Bar graphs, pie charts, line graphs, tables \u2014 read carefully before attempting</li>\n          <li>Percentage change = (New\u2013Old)/Old \u00d7 100</li>\n          <li>Ratio and proportion calculations</li>\n          <li>Common traps: units (thousands vs lakhs), reading the question accurately</li>\n          <li>Practice 2 DI sets daily \u2014 speed and accuracy matter here</li>\n        </ul>\n      </div>\n      <div class=\"p1-card\">\n        <h4>Unit VIII: ICT Basics</h4>\n        <ul>\n          <li>Computer fundamentals: hardware vs software, input/output devices, RAM vs ROM, CPU, GPU</li>\n          <li>Internet: URL, HTTP/HTTPS, IP address, browser, search engine algorithms basics</li>\n          <li>E-learning: MOOCs, LMS, Swayam, NPTEL (NTA often asks about Indian digital education initiatives)</li>\n          <li>Digital libraries: Shodhganga (theses), e-PG Pathshala, NDL (National Digital Library)</li>\n          <li>Cybersecurity: phishing, malware, firewall, encryption basics</li>\n          <li>Social media literacy, digital rights, net neutrality basics</li>\n        </ul>\n      </div>\n      <div class=\"p1-card\">\n        <h4>Unit IX: Environment & Development</h4>\n        <ul>\n          <li>Biodiversity: hotspots (India has 4), endemic species, IUCN Red List categories</li>\n          <li>Greenhouse gases: CO\u2082, CH\u2084, N\u2082O, H\u2082O, O\u2083 \u2014 sources and warming potential</li>\n          <li>Conventions: Kyoto Protocol (1997), Paris Agreement (2015, 1.5\u00b0C target), CBD (1992 Rio), CITES, Ramsar</li>\n          <li>Sustainable Development Goals (SDGs): 17 goals, 2030 agenda \u2014 know goals 1,4,13,15</li>\n          <li>Pollution types, environmental impact assessment, carbon footprint</li>\n          <li>India-specific: Project Tiger, Project Elephant, Biosphere Reserves, MAB Programme</li>\n        </ul>\n      </div>\n      <div class=\"p1-card\">\n        <h4>Unit X: Higher Education System</h4>\n        <ul>\n          <li>UGC: functions, establishment (1956), grants, NET/SLET authority</li>\n          <li>NAAC: accreditation process, grades (A++, A+, A, B++, B+, B, C, D), CGPA</li>\n          <li>NBA: technical programme accreditation; NIRF Rankings</li>\n          <li>NEP 2020: key provisions \u2014 multidisciplinary, 5+3+3+4 school structure, GER targets, credit transfer, internationalisation</li>\n          <li>Types of universities: Central, State, Deemed, Private; autonomous colleges</li>\n          <li>Research institutions: IITs, IISc, CSIR labs, ICSSR (social sciences), ICHR (history)</li>\n        </ul>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 15: MOCK TESTS -->\n<div class=\"section\" id=\"mock\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">15</div>\n      <div class=\"section-title-block\">\n        <h2>Mock Test Schedule \u2014 16 Weeks</h2>\n        <div class=\"divider\"></div>\n        <p>Progressive mock testing \u2014 from unit tests to full exam simulations</p>\n      </div>\n    </div>\n\n    <div class=\"mock-calendar\">\n      <div class=\"mock-week\"><div class=\"wk\">Week 1\u20132</div><div class=\"tests\">1</div><div class=\"detail\">End-of-unit test (Bio Anthropology only) \u00b7 40 Qs \u00b7 Timed</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 3</div><div class=\"tests\">1</div><div class=\"detail\">Primatology + Genetics combined \u00b7 40 Qs \u00b7 Analyse errors</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 4</div><div class=\"tests\">2</div><div class=\"detail\">First FULL mock (P1+P2) \u00b7 Score benchmark + Paper 1 standalone</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 5\u20136</div><div class=\"tests\">1</div><div class=\"detail\">Theory-focused mock \u00b7 50 Qs from all theory schools</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 7</div><div class=\"tests\">1</div><div class=\"detail\">Kinship & marriage focussed \u00b7 40 Qs \u00b7 Diagram-identification types</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 8</div><div class=\"tests\">2</div><div class=\"detail\">Full mock #2 + Indian Anthropology standalone \u00b7 50 Qs</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 9\u201310</div><div class=\"tests\">1</div><div class=\"detail\">Archaeology focused \u00b7 40 Qs \u00b7 Sites + dating methods emphasis</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 11</div><div class=\"tests\">1</div><div class=\"detail\">Research methods + stats + applied \u00b7 35 Qs</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 12</div><div class=\"tests\">2</div><div class=\"detail\">Full mock #3 + dedicated Paper 1 mock under time pressure</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 13</div><div class=\"tests\">3</div><div class=\"detail\">Full mocks Mon/Wed/Fri \u00b7 Target 165+ consistently \u00b7 Analyse every wrong Q</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 14</div><div class=\"tests\">4</div><div class=\"detail\">PYQ papers 2013, 2016, 2019, 2022 \u2014 timed, full simulation</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 15</div><div class=\"tests\">7</div><div class=\"detail\">1 full mock per day \u2014 exam simulation week \u00b7 Target 180+</div></div>\n      <div class=\"mock-week\"><div class=\"wk\">Week 16</div><div class=\"tests\">1</div><div class=\"detail\">1 gentle half-mock on Day 116 \u00b7 Rest mode for final 4 days</div></div>\n    </div>\n\n    <div class=\"callout success\" style=\"margin-top: 28px;\">\n      <p><strong>Total mocks over 4 months: ~27\u201330 tests.</strong> With a real cutoff of ~210/300, mock performance is your truest indicator. If you're consistently hitting 215+ in mocks by Week 14, you are ready. If you're at 190\u2013210, identify the gap units immediately \u2014 you have time to close them. If below 190 by Week 14, extend daily study to 7+ hours and drop low-priority units entirely.</p>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 16: RESOURCES -->\n<div class=\"section\" id=\"resources\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">16</div>\n      <div class=\"section-title-block\">\n        <h2>Resources \u2014 Curated & Ranked</h2>\n        <div class=\"divider\"></div>\n        <p>Only the books and resources that are actually aligned with UGC NET syllabus and question patterns</p>\n      </div>\n    </div>\n\n    <div class=\"resources-grid\">\n      <div class=\"resource-card\">\n        <h4><span class=\"ricon\">\ud83d\udcd7</span> Primary Textbooks (Must Have)</h4>\n        <ul>\n          <li>IGNOU MAN 001\u2013007 Study Materials \u2014 free PDFs, perfectly syllabus-aligned; the single best resource</li>\n          <li>Arihant UGC NET Anthropology \u2014 MCQ practice book, good for exam pattern exposure</li>\n          <li>Anthropology by P.K. Misra \u2014 essential for Indian Anthropology unit</li>\n          <li>Cultural Anthropology by Ember & Ember \u2014 for social & cultural concepts (don't read cover to cover, use selectively)</li>\n          <li>General Anthropology by Beals & Hoijer \u2014 good for biological units</li>\n        </ul>\n      </div>\n      <div class=\"resource-card\">\n        <h4><span class=\"ricon\">\ud83d\udcd9</span> Reference Books (Secondary)</h4>\n        <ul>\n          <li>Physical Anthropology by P. Nath \u2014 for human evolution and genetics depth</li>\n          <li>Anthropological Theory by McGee & Warms \u2014 excellent for theory history</li>\n          <li>Kinship & Marriage by Robin Fox \u2014 kinship unit clarification</li>\n          <li>Social Anthropology by Lucy Mair \u2014 accessible introduction to social concepts</li>\n          <li>Man in India journal \u2014 for contemporary Indian anthropology content</li>\n        </ul>\n      </div>\n      <div class=\"resource-card\">\n        <h4><span class=\"ricon\">\ud83d\udcbb</span> Online Resources (Free)</h4>\n        <ul>\n          <li>e-PG Pathshala Anthropology modules \u2014 free, NTA-aligned video lectures</li>\n          <li>Swayam NPTEL Anthropology courses \u2014 structured academic content</li>\n          <li>YouTube: search \"UGC NET Anthropology 2024\" \u2014 filter for channels with structured playlists</li>\n          <li>Telegram: \"UGC NET Anthropology\" groups \u2014 PYQ PDFs, current affairs updates, mock tests shared regularly</li>\n          <li>NTA official website (nta.ac.in) \u2014 previous year papers, official syllabus, answer keys</li>\n        </ul>\n      </div>\n      <div class=\"resource-card\">\n        <h4><span class=\"ricon\">\ud83d\udccb</span> Paper 1 Resources</h4>\n        <ul>\n          <li>Arihant UGC NET Paper 1 by KVS Madaan \u2014 most popular, well-structured</li>\n          <li>R. Gupta's UGC NET General Paper 1 \u2014 additional MCQ practice</li>\n          <li>Previous year Paper 1 PDFs from NTA (2013\u20132024) \u2014 essential pattern understanding</li>\n          <li>Logical reasoning apps: Indiabix.com \u2014 free, unlimited logical reasoning practice</li>\n          <li>Data interpretation: practice from any bank exam material (same question types)</li>\n        </ul>\n      </div>\n      <div class=\"resource-card\">\n        <h4><span class=\"ricon\">\ud83d\uddc2\ufe0f</span> Self-Made Study Tools</h4>\n        <ul>\n          <li>Fossil flash cards (one species per card \u2014 30 cards total)</li>\n          <li>Theory comparison master table (all schools in one spreadsheet)</li>\n          <li>Kinship terminology visual diagrams (drawn, not photocopied)</li>\n          <li>PVTG state-wise map (print blank India map and annotate)</li>\n          <li>Archaeological sites period-site-excavator table (one page)</li>\n          <li>Theorist one-liners document (150 one-liners, 2 per theorist)</li>\n          <li>Error log notebook (maintained from Week 1, reviewed daily)</li>\n          <li>Dating methods comparison card (material + range + principle per method)</li>\n        </ul>\n      </div>\n      <div class=\"resource-card\">\n        <h4><span class=\"ricon\">\u26a0\ufe0f</span> Resources to Avoid / Use Carefully</h4>\n        <ul>\n          <li>Deep reading of original ethnographic texts (Argonauts, etc.) \u2014 time drain, not exam-relevant depth</li>\n          <li>Wikipedia for definitions \u2014 often imprecise; use only for orientation then go to textbook</li>\n          <li>Random YouTube videos without checking syllabus alignment \u2014 many cover irrelevant topics</li>\n          <li>Multiple competing coaching notes \u2014 pick ONE set of notes per topic and go deep, not wide</li>\n          <li>Ignoring Paper 1 entirely \u2014 costs 100 marks; minimum 1 hr/day on Paper 1 from Week 1</li>\n        </ul>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- SECTION 17: FINAL STRATEGY -->\n<div class=\"section\" id=\"strategy\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-num\">17</div>\n      <div class=\"section-title-block\">\n        <h2>Final Strategy, Mindset & Psychological Edge</h2>\n        <div class=\"divider\"></div>\n        <p>The difference between knowing and scoring \u2014 exam psychology and strategic execution</p>\n      </div>\n    </div>\n\n    <div class=\"dodont-grid\">\n      <div class=\"do-box\">\n        <h4>\u2713 Non-Negotiable Habits to Build</h4>\n        <ul>\n          <li>Review error log every single morning before studying \u2014 20 minutes</li>\n          <li>Attempt every question on exam day (no negatives = no reason to skip)</li>\n          <li>Build your theory comparison table from Week 1, add to it every day</li>\n          <li>Do at least 30 MCQs from that day's studied topic before sleeping</li>\n          <li>Sleep minimum 7 hours every night \u2014 memory consolidation is non-negotiable</li>\n          <li>Practice active recall: close notes and write from memory, then check</li>\n          <li>One dedicated Paper 1 hour every single day \u2014 treat it like a separate exam</li>\n          <li>Maintain a scoring log across all mocks \u2014 trend visibility is motivating</li>\n          <li>Eat well, exercise at least 3x per week \u2014 physical health = cognitive performance</li>\n          <li>When a topic confuses you, draw it \u2014 visual representation unlocks understanding</li>\n        </ul>\n      </div>\n      <div class=\"dont-box\">\n        <h4>\u2717 Traps That Kill Preparations</h4>\n        <ul>\n          <li>Reading new textbooks in Month 4 \u2014 you need revision, not new inputs</li>\n          <li>Skipping Paper 1 because \"it's easy\" \u2014 it's 100 marks and it's not always easy</li>\n          <li>Spending 80% time on theory while neglecting Indian tribes and genetics</li>\n          <li>Doing mocks without analysing errors \u2014 mocks without review are useless</li>\n          <li>Panic-reading everything in the final week \u2014 trust your preparation</li>\n          <li>Using 5+ different resources simultaneously \u2014 depth over breadth always wins</li>\n          <li>Memorising without understanding \u2014 UGC NET tests concept application, not rote recall</li>\n          <li>Comparing preparation progress with others \u2014 everyone's baseline is different</li>\n          <li>Attempting the \"low-priority\" topics at the cost of high-priority revision</li>\n          <li>Sleeping less than 6 hours \u2014 you will score lower, not higher, despite more study hours</li>\n        </ul>\n      </div>\n    </div>\n\n    <div class=\"strategy-blocks\" style=\"margin-top: 32px;\">\n      <div class=\"strategy-block gold\">\n        <h4>The 80-20 Scoring Formula</h4>\n        <ul>\n          <li>Master 5 units thoroughly: Evolution, Theory, Kinship, Indian Tribes, Genetics = ~55% of Paper 2</li>\n          <li>Score 70\u201375/100 in Paper 1 = safe qualifying margin on Paper 1</li>\n          <li>Score 105\u2013115/200 in Paper 2 = well above qualifying cutoff</li>\n          <li>Combined: 175\u2013190/300 = qualification with significant margin</li>\n        </ul>\n      </div>\n      <div class=\"strategy-block rust\">\n        <h4>Exam Day Sequence</h4>\n        <ul>\n          <li>Start Paper 2 mentally first (Paper 1 is combined but do it separately)</li>\n          <li>In Paper 2: Evolution \u2192 Theory \u2192 Kinship (your strongest units first)</li>\n          <li>Never spend more than 90 seconds on one question \u2014 flag and move</li>\n          <li>Final 10 minutes: verify all blanks are filled; check answer sheet alignment</li>\n        </ul>\n      </div>\n      <div class=\"strategy-block forest\">\n        <h4>The Real Qualification Math</h4>\n        <ul>\n          <li>General category cutoff: ~210/300 (~70%) based on recent exam cycles</li>\n          <li>Safe target: 225/300 gives a 15-mark buffer above cutoff</li>\n          <li>Split to aim for: 82\u201385/100 (Paper 1) + 140\u2013145/200 (Paper 2) = 222\u2013230</li>\n          <li>This means getting ~75% of Paper 2 correct \u2014 demanding but achievable with this plan</li>\n          <li>Every unit matters at 70% \u2014 you cannot skip any unit entirely</li>\n        </ul>\n      </div>\n      <div class=\"strategy-block slate\">\n        <h4>What to Do if Exam is in 48 Hours</h4>\
