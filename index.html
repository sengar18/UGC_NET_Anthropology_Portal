egion)</div>\n          <div class=\"pe-note\">Salt workers and fishermen; Rann of Kutch; displaced by partition-era border changes; very small, economically marginalised population</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Kathodia / Kotwalia</div>\n          <div class=\"pe-state\">Gujarat (South Gujarat, Valsad)</div>\n          <div class=\"pe-note\">Bamboo artisans; forest dwellers; making tools and baskets; declining forest access has disrupted traditional livelihood</div>\n        </div>\n      </div>\n\n      <!-- SOUTH -->\n      <div class=\"pvtg-region south\" style=\"grid-column: span 1;\">\n        <div class=\"region-header\">\n          <div><div class=\"region-name\">South India</div><div class=\"region-states\">Tamil Nadu \u00b7 Kerala \u00b7 Karnataka \u00b7 AP \u00b7 Telangana</div></div>\n          <div class=\"region-count\" style=\"color:#c05030;\">16</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Toda<span class=\"pvtg-star\">\u2605</span><span class=\"pvtg-exam-tag\">EXAM HOT</span></div>\n          <div class=\"pe-state\">Tamil Nadu (Nilgiri Hills \u2014 Ooty)</div>\n          <div class=\"pe-note\">Famous for fraternal polyandry (woman married to multiple brothers); sacred buffalo herding; unique barrel-shaped temples; studied by W.H.R. Rivers (The Todas, 1906)</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Chenchu<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Andhra Pradesh \u00b7 Telangana (Nallamala Hills)</div>\n          <div class=\"pe-note\">Forest hunters and gatherers; Nagarjunasagar-Srisailam Tiger Reserve; legends in Mahabharata as Cheenchulakulam; refuse settled agriculture; studied by Furer-Haimendorf</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Irula (Irular)<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Tamil Nadu \u00b7 Kerala</div>\n          <div class=\"pe-note\">Renowned snake catchers; venom extraction for anti-venom production; tribal cooperative set up in 1978; forest food collectors and hunters</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Kota</div>\n          <div class=\"pe-state\">Tamil Nadu (Nilgiri Hills)</div>\n          <div class=\"pe-note\">One of the Nilgiri hill tribes; known for metalwork, pottery, music; bartering with Todas and Badagas historically; their musicians perform at all Nilgiri tribe ceremonies</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Cholanaikkan<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Kerala (Malappuram district)</div>\n          <div class=\"pe-note\">Cave dwellers in Silent Valley area; semi-nomadic; among the most isolated tribes in Kerala; very small population (~200); contact established only in 1970s</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Kadar</div>\n          <div class=\"pe-state\">Kerala (Thrissur, Palakkad \u2014 Anamalai hills)</div>\n          <div class=\"pe-note\">Forest dwellers; honey and minor forest produce collectors; studied by C. von Furer-Haimendorf; live along Kerala-Tamil Nadu border forests</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Koraga</div>\n          <div class=\"pe-state\">Karnataka \u00b7 Kerala (coastal belt)</div>\n          <div class=\"pe-note\">Once practiced Ajalu (untouchable status, rolling on leftover food); Supreme Court ended this practice; weavers and basket-makers; coastal Karnataka</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Jenu Kuruba</div>\n          <div class=\"pe-state\">Karnataka (Nagarhole, Kodagu)</div>\n          <div class=\"pe-note\">Honey gatherers (\"jenu\" = honey); traditional knowledge of forests; displaced by wildlife sanctuary creation; tiger reserve conflicts</div>\n        </div>\n      </div>\n\n      <!-- NORTHEAST -->\n      <div class=\"pvtg-region northeast\">\n        <div class=\"region-header\">\n          <div><div class=\"region-name\">North-East India</div><div class=\"region-states\">Assam \u00b7 Manipur \u00b7 Tripura \u00b7 Mizoram</div></div>\n          <div class=\"region-count\" style=\"color:#5a9a9a;\">5</div>\n        </div>\n        <div class=\"pvtg-entry starred\">\n          <div class=\"pe-tribe\">Reang / Bru<span class=\"pvtg-star\">\u2605</span></div>\n          <div class=\"pe-state\">Tripura \u00b7 Mizoram</div>\n          <div class=\"pe-note\">Largest PVTG displacement case in India \u2014 over 37,000 Bru refugees from Mizoram settled in Tripura after ethnic violence (1997); resettlement completed 2020</div>\n        </div>\n        <div class=\"pvtg-entry\">\n          <div class=\"pe-tribe\">Maram Naga</div>\n          <div class=\"pe-state\">Manipur (Senapati district)</div>\n          <div class=\"pe-note\">One of several Naga sub-groups; known for headhunting traditions (now historic); terrace farming; morungs (dormitory system for young men)</div>\n        </div>\n      </div>\n\n      <!-- ISLANDS -->\n      <div class=\"pvtg-region islands\" style=\"grid-column: span 2;\">\n        <div class=\"region-header\">\n          <div><div class=\"region-name\">Andaman & Nicobar Islands</div><div class=\"region-states\">5 PVTGs \u2014 Most Studied & Most Frequently Examined</div></div>\n          <div class=\"region-count\" style=\"color:#6090c0;\">5</div>\n        </div>\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px;\">\n          <div class=\"pvtg-entry starred\">\n            <div class=\"pe-tribe\">Sentinelese<span class=\"pvtg-star\">\u2605\u2605</span><span class=\"pvtg-exam-tag\">ALWAYS IN EXAM</span></div>\n            <div class=\"pe-state\">North Sentinel Island (A&N)</div>\n            <div class=\"pe-note\">Most isolated humans on Earth; reject all outside contact; Indian Navy maintains exclusion zone (3 nautical miles); 2018 \u2014 John Allen Chau missionary killed. Population unknown (~50\u2013500). Protected by Indian govt under Andaman & Nicobar Protection of Aboriginal Tribes Act.</div>\n          </div>\n          <div class=\"pvtg-entry starred\">\n            <div class=\"pe-tribe\">Jarawa<span class=\"pvtg-star\">\u2605\u2605</span><span class=\"pvtg-exam-tag\">ALWAYS IN EXAM</span></div>\n            <div class=\"pe-state\">South & Middle Andaman</div>\n            <div class=\"pe-note\">Hostile to outsiders until 1998 when first peaceful contact made. Population ~380. Hunter-gatherers. Supreme Court \"human safari\" ban along Andaman Trunk Road. Major vulnerability from disease contact.</div>\n          </div>\n          <div class=\"pvtg-entry starred\">\n            <div class=\"pe-tribe\">Onge (Ong)<span class=\"pvtg-star\">\u2605</span></div>\n            <div class=\"pe-state\">Little Andaman Island</div>\n            <div class=\"pe-state\" style=\"margin-top:2px;\">Population: ~100 (critically low)</div>\n            <div class=\"pe-note\">Semi-nomadic forest hunters; contact established; severe population decline from 1951 (~150) to today. Honey collection, pig hunting, sea turtle eggs. Critically endangered as a people.</div>\n          </div>\n          <div class=\"pvtg-entry starred\">\n            <div class=\"pe-tribe\">Great Andamanese<span class=\"pvtg-star\">\u2605</span></div>\n            <div class=\"pe-state\">Strait Island (A&N Islands)</div>\n            <div class=\"pe-state\" style=\"margin-top:2px;\">Population: ~60 (near extinction)</div>\n            <div class=\"pe-note\">Originally 10 tribes; decimated by British colonisation and disease after 1858; from ~5,000 to ~60 today. Now settled on Strait Island. Classic example of contact-induced depopulation.</div>\n          </div>\n          <div class=\"pvtg-entry starred\">\n            <div class=\"pe-tribe\">Shompen<span class=\"pvtg-star\">\u2605</span></div>\n            <div class=\"pe-state\">Great Nicobar Island</div>\n            <div class=\"pe-state\" style=\"margin-top:2px;\">Population: ~200\u2013300</div>\n            <div class=\"pe-note\">Interior forest dwellers of Great Nicobar; semi-nomadic; avoid outsiders; threatened by Great Nicobar development project (2022) \u2014 major conservation controversy. Hunter-gatherers + forest food.</div>\n          </div>\n        </div>\n      </div>\n\n    </div><!-- end pvtg-map-container -->\n\n    <div class=\"callout\" style=\"margin-top:28px;\">\n      <p><strong>How to study PVTGs for exam:</strong> Memorise in 3 tiers \u2014 (1) Islands: all 5 by heart with distinguishing features. (2) Famous-for-one-thing tribes: Toda = polyandry, Irula = snakes, Dongaria Kondh = Niyamgiri, Siddi = African origin, Birhor = rope-makers, Chenchu = Nallamala forest. (3) State-count geography: Odisha and Jharkhand have the highest number of PVTGs. Questions often test \"which tribe belongs to which state\" \u2014 this regional map structure helps anchor those associations spatially.</p>\n    </div>\n\n  </div>\n</div>\n\n<script>\n  // Flashcard flip functionality\n  let reviewedCount = 0;\n  const reviewed = new Set();\n\n  function flipCard(el) {\n    el.classList.toggle('flipped');\n    const id = el.querySelector('.fc-name').textContent;\n    if (!reviewed.has(id)) {\n      reviewed.add(id);\n      reviewedCount = reviewed.size;\n      const total = document.querySelectorAll('.flashcard-wrap:not([style*=\"display: none\"])').length;\n      document.getElementById('fc-progress').textContent =\n        `${reviewedCount} card${reviewedCount !== 1 ? 's' : ''} reviewed \u00b7 Click again to flip back`;\n    }\n  }\n\n  function filterCards(group) {\n    document.querySelectorAll('.fc-btn').forEach(b => b.classList.remove('active'));\n    event.target.classList.add('active');\n    reviewed.clear();\n    document.querySelectorAll('.flashcard-wrap').forEach(card => {\n      if (group === 'all' || card.dataset.group === group) {\n        card.style.display = '';\n        card.classList.remove('flipped');\n      } else {\n        card.style.display = 'none';\n        card.classList.remove('flipped');\n      }\n    });\n    const visible = document.querySelectorAll('.flashcard-wrap:not([style*=\"display: none\"])').length;\n    document.getElementById('fc-progress').textContent = `Showing ${visible} cards \u00b7 Click any card to flip`;\n  }\n\n  function resetCards() {\n    reviewed.clear();\n    document.querySelectorAll('.flashcard-wrap').forEach(c => {\n      c.classList.remove('flipped');\n      c.style.display = '';\n    });\n    document.querySelectorAll('.fc-btn').forEach(b => b.classList.remove('active'));\n    document.querySelector('.fc-btn').classList.add('active');\n    document.getElementById('fc-progress').textContent = 'All cards reset \u00b7 0 / 14 reviewed';\n  }\n<\/script>\n\n<footer>\n  UGC NET Anthropology \u2014 Complete 4-Month Study System \u00b7 Designed for guaranteed qualification \u00b7 Good luck, scholar.\n</footer>\n\n</body>\n</html>\n", "Implementation_Plan.md": "# PDF Integration Implementation Plan\n\n## \ud83d\udccc Overview\nThis plan outlines how the 20+ anthropological PDF files discovered in `Folder_1` and `Folder_2` will be mapped and integrated into the `anthropology.html` (or `index.html`) study portal. \n*Note: Folder_1 and Folder_2 contain identical sets of PDFs. One non-anthropology PDF (Indium selenides) has been excluded.*\n\n## \ud83d\uddfa\ufe0f Mapping Strategy\n\n### \ud83d\udfe2 Unit 1: Meaning and Scope of Anthropology\n1. **BLOCK 1.pdf**\n   * *Theme*: Introduction to Biological Anthropology.\n   * *Summary*: Defines the fundamental scope and applications of biological anthropology. It explores the holistic relationship between human biology and cultural environments.\n2. **Unit-1.pdf**\n   * *Theme*: Concept of Society and Culture.\n   * *Summary*: Investigates the core definitions and elements of human society and culture. It establishes the foundational sociological concepts necessary for anthropological study.\n\n### \ud83d\udfe2 Unit 2: Evolution and Primatology\n3. **MANI-002B3E.pdf**\n   * *Theme*: Primate Study and Phylogeny.\n   * *Summary*: Details the classification, anatomy, and behavior of living primates. It traces their phylogenetic relationships to understand early human evolutionary pathways.\n\n### \ud83d\udfe2 Unit 3: Archaeological Anthropology\n4. **MAN-002B5E.pdf**\n   * *Theme*: Palaeolithic Cultures.\n   * *Summary*: Chronicles the progression of Lower, Middle, and Upper Palaeolithic cultures. It analyzes the development of prehistoric art and early human survival strategies.\n5. **Unit-4 (1).pdf**\n   * *Theme*: Dating Methods.\n   * *Summary*: Compares relative and absolute chronometric dating methods. It covers critical techniques like stratigraphy, radiocarbon, and potassium-argon dating utilized in archaeology.\n6. **Unit-8.pdf**\n   * *Theme*: Prehistoric Typology.\n   * *Summary*: Categorizes prehistoric stone tools across the Palaeolithic, Mesolithic, and Neolithic periods. It also examines early ceramic typologies and firing techniques.\n\n### \ud83d\udfe2 Unit 4: Social and Cultural Anthropology\n7. **BLOCK 2.pdf**\n   * *Theme*: Introduction to Social and Cultural Anthropology.\n   * *Summary*: Introduces the foundational concepts governing human social organization. It provides a broad overview of cultural dynamics and social structures.\n8. **residence-and-kinship.pdf**\n   * *Theme*: Marital Residence and Kinship by Ember.\n   * *Summary*: Cross-culturally analyzes rules of descent, kinship terminology, and post-marital residence patterns. It explores the predictors and consequences of living arrangements like patrilocality and matrilocality.\n9. **Unit-3.pdf**\n   * *Theme*: Kinship Systems.\n   * *Summary*: Explores complex kin relations including moieties, phratries, and clans. It details specific kinship usages like avoidance relationships and the avunculate.\n10. **Unit-5.pdf**\n   * *Theme*: Alliance Theory.\n   * *Summary*: Discusses marriage as a systematic form of exchange across cultures. It heavily references Levi-Strauss's structuralist interpretations of elementary kinship and Dravidian marriage rules.\n11. **Unit-1 (1).pdf**\n   * *Theme*: Concepts of Religion.\n   * *Summary*: Categorizes early religious beliefs such as animism, animatism, and totemism. It breaks down anthropological approaches to understanding magic, witchcraft, and religious symbolism.\n12. **Unit7.pdf**\n   * *Theme*: Economic and Political Institutions.\n   * *Summary*: Reviews the functioning of bands, tribes, chiefdoms, and state-level societies. It bridges these political structures with their corresponding systems of economic production and exchange.\n\n### \ud83d\udfe2 Unit 5: Human Genetics and Physical Anthropology\n13. **MANE-001-B1.pdf**\n   * *Theme*: Introduction to Human Genetics.\n   * *Summary*: Outlines the biological basis of human heredity and formal genetics. It establishes the cellular mechanisms bridging genetic inheritance to physical variability.\n14. **Unit--3.pdf**\n   * *Theme*: Dermatoglyphics.\n   * *Summary*: Analyzes the fundamental principles of fingerprint classification, including loops, whorls, and arches. It discusses the utility of palmar dermatoglyphics for personal identification.\n15. **Unit-11.pdf**\n   * *Theme*: Somatotyping and Human Physique.\n   * *Summary*: Evaluates historical methods of body classification such as those developed by Sheldon, Kretschmer, and Heath-Carter. It examines how phenotypic expressions of body shape vary across human populations.\n16. **Unit-2.pdf**\n   * *Theme*: Stages of Human Growth.\n   * *Summary*: Tracks the biological progression from prenatal development through senescence. It discusses normal growth variations and secular trends in human physical maturation.\n\n### \ud83d\udfe2 Unit 6: Anthropological Theories\n17. **112.pdf**\n   * *Theme*: Symbolic Functionalism.\n   * *Summary*: Compares the approaches of Clifford Geertz and Victor Turner in interpreting cultural symbols. It explores how symbolic interactionism and folklore construct communal meaning.\n18. **Block-3.pdf**\n   * *Theme*: Anthropological Theories I.\n   * *Summary*: Surveys classical evolutionary theories alongside functionalism and structural-functionalism. It highlights the shifting paradigms of analyzing social organization dynamically.\n\n### \ud83d\udfe2 Unit 9: Applied and Action Anthropology\n19. **Unit-1 (2).pdf**\n   * *Theme*: History of Applied Anthropology.\n   * *Summary*: Analyzes the historical divergence of applied anthropology from pure theory. It explores how anthropological knowledge is practically utilized in administration and development, particularly in India.\n\n### \ud83d\udfe2 Unit 10: Research Methods\n20. **Block-4.pdf**\n   * *Theme*: Approaches to Anthropological Research.\n   * *Summary*: Details fundamental ethnographic methodologies including holistic, emic, and etic approaches. It emphasizes the importance of comparative and historical frameworks in fieldwork.\n\n## \u2699\ufe0f Execution Plan\n1. I will parse `generate_html.py`.\n2. For each Unit section in the Python script's `units_data` (and Unit 1-3's separate text blocks), I will dynamically insert the formatted HTML blocks containing the `<h3>` titles and `<p class=\"unit-description\">` summaries exactly where the relevant unit content begins.\n3. I will regenerate `index.html` to apply the updates visually.\n\n**Please review this plan. If you approve, I will proceed with updating the code!**\n", "Research_Methodology_CheatSheet.md": "# Research Methodology Cheat Sheet\n\n## Qualitative Methods\n- **Ethnography**: In-depth study of cultures. Key method: Participant observation.\n- **Interviews**: Structured, semi-structured, and unstructured.\n- **Focus Groups**: Group discussions led by a moderator.\n\n## Quantitative Methods\n- **Surveys & Questionnaires**: Collecting standardized data from large populations.\n- **Statistical Analysis**: Descriptive (mean, median, mode) vs Inferential (t-tests, ANOVA).\n- **Sampling**: Random, stratified, purposive, snowball.\n\n## Key Concepts\n- **Validity**: Does the tool measure what it claims to measure?\n- **Reliability**: Consistency of the measurement.\n- **Ethics**: Informed consent, anonymity, do no harm.\n", "Syllabus_Master.md": "# UGC NET Anthropology (Paper II) - 2026 Progress Tracker\n\n| Unit | Topic Name | Status | Last Revision Date | Core Focus Area |\n| :--- | :--- | :--- | :--- | :--- |\n| **Unit 1** | Fundamentals of Anthropology | To-Do | - | Meaning, Scope, Branches, Relationships with other sciences. |\n| **Unit 2** | Human Evolution & Primatology | To-Do | - | Theories of evolution, Primate classification, Extinct hominins. |\n| **Unit 3** | Modern Human Variation | To-Do | - | Biological diversity, Race vs Racism, Genetics and environment. |\n| **Unit 4** | Human Growth & Social/Cultural | To-Do | - | Growth stages, Marriage, Family, Kinship, Religion, Economy, Politics. |\n| **Unit 5** | Human Genetics & Prehistoric Archaeology | To-Do | - | Population genetics, blood groups, Scope of prehistoric archaeology. |\n| **Unit 6** | Anthropological Theories & Palaeolithic India| To-Do | - | Evolutionism, Functionalism, Structuralism, Lower Palaeolithic in India. |\n| **Unit 7** | Indian Society and Culture | To-Do | - | Varna, Jati, Purusharthas, Sanskritization, Dominant Caste, Jajmani system. |\n| **Unit 8** | Tribal Situation in India | To-Do | - | PVTGs, Constitutional safeguards, Tribal movements, Development policies. |\n| **Unit 9** | Indian Anthropology Development & Applied Anthro| To-Do | - | History of anthropological thought in India, Applied vs Action, Interventions. |\n| **Unit 10** | Research Methods and Techniques | To-Do | - | Ethnography, Emic/Etic perspectives, PRA, Basic statistics in research. |\n", "test_extract.txt": "--- PAGE 0 ---\nMANI-002\nPHYSICAL\nANTHROPOLOGY\nPRIMATE STUDY\nUNIT 1\nLiving Primates 5\nUNIT 2\nPrimate Behaviour 24\nUNIT 3\nPhylogeny of Living Primates and Primate Anatomy 42\nBlock\n3\nIndira Gandhi\nNational Open University\nSchool of Social Sciences\n\n--- PAGE 1 ---\nProgramme Coordinator: Dr. Rashmi Sinha, SOSS, IGNOU, New Delhi\nCourse Coordinator: Dr. Rashmi Sinha, SOSS, IGNOU, New Delhi\nBlocks Preparation Team\nPrint Production\nMr. Manjit Singh\nSection Officer (Pub.), SOSS, IGNOU, New Delhi\nAugust, 201 1\n\uf8e9 Indira Gandhi National Open University , 201 1\nISBN-978-81-266-5547-2\nAll rights reserved. No par t of this work may be r eproduced in any form, by mimeograph or any other\nmeans, without permission in writing fr om the Indira Gandhi National Open University .\nFurther information on Indira Gandhi National Open University courses may be obtained fr om the\nUniversity's office at Maidan Gar hi. New Delhi-1 10 068.\nPrinted and published on behalf of the Indira Gandhi National Open University , New Delhi by the\nDirector, School of Social Sciences.\nLaser Typeset by : Tessa Media & Computers, C-206, A.F.E.-II, Okhla, New Delhi\nPrinted at :\nContent Editor Language Editor\nProfessor V. Rami Reddy\nRetired, Department of Anthropology\nS V University, Tirupati\nMrs. Narinder Jit Kaur\nRetired, Associate Professor in English\nGovernment Mohindra College, Patiala\nUnit Writers\nProfessor P. K. Seth  (Unit 1 & 2)\nRetired, Deptt. of  Anthropology,\nUniversity of Delhi, Delhi\nProfessor R. P. Srivastava (Unit 3 )\nRetired, Deptt. of Anthropology\nUniversity of Lucknow, Lucknow.\nExpert Committee\nProfessor I. J. S. Bansal\nRetired, Department of Human Biology\nPunjabi University\nPatiala\nProfessor K. K. Misra\nDirector\nIndira Gandhi Rashtriya Manav\nSangrahalaya, Bhopal\nProfessor Ranjana Ray\nRetired, Department of Anthropology,\nCalcutta University\nKolkata\nProfessor P. Chengal Reddy\nRetired, Department of Anthropology\nS V University,  Tirupati\nProfessor  R. K. Pathak\nDepartment of Anthropology\nPanjab University\nChandigarh\nProfessor A. K. Kapoor\nDepartment of Anthropology\nUniversity of Delhi, Delhi\nProfessor V.K.Srivastava\nPrincipal, Hindu College\nUniversity of Delhi, Delhi\nProfessor Sudhakar Rao\nDepartment of Anthropology\nUniversity of Hyderabad, Hyderabad\nProfessor S.Channa\nDepartment of Anthropology\nUniversity of Delhi, Delhi\nProfessor P. Vijay Prakash\nDepartment of Anthropology\nAndhra University\nVisakhapatnam\nDr. Nita Mathur\nAssociate Professor\nFaculty of Sociology\nSchool of Social Sciences\nIndira Gandhi National Open University\nMaidan Garhi, New Delhi\nDr. S. M. Patnaik\nAssociate Professor\nDepartment of Anthropology\nUniversity of Delhi, Delhi\nDr. Manoj Kumar Singh\nAssistant Professor\nDepartment of Anthropology\nUniversity of Delhi, Delhi\nFaculty of Anthropology\nSOSS, IGNOU\nDr. Rashmi Sinha, Reader\nDr. Mitoo Das, Assistant Professor\nDr. Rukshana Zaman, Assistant Professor\nDr. P Venkatramana, Assistant Professor\nDr. K. Anil Kumar, Assistant Professor\nAuthors are responsible for the academic content of this course as far as the copy right issues are concerned.\nCover Design\n Dr. Mitoo Das\nAsstt. Professor, Anthropology,  SOSS, IGNOU\n\n--- PAGE 2 ---\nBLOCK 3 PRIMATE STUDY\nIntroduction\nMan is primate of the primates with a unique place in the animal kingdom due to\nmost distinguishable primate characteristics. He and the non-human primates of\napes and monkeys descended from a common ancestor. The non-human primates\nparticularly the apes are our close relatives. Primates as multi-cellular animals\nare mammals with a rather generalised anatomy . Two categories can be\ndistinguished among the primates: prosimians or lower monkeys (tree-shrews,\nlemurs, lorises and tarsiers), anthoropoids or higher primates (New World or\nplatyrrhine monkeys, Old World or Catarrhine monkeys and man). There are\nmany characteristics which are common to both the groups of primates. Humans\nare closely related to great apes as shown by anatomical- molecular-behavioural\nevidences inspite of many typical characteristics in which they differ from each\nother. The ancestral or basal primate stock separated from the common eutherian\nstock, emer ged as an independent order and evolved as prosimians during\nPalaeocene of 70-60 myr BP, as cuboids and pongids of Oligocene of 40-20 myr\nBP, and as protohominids during Pliocene of 12-4 myr BP. Squirrel-like, simple\nprosimian primates made their first appearance, followed by their adaptive\nradiation till the Oligocene time when the New World monkey and the anthropoid\napes came to the scene. The predominance of the latter continued during the\nMiocene epoch. During the Miocene and Pliocene epochs the Pliopithicus-\nProconsul-Dryopithecus-Ramapithicus groups made remarkable progress in the\nOld World. Of all the classifications of primates, the one by G G Simpson seems\nto be most convincing.\nThe human behaviour including that of the extinct hominids can be best\nunderstood and interpreted from the studies of non-human primates in their natural\nsetting. This has to be gauged from the findings of field investigations among\nthe non-human primates on their activity pattern, social or ganisation, mating\npatterns, reproduction, parental care, territoriality , communication, life span,\ndominance and aggression, communication, social behaviour, sexual behaviour,\nand so on. These behavioural aspects have been examined among such non-\nhuman primates as rhesus monkeys, baboons, presbytis, and great apes. The\nrhesus monkey helped in the discovery of Rh factor, which has been found to be\nhereditary in Homo sapiens. The great apes have been found to be similar to\nhumans in anatomical, physiological and behavioural traits.\nIn the construction of primate phylogenies including those of hominids, the\nbiological sciences of palaeontology , comparative anatomy and morphology\nplayed a significant role. These methods have been found to be inadequate in the\nmatter of convincing interpretation of the phylogenies. Recent advances in modern\ngenetics revealed the development of important techniques and approaches of\nsignal importance in understanding the relationships between the great apes and\nman. Among these can be mentioned the immunological technique, molecular\napproaches, DNA hybridisation, mobile DNA elements approach, and human-\nchimpanzee-gorilla tricnotomy . Morris Goodman\u2019 s 1960s analysis revealed\ngreater similarity between African apes and man than between Asian apes and\nhumans. Sarich and Wilson through their molecular approach in 1971 found that\nman; gorilla and chimpanzee shared a common ancestor about five million years\n\n--- PAGE 3 ---\n4\nPrimate Study ago. Yunish and Prakash, Mai and kluge all in 1983 and Schwar in 1984 found\nbiomolecular similarities between man and African apes. DNA hybridisation,\nmobile DNA elements approach and man-gorilla-chimpanzee trichotomy also\nsupport the above findings. The process of hominisation is supported by details\nof comparative anatomy of man and apes in the context of skull, spine, pectoral\ngirdle, pelvic girdle, and lower limbs. The block on Primate Study will facilitate\nin understanding Man better.\n\n--- PAGE 4 ---\n5\nLiving Primates\nUNIT 1 LIVING PRIMATES\nContents\n1.1 Introduction\n1.2 Definition\n1.3 Characteristics\n1.4 Evolutionary Trends\n1.5 Classification\n1.6 Distribution\n1.7 Adaptation\n1.8 Summary\n1.9 Glossary\nReferences\nSuggested Reading\nSample Questions\nLearning Objectives\nWe consider ourselves as the highest among all beings. But we hardly know\nabout ourselves. Once you have studied, this unit you will be able to understand\nthe\n/head2right distribution of MAN including non-human primates (our closest relatives);\n/head2right characteristics of MAN including non-human primates;\n/head2right classification of MAN including non-human primates; and\n/head2right evolution of MAN including non-human primates.\n1.1 INTRODUCTION\nThat modern MAN, Homo sapiens sapiens, is a primate and a close cousin of\nmonkeys and apes cannot be denied. Yet, few people understand the relationship\nbetween them. Neither man nor the non-human primates can be defined on the\nbasis of one or two features. They can be best defined on the basis of the general\npattern displayed by them or by the complexes of their characteristics. So, what\ndo we mean by the term primate (as this term also includes human beings)?\nUnless we know this, it would be difficult for us to proceed with our discussion\non living primates, \u201cour close relatives\u201d.\nCarl von Linnaeus, a Swedish botanist, chose the term \u2018primate\u2019(meaning first\nor the highest amongst all), for the specific order Primates of Animal Kingdom,\nClass Mammalia, including humans and the nonhuman primates, i.e., lemurs,\ntree-shrews, lorises, aye-ayes, pottos, bush babies, tarsiers, monkeys and apes.\nFrom a little shrew like ancestor, these animals are dominating this kingdom.\nThe evolutionary story of the primates \u2013 beginning from the prosimians at\none end of the spectrum to the highly complex man at the other end \u2013 is\nnow revealed in an ever new and fascinating manner.\n\u1f56E\n\n", "books/placeholder.txt": "", "notes/placeholder.txt": "", "Unit_1/Summary.md": "", "Unit_1/Unit1_MCQs.txt": "", "Unit_2/Summary.md": "", "Unit_2/Unit2_MCQs.txt": "", "Unit_3/Summary.md": "", "Unit_3/Unit3_MCQs.txt": "", "Unit_4/Summary.md": "", "Unit_4/Unit4_MCQs.txt": "", "Unit_5/Summary.md": "", "Unit_5/Unit5_MCQs.txt": "", "Unit_6/Summary.md": "", "Unit_6/Unit6_MCQs.txt": "", "Unit_7/Summary.md": "", "Unit_7/Unit7_MCQs.txt": "", "Unit_8/Summary.md": "", "Unit_8/Unit8_MCQs.txt": "", "Unit_9/Summary.md": "", "Unit_9/Unit9_MCQs.txt": "", "Unit_10/Summary.md": "", "Unit_10/Unit10_MCQs.txt": ""};
        const mockData = "";

        function markStudied(btn) {
            btn.classList.toggle('studied');
            if(btn.classList.contains('studied')) btn.innerText = '✓ Studied';
            else btn.innerText = 'Mark as Studied';
        }

        function parseMarkdown(md) {
            if(!md) return "<i>No content available.</i>";
            let html = md;

            // Smart features tags to divs
            html = html.replace(/<div class="smart-feature(.*?)">/g, '<div class="smart-feature$1">');

            // Auto-Highlight Definitions (Sentences containing "is defined as", "refers to", etc)
            html = html.replace(/([^.]*?\b(is defined as|refers to|known as|means|can be defined as|called)\b[^.]*\.)/gi, function(match) {
                if(match.includes('<') || match.includes('>')) return match; // skip if it contains HTML (like headers)
                return '<span class="highlight-definition">' + match + '</span>';
            });

            // Auto-Highlight Formulas
            html = html.replace(/(Formula:|Equation:)([^\n]+)/gi, function(match) {
                return '<span class="highlight-formula">' + match + '</span>';
            });

            // List tags & bold (Concepts)
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong class="highlight-concept">$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/^\* (.*$)/gim, '<ul><li>$1</li></ul>');
            html = html.replace(/^\- (.*$)/gim, '<ul><li>$1</li></ul>');
            html = html.replace(/<\/ul>\s*<ul>/g, '');

            // Tables
            html = html.replace(/\|(.*?)\|/g, function(match, inner) {
                if(inner.includes('---')) return '';
                let cells = inner.split('|').map(c => '<td>' + c.trim() + '</td>').join('');
                return '<tr>' + cells + '</tr>';
            });
            html = html.replace(/(<tr>.*<\/tr>)/gsi, function(match) {
                return '<table><tbody>' + match + '</tbody></table>';
            });
            html = html.replace(/<\/table>\s*<table>/g, '');

            // Paragraphs
            html = html.split('\n\n').map(p => {
                if(p.trim().startsWith('<h') || p.trim().startsWith('<ul') || p.trim().startsWith('<div') || p.trim().startsWith('<table') || p.trim().startsWith('<span')) return p;
                return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
            }).join('\n');

            // Headers with Mark Studied
            html = html.replace(/^(##+)\s+(.*)$/gim, function(match, hashes, title) {
                let level = hashes.length;
                let btn = `<button class="btn-mark-studied" onclick="markStudied(this)">Mark as Studied</button>`;
                return `<h${level}>${title} ${btn}</h${level}>`;
            });

            // Target the PDF Supplementary Content specifically injected by extract_refined.py
            html = html.replace(/<div style='background: rgba\(187, 134, 252, 0\.05\);[^>]*>/g, '<div class="pdf-supplementary-content">');

            // Aggressive Trimming & Auto-Highlighting Logic
            let tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;

            // Define core high-yield Anthropology terminology
            const keywords = ['theory', 'evolution', 'kinship', 'society', 'culture', 'fossil', 'hominin', 'primate', 'archaeology', 'palaeolithic', 'lineage', 'genetics', 'methodology', 'ethnography', 'functionalism', 'structuralism', 'caste', 'tribe', 'marriage', 'family', 'descent', 'mutation', 'adaptation'];
            const keywordRegex = new RegExp(`\\b(${keywords.join('|')})\\b`, 'gi');

            let pdfSections = tempDiv.querySelectorAll('.pdf-supplementary-content');
            pdfSections.forEach(section => {
                let pTags = Array.from(section.querySelectorAll('p'));
                pTags.forEach(p => {
                    let text = p.innerHTML;

                    // Trimming Logic: If it's a long paragraph but lacks BOTH keywords and scholarly names, delete it!
                    let capsRegex = /\b([A-Z][a-z]+(?:\s+[A-Z][a-z]+)+)\b/g;
                    let hasCaps = capsRegex.test(text);
                    let hasKeyword = keywordRegex.test(text);

                    if (!hasCaps && !hasKeyword && text.split(' ').length > 15) {
                        p.remove();
                        return; // skip further processing
                    }

                    // Contextual Sentence Highlighting Logic
                    // Split paragraph into sentences (basic regex: period followed by space or end of string)
                    let sentences = text.match(/[^.!?]+[.!?]+(?:\s+|$)|[^.!?]+$/g) || [text];
                    let processedSentences = [];

                    sentences.forEach(sentence => {
                        let isHighlighted = false;
                        let processedSentence = sentence;

                        // If sentence contains a keyword, mark it for contextual highlighting
                        if (keywordRegex.test(sentence)) {
                            isHighlighted = true;
                            // Still bold the specific keywords within the highlighted sentence
                            processedSentence = processedSentence.replace(keywordRegex, function(match) {
                                if(match.includes('span') || match.includes('class')) return match;
                                return '<strong class="pdf-keyword">' + match + '</strong>';
                            });
                        }

                        // Always highlight capitalized phrases (Scholars/Theories) regardless
                        if (capsRegex.test(processedSentence)) {
                            processedSentence = processedSentence.replace(capsRegex, '<span class="pdf-highlight">$1</span>');
                        }

                        // Wrap the entire sentence if it contained a keyword
                        if (isHighlighted) {
                            processedSentence = `<span class="pdf-context-highlight">${processedSentence.trim()}</span> `;
                        }

                        processedSentences.push(processedSentence);
                    });

                    p.innerHTML = processedSentences.join(' ');
                });
            });
            html = tempDiv.innerHTML;

            return html;
        }

        let attemptedMCQs = new Set();
        let totalMCQs = 0;

        function renderMCQs(mcqText) {
            if(!mcqText) return '';

            let blocks = mcqText.split(/Q\d+\./);
            let html = `<div class="mcq-container">
                <h2>Interactive MCQ Quiz</h2>
                <div class="progress-box">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>Quiz Progress</strong>
                        <span id="mcq-score">0 / 0</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" id="mcq-progress"></div></div>
                </div>
                <div id="mcq-list">
            `;

            blocks.shift(); // remove empty first split
            totalMCQs = blocks.length;
            attemptedMCQs.clear();

            blocks.forEach((block, index) => {
                let lines = block.trim().split('\n').filter(l => l.trim().length > 0);
                let qText = lines[0];
                let opts = [];
                let ans = '', exp = '', diff = '', src = '';

                for(let i=1; i<lines.length; i++){
                    let line = lines[i];
                    if(line.startsWith('A)') || line.startsWith('B)') || line.startsWith('C)') || line.startsWith('D)')) opts.push(line);
                    else if(line.startsWith('Answer:')) ans = line.replace('Answer:', '').trim();
                    else if(line.startsWith('Explanation:')) exp = line.replace('Explanation:', '').trim();
                    else if(line.startsWith('Difficulty:')) diff = line.replace('Difficulty:', '').trim();
                    else if(line.startsWith('Source:')) src = line.replace('Source:', '').trim();
                }

                html += `<div class="mcq-card" id="q-${index}">
                    <div class="mcq-q">Q${index+1}. ${qText}</div>`;

                opts.forEach((opt, optIdx) => {
                    let optLetter = opt.substring(0, 1);
                    html += `<div class="mcq-opt" onclick="selectOpt(${index}, '${optLetter}', '${ans}')">${opt}</div>`;
                });

                html += `<button class="btn-reveal" onclick="revealAns(${index})">Reveal Answer</button>
                    <div class="mcq-ans-box" id="ans-${index}">
                        <strong>Correct Answer: ${ans}</strong>
                        <p style="margin:10px 0;">${exp}</p>
                        <div class="meta-tags">
                            <span class="meta-tag">Diff: ${diff}</span>
                            <span class="meta-tag">Src: ${src}</span>
                        </div>
                    </div>
                </div>`;
            });
            html += `</div></div>`;
            return html;
        }

        window.selectOpt = function(qIndex, selected, correct) {
            let card = document.getElementById(`q-${qIndex}`);
            // visually select
            let opts = card.querySelectorAll('.mcq-opt');
            opts.forEach(o => o.classList.remove('selected'));
            event.target.classList.add('selected');

            if(!attemptedMCQs.has(qIndex)) {
                attemptedMCQs.add(qIndex);
                updateProgress();
            }
        };

        window.revealAns = function(qIndex) {
            document.getElementById(`ans-${qIndex}`).classList.add('show');
            if(!attemptedMCQs.has(qIndex)) {
                attemptedMCQs.add(qIndex);
                updateProgress();
            }
        };

        function updateProgress() {
            let count = attemptedMCQs.size;
            document.getElementById('mcq-score').innerText = `${count} / ${totalMCQs} Attempted`;
            document.getElementById('mcq-progress').style.width = `${(count/totalMCQs)*100}%`;
        }

        const area = document.getElementById('content-area');

        function loadContent(target) {
            // Unset toggle state
            document.body.classList.remove('quick-revision-mode');

            let html = '';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.querySelector(`.nav-item[data-target="${target}"]`);
            if(activeEl) activeEl.classList.add('active');

            if (target === 'home') {
                html = `
                    <h1>Welcome to UGC NET Study Portal</h1>
                    <div class="home-grid">
                        <div class="home-card" onclick="loadContent('conquest')" style="border-color: var(--primary); background: rgba(200,146,42,0.05);">
                            <h3>🔥 Conquest Plan</h3><p>Complete 4-Month Road Map</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_1')">
                            <h3>Unit 1</h3><p>Meaning & Scope of Anthropology</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_2')">
                            <h3>Unit 2</h3><p>Evolution & Primatology Notes</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_3')">
                            <h3>Unit 3</h3><p>Archaeological Anthropology</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_4')">
                            <h3>Unit 4</h3><p>Social/Cultural Anthropology</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_5')">
                            <h3>Unit 5</h3><p>Human Genetics</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_6')">
                            <h3>Unit 6</h3><p>Anthropological Theories</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_7')">
                            <h3>Unit 7</h3><p>Indian Society and Culture</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_8')">
                            <h3>Unit 8</h3><p>Tribal Situation in India</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_9')">
                            <h3>Unit 9</h3><p>Applied and Action Anthropology</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_10')">
                            <h3>Unit 10</h3><p>Research Methods</p>
                        </div>
                        <div class="home-card" onclick="loadContent('cheatsheets')">
                            <h3>Cheat Sheets</h3><p>Quick reference for vital topics</p>
                        </div>
                    </div>
                `;
            } else if (target === 'syllabus') {
                html = '<div class="syllabus-master-container" style="animation: fadeIn 0.3s ease-out;">';
                if(dbContent['Syllabus_Master.md']) html += parseMarkdown(dbContent['Syllabus_Master.md']);
                else html += '<i>Syllabus_Master.md not found in the database.</i>';
                html += '</div>';
            } else if (target === 'cheatsheets') {
                html = '<h1>Cheat Sheets</h1>';
                if(dbContent['Research_Methodology_CheatSheet.md']) html += parseMarkdown(dbContent['Research_Methodology_CheatSheet.md']);
            } else if (target === 'conquest') {
                let p = dbContent['Conquest_Plan.html'] || '<i>Plan not found. Please ensure Conquest_Plan.html is present.</i>';
                let bodyMatch = p.match(/<body[^>]*>([\s\S]*)<\/body>/i);

                html = '<div class="conquest-container">' + (bodyMatch ? bodyMatch[1] : p) + '</div>';

                // Add the specific styles scoped so they don't break the rest of the app
                let styleMatch = p.match(/<style>([\s\S]*?)<\/style>/i);
                if (styleMatch) {
                    let styles = styleMatch[1];
                    // Scope global resets and body styles to our container
                    styles = styles.replace(/\*\s*{([^}]*)}/g, '.conquest-container * { $1 }');
                    styles = styles.replace(/body\s*{([^}]*)}/g, '.conquest-container { $1 }');
                    styles = styles.replace(/:root\s*{([^}]*)}/g, '.conquest-container { $1 }');

                    // Fix horizontal scrolling and stickiness
                    styles += `
                    .conquest-container {
                        overflow-x: hidden;
                        padding-top: 10px;
                        margin: -40px; /* Counteract #content-area padding */
                    }
                    .conquest-container .sticky-nav {
                        position: sticky;
                        top: 0;
                        z-index: 100;
                    }
                    .conquest-container .nav-inner {
                        padding-bottom: 5px; /* prevent scrollbar clipping */
                        mask-image: linear-gradient(to right, black 90%, transparent);
                    }
                    `;
                    html = '<style>' + styles + '</style>' + html;
                }
            } else if (target.startsWith('unit_')) {
                const unitNum = target.split('_')[1];
                html = '<button id="toggle-revision" onclick="document.body.classList.toggle(\'quick-revision-mode\')">⚡ Toggle Quick Revision</button>';

                // Content
                const sumKey = `Unit_${unitNum}/Summary.md`;
                if(dbContent[sumKey]) {
                    html += parseMarkdown(dbContent[sumKey]);
                } else {
                    html += `<h1>Unit ${unitNum}</h1><i>No Summary.md found.</i>`;
                }

                // MCQs
                const mcqKey = `Unit_${unitNum}/Unit${unitNum}_MCQs.txt`;
                if(dbContent[mcqKey]) {
                    html += renderMCQs(dbContent[mcqKey]);
                }
            }

            DOMPurify.addHook('uponSanitizeAttribute', function (node, data) {
                if (data.attrName === 'onclick') {
                    const safeCalls = /^(?:markStudied\(this\)|loadContent\('[a-zA-Z0-9_]+'\)|document\.body\.classList\.toggle\('[a-zA-Z0-9_-]+'\)|selectOpt\([0-9]+,\s*'[^']+',\s*'[^']+'\)|revealAns\([0-9]+\))$/;
                    if (!safeCalls.test(data.attrValue.trim())) {
                        data.keepAttr = false;
                    }
                }
            });
            area.innerHTML = DOMPurify.sanitize(html, { ADD_ATTR: ['onclick'] });
            document.getElementById('main-content').scrollTop = 0;
            if(window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        loadContent('unit_1'); // default to unit 1 to show off new features

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => loadContent(item.getAttribute('data-target')));
        });
        document.getElementById('menu-toggle').addEventListener('click', () => {
             document.getElementById('sidebar').classList.toggle('open');
        });

        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        });
        if(localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }

        // Scroll Progress
        const mainContentEl = document.getElementById('main-content');
        const scrollBar = document.getElementById('scroll-progress');
        mainContentEl.addEventListener('scroll', () => {
            let scrollTop = mainContentEl.scrollTop;
            let scrollHeight = mainContentEl.scrollHeight - mainContentEl.clientHeight;
            let progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
            scrollBar.style.width = progress + '%';
        });

        // Pomodoro Timer
        let pomoTime = 25 * 60;
        let pomoInterval = null;
        let pomoRunning = false;
        const pomoTimeEl = document.getElementById('pomodoro-time');
        const pomoPlayBtn = document.getElementById('pomo-play');

        function updatePomoDisplay() {
            let m = Math.floor(pomoTime / 60).toString().padStart(2, '0');
            let s = (pomoTime % 60).toString().padStart(2, '0');
            pomoTimeEl.innerText = `${m}:${s}`;
            document.title = `${m}:${s} - FocusTimer`;
        }

        document.getElementById('pomo-play').addEventListener('click', () => {
            if(pomoRunning) {
                clearInterval(pomoInterval);
                pomoRunning = false;
                pomoPlayBtn.innerText = '▶️';
                document.title = `UGC NET Anthropology Portal`;
            } else {
                pomoRunning = true;
                pomoPlayBtn.innerText = '⏸️';
                pomoInterval = setInterval(() => {
                    if(pomoTime > 0) {
                        pomoTime--;
                        updatePomoDisplay();
                    } else {
                        clearInterval(pomoInterval);
                        pomoRunning = false;
                        pomoPlayBtn.innerText = '▶️';
                        pomoTime = 5 * 60; // 5 min break
                        updatePomoDisplay();
                        alert('Focus session complete! Taking a 5 minute break.');
                    }
                }, 1000);
            }
        });

        document.getElementById('pomo-reset').addEventListener('click', () => {
            clearInterval(pomoInterval);
            pomoRunning = false;
            pomoTime = 25 * 60;
            pomoPlayBtn.innerText = '▶️';
            document.title = `UGC NET Anthropology Portal`;
            updatePomoDisplay();
        });

    </script>
</body>
</html>
