, meanwhile, has reached version **v3.4.5**.\n\nDOMPurify runs as JavaScript and works in all modern browsers (Safari (10+), Opera (15+), Edge, Firefox and Chrome - as well as almost anything else using Blink, Gecko or WebKit). It doesn't break on MSIE or other legacy browsers. It simply does nothing.\n\n**Note that [DOMPurify v2.5.9](https://github.com/cure53/DOMPurify/releases/tag/2.5.9) is the latest version supporting MSIE. For important security updates compatible with MSIE, please use the [2.x branch](https://github.com/cure53/DOMPurify/tree/2.x).**\n\nOur automated tests cover 9 browser/OS combinations (Chromium, Firefox, and WebKit across Ubuntu, macOS, and Windows) on every push, plus Node.js v20, v22, v24, v25 and v26 running DOMPurify on [jsdom](https://github.com/jsdom/jsdom). Older Node versions are known to work as well, but hey... no guarantees.\n\nDOMPurify is written by security people who have vast background in web attacks and XSS. Fear not. For more details please also read about our [Security Goals & Threat Model](https://github.com/cure53/DOMPurify/wiki/Security-Goals-&-Threat-Model). Please, read it. Like, really.\n\nThe DOMPurify project inspired the creation of the [HTML Sanitizer API](https://wicg.github.io/sanitizer-api/#sanitizer), which is already shipping in [many browsers](https://developer.mozilla.org/en-US/docs/Web/API/HTML_Sanitizer_API#browser_compatibility).\n\n## What does it do?\n\nDOMPurify sanitizes HTML and prevents XSS attacks. You can feed DOMPurify with e.g. a string full of dirty HTML and it will return a string (unless configured otherwise) with clean HTML. DOMPurify will strip out everything that contains dangerous HTML and thereby prevent XSS attacks and other nastiness. It's also damn bloody fast. We use the technologies the browser provides and turn them into an XSS filter. The faster your browser, the faster DOMPurify will be.\n\n## How do I use it?\n\nIt's easy. Just include DOMPurify on your website.\n\n### Using the unminified version (source-map available)\n\n```html\n<script type=\"text/javascript\" src=\"dist/purify.js\"><\/script>\n```\n\n### Using the minified and tested production version (source-map available)\n\n```html\n<script type=\"text/javascript\" src=\"dist/purify.min.js\"><\/script>\n```\n\nAfterwards you can sanitize strings by executing the following code:\n\n```js\nconst clean = DOMPurify.sanitize(dirty);\n```\n\nOr maybe this, if you love working with Angular or alike:\n\n```js\nimport DOMPurify from 'dompurify';\n\nconst clean = DOMPurify.sanitize('<b>hello there</b>');\n```\n\nThe resulting HTML can be written into a DOM element using `innerHTML` or the DOM using `document.write()`. That is fully up to you.\nNote that by default, we permit HTML, SVG **and** MathML. If you only need HTML, which might be a very common use-case, you can easily set that up as well:\n\n```js\nconst clean = DOMPurify.sanitize(dirty, { USE_PROFILES: { html: true } });\n```\n\n### Is there any foot-gun potential?\n\nWell, please note, if you _first_ sanitize HTML and then modify it _afterwards_, you might easily **void the effects of sanitization**. If you feed the sanitized markup to another library _after_ sanitization, please be certain that the library doesn't mess around with the HTML on its own.\n\n### Okay, makes sense, let's move on\n\nAfter sanitizing your markup, you can also have a look at the property `DOMPurify.removed` and find out, what elements and attributes were thrown out. Please **do not use** this property for making any security critical decisions. This is just a little helper for curious minds.\n\n### Running DOMPurify on the server\n\nDOMPurify technically also works server-side with Node.js. Our support strives to follow the [Node.js release cycle](https://nodejs.org/en/about/previous-releases).\n\nRunning DOMPurify on the server requires a DOM to be present, which is probably no surprise. Usually, [jsdom](https://github.com/jsdom/jsdom) is the tool of choice and we **strongly recommend** to use the latest version of _jsdom_.\n\nWhy? Because older versions of _jsdom_ are known to be buggy in ways that result in XSS _even if_ DOMPurify does everything 100% correctly. There are **known attack vectors** in, e.g. _jsdom v19.0.0_ that are fixed in _jsdom v20.0.0_ - and we really recommend to keep _jsdom_ up to date because of that.\n\nPlease also be aware that tools like [happy-dom](https://github.com/capricorn86/happy-dom) exist but **are not considered safe** at this point. Combining DOMPurify with _happy-dom_ is currently not recommended and will likely lead to XSS.\n\nOther than that, you are fine to use DOMPurify on the server. Probably. This really depends on _jsdom_ or whatever DOM you utilize server-side. If you can live with that, this is how you get it to work:\n\n```bash\nnpm install dompurify\nnpm install jsdom\n```\n\nFor _jsdom_ (please use an up-to-date version), this should do the trick:\n\n```js\nconst createDOMPurify = require('dompurify');\nconst { JSDOM } = require('jsdom');\n\nconst window = new JSDOM('').window;\nconst DOMPurify = createDOMPurify(window);\nconst clean = DOMPurify.sanitize('<b>hello there</b>');\n```\n\nOr even this, if you prefer working with imports:\n\n```js\nimport { JSDOM } from 'jsdom';\nimport DOMPurify from 'dompurify';\n\nconst window = new JSDOM('').window;\nconst purify = DOMPurify(window);\nconst clean = purify.sanitize('<b>hello there</b>');\n```\n\nIf you have problems making it work in your specific setup, consider looking at the amazing [isomorphic-dompurify](https://github.com/kkomelin/isomorphic-dompurify) project which solves lots of problems people might run into.\n\n```bash\nnpm install isomorphic-dompurify\n```\n\n```js\nimport DOMPurify from 'isomorphic-dompurify';\n\nconst clean = DOMPurify.sanitize('<s>hello</s>');\n```\n\n## Is there a demo?\n\nOf course there is a demo! [Play with DOMPurify](https://cure53.de/purify)\n\n## What if I find a _security_ bug?\n\nFirst of all, please immediately contact us via [email](mailto:mario@cure53.de) so we can work on a fix. [PGP key](https://keyserver.ubuntu.com/pks/lookup?op=vindex&search=0xC26C858090F70ADA)\n\nAlso, you probably qualify for a bug bounty! The fine folks over at [Fastmail](https://www.fastmail.com/) use DOMPurify for their services and added our library to their bug bounty scope. So, if you find a way to bypass or weaken DOMPurify, please also have a look at their website and the [bug bounty info](https://www.fastmail.com/about/bugbounty/).\n\n## Some purification samples please?\n\nHow does purified markup look like? Well, [the demo](https://cure53.de/purify) shows it for a big bunch of nasty elements. But let's also show some smaller examples!\n\n```js\nDOMPurify.sanitize('<img src=x onerror=alert(1)//>'); // becomes <img src=\"x\">\nDOMPurify.sanitize('<svg><g/onload=alert(2)//<p>'); // becomes <svg><g></g></svg>\nDOMPurify.sanitize('<p>abc<iframe//src=jAva&Tab;script:alert(3)>def</p>'); // becomes <p>abc</p>\nDOMPurify.sanitize('<math><mi//xlink:href=\"data:x,<script>alert(4)<\/script>\">'); // becomes <math><mi></mi></math>\nDOMPurify.sanitize('<TABLE><tr><td>HELLO</tr></TABL>'); // becomes <table><tbody><tr><td>HELLO</td></tr></tbody></table>\nDOMPurify.sanitize('<UL><li><A HREF=//google.com>click</UL>'); // becomes <ul><li><a href=\"//google.com\">click</a></li></ul>\n```\n\n## What is supported?\n\nDOMPurify currently supports HTML5, SVG and MathML. DOMPurify per default allows CSS, HTML custom data attributes. DOMPurify also supports the Shadow DOM - and sanitizes DOM templates recursively. DOMPurify also allows you to sanitize HTML for being used with the jQuery `$()` and `elm.html()` API without any known problems.\n\n## What about legacy browsers like Internet Explorer?\n\nDOMPurify does nothing at all. It simply returns exactly the string that you fed it. DOMPurify exposes a property called `isSupported`, which tells you whether it will be able to do its job, so you can come up with your own backup plan.\n\n## What about DOMPurify and Trusted Types?\n\nIn version 1.0.9, support for [Trusted Types API](https://github.com/w3c/webappsec-trusted-types) was added to DOMPurify.\nIn version 2.0.0, a config flag was added to control DOMPurify's behavior regarding this.\n\nWhen `DOMPurify.sanitize` is used in an environment where the Trusted Types API is available and `RETURN_TRUSTED_TYPE` is set to `true`, it tries to return a `TrustedHTML` value instead of a string (the behavior for `RETURN_DOM` and `RETURN_DOM_FRAGMENT` config options does not change).\n\nNote that in order to create a policy in `trustedTypes` using DOMPurify, `RETURN_TRUSTED_TYPE: false` is required, as `createHTML` expects a normal string, not `TrustedHTML`. The example below shows this.\n\n```js\nwindow.trustedTypes.createPolicy('default', {\n  createHTML: (to_escape) =>\n    DOMPurify.sanitize(to_escape, { RETURN_TRUSTED_TYPE: false }),\n});\n```\n\n## Can I configure DOMPurify?\n\nYes. The included default configuration values are pretty good already - but you can of course override them. Check out the [`/demos`](https://github.com/cure53/DOMPurify/tree/main/demos) folder to see a bunch of examples on how you can [customize DOMPurify](https://github.com/cure53/DOMPurify/tree/main/demos#what-is-this).\n\n### General settings\n\n```js\n// strip {{ ... }}, ${ ... } and <% ... %> to make output safe for template systems\n// be careful please, this mode is not recommended for production usage.\n// allowing template parsing in user-controlled HTML is not advised at all.\n// only use this mode if there is really no alternative.\nconst clean = DOMPurify.sanitize(dirty, { SAFE_FOR_TEMPLATES: true });\n\n// change how e.g. comments containing risky HTML characters are treated.\n// be very careful, this setting should only be set to `false` if you really only handle\n// HTML and nothing else, no SVG, MathML or the like.\n// Otherwise, changing from `true` to `false` will lead to XSS in this or some other way.\nconst clean = DOMPurify.sanitize(dirty, { SAFE_FOR_XML: false });\n```\n\n### Control our allow-lists and block-lists\n\n```js\n// allow only <b> elements, very strict\nconst clean = DOMPurify.sanitize(dirty, { ALLOWED_TAGS: ['b'] });\n\n// allow only <b> and <q> with style attributes\nconst clean = DOMPurify.sanitize(dirty, {\n  ALLOWED_TAGS: ['b', 'q'],\n  ALLOWED_ATTR: ['style'],\n});\n\n// allow all safe HTML elements but neither SVG nor MathML\n// note that the USE_PROFILES setting will override the ALLOWED_TAGS setting\n// so don't use them together\nconst clean = DOMPurify.sanitize(dirty, { USE_PROFILES: { html: true } });\n\n// allow all safe SVG elements and SVG Filters, no HTML or MathML\nconst clean = DOMPurify.sanitize(dirty, {\n  USE_PROFILES: { svg: true, svgFilters: true },\n});\n\n// allow all safe MathML elements and SVG, but no SVG Filters\nconst clean = DOMPurify.sanitize(dirty, {\n  USE_PROFILES: { mathMl: true, svg: true },\n});\n\n// change the default namespace from HTML to something different\nconst clean = DOMPurify.sanitize(dirty, {\n  NAMESPACE: 'http://www.w3.org/2000/svg',\n});\n\n// leave all safe HTML as it is and add <style> elements to block-list\nconst clean = DOMPurify.sanitize(dirty, { FORBID_TAGS: ['style'] });\n\n// leave all safe HTML as it is and add style attributes to block-list\nconst clean = DOMPurify.sanitize(dirty, { FORBID_ATTR: ['style'] });\n\n// extend the existing array of allowed tags and add <my-tag> to allow-list\nconst clean = DOMPurify.sanitize(dirty, { ADD_TAGS: ['my-tag'] });\n\n// extend the existing array of allowed attributes and add my-attr to allow-list\nconst clean = DOMPurify.sanitize(dirty, { ADD_ATTR: ['my-attr'] });\n\n// use functions to control which additional tags and attributes are allowed\nconst allowlist = {\n  one: ['attribute-one'],\n  two: ['attribute-two'],\n};\nconst clean = DOMPurify.sanitize(\n  '<one attribute-one=\"1\" attribute-two=\"2\"></one><two attribute-one=\"1\" attribute-two=\"2\"></two>',\n  {\n    ADD_TAGS: (tagName) => {\n      return Object.keys(allowlist).includes(tagName);\n    },\n    ADD_ATTR: (attributeName, tagName) => {\n      return allowlist[tagName]?.includes(attributeName) || false;\n    },\n  }\n); // <one attribute-one=\"1\"></one><two attribute-two=\"2\"></two>\n\n// prohibit ARIA attributes, leave other safe HTML as is (default is true)\nconst clean = DOMPurify.sanitize(dirty, { ALLOW_ARIA_ATTR: false });\n\n// prohibit HTML5 data attributes, leave other safe HTML as is (default is true)\nconst clean = DOMPurify.sanitize(dirty, { ALLOW_DATA_ATTR: false });\n```\n\n### Control behavior relating to Custom Elements\n\n```js\n// DOMPurify allows to define rules for Custom Elements. When using the CUSTOM_ELEMENT_HANDLING\n// literal, it is possible to define exactly what elements you wish to allow (by default, none are allowed).\n//\n// The same goes for their attributes. By default, the built-in or configured allow.list is used.\n//\n// You can use a RegExp literal to specify what is allowed or a predicate, examples for both can be seen below.\n// When using a predicate function for attributeNameCheck, it can optionally receive the tagName as a second parameter\n// for more granular control over which attributes are allowed for specific elements.\n// The default values are very restrictive to prevent accidental XSS bypasses. Handle with great care!\n\nconst clean = DOMPurify.sanitize(\n  '<foo-bar baz=\"foobar\" forbidden=\"true\"></foo-bar><div is=\"foo-baz\"></div>',\n  {\n    CUSTOM_ELEMENT_HANDLING: {\n      tagNameCheck: null, // no custom elements are allowed\n      attributeNameCheck: null, // default / standard attribute allow-list is used\n      allowCustomizedBuiltInElements: false, // no customized built-ins allowed\n    },\n  }\n); // <div is=\"\"></div>\n\nconst clean = DOMPurify.sanitize(\n  '<foo-bar baz=\"foobar\" forbidden=\"true\"></foo-bar><div is=\"foo-baz\"></div>',\n  {\n    CUSTOM_ELEMENT_HANDLING: {\n      tagNameCheck: /^foo-/, // allow all tags starting with \"foo-\"\n      attributeNameCheck: /baz/, // allow all attributes containing \"baz\"\n      allowCustomizedBuiltInElements: true, // customized built-ins are allowed\n    },\n  }\n); // <foo-bar baz=\"foobar\"></foo-bar><div is=\"foo-baz\"></div>\n\nconst clean = DOMPurify.sanitize(\n  '<foo-bar baz=\"foobar\" forbidden=\"true\"></foo-bar><div is=\"foo-baz\"></div>',\n  {\n    CUSTOM_ELEMENT_HANDLING: {\n      tagNameCheck: (tagName) => tagName.match(/^foo-/), // allow all tags starting with \"foo-\"\n      attributeNameCheck: (attr) => attr.match(/baz/), // allow all containing \"baz\"\n      allowCustomizedBuiltInElements: true, // allow customized built-ins\n    },\n  }\n); // <foo-bar baz=\"foobar\"></foo-bar><div is=\"foo-baz\"></div>\n\n// Example with attributeNameCheck receiving tagName as a second parameter\nconst clean = DOMPurify.sanitize(\n  '<element-one attribute-one=\"1\" attribute-two=\"2\"></element-one><element-two attribute-one=\"1\" attribute-two=\"2\"></element-two>',\n  {\n    CUSTOM_ELEMENT_HANDLING: {\n      tagNameCheck: (tagName) => tagName.match(/^element-(one|two)$/),\n      attributeNameCheck: (attr, tagName) => {\n        if (tagName === 'element-one') {\n          return ['attribute-one'].includes(attr);\n        } else if (tagName === 'element-two') {\n          return ['attribute-two'].includes(attr);\n        } else {\n          return false;\n        }\n      },\n      allowCustomizedBuiltInElements: false,\n    },\n  }\n); // <element-one attribute-one=\"1\"></element-one><element-two attribute-two=\"2\"></element-two>\n```\n\n### Control behavior relating to URI values\n\n```js\n// extend the existing array of elements that can use Data URIs\nconst clean = DOMPurify.sanitize(dirty, { ADD_DATA_URI_TAGS: ['a', 'area'] });\n\n// extend the existing array of elements that are safe for URI-like values (be careful, XSS risk)\nconst clean = DOMPurify.sanitize(dirty, { ADD_URI_SAFE_ATTR: ['my-attr'] });\n```\n\n### Control permitted attribute values\n\n```js\n// allow external protocol handlers in URL attributes (default is false, be careful, XSS risk)\n// by default only http, https, ftp, ftps, tel, mailto, callto, sms, cid, xmpp and matrix are allowed.\nconst clean = DOMPurify.sanitize(dirty, { ALLOW_UNKNOWN_PROTOCOLS: true });\n\n// allow specific protocol handlers in URL attributes via regex (default is false, be careful, XSS risk)\n// by default only (protocol-)relative URLs, http, https, ftp, ftps, tel, mailto, callto, sms, cid, xmpp and matrix are allowed.\n// Default RegExp: /^(?:(?:(?:f|ht)tps?|mailto|tel|callto|sms|cid|xmpp):|[^a-z]|[a-z+.\\-]+(?:[^a-z+.\\-:]|$))/i;\nconst clean = DOMPurify.sanitize(dirty, {\n  ALLOWED_URI_REGEXP:\n    /^(?:(?:(?:f|ht)tps?|mailto|tel|callto|sms|cid|xmpp|matrix):|[^a-z]|[a-z+.\\-]+(?:[^a-z+.\\-:]|$))/i,\n});\n```\n\n### Influence the return-type\n\n```js\n// return a DOM HTMLBodyElement instead of an HTML string (default is false)\nconst clean = DOMPurify.sanitize(dirty, { RETURN_DOM: true });\n\n// return a DOM DocumentFragment instead of an HTML string (default is false)\nconst clean = DOMPurify.sanitize(dirty, { RETURN_DOM_FRAGMENT: true });\n\n// use the RETURN_TRUSTED_TYPE flag to turn on Trusted Types support if available\nconst clean = DOMPurify.sanitize(dirty, { RETURN_TRUSTED_TYPE: true }); // will return a TrustedHTML object instead of a string if possible\n\n// use a provided Trusted Types policy\nconst clean = DOMPurify.sanitize(dirty, {\n  // supplied policy must define createHTML and createScriptURL\n  TRUSTED_TYPES_POLICY: trustedTypes.createPolicy('dompurify', {\n    createHTML(s) {\n      return s;\n    },\n    createScriptURL(s) {\n      return s;\n    },\n  }),\n});\n```\n\n### Influence how we sanitize\n\n```js\n// return entire document including <html> tags (default is false)\nconst clean = DOMPurify.sanitize(dirty, { WHOLE_DOCUMENT: true });\n\n// disable DOM Clobbering protection on output (default is true, handle with care, minor XSS risks here)\nconst clean = DOMPurify.sanitize(dirty, { SANITIZE_DOM: false });\n\n// enforce strict DOM Clobbering protection via namespace isolation (default is false)\n// when enabled, isolates the namespace of named properties (i.e., `id` and `name` attributes)\n// from JS variables by prefixing them with the string `user-content-`\nconst clean = DOMPurify.sanitize(dirty, { SANITIZE_NAMED_PROPS: true });\n\n// keep an element's content when the element is removed (default is true)\nconst clean = DOMPurify.sanitize(dirty, { KEEP_CONTENT: false });\n\n// glue elements like style, script or others to document.body and prevent unintuitive browser behavior in several edge-cases (default is false)\nconst clean = DOMPurify.sanitize(dirty, { FORCE_BODY: true });\n\n// remove all <a> elements under <p> elements that are removed\nconst clean = DOMPurify.sanitize(dirty, {\n  FORBID_CONTENTS: ['a'],\n  FORBID_TAGS: ['p'],\n});\n\n// extend the default FORBID_CONTENTS list to also remove <a> elements under <p> elements\nconst clean = DOMPurify.sanitize(dirty, {\n  ADD_FORBID_CONTENTS: ['a'],\n  FORBID_TAGS: ['p'],\n});\n\n// change the parser type so sanitized data is treated as XML and not as HTML, which is the default\nconst clean = DOMPurify.sanitize(dirty, {\n  PARSER_MEDIA_TYPE: 'application/xhtml+xml',\n});\n```\n\n### Influence where we sanitize\n\n```js\n// use the IN_PLACE mode to sanitize a node \"in place\", which is much faster depending on how you use DOMPurify\nconst dirty = document.createElement('a');\ndirty.setAttribute('href', 'javascript:alert(1)');\n\nconst clean = DOMPurify.sanitize(dirty, { IN_PLACE: true }); // see https://github.com/cure53/DOMPurify/issues/288 for more info\n```\n\nThere is even [more examples here](https://github.com/cure53/DOMPurify/tree/main/demos#what-is-this), showing how you can run, customize and configure DOMPurify to fit your needs.\n\n## Persistent Configuration\n\nInstead of repeatedly passing the same configuration to `DOMPurify.sanitize`, you can use the `DOMPurify.setConfig` method. Your configuration will persist until your next call to `DOMPurify.setConfig`, or until you invoke `DOMPurify.clearConfig` to reset it. Remember that there is only one active configuration, which means once it is set, all extra configuration parameters passed to `DOMPurify.sanitize` are ignored.\n\n## Hooks\n\nDOMPurify allows you to augment its functionality by attaching one or more functions with the `DOMPurify.addHook` method to one of the following hooks:\n\n- `beforeSanitizeElements`\n- `uponSanitizeElement` (No 's' - called for every element)\n- `afterSanitizeElements`\n- `beforeSanitizeAttributes`\n- `uponSanitizeAttribute`\n- `afterSanitizeAttributes`\n- `beforeSanitizeShadowDOM`\n- `uponSanitizeShadowNode`\n- `afterSanitizeShadowDOM`\n\nIt passes the currently processed DOM node, when needed a literal with verified node and attribute data and the DOMPurify configuration to the callback. Check out the [MentalJS hook demo](https://github.com/cure53/DOMPurify/blob/main/demos/hooks-mentaljs-demo.html) to see how the API can be used nicely.\n\n_Example_:\n\n```js\nDOMPurify.addHook(\n  'uponSanitizeAttribute',\n  function (currentNode, hookEvent, config) {\n    // Do something with the current node\n    // You can also mutate hookEvent for current node (i.e. set hookEvent.forceKeepAttr = true)\n    // For other than 'uponSanitizeAttribute' hook types hookEvent equals to null\n  }\n);\n```\n\n## Removed Configuration\n\n| Option          | Since | Note                     |\n| --------------- | ----- | ------------------------ |\n| SAFE_FOR_JQUERY | 2.1.0 | No replacement required. |\n\n## Continuous Integration\n\nWe are currently using GitHub Actions in combination with Playwright. This gives us the possibility to confirm for each and every commit that all is going according to plan in relevant modern browsers. Check out the build logs here: https://github.com/cure53/DOMPurify/actions\n\nYou can further run local tests by executing `npm run test`.\n\nAll relevant commits will be signed with the key `0x24BB6BF4` for additional security (since 8th of April 2016).\n\n### Development and contributing\n\n#### Installation (`npm i`)\n\nWe support `npm` officially. GitHub Actions workflow is configured to install dependencies using `npm`. When using a deprecated version of `npm`, we cannot fully ensure the versions of installed dependencies, which might lead to unanticipated problems.\n\n#### Scripts\n\nWe use ESLint via `xo` as part of our pre-commit workflow to help ensure code consistency. In addition, we use [Prettier](https://github.com/prettier/prettier) for source and Markdown formatting, and `/dist` assets are built through `rollup`.\n\nThese are our npm scripts:\n\n- `npm run dev` to build the unminified UMD bundle while watching sources for changes\n- `npm run test` to lint the sources, run tests through jsdom, and run Karma tests in Chrome\n  - `npm run test:jsdom` to only run tests through jsdom\n  - `npm run test:browser` to only run tests through Playwright\n  - `npm run test:ci` to run the CI test flow for jsdom and Karma/BrowserStack\n  - `npm run test:fuzz` to run a small fuzzer covering `sanitize()` and CONFIG\n- `npm run lint` to lint the sources using ESLint via xo\n- `npm run format` to format JavaScript/TypeScript and Markdown sources with Prettier\n  - `npm run format:js` to only format JavaScript/TypeScript sources\n  - `npm run format:md` to only format Markdown files\n- `npm run build` to build type declarations and distribution bundles, then fix and clean up generated types\n  - `npm run build:types` to only emit TypeScript declaration files\n  - `npm run build:rollup` to build all Rollup bundles\n  - `npm run build:umd` to only build an unminified UMD bundle\n  - `npm run build:umd:min` to only build a minified UMD bundle\n  - `npm run build:es` to only build the ES module bundle\n  - `npm run build:cjs` to only build the CommonJS bundle\n  - `npm run build:fix-types` to post-process generated type files\n  - `npm run build:cleanup` to clean up temporary generated type output\n- `npm run verify-typescript` to run the TypeScript verification script\n- `npm run commit-amend-build` to run the maintainer helper script for amending build output\n\nNote: all run scripts triggered via `npm run <script>`.\n\nThere are more npm scripts but they are mainly to integrate with CI or are meant to be \"private\" for instance to amend build distribution files with every commit.\n\n## Security Mailing List\n\nWe maintain a mailing list that notifies whenever a **security-critical** release of DOMPurify was published. This means, if someone found a bypass and we fixed it with a release (which always happens when a bypass was found) a mail will go out to that list. This usually happens within minutes or a few hours after learning about a bypass. The list can be subscribed to here:\n\n[https://lists.ruhr-uni-bochum.de/mailman/listinfo/dompurify-security](https://lists.ruhr-uni-bochum.de/mailman/listinfo/dompurify-security)\n\nFeature releases will not be announced to this list.\n\n## Who contributed?\n\nMany people have helped DOMPurify become what it is today, and they deserve to be acknowledged!\n\n[lukewarlow](https://github.com/lukewarlow), [DEMON1A](https://github.com/DEMON1A), [fg0x0](https://github.com/fg0x0), [kodareef5](https://github.com/kodareef5), [DavidOliver](https://github.com/DavidOliver), [1Jesper1](https://github.com/1Jesper1), [bencalif](https://github.com/bencalif), [trace37labs](https://github.com/trace37labs), [eddieran](https://github.com/eddieran), [christos-eth](https://github.com/christos-eth), [researchatfluidattacks](https://github.com/researchatfluidattacks), [frevadiscor](https://github.com/frevadiscor), [Rotzbua](https://github.com/Rotzbua), [binhpv](https://github. rdwell](https://github.com/davecardwell) and especially [@securitymb \u2764\ufe0f](https://twitter.com/securitymb) & [@masatokinugawa \u2764\ufe0f](https://twitter.com/masatokinugawa)\n", ".pytest_cache/README.md": "# pytest cache directory #\n\nThis directory contains data from the pytest's cache plugin,\nwhich provides the `--lf` and `--ff` options, as well as the `cache` fixture.\n\n**Do not** commit this to version control.\n\nSee [the docs](https://docs.pytest.org/en/stable/how-to/cache.html) for more information.\n"};
        const mockData = "";

        function markStudied(btn) {
            btn.classList.toggle('studied');
            if(btn.classList.contains('studied')) btn.innerText = '✓ Studied';
            else btn.innerText = 'Mark as Studied';
        }

        function parseMarkdown(md) {
            if(!md) return "<i>No content available.</i>";
            let html = md;

            // Smart features tags to divs
            html = html.replace(/<div class="smart-feature(.*?)">/g, '<div class="smart-feature$1">');

            // Auto-Highlight Definitions (Sentences containing "is defined as", "refers to", etc)
            html = html.replace(/([^.]*?\b(is defined as|refers to|known as|means|can be defined as|called)\b[^.]*\.)/gi, function(match) {
                if(match.includes('<') || match.includes('>')) return match; // skip if it contains HTML (like headers)
                return '<span class="highlight-definition">' + match + '</span>';
            });

            // Auto-Highlight Formulas
            html = html.replace(/(Formula:|Equation:)([^\n]+)/gi, function(match) {
                return '<span class="highlight-formula">' + match + '</span>';
            });

            // List tags & bold (Concepts)
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong class="highlight-concept">$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/^\* (.*$)/gim, '<ul><li>$1</li></ul>');
            html = html.replace(/^\- (.*$)/gim, '<ul><li>$1</li></ul>');
            html = html.replace(/<\/ul>\s*<ul>/g, '');

            // Tables
            html = html.replace(/\|(.*?)\|/g, function(match, inner) {
                if(inner.includes('---')) return '';
                let cells = inner.split('|').map(c => '<td>' + c.trim() + '</td>').join('');
                return '<tr>' + cells + '</tr>';
            });
            html = html.replace(/(<tr>.*<\/tr>)/gsi, function(match) {
                return '<table><tbody>' + match + '</tbody></table>';
            });
            html = html.replace(/<\/table>\s*<table>/g, '');

            // Paragraphs
            html = html.split('\n\n').map(p => {
                if(p.trim().startsWith('<h') || p.trim().startsWith('<ul') || p.trim().startsWith('<div') || p.trim().startsWith('<table') || p.trim().startsWith('<span')) return p;
                return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
            }).join('\n');

            // Headers with Mark Studied
            html = html.replace(/^(##+)\s+(.*)$/gim, function(match, hashes, title) {
                let level = hashes.length;
                let btn = `<button class="btn-mark-studied" onclick="markStudied(this)">Mark as Studied</button>`;
                return `<h${level}>${title} ${btn}</h${level}>`;
            });

            // Target the PDF Supplementary Content specifically injected by extract_refined.py
            html = html.replace(/<div style='background: rgba\(187, 134, 252, 0\.05\);[^>]*>/g, '<div class="pdf-supplementary-content">');

            // Aggressive Trimming & Auto-Highlighting Logic
            let tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;

            // Define core high-yield Anthropology terminology
            const keywords = ['theory', 'evolution', 'kinship', 'society', 'culture', 'fossil', 'hominin', 'primate', 'archaeology', 'palaeolithic', 'lineage', 'genetics', 'methodology', 'ethnography', 'functionalism', 'structuralism', 'caste', 'tribe', 'marriage', 'family', 'descent', 'mutation', 'adaptation'];
            const keywordRegex = new RegExp(`\\b(${keywords.join('|')})\\b`, 'gi');

            let pdfSections = tempDiv.querySelectorAll('.pdf-supplementary-content');
            pdfSections.forEach(section => {
                let pTags = Array.from(section.querySelectorAll('p'));
                pTags.forEach(p => {
                    let text = p.innerHTML;

                    // Trimming Logic: If it's a long paragraph but lacks BOTH keywords and scholarly names, delete it!
                    let capsRegex = /\b([A-Z][a-z]+(?:\s+[A-Z][a-z]+)+)\b/g;
                    let hasCaps = capsRegex.test(text);
                    let hasKeyword = keywordRegex.test(text);

                    if (!hasCaps && !hasKeyword && text.split(' ').length > 15) {
                        p.remove();
                        return; // skip further processing
                    }

                    // Contextual Sentence Highlighting Logic
                    // Split paragraph into sentences (basic regex: period followed by space or end of string)
                    let sentences = text.match(/[^.!?]+[.!?]+(?:\s+|$)|[^.!?]+$/g) || [text];
                    let processedSentences = [];

                    sentences.forEach(sentence => {
                        let isHighlighted = false;
                        let processedSentence = sentence;

                        // If sentence contains a keyword, mark it for contextual highlighting
                        if (keywordRegex.test(sentence)) {
                            isHighlighted = true;
                            // Still bold the specific keywords within the highlighted sentence
                            processedSentence = processedSentence.replace(keywordRegex, function(match) {
                                if(match.includes('span') || match.includes('class')) return match;
                                return '<strong class="pdf-keyword">' + match + '</strong>';
                            });
                        }

                        // Always highlight capitalized phrases (Scholars/Theories) regardless
                        if (capsRegex.test(processedSentence)) {
                            processedSentence = processedSentence.replace(capsRegex, '<span class="pdf-highlight">$1</span>');
                        }

                        // Wrap the entire sentence if it contained a keyword
                        if (isHighlighted) {
                            processedSentence = `<span class="pdf-context-highlight">${processedSentence.trim()}</span> `;
                        }

                        processedSentences.push(processedSentence);
                    });

                    p.innerHTML = processedSentences.join(' ');
                });
            });
            html = tempDiv.innerHTML;

            return html;
        }

        let attemptedMCQs = new Set();
        let totalMCQs = 0;

        function renderMCQs(mcqText) {
            if(!mcqText) return '';

            let blocks = mcqText.split(/Q\d+\./);
            let html = `<div class="mcq-container">
                <h2>Interactive MCQ Quiz</h2>
                <div class="progress-box">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>Quiz Progress</strong>
                        <span id="mcq-score">0 / 0</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" id="mcq-progress"></div></div>
                </div>
                <div id="mcq-list">
            `;

            blocks.shift(); // remove empty first split
            totalMCQs = blocks.length;
            attemptedMCQs.clear();

            blocks.forEach((block, index) => {
                let lines = block.trim().split('\n').filter(l => l.trim().length > 0);
                let qText = lines[0];
                let opts = [];
                let ans = '', exp = '', diff = '', src = '';

                for(let i=1; i<lines.length; i++){
                    let line = lines[i];
                    if(line.startsWith('A)') || line.startsWith('B)') || line.startsWith('C)') || line.startsWith('D)')) opts.push(line);
                    else if(line.startsWith('Answer:')) ans = line.replace('Answer:', '').trim();
                    else if(line.startsWith('Explanation:')) exp = line.replace('Explanation:', '').trim();
                    else if(line.startsWith('Difficulty:')) diff = line.replace('Difficulty:', '').trim();
                    else if(line.startsWith('Source:')) src = line.replace('Source:', '').trim();
                }

                html += `<div class="mcq-card" id="q-${index}">
                    <div class="mcq-q">Q${index+1}. ${qText}</div>`;

                opts.forEach((opt, optIdx) => {
                    let optLetter = opt.substring(0, 1);
                    html += `<div class="mcq-opt" onclick="selectOpt(${index}, '${optLetter}', '${ans}')">${opt}</div>`;
                });

                html += `<button class="btn-reveal" onclick="revealAns(${index})">Reveal Answer</button>
                    <div class="mcq-ans-box" id="ans-${index}">
                        <strong>Correct Answer: ${ans}</strong>
                        <p style="margin:10px 0;">${exp}</p>
                        <div class="meta-tags">
                            <span class="meta-tag">Diff: ${diff}</span>
                            <span class="meta-tag">Src: ${src}</span>
                        </div>
                    </div>
                </div>`;
            });
            html += `</div></div>`;
            return html;
        }

        window.selectOpt = function(qIndex, selected, correct) {
            let card = document.getElementById(`q-${qIndex}`);
            // visually select
            let opts = card.querySelectorAll('.mcq-opt');
            opts.forEach(o => o.classList.remove('selected'));
            event.target.classList.add('selected');

            if(!attemptedMCQs.has(qIndex)) {
                attemptedMCQs.add(qIndex);
                updateProgress();
            }
        };

        window.revealAns = function(qIndex) {
            document.getElementById(`ans-${qIndex}`).classList.add('show');
            if(!attemptedMCQs.has(qIndex)) {
                attemptedMCQs.add(qIndex);
                updateProgress();
            }
        };

        function updateProgress() {
            let count = attemptedMCQs.size;
            document.getElementById('mcq-score').innerText = `${count} / ${totalMCQs} Attempted`;
            document.getElementById('mcq-progress').style.width = `${(count/totalMCQs)*100}%`;
        }

        const area = document.getElementById('content-area');

        function loadContent(target) {
            // Unset toggle state
            document.body.classList.remove('quick-revision-mode');

            let html = '';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.querySelector(`.nav-item[data-target="${target}"]`);
            if(activeEl) activeEl.classList.add('active');

            if (target === 'home') {
                html = `
                    <h1>Welcome to UGC NET Study Portal</h1>
                    <div class="home-grid">
                        <div class="home-card" onclick="loadContent('conquest')" style="border-color: var(--primary); background: rgba(200,146,42,0.05);">
                            <h3>🔥 Conquest Plan</h3><p>Complete 4-Month Road Map</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_1')">
                            <h3>Unit 1</h3><p>Meaning & Scope of Anthropology</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_2')">
                            <h3>Unit 2</h3><p>Evolution & Primatology Notes</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_3')">
                            <h3>Unit 3</h3><p>Archaeological Anthropology</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_4')">
                            <h3>Unit 4</h3><p>Social/Cultural Anthropology</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_5')">
                            <h3>Unit 5</h3><p>Human Genetics</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_6')">
                            <h3>Unit 6</h3><p>Anthropological Theories</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_7')">
                            <h3>Unit 7</h3><p>Indian Society and Culture</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_8')">
                            <h3>Unit 8</h3><p>Tribal Situation in India</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_9')">
                            <h3>Unit 9</h3><p>Applied and Action Anthropology</p>
                        </div>
                        <div class="home-card" onclick="loadContent('unit_10')">
                            <h3>Unit 10</h3><p>Research Methods</p>
                        </div>
                        <div class="home-card" onclick="loadContent('cheatsheets')">
                            <h3>Cheat Sheets</h3><p>Quick reference for vital topics</p>
                        </div>
                    </div>
                `;
            } else if (target === 'syllabus') {
                html = '<div class="syllabus-master-container" style="animation: fadeIn 0.3s ease-out;">';
                if(dbContent['Syllabus_Master.md']) html += parseMarkdown(dbContent['Syllabus_Master.md']);
                else html += '<i>Syllabus_Master.md not found in the database.</i>';
                html += '</div>';
            } else if (target === 'cheatsheets') {
                html = '<h1>Cheat Sheets</h1>';
                if(dbContent['Research_Methodology_CheatSheet.md']) html += parseMarkdown(dbContent['Research_Methodology_CheatSheet.md']);
            } else if (target === 'conquest') {
                let p = dbContent['Conquest_Plan.html'] || '<i>Plan not found. Please ensure Conquest_Plan.html is present.</i>';
                let bodyMatch = p.match(/<body[^>]*>([\s\S]*)<\/body>/i);

                html = '<div class="conquest-container">' + (bodyMatch ? bodyMatch[1] : p) + '</div>';

                // Add the specific styles scoped so they don't break the rest of the app
                let styleMatch = p.match(/<style>([\s\S]*?)<\/style>/i);
                if (styleMatch) {
                    let styles = styleMatch[1];
                    // Scope global resets and body styles to our container
                    styles = styles.replace(/\*\s*{([^}]*)}/g, '.conquest-container * { $1 }');
                    styles = styles.replace(/body\s*{([^}]*)}/g, '.conquest-container { $1 }');
                    styles = styles.replace(/:root\s*{([^}]*)}/g, '.conquest-container { $1 }');

                    // Fix horizontal scrolling and stickiness
                    styles += `
                    .conquest-container {
                        overflow-x: hidden;
                        padding-top: 10px;
                        margin: -40px; /* Counteract #content-area padding */
                    }
                    .conquest-container .sticky-nav {
                        position: sticky;
                        top: 0;
                        z-index: 100;
                    }
                    .conquest-container .nav-inner {
                        padding-bottom: 5px; /* prevent scrollbar clipping */
                        mask-image: linear-gradient(to right, black 90%, transparent);
                    }
                    `;
                    html = '<style>' + styles + '</style>' + html;
                }
            } else if (target.startsWith('unit_')) {
                const unitNum = target.split('_')[1];
                html = '<button id="toggle-revision" onclick="document.body.classList.toggle(\'quick-revision-mode\')">⚡ Toggle Quick Revision</button>';

                // Content
                const sumKey = `Unit_${unitNum}/Summary.md`;
                if(dbContent[sumKey]) {
                    html += parseMarkdown(dbContent[sumKey]);
                } else {
                    html += `<h1>Unit ${unitNum}</h1><i>No Summary.md found.</i>`;
                }

                // MCQs
                const mcqKey = `Unit_${unitNum}/Unit${unitNum}_MCQs.txt`;
                if(dbContent[mcqKey]) {
                    html += renderMCQs(dbContent[mcqKey]);
                }
            }

            DOMPurify.addHook('uponSanitizeAttribute', function (node, data) {
                if (data.attrName === 'onclick') {
                    const safeCalls = /^(?:markStudied\(this\)|loadContent\('[a-zA-Z0-9_]+'\)|document\.body\.classList\.toggle\('[a-zA-Z0-9_-]+'\)|selectOpt\([0-9]+,\s*'[^']+',\s*'[^']+'\)|revealAns\([0-9]+\))$/;
                    if (!safeCalls.test(data.attrValue.trim())) {
                        data.keepAttr = false;
                    }
                }
            });
            area.innerHTML = DOMPurify.sanitize(html, { ADD_ATTR: ['onclick'] });
            document.getElementById('main-content').scrollTop = 0;
            if(window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        loadContent('unit_1'); // default to unit 1 to show off new features

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => loadContent(item.getAttribute('data-target')));
        });
        document.getElementById('menu-toggle').addEventListener('click', () => {
             document.getElementById('sidebar').classList.toggle('open');
        });

        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        });
        if(localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }

        // Scroll Progress
        const mainContentEl = document.getElementById('main-content');
        const scrollBar = document.getElementById('scroll-progress');
        mainContentEl.addEventListener('scroll', () => {
            let scrollTop = mainContentEl.scrollTop;
            let scrollHeight = mainContentEl.scrollHeight - mainContentEl.clientHeight;
            let progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
            scrollBar.style.width = progress + '%';
        });

        // Pomodoro Timer
        let pomoTime = 25 * 60;
        let pomoInterval = null;
        let pomoRunning = false;
        const pomoTimeEl = document.getElementById('pomodoro-time');
        const pomoPlayBtn = document.getElementById('pomo-play');

        function updatePomoDisplay() {
            let m = Math.floor(pomoTime / 60).toString().padStart(2, '0');
            let s = (pomoTime % 60).toString().padStart(2, '0');
            pomoTimeEl.innerText = `${m}:${s}`;
            document.title = `${m}:${s} - FocusTimer`;
        }

        document.getElementById('pomo-play').addEventListener('click', () => {
            if(pomoRunning) {
                clearInterval(pomoInterval);
                pomoRunning = false;
                pomoPlayBtn.innerText = '▶️';
                document.title = `UGC NET Anthropology Portal`;
            } else {
                pomoRunning = true;
                pomoPlayBtn.innerText = '⏸️';
                pomoInterval = setInterval(() => {
                    if(pomoTime > 0) {
                        pomoTime--;
                        updatePomoDisplay();
                    } else {
                        clearInterval(pomoInterval);
                        pomoRunning = false;
                        pomoPlayBtn.innerText = '▶️';
                        pomoTime = 5 * 60; // 5 min break
                        updatePomoDisplay();
                        alert('Focus session complete! Taking a 5 minute break.');
                    }
                }, 1000);
            }
        });

        document.getElementById('pomo-reset').addEventListener('click', () => {
            clearInterval(pomoInterval);
            pomoRunning = false;
            pomoTime = 25 * 60;
            pomoPlayBtn.innerText = '▶️';
            document.title = `UGC NET Anthropology Portal`;
            updatePomoDisplay();
        });

    </script>
</body>
</html>
