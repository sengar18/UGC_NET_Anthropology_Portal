n `Folder_1` and `Folder_2` will be mapped and integrated into the `anthropology.html` (or `index.html`) study portal. \n*Note: Folder_1 and Folder_2 contain identical sets of PDFs. One non-anthropology PDF (Indium selenides) has been excluded.*\n\n## \ud83d\uddfa\ufe0f Mapping Strategy\n\n### \ud83d\udfe2 Unit 1: Meaning and Scope of Anthropology\n1. **BLOCK 1.pdf**\n   * *Theme*: Introduction to Biological Anthropology.\n   * *Summary*: Defines the fundamental scope and applications of biological anthropology. It explores the holistic relationship between human biology and cultural environments.\n2. **Unit-1.pdf**\n   * *Theme*: Concept of Society and Culture.\n   * *Summary*: Investigates the core definitions and elements of human society and culture. It establishes the foundational sociological concepts necessary for anthropological study.\n\n### \ud83d\udfe2 Unit 2: Evolution and Primatology\n3. **MANI-002B3E.pdf**\n   * *Theme*: Primate Study and Phylogeny.\n   * *Summary*: Details the classification, anatomy, and behavior of living primates. It traces their phylogenetic relationships to understand early human evolutionary pathways.\n\n### \ud83d\udfe2 Unit 3: Archaeological Anthropology\n4. **MAN-002B5E.pdf**\n   * *Theme*: Palaeolithic Cultures.\n   * *Summary*: Chronicles the progression of Lower, Middle, and Upper Palaeolithic cultures. It analyzes the development of prehistoric art and early human survival strategies.\n5. **Unit-4 (1).pdf**\n   * *Theme*: Dating Methods.\n   * *Summary*: Compares relative and absolute chronometric dating methods. It covers critical techniques like stratigraphy, radiocarbon, and potassium-argon dating utilized in archaeology.\n6. **Unit-8.pdf**\n   * *Theme*: Prehistoric Typology.\n   * *Summary*: Categorizes prehistoric stone tools across the Palaeolithic, Mesolithic, and Neolithic periods. It also examines early ceramic typologies and firing techniques.\n\n### \ud83d\udfe2 Unit 4: Social and Cultural Anthropology\n7. **BLOCK 2.pdf**\n   * *Theme*: Introduction to Social and Cultural Anthropology.\n   * *Summary*: Introduces the foundational concepts governing human social organization. It provides a broad overview of cultural dynamics and social structures.\n8. **residence-and-kinship.pdf**\n   * *Theme*: Marital Residence and Kinship by Ember.\n   * *Summary*: Cross-culturally analyzes rules of descent, kinship terminology, and post-marital residence patterns. It explores the predictors and consequences of living arrangements like patrilocality and matrilocality.\n9. **Unit-3.pdf**\n   * *Theme*: Kinship Systems.\n   * *Summary*: Explores complex kin relations including moieties, phratries, and clans. It details specific kinship usages like avoidance relationships and the avunculate.\n10. **Unit-5.pdf**\n   * *Theme*: Alliance Theory.\n   * *Summary*: Discusses marriage as a systematic form of exchange across cultures. It heavily references Levi-Strauss's structuralist interpretations of elementary kinship and Dravidian marriage rules.\n11. **Unit-1 (1).pdf**\n   * *Theme*: Concepts of Religion.\n   * *Summary*: Categorizes early religious beliefs such as animism, animatism, and totemism. It breaks down anthropological approaches to understanding magic, witchcraft, and religious symbolism.\n12. **Unit7.pdf**\n   * *Theme*: Economic and Political Institutions.\n   * *Summary*: Reviews the functioning of bands, tribes, chiefdoms, and state-level societies. It bridges these political structures with their corresponding systems of economic production and exchange.\n\n### \ud83d\udfe2 Unit 5: Human Genetics and Physical Anthropology\n13. **MANE-001-B1.pdf**\n   * *Theme*: Introduction to Human Genetics.\n   * *Summary*: Outlines the biological basis of human heredity and formal genetics. It establishes the cellular mechanisms bridging genetic inheritance to physical variability.\n14. **Unit--3.pdf**\n   * *Theme*: Dermatoglyphics.\n   * *Summary*: Analyzes the fundamental principles of fingerprint classification, including loops, whorls, and arches. It discusses the utility of palmar dermatoglyphics for personal identification.\n15. **Unit-11.pdf**\n   * *Theme*: Somatotyping and Human Physique.\n   * *Summary*: Evaluates historical methods of body classification such as those developed by Sheldon, Kretschmer, and Heath-Carter. It examines how phenotypic expressions of body shape vary across human populations.\n16. **Unit-2.pdf**\n   * *Theme*: Stages of Human Growth.\n   * *Summary*: Tracks the biological progression from prenatal development through senescence. It discusses normal growth variations and secular trends in human physical maturation.\n\n### \ud83d\udfe2 Unit 6: Anthropological Theories\n17. **112.pdf**\n   * *Theme*: Symbolic Functionalism.\n   * *Summary*: Compares the approaches of Clifford Geertz and Victor Turner in interpreting cultural symbols. It explores how symbolic interactionism and folklore construct communal meaning.\n18. **Block-3.pdf**\n   * *Theme*: Anthropological Theories I.\n   * *Summary*: Surveys classical evolutionary theories alongside functionalism and structural-functionalism. It highlights the shifting paradigms of analyzing social organization dynamically.\n\n### \ud83d\udfe2 Unit 9: Applied and Action Anthropology\n19. **Unit-1 (2).pdf**\n   * *Theme*: History of Applied Anthropology.\n   * *Summary*: Analyzes the historical divergence of applied anthropology from pure theory. It explores how anthropological knowledge is practically utilized in administration and development, particularly in India.\n\n### \ud83d\udfe2 Unit 10: Research Methods\n20. **Block-4.pdf**\n   * *Theme*: Approaches to Anthropological Research.\n   * *Summary*: Details fundamental ethnographic methodologies including holistic, emic, and etic approaches. It emphasizes the importance of comparative and historical frameworks in fieldwork.\n\n## \u2699\ufe0f Execution Plan\n1. I will parse `generate_html.py`.\n2. For each Unit section in the Python script's `units_data` (and Unit 1-3's separate text blocks), I will dynamically insert the formatted HTML blocks containing the `<h3>` titles and `<p class=\"unit-description\">` summaries exactly where the relevant unit content begins.\n3. I will regenerate `index.html` to apply the updates visually.\n\n**Please review this plan. If you approve, I will proceed with updating the code!**\n", "node_modules/entities/readme.md": "# entities [![NPM version](https://img.shields.io/npm/v/entities.svg)](https://npmjs.org/package/entities) [![Downloads](https://img.shields.io/npm/dm/entities.svg)](https://npmjs.org/package/entities) [![Node.js CI](https://github.com/fb55/entities/actions/workflows/nodejs-test.yml/badge.svg)](https://github.com/fb55/entities/actions/workflows/nodejs-test.yml)\n\nEncode & decode HTML & XML entities with ease & speed.\n\n## Features\n\n- \ud83d\ude07 Tried and true: `entities` is used by many popular libraries; eg.\n  [`htmlparser2`](https://github.com/fb55/htmlparser2), the official\n  [AWS SDK](https://github.com/aws/aws-sdk-js-v3) and\n  [`commonmark`](https://github.com/commonmark/commonmark.js) use it to process\n  HTML entities.\n- \u26a1\ufe0f Fast: `entities` is the fastest library for decoding HTML entities (as of\n  September 2025); see [performance](#performance).\n- \ud83c\udf9b Configurable: Get an output tailored for your needs. You are fine with\n  UTF8? That'll save you some bytes. Prefer to only have ASCII characters? We\n  can do that as well!\n\n## How to\u2026\n\n### \u2026install `entities`\n\n    npm install entities\n\n### \u2026use `entities`\n\n```javascript\nimport * as entities from \"entities\";\n\n// Encoding\nentities.escapeUTF8(\"&#38; \u00fc\"); // \"&amp;#38; \u00fc\"\nentities.encodeXML(\"&#38; \u00fc\"); // \"&amp;#38; &#xfc;\"\nentities.encodeHTML(\"&#38; \u00fc\"); // \"&amp;&num;38&semi; &uuml;\"\n\n// Decoding\nentities.decodeXML(\"asdf &amp; &#xFF; &#xFC; &apos;\"); // \"asdf & \u00ff \u00fc '\"\nentities.decodeHTML(\"asdf &amp; &yuml; &uuml; &apos;\"); // \"asdf & \u00ff \u00fc '\"\n```\n\n## Performance\n\nBenchmarked in September 2025 with Node v24.6.0 on Apple M2 using `tinybench`.\nHigher ops/s is better; `avg (\u03bcs)` is the mean time per operation.\nSee `scripts/benchmark.ts` to reproduce.\n\n### Decoding\n\n| Library        | Version | ops/s     | avg (\u03bcs) | \u00b1%   | slower |\n| -------------- | ------- | --------- | -------- | ---- | ------ |\n| entities       | 7.0.0   | 5,838,416 | 175.57   | 0.06 | \u2014      |\n| html-entities  | 2.6.0   | 2,919,637 | 347.77   | 0.33 | 50.0%  |\n| he             | 1.2.0   | 2,318,438 | 446.48   | 0.70 | 60.3%  |\n| parse-entities | 4.0.2   |   852,855 | 1,199.51 | 0.36 | 85.4%  |\n\n### Encoding\n\n| Library        | Version | ops/s     | avg (\u03bcs) | \u00b1%   | slower |\n| -------------- | ------- | --------- | -------- | ---- | ------ |\n| entities       | 7.0.0   | 2,770,115 | 368.09   | 0.11 | \u2014      |\n| html-entities  | 2.6.0   | 1,491,963 | 679.96   | 0.58 | 46.2%  |\n| he             | 1.2.0   |   481,278 | 2,118.25 | 0.61 | 82.6%  |\n\n### Escaping\n\n| Library        | Version | ops/s     | avg (\u03bcs) | \u00b1%   | slower |\n| -------------- | ------- | --------- | -------- | ---- | ------ |\n| entities       | 7.0.0   | 4,616,468 | 223.84   | 0.17 | \u2014      |\n| he             | 1.2.0   | 3,659,301 | 280.76   | 0.58 | 20.7%  |\n| html-entities  | 2.6.0   | 3,555,301 | 296.63   | 0.84 | 23.0%  |\n\nNote: Micro-benchmarks may vary across machines and Node versions.\n\n---\n\n## FAQ\n\n> What methods should I actually use to encode my documents?\n\nIf your target supports UTF-8, the `escapeUTF8` method is going to be your best\nchoice. Otherwise, use either `encodeHTML` or `encodeXML` based on whether\nyou're dealing with an HTML or an XML document.\n\nYou can have a look at the options for the `encode` and `decode` methods to see\neverything you can configure.\n\n> When should I use strict decoding?\n\nWhen strict decoding, entities not terminated with a semicolon will be ignored.\nThis is helpful for decoding entities in legacy environments.\n\n> Why should I use `entities` instead of alternative modules?\n\nAs of September 2025, `entities` is faster than other modules. Still, this is\nnot a differentiated space and other modules can catch up.\n\n**More importantly**, you might already have `entities` in your dependency graph\n(as a dependency of eg. `cheerio`, or `htmlparser2`), and including it directly\nmight not even increase your bundle size. The same is true for other entity\nlibraries, so have a look through your `node_modules` directory!\n\n> Does `entities` support tree shaking?\n\nYes! Note that for best results, you should not use the `encode` and `decode`\nfunctions, as they wrap around a number of other functions, all of which will\nremain in the bundle. Instead, use the functions that you need directly.\n\n---\n\n## Acknowledgements\n\nThis library wouldn't be possible without the work of these individuals. Thanks\nto\n\n- [@mathiasbynens](https://github.com/mathiasbynens) for his explanations about\n  character encodings, and his library `he`, which was one of the inspirations\n  for `entities`\n- [@inikulin](https://github.com/inikulin) for his work on optimized tries for\n  decoding HTML entities for the `parse5` project\n- [@mdevils](https://github.com/mdevils) for taking on the challenge of\n  producing a quick entity library with his `html-entities` library. `entities`\n  would be quite a bit slower if there wasn't any competition. Right now\n  `entities` is on top, but we'll see how long that lasts!\n\n---\n\nLicense: BSD-2-Clause\n\n## Security contact information\n\nTo report a security vulnerability, please use the\n[Tidelift security contact](https://tidelift.com/security). Tidelift will\ncoordinate the fix and disclosure.\n", "node_modules/tr46/README.md": "# tr46\n\nAn JavaScript implementation of [Unicode Technical Standard #46: Unicode IDNA Compatibility Processing](https://unicode.org/reports/tr46/).\n\n## API\n\n### `toASCII(domainName[, options])`\n\nConverts a string of Unicode symbols to a case-folded Punycode string of ASCII symbols.\n\nAvailable options:\n\n* [`checkBidi`](#checkbidi)\n* [`checkHyphens`](#checkhyphens)\n* [`checkJoiners`](#checkjoiners)\n* [`ignoreInvalidPunycode`](#ignoreinvalidpunycode)\n* [`transitionalProcessing`](#transitionalprocessing)\n* [`useSTD3ASCIIRules`](#usestd3asciirules)\n* [`verifyDNSLength`](#verifydnslength)\n\n### `toUnicode(domainName[, options])`\n\nConverts a case-folded Punycode string of ASCII symbols to a string of Unicode symbols.\n\nAvailable options:\n\n* [`checkBidi`](#checkbidi)\n* [`checkHyphens`](#checkhyphens)\n* [`checkJoiners`](#checkjoiners)\n* [`ignoreInvalidPunycode`](#ignoreinvalidpunycode)\n* [`transitionalProcessing`](#transitionalprocessing)\n* [`useSTD3ASCIIRules`](#usestd3asciirules)\n\n## Options\n\n### `checkBidi`\n\nType: `boolean`\nDefault value: `false`\nWhen set to `true`, any bi-directional text within the input will be checked for validation.\n\n### `checkHyphens`\n\nType: `boolean`\nDefault value: `false`\nWhen set to `true`, the positions of any hyphen characters within the input will be checked for validation.\n\n### `checkJoiners`\n\nType: `boolean`\nDefault value: `false`\nWhen set to `true`, any word joiner characters within the input will be checked for validation.\n\n### `ignoreInvalidPunycode`\n\nType: `boolean`\nDefault value: `false`\nWhen set to `true`, invalid Punycode strings within the input will be allowed.\n\n### `transitionalProcessing`\n\nType: `boolean`\nDefault value: `false`\nWhen set to `true`, uses [transitional (compatibility) processing](https://unicode.org/reports/tr46/#Compatibility_Processing) of the deviation characters.\n\n### `useSTD3ASCIIRules`\n\nType: `boolean`\nDefault value: `false`\nWhen set to `true`, input will be validated according to [STD3 Rules](http://unicode.org/reports/tr46/#STD3_Rules).\n\n### `verifyDNSLength`\n\nType: `boolean`\nDefault value: `false`\nWhen set to `true`, the length of each DNS label within the input will be checked for validation.\n", "node_modules/tr46/LICENSE.md": "The MIT License (MIT)\n\nCopyright (c) Sebastian Mayr\n\nPermission is hereby granted, free of charge, to any person obtaining a copy\nof this software and associated documentation files (the \"Software\"), to deal\nin the Software without restriction, including without limitation the rights\nto use, copy, modify, merge, publish, distribute, sublicense, and/or sell\ncopies of the Software, and to permit persons to whom the Software is\nfurnished to do so, subject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all\ncopies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,\nFITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\nAUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\nLIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\nOUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE\nSOFTWARE.\n", "node_modules/@bramus/specificity/README.md": "[![Calculate CSS Specificity](./screenshots/calculate-specificity.png)](https://codepen.io/bramus/pen/WNXyoYm)\n\n# Specificity\n\n`@bramus/specificity` is a package to calculate the specificity of CSS Selectors. It also includes some convenience functions to compare, sort, and filter an array of specificity values.\n\nSupports [Selectors Level 4](https://www.w3.org/TR/selectors-4/), including those special cases `:is()`, `:where()`, `:not()`, etc.\n\nDemo: [https://codepen.io/bramus/pen/WNXyoYm](https://codepen.io/bramus/pen/WNXyoYm)\n\n## Installation\n\n```bash\nnpm i @bramus/specificity\n```\n\n## Usage / Example\n\nAt its core, `@bramus/specificity` exposes a `Specificity` class. Its static `calculate` method can be used to calculate the specificity of a given CSS [Selector List](https://www.w3.org/TR/selectors-4/#grouping) string.\n\n```js\nimport Specificity from '@bramus/specificity';\n\nconst specificities = Specificity.calculate('header:where(#top) nav li:nth-child(2n), #doormat');\n```\n\nBecause `calculate` accepts a [Selector List](https://www.w3.org/TR/selectors-4/#grouping) \u2014 which can contain more than 1 [Selector](https://www.w3.org/TR/selectors-4/#selector) \u2014 it will always return an array, with each entry being a `Specificity` instance \u2014 one per found selector.\n\n```js\nconst specificities = Specificity.calculate('header:where(#top) nav li:nth-child(2n), #doormat');\nspecificities.map((s) => s.toString()); // ~> [\"(0,1,3)\",\"(1,0,0)\"]\n```\n\n\ud83d\udca1 If you know you\u2019re passing only a single Selector into `calculate()`, you can use JavaScript\u2019s built-in destructuring to keep your variable names clean.\n\n```js\nconst [s] = Specificity.calculate('header:where(#top) nav li:nth-child(2n)');\ns.toString(); // ~> \"(0,1,3)\"\n```\n\n\ud83d\udca1 Under the hood, `@bramus/specificity` uses [CSSTree](https://github.com/csstree/csstree) to do the parsing of strings to Selectors. As a result, the `calculate` method also accepts a [CSSTree AST](https://github.com/csstree/csstree/blob/master/docs/ast.md) of the types `Selector` and `SelectorList`.\n\nIf you have a pre-parsed CSSTree AST of the type `Selector` you can pass it into `Specificity.calculateForAST()`. It [performs slightly better](#benchmark) than `Specificity.calculate()` as it needs to check fewer things. It differs from `Specificity.calculate()` in that it does not return an array of `Specificity` instances but only a single value.\n\n## The Return Format\n\nA calculated specificity is represented as an instance of the `Specificity` class. The `Specificity` class includes methods to get the specificity value in a certain format, along with some convenience methods to compare it against other instances.\n\n```js\n// \ud83d\ude80 Thunderbirds are go!\nimport Specificity from '@bramus/specificity';\n\n// \u2728 Calculate specificity for each Selector in the given Selector List\nconst specificities = Specificity.calculate('header:where(#top) nav li:nth-child(2n), #doormat');\n\n// \ud83d\ude9a The values in the array are instances of the Specificity class\nconst s = specificities[0]; // Instance of Specificity\n\n// \ud83d\udc40 Read the specificity value using one of its accessors\ns.value; // { a: 0, b: 1, c: 3 }\ns.a; // 0\ns.b; // 1\ns.c; // 3\n\n// \ud83d\udee0 Convert the calculated value to various formats using one of the toXXX() instance methods\ns.toString(); // \"(0,1,3)\"\ns.toArray(); // [0, 1, 3]\ns.toObject(); // { a: 0, b: 1, c: 3 }\n\n// \ud83d\udca1 Extract the matched selector string\ns.selectorString(); // \"header:where(#top) nav li:nth-child(2n)\"\n\n// \ud83d\udd00 Use one of its instance comparison methods to compare it to another Specificity instance\ns.isEqualTo(specificities[1]); // false\ns.isGreaterThan(specificities[1]); // false\ns.isLessThan(specificities[1]); // true\n\n// \ud83d\udcbb Don\u2019t worry about JSON.stringify()\nJSON.stringify(s);\n// {\n//    \"selector\": 'header:where(#top) nav li:nth-child(2n)',\n//    \"asObject\": { \"a\": 0, \"b\": 1, \"c\": 3 },\n//    \"asArray\": [0, 1, 3],\n//    \"asString\": \"(0,1,3)\",\n// }\n```\n\n## Utility Functions (Static Methods)\n\nThis package also exposes some utility functions to work with specificities. These utility functions are all exposed as static methods on the `Specificity` class.\n\n-   Comparing:\n\n    -   `Specificity.compare(s1, s2)`: Compares s1 to s2. Returns a value that can be:\n        -   `> 0` = Sort s2 before s1 _(i.e. s1 is more specific than s2)_\n        -   `0` = Keep original order of s1 and s2 _(i.e. s1 and s2 are equally specific)_\n        -   `< 0` = Sort s1 before s2 _(i.e. s1 is less specific than s2)_\n    -   `Specificity.equals(s1, s2)`: Returns `true` if s1 and s2 have the same specificity. If not, `false` is returned.\n    -   `Specificity.greaterThan(s1, s2)`: Returns `true` if s1 has a higher specificity than s2. If not, `false` is returned.\n    -   `Specificity.lessThan(s1, s2)`: Returns `true` if s1 has a lower specificity than s2. If not, `false` is returned.\n\n-   Sorting:\n\n    -   `Specificity.sortAsc(s1, s2, \u2026, sN)`: Sorts the given specificities in ascending order _(low specificity to high specificity)_\n    -   `Specificity.sortDesc(s1, s2, \u2026, sN)`: Sorts the given specificities in descending order _(high specificity to low specificity)_\n\n-   Filtering:\n    -   `Specificity.min(s1, s2, \u2026, sN)`: Filters out the value with the lowest specificity\n    -   `Specificity.max(s1, s2, \u2026, sN)`: Filters out the value with the highest specificity\n\nA specificity passed into any of these utility functions can be any of:\n\n-   An instance of the included `Specificity` class\n-   A simple Object such as `{'a': 1, 'b': 0, 'c': 2}`\n\n## Utility Functions (Standalone)\n\nAll static methods the `Specificity` class exposes are also exported as standalone functions using [Subpath Exports](https://nodejs.org/api/packages.html#subpath-exports).\n\nIf you're only interested in including some of these functions into your project you can import them from their Subpath. As a result, your bundle size will be reduced greatly _(except for including the standalone `calculate`, as it returns an array of `Specificity` instances that relies on the whole lot)_\n\n```js\nimport { calculate, calculateForAST } from '@bramus/specificity/core';\nimport { compare, equals, greaterThan, lessThan } from '@bramus/specificity/compare';\nimport { min, max } from '@bramus/specificity/filter';\nimport { sortAsc, sortDesc } from '@bramus/specificity/sort';\n```\n\n## Type Definitions\n\nAlthough `@bramus/specificity` is written in Vanilla JavaScript, it does include [Type Definitions](https://www.typescriptlang.org/docs/handbook/2/type-declarations.html) which are exposed via its `package.json`.\n\n## Binary/CLI\n\n`@bramus/specificity` exposes a binary named `specificity` to calculate the specificity of a given selector list on the CLI. For each selector that it finds, it'll print out the calculated specificity as a string on a new line.\n\n```bash\n$ specificity \"header:where(#top) nav li:nth-child(2n), #doormat\"\n(0,1,3)\n(1,0,0)\n```\n\n## Benchmark\n\nA benchmark is included, which you can invoke using `npm run benchmark`.\n\nSample results (tested on a MacBook Air M3):\n\n```\nSpecificity.calculate(string) x 420,682 ops/sec \u00b10.34% (98 runs sampled)\nSpecificity.calculate(ast) - using SelectorList x 8,994,080 ops/sec \u00b10.25% (98 runs sampled)\nSpecificity.calculate(ast) - using Selector x 11,054,856 ops/sec \u00b10.39% (91 runs sampled)\nSpecificity.calculateForAST(ast) x 12,652,322 ops/sec \u00b10.35% (96 runs sampled)\n```\n\n## License\n\n`@bramus/specificity` is released under the MIT public license. See the enclosed `LICENSE` for details.\n\n## Acknowledgements\n\nThe idea to create this package was sparked by [the wonderful Specificity Calculator created by Kilian Valkhof / Polypane](https://polypane.app/css-specificity-calculator/), a highly educational tool that not only calculates the specificity, but also explains which parts are responsible for it.\n\nThe heavy lifting of doing the actual parsing of Selectors is done by [CSSTree](https://github.com/csstree/csstree).\n", "node_modules/decimal.js/LICENCE.md": "The MIT Licence.\n\nCopyright (c) 2025 Michael Mclaughlin\n\nPermission is hereby granted, free of charge, to any person obtaining\na copy of this software and associated documentation files (the\n'Software'), to deal in the Software without restriction, including\nwithout limitation the rights to use, copy, modify, merge, publish,\ndistribute, sublicense, and/or sell copies of the Software, and to\npermit persons to whom the Software is furnished to do so, subject to\nthe following conditions:\n\nThe above copyright notice and this permission notice shall be\nincluded in all copies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED 'AS IS', WITHOUT WARRANTY OF ANY KIND,\nEXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF\nMERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT.\nIN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY\nCLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION OF CONTRACT,\nTORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION WITH THE\nSOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n\n", "node_modules/decimal.js/README.md": "![decimal.js](https://raw.githubusercontent.com/MikeMcl/decimal.js/gh-pages/decimaljs.png)\n\nAn arbitrary-precision Decimal type for JavaScript.\n\n[![npm version](https://img.shields.io/npm/v/decimal.js.svg)](https://www.npmjs.com/package/decimal.js)\n[![npm downloads](https://img.shields.io/npm/dw/decimal.js)](https://www.npmjs.com/package/decimal.js)\n[![CDNJS](https://img.shields.io/cdnjs/v/decimal.js.svg)](https://cdnjs.com/libraries/decimal.js)\n[![](https://data.jsdelivr.com/v1/package/npm/decimal.js/badge)](https://www.jsdelivr.com/package/npm/decimal.js)\n\n<br>\n\n## Features\n\n  - Integers and floats\n  - Simple but full-featured API\n  - Replicates many of the methods of JavaScript's `Number.prototype` and `Math` objects\n  - Also handles hexadecimal, binary and octal values\n  - Faster, smaller, and perhaps easier to use than JavaScript versions of Java's BigDecimal\n  - No dependencies\n  - Wide platform compatibility: uses JavaScript 1.5 (ECMAScript 3) features only\n  - Comprehensive [documentation](https://mikemcl.github.io/decimal.js/) and test set\n  - Used under the hood by [math.js](https://github.com/josdejong/mathjs)\n  - Includes a TypeScript declaration file: *decimal.d.ts*\n\n![API](https://raw.githubusercontent.com/MikeMcl/decimal.js/gh-pages/API.png)\n\nThe library is similar to [bignumber.js](https://github.com/MikeMcl/bignumber.js/), but here\nprecision is specified in terms of significant digits rather than decimal places, and all\ncalculations are rounded to the precision (similar to Python's decimal module) rather than just\nthose involving division.\n\nThis library also adds the trigonometric functions, among others, and supports non-integer powers,\nwhich makes it a significantly larger library than *bignumber.js* and the even smaller\n[big.js](https://github.com/MikeMcl/big.js/).\n\nFor a lighter version of this library without the trigonometric functions see\n[decimal.js-light](https://github.com/MikeMcl/decimal.js-light/).\n\n## Load\n\nThe library is the single JavaScript file *decimal.js* or ES module *decimal.mjs*.\n\nBrowser:\n\n```html\n<script src='path/to/decimal.js'><\/script>\n\n<script type=\"module\">\n  import Decimal from './path/to/decimal.mjs';\n  ...\n<\/script>\n```\n\n[Node.js](https://nodejs.org):\n\n```bash\nnpm install decimal.js\n```\n```js\nconst Decimal = require('decimal.js');\n\nimport Decimal from 'decimal.js';\n\nimport {Decimal} from 'decimal.js';\n```\n\n## Use\n\n*In all examples below, semicolons and `toString` calls are not shown.\nIf a commented-out value is in quotes it means `toString` has been called on the preceding expression.*\n\nThe library exports a single constructor function, `Decimal`, which expects a single argument that is a number, string or Decimal instance.\n\n```js\nx = new Decimal(123.4567)\ny = new Decimal('123456.7e-3')\nz = new Decimal(x)\nx.equals(y) && y.equals(z) && x.equals(z)        // true\n```\n\nIf using values with more than a few digits, it is recommended to pass strings rather than numbers to avoid a potential loss of precision.\n\n```js\n// Precision loss from using numeric literals with more than 15 significant digits.\nnew Decimal(1.0000000000000001)         // '1'\nnew Decimal(88259496234518.57)          // '88259496234518.56'\nnew Decimal(99999999999999999999)       // '100000000000000000000'\n\n// Precision loss from using numeric literals outside the range of Number values.\nnew Decimal(2e+308)                     // 'Infinity'\nnew Decimal(1e-324)                     // '0'\n\n// Precision loss from the unexpected result of arithmetic with Number values.\nnew Decimal(0.7 + 0.1)                  // '0.7999999999999999'\n```\n\nAs with JavaScript numbers, strings can contain underscores as separators to improve readability.\n\n```js\nx = new Decimal('2_147_483_647')\n```\n\nString values in binary, hexadecimal or octal notation are also accepted if the appropriate prefix is included.\n\n```js\nx = new Decimal('0xff.f')            // '255.9375'\ny = new Decimal('0b10101100')        // '172'\nz = x.plus(y)                        // '427.9375'\n\nz.toBinary()                         // '0b110101011.1111'\nz.toBinary(13)                       // '0b1.101010111111p+8'\n\n// Using binary exponential notation to create a Decimal with the value of `Number.MAX_VALUE`.\nx = new Decimal('0b1.1111111111111111111111111111111111111111111111111111p+1023')\n// '1.7976931348623157081e+308'\n```\n\nDecimal instances are immutable in the sense that they are not changed by their methods.\n\n```js\n0.3 - 0.1                     // 0.19999999999999998\nx = new Decimal(0.3)\nx.minus(0.1)                  // '0.2'\nx                             // '0.3'\n```\n\nThe methods that return a Decimal can be chained.\n\n```js\nx.dividedBy(y).plus(z).times(9).floor()\nx.times('1.23456780123456789e+9').plus(9876.5432321).dividedBy('4444562598.111772').ceil()\n```\n\nMany method names have a shorter alias.\n\n```js\nx.squareRoot().dividedBy(y).toPower(3).equals(x.sqrt().div(y).pow(3))     // true\nx.comparedTo(y.modulo(z).negated() === x.cmp(y.mod(z).neg())              // true\n```\n\nMost of the methods of JavaScript's `Number.prototype` and `Math` objects are replicated.\n\n```js\nx = new Decimal(255.5)\nx.toExponential(5)                       // '2.55500e+2'\nx.toFixed(5)                             // '255.50000'\nx.toPrecision(5)                         // '255.50'\n\nDecimal.sqrt('6.98372465832e+9823')      // '8.3568682281821340204e+4911'\nDecimal.pow(2, 0.0979843)                // '1.0702770511687781839'\n\n// Using `toFixed()` to avoid exponential notation:\nx = new Decimal('0.0000001')\nx.toString()                             // '1e-7'\nx.toFixed()                              // '0.0000001'\n```\n\nAnd there are `isNaN` and `isFinite` methods, as `NaN` and `Infinity` are valid `Decimal` values.\n\n```js\nx = new Decimal(NaN)                                           // 'NaN'\ny = new Decimal(Infinity)                                      // 'Infinity'\nx.isNaN() && !y.isNaN() && !x.isFinite() && !y.isFinite()      // true\n```\n\nThere is also a `toFraction` method with an optional *maximum denominator* argument.\n\n```js\nz = new Decimal(355)\npi = z.dividedBy(113)        // '3.1415929204'\npi.toFraction()              // [ '7853982301', '2500000000' ]\npi.toFraction(1000)          // [ '355', '113' ]\n```\n\nAll calculations are rounded according to the number of significant digits and rounding mode specified\nby the `precision` and `rounding` properties of the Decimal constructor.\n\nFor advanced usage, multiple Decimal constructors can be created, each with their own independent\nconfiguration which applies to all Decimal numbers created from it.\n\n```js\n// Set the precision and rounding of the default Decimal constructor\nDecimal.set({ precision: 5, rounding: 4 })\n\n// Create another Decimal constructor, optionally passing in a configuration object\nDec = Decimal.clone({ precision: 9, rounding: 1 })\n\nx = new Decimal(5)\ny = new Dec(5)\n\nx.div(3)                           // '1.6667'\ny.div(3)                           // '1.66666666'\n```\n\nThe value of a Decimal is stored in a floating point format in terms of its digits, exponent and sign, but these properties should be considered read-only.\n\n```js\nx = new Decimal(-12345.67);\nx.d                            // [ 12345, 6700000 ]    digits (base 10000000)\nx.e                            // 4                     exponent (base 10)\nx.s                            // -1                    sign\n```\n\nFor further information see the [API](http://mikemcl.github.io/decimal.js/) reference in the *doc* directory.\n\n## Test\n\nTo run the tests using Node.js from the root directory:\n\n```bash\nnpm test\n```\n\nEach separate test module can also be executed individually, for example:\n\n```bash\nnode test/modules/toFraction\n```\n\nTo run the tests in a browser, open *test/test.html*.\n\n## Minify\n\nTwo minification examples:\n\nUsing [uglify-js](https://github.com/mishoo/UglifyJS) to minify the *decimal.js* file:\n\n```bash\nnpm install uglify-js -g\nuglifyjs decimal.js --source-map url=decimal.min.js.map -c -m -o decimal.min.js\n```\n\nUsing [terser](https://github.com/terser/terser) to minify the ES module version, *decimal.mjs*:\n\n```bash\nnpm install terser -g\nterser decimal.mjs --source-map url=decimal.min.mjs.map -c -m --toplevel -o decimal.min.mjs\n```\n\n```js\nimport Decimal from './decimal.min.mjs';\n```\n\n## Licence\n\n[The MIT Licence](LICENCE.md)\n", "node_modules/bidi-js/LICENSE.txt": "Copyright (c) 2021 Jason Johnston\n\nMIT License\n\nPermission is hereby granted, free of charge, to any person obtaining\na copy of this software and associated documentation files (the\n\"Software\"), to deal in the Software without restriction, including\nwithout limitation the rights to use, copy, modify, merge, publish,\ndistribute, sublicense, and/or sell copies of the Software, and to\npermit persons to whom the Software is furnished to do so, subject to\nthe following conditions:\n\nThe above copyright notice and this permission notice shall be\nincluded in all copies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND,\nEXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF\nMERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND\nNONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE\nLIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION\nOF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION\nWITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/bidi-js/README.md": "# bidi-js\n\nThis is a pure JavaScript implementation of the [Unicode Bidirectional Algorithm](https://www.unicode.org/reports/tr9/) version 13.0.0. Its goals, in no particular order, are to be:\n\n* Correct\n* Small\n* Fast\n\n\n## Conformance\n\nThis implementation currently conforms to section [UAX-C1](https://unicode.org/reports/tr9/#C1) of the bidi spec, as verified by running all the provided [conformance tests](https://unicode.org/reports/tr9/#Bidi_Conformance_Testing).\n\n## Compatibility\n\nIt has no external dependencies and therefore should run just fine in any relatively capable web browser, Node.js, etc. The provided distribution `.js` files are valid ES5.\n\n## Usage\n\nInstall it from npm:\n\n```shell\nnpm install bidi-js\n```\n\n[![NPM](https://nodei.co/npm/bidi-js.png?compact=true)](https://npmjs.org/package/bidi-js)\n\nImport and initialize:\n\n```js\nimport bidiFactory from 'bidi-js'\n// or: const bidiFactory = require('bidi-js')\n\nconst bidi = bidiFactory()\n```\n\nThe `bidi-js` package's only export is a factory function which you _must invoke_ to return a `bidi` object; that object exposes the methods for bidi processing.\n\n(_Why a factory function?_ The main reason is to ensure the entire module's code is wrapped within a single self-contained function with no closure dependencies. This enables that function to be stringified and passed into a web worker, for example.)\n\nNow that you have the `bidi` object, you can:\n\n### Calculate bidi embedding levels\n\n```js\nconst embeddingLevels = bidi.getEmbeddingLevels(\n  text, //the input string containing mixed-direction text\n  explicitDirection //\"ltr\" or \"rtl\" if you don't want to auto-detect it\n)\n\nconst { levels, paragraphs } = embeddingLevels\n```\n\nThe result object `embeddingLevels` will usually be passed to other functions described below. Its contents, should you need to inspect them individually, are:\n\n* `levels` is a `Uint8Array` holding the calculated [bidi embedding levels](https://unicode.org/reports/tr9/#BD2) for each character in the string. The most important thing to know about these levels is that any given character is in a right-to-left scope if its embedding level is an odd number, and left-to-right if it's an even number.\n\n* `paragraphs` is an array of `{start, end, level}` objects, one for each paragraph in the text (paragraphs are separated by explicit breaking characters, not soft line wrapping). The `start` and `end` indices are inclusive, and `level` is the resolved base embedding level of that paragraph.\n\n### Calculate character reorderings\n\n```js\nconst flips = bidi.getReorderSegments(\n  text, //the full input string\n  embeddingLevels //the full result object from getEmbeddingLevels\n)\n\n// Process all reversal sequences, in order:\nflips.forEach(range => {\n  const [start, end] = range\n  // Reverse this sequence of characters from start to end, inclusive\n  for (let i = start; i <= end; i++) {\n    //...\n  }\n})\n```\n\nEach \"flip\" is a range that should be reversed in place; they must all be applied in order.\n\nSometimes you don't want to process the whole string at once, but just a particular substring. A common example would be if you've applied line wrapping, in which case you need to process each line individually (in particular this does some special handling for trailing whitespace for each line). For this you can pass the extra `start` and `end` parameters:\n\n```js\nyourWrappedLines.forEach(([lineStart, lineEnd]) => {\n  const flips = bidi.getReorderSegments(\n    text,\n    embeddingLevels,\n    lineStart,\n    lineEnd //inclusive\n  )\n  // ...process flips for this line\n})\n```\n\n### Handle right-to-left mirrored characters\n\nSome characters that resolve to right-to-left need to be swapped with their \"mirrored\" characters. Examples of this are opening/closing parentheses. You can determine all the characters that need to be mirrored like so:\n\n```js\nconst mirrored = bidi.getMirroredCharactersMap(\n  text,\n  embeddingLevels\n)\n```\n\nThis returns a `Map` of numeric character indices to replacement characters.\n\nYou can also process just a substring with extra `start` and `end` parameters:\n\n```js\nconst mirrored = bidi.getMirroredCharactersMap(\n  text,\n  embeddingLevels,\n  start,\n  end //inclusive\n)\n```\n\nIf you'd rather process mirrored characters individually, you can use the single `getMirroredCharacter` function, just make sure you only do it for right-to-left characters (those whose embedding level is an odd number.) It will return `null` if the character doesn't support mirroring.\n\n```js\nconst mirroredChar = (embeddingLevels.levels[charIndex] & 1) //odd number means RTL\n    ? bidi.getMirroredCharacter(text[charIndex])\n    : null\n```\n\n### Get a character's bidi type\n\nThis is used internally, but you can also ask for the [\"bidi character type\"](https://unicode.org/reports/tr9/#BD1) of any character, should you need it:\n\n```js\nconst bidiType = bidi.getBidiCharTypeName(string[charIndex])\n// e.g. \"L\", \"R\", \"AL\", \"NSM\", ...\n```\n", "node_modules/@csstools/css-tokenizer/CHANGELOG.md": "# Changes to CSS Tokenizer\n\n### 4.0.0\n\n_January 14, 2026_\n\n- Updated: Support for Node `20.19.0` or later (major).\n- Removed: `commonjs` API. In supported Node versions `require(esm)` will work without needing to make code changes.\n\n[Full CHANGELOG](https://github.com/csstools/postcss-plugins/tree/main/packages/css-tokenizer/CHANGELOG.md)\n", "node_modules/@csstools/css-tokenizer/README.md": "# CSS Tokenizer <img src=\"https://cssdb.org/images/css.svg\" alt=\"for CSS\" width=\"90\" height=\"90\" align=\"right\">\n\n[<img alt=\"npm version\" src=\"https://img.shields.io/npm/v/@csstools/css-tokenizer.svg\" height=\"20\">][npm-url]\n[<img alt=\"Build Status\" src=\"https://github.com/csstools/postcss-plugins/actions/workflows/test.yml/badge.svg?branch=main\" height=\"20\">][cli-url]\n[<img alt=\"Discord\" src=\"https://shields.io/badge/Discord-5865F2?logo=discord&logoColor=white\">][discord]\n\nImplemented from : https://drafts.csswg.org/css-syntax/\n\n## API\n\n[Read the API docs](./docs/css-tokenizer.md)\n\n## Usage\n\nAdd [CSS Tokenizer] to your project:\n\n```bash\nnpm install @csstools/css-tokenizer --save-dev\n```\n\n```js\nimport { tokenize } from '@csstools/css-tokenizer';\n\nconst myCSS =  `@media only screen and (min-width: 768rem) {\n\t.foo {\n\t\tcontent: 'Some content!' !important;\n\t}\n}\n`;\n\nconst tokens = tokenize({\n\tcss: myCSS,\n});\n\nconsole.log(tokens);\n```\n\nOr use the streaming interface:\n\n```js\nimport { tokenizer, TokenType } from '@csstools/css-tokenizer';\n\nconst myCSS = `@media only screen and (min-width: 768rem) {\n\t.foo {\n\t\tcontent: 'Some content!' !important;\n\t}\n}\n`;\n\nconst t = tokenizer({\n\tcss: myCSS,\n});\n\nwhile (true) {\n\tconst token = t.nextToken();\n\tif (token[0] === TokenType.EOF) {\n\t\tbreak;\n\t}\n\n\tconsole.log(token);\n}\n```\n\n### Options\n\n```ts\n{\n\tonParseError?: (error: ParseError) => void\n}\n```\n\n#### `onParseError`\n\nThe tokenizer is forgiving and won't stop when a parse error is encountered.\n\nTo receive parsing error information you can set a callback.\n\n```js\nimport { tokenizer, TokenType } from '@csstools/css-tokenizer';\n\nconst t = tokenizer({\n\tcss: '\\\\',\n}, { onParseError: (err) => console.warn(err) });\n\nwhile (true) {\n\tconst token = t.nextToken();\n\tif (token[0] === TokenType.EOF) {\n\t\tbreak;\n\t}\n}\n```\n\nParser errors will try to inform you where in the tokenizer logic the error happened.\nThis tells you what kind of error occurred.\n\n## Order of priorities\n\n1. specification compliance\n2. correctness\n3. reliability\n4. tokenizing and serializing must round trip losslessly\n5. exposing useful aspects about the source code\n6. runtime performance\n7. package size\n\n\n[cli-url]: https://github.com/csstools/postcss-plugins/actions/workflows/test.yml?query=workflow/test\n[discord]: https://discord.gg/bUadyRwkJS\n[npm-url]: https://www.npmjs.com/package/@csstools/css-tokenizer\n\n[CSS Tokenizer]: https://github.com/csstools/postcss-plugins/tree/main/packages/css-tokenizer\n", "node_modules/@csstools/css-tokenizer/LICENSE.md": "The MIT License (MIT)\n\nCopyright 2022 Romain Menke, Antonio Laguna <antonio@laguna.es>\n\nPermission is hereby granted, free of charge, to any person obtaining a copy of\nthis software and associated documentation files (the \"Software\"), to deal in\nthe Software without restriction, including without limitation the rights to\nuse, copy, modify, merge, publish, distribute, sublicense, and/or sell copies of\nthe Software, and to permit persons to whom the Software is furnished to do so,\nsubject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all\ncopies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS\nFOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR\nCOPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER\nIN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN\nCONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/@csstools/css-color-parser/CHANGELOG.md": "# Changes to CSS Color Parser\n\n### 4.1.1\n\n_May 13, 2026_\n\n- Fix analogous components and sets for `hwb()`\n- Align precision of powerless components with the specification\n- Updated [`@csstools/css-calc`](https://github.com/csstools/postcss-plugins/tree/main/packages/css-calc) to [`3.2.1`](https://github.com/csstools/postcss-plugins/tree/main/packages/css-calc/CHANGELOG.md#321) (patch)\n\n[Full CHANGELOG](https://github.com/csstools/postcss-plugins/tree/main/packages/css-color-parser/CHANGELOG.md)\n", "node_modules/@csstools/css-color-parser/README.md": "# CSS Color Parser <img src=\"https://cssdb.org/images/css.svg\" alt=\"for CSS\" width=\"90\" height=\"90\" align=\"right\">\n\n[<img alt=\"npm version\" src=\"https://img.shields.io/npm/v/@csstools/css-color-parser.svg\" height=\"20\">][npm-url]\n[<img alt=\"Build Status\" src=\"https://github.com/csstools/postcss-plugins/actions/workflows/test.yml/badge.svg?branch=main\" height=\"20\">][cli-url]\n[<img alt=\"Discord\" src=\"https://shields.io/badge/Discord-5865F2?logo=discord&logoColor=white\">][discord]\n\n## Usage\n\nAdd [CSS Color Parser] to your project:\n\n```bash\nnpm install @csstools/css-color-parser @csstools/css-parser-algorithms @csstools/css-tokenizer --save-dev\n```\n\n```ts\nimport { color } from '@csstools/css-color-parser';\nimport { isFunctionNode, parseComponentValue } from '@csstools/css-parser-algorithms';\nimport { serializeRGB } from '@csstools/css-color-parser';\nimport { tokenize } from '@csstools/css-tokenizer';\n\n// color() expects a parsed component value.\nconst hwbComponentValue = parseComponentValue(tokenize({ css: 'hwb(10deg 10% 20%)' }));\nconst colorData = color(hwbComponentValue);\nif (colorData) {\n\tconsole.log(colorData);\n\n\t// serializeRGB() returns a component value.\n\tconst rgbComponentValue = serializeRGB(colorData);\n\tconsole.log(rgbComponentValue.toString());\n}\n```\n\n[cli-url]: https://github.com/csstools/postcss-plugins/actions/workflows/test.yml?query=workflow/test\n[discord]: https://discord.gg/bUadyRwkJS\n[npm-url]: https://www.npmjs.com/package/@csstools/css-color-parser\n\n[CSS Color Parser]: https://github.com/csstools/postcss-plugins/tree/main/packages/css-color-parser\n", "node_modules/@csstools/css-color-parser/LICENSE.md": "The MIT License (MIT)\n\nCopyright 2022 Romain Menke, Antonio Laguna <antonio@laguna.es>\n\nPermission is hereby granted, free of charge, to any person obtaining a copy of\nthis software and associated documentation files (the \"Software\"), to deal in\nthe Software without restriction, including without limitation the rights to\nuse, copy, modify, merge, publish, distribute, sublicense, and/or sell copies of\nthe Software, and to permit persons to whom the Software is furnished to do so,\nsubject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all\ncopies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS\nFOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR\nCOPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER\nIN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN\nCONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/@csstools/css-calc/CHANGELOG.md": "# Changes to CSS Calc\n\n### 3.2.1\n\n_May 13, 2026_\n\n- Update `round(line-width, 1.2345px)` to match the latest spec\n\n[Full CHANGELOG](https://github.com/csstools/postcss-plugins/tree/main/packages/css-calc/CHANGELOG.md)\n", "node_modules/@csstools/css-calc/README.md": "# CSS Calc <img src=\"https://cssdb.org/images/css.svg\" alt=\"for CSS\" width=\"90\" height=\"90\" align=\"right\">\n\n[<img alt=\"npm version\" src=\"https://img.shields.io/npm/v/@csstools/css-calc.svg\" height=\"20\">][npm-url]\n[<img alt=\"Build Status\" src=\"https://github.com/csstools/postcss-plugins/actions/workflows/test.yml/badge.svg?branch=main\" height=\"20\">][cli-url]\n[<img alt=\"Discord\" src=\"https://shields.io/badge/Discord-5865F2?logo=discord&logoColor=white\">][discord]\n\nImplemented from : https://drafts.csswg.org/css-values-4/ on 2023-02-17\n\n## Usage\n\nAdd [CSS calc] to your project:\n\n```bash\nnpm install @csstools/css-calc @csstools/css-parser-algorithms @csstools/css-tokenizer --save-dev\n```\n\n### With string values :\n\n```mjs\nimport { calc } from '@csstools/css-calc';\n\n// '20'\nconsole.log(calc('calc(10 * 2)'));\n```\n\n### With component values :\n\n```mjs\nimport { stringify, tokenizer } from '@csstools/css-tokenizer';\nimport { parseCommaSeparatedListOfComponentValues } from '@csstools/css-parser-algorithms';\nimport { calcFromComponentValues } from '@csstools/css-calc';\n\nconst t = tokenizer({\n\tcss: 'calc(10 * 2)',\n});\n\nconst tokens = [];\n\n{\n\twhile (!t.endOfFile()) {\n\t\ttokens.push(t.nextToken());\n\t}\n\n\ttokens.push(t.nextToken()); // EOF-token\n}\n\nconst result = parseCommaSeparatedListOfComponentValues(tokens, {});\n\n// filter or mutate the component values\n\nconst calcResult = calcFromComponentValues(result, { precision: 5, toCanonicalUnits: true });\n\n// filter or mutate the component values even further\n\nconst calcResultStr = calcResult.map((componentValues) => {\n\treturn componentValues.map((x) => stringify(...x.tokens())).join('');\n}).join(',');\n\n// '20'\nconsole.log(calcResultStr);\n```\n\n### Options\n\n#### `precision` :\n\nThe default precision is fairly high.\nIt aims to be high enough to make rounding unnoticeable in the browser.\n\nYou can set it to a lower number to suit your needs.\n\n```mjs\nimport { calc } from '@csstools/css-calc';\n\n// '0.3'\nconsole.log(calc('calc(1 / 3)', { precision: 1 }));\n// '0.33'\nconsole.log(calc('calc(1 / 3)', { precision: 2 }));\n```\n\n#### `globals` :\n\nPass global values as a map of key value pairs.\n\n> Example : Relative color syntax (`lch(from pink calc(l / 2) c h)`) exposes color channel information as ident tokens.\n> By passing globals for `l`, `c` and `h` it is possible to solve nested `calc()`'s.\n\n```mjs\nimport { calc } from '@csstools/css-calc';\n\nconst globals = new Map([\n\t['a', '10px'],\n\t['b', '2rem'],\n]);\n\n// '20px'\nconsole.log(calc('calc(a * 2)', { globals: globals }));\n// '6rem'\nconsole.log(calc('calc(b * 3)', { globals: globals }));\n```\n\n#### `toCanonicalUnits` :\n\nBy default this package will try to preserve units.\nThe heuristic to do this is very simplistic.\nWe take the first unit we encounter and try to convert other dimensions to that unit.\n\nThis better matches what users expect from a CSS dev tool.\n\nIf you want to have outputs that are closes to CSS serialized values you can pass `toCanonicalUnits: true`.\n\n```mjs\nimport { calc } from '@csstools/css-calc';\n\n// '20hz'\nconsole.log(calc('calc(0.01khz + 10hz)', { toCanonicalUnits: true }));\n\n// '20hz'\nconsole.log(calc('calc(10hz + 0.01khz)', { toCanonicalUnits: true }));\n\n// '0.02khz' !!!\nconsole.log(calc('calc(0.01khz + 10hz)', { toCanonicalUnits: false }));\n\n// '20hz'\nconsole.log(calc('calc(10hz + 0.01khz)', { toCanonicalUnits: false }));\n```\n\n[cli-url]: https://github.com/csstools/postcss-plugins/actions/workflows/test.yml?query=workflow/test\n[discord]: https://discord.gg/bUadyRwkJS\n[npm-url]: https://www.npmjs.com/package/@csstools/css-calc\n\n[CSS calc]: https://github.com/csstools/postcss-plugins/tree/main/packages/css-calc\n", "node_modules/@csstools/css-calc/LICENSE.md": "The MIT License (MIT)\n\nCopyright 2022 Romain Menke, Antonio Laguna <antonio@laguna.es>\n\nPermission is hereby granted, free of charge, to any person obtaining a copy of\nthis software and associated documentation files (the \"Software\"), to deal in\nthe Software without restriction, including without limitation the rights to\nuse, copy, modify, merge, publish, distribute, sublicense, and/or sell copies of\nthe Software, and to permit persons to whom the Software is furnished to do so,\nsubject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all\ncopies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS\nFOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR\nCOPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER\nIN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN\nCONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/@csstools/css-parser-algorithms/CHANGELOG.md": "# Changes to CSS Parser Algorithms\n\n### 4.0.0\n\n_January 14, 2026_\n\n- Updated: Support for Node `20.19.0` or later (major).\n- Removed: `commonjs` API. In supported Node versions `require(esm)` will work without needing to make code changes.\n- Updated [`@csstools/css-tokenizer`](https://github.com/csstools/postcss-plugins/tree/main/packages/css-tokenizer) to [`4.0.0`](https://github.com/csstools/postcss-plugins/tree/main/packages/css-tokenizer/CHANGELOG.md#400) (major)\n\n[Full CHANGELOG](https://github.com/csstools/postcss-plugins/tree/main/packages/css-parser-algorithms/CHANGELOG.md)\n", "node_modules/@csstools/css-parser-algorithms/README.md": "# CSS Parser Algorithms <img src=\"https://cssdb.org/images/css.svg\" alt=\"for CSS\" width=\"90\" height=\"90\" align=\"right\">\n\n[<img alt=\"npm version\" src=\"https://img.shields.io/npm/v/@csstools/css-parser-algorithms.svg\" height=\"20\">][npm-url]\n[<img alt=\"Build Status\" src=\"https://github.com/csstools/postcss-plugins/actions/workflows/test.yml/badge.svg?branch=main\" height=\"20\">][cli-url]\n[<img alt=\"Discord\" src=\"https://shields.io/badge/Discord-5865F2?logo=discord&logoColor=white\">][discord]\n\nImplemented from : https://www.w3.org/TR/2021/CRD-css-syntax-3-20211224/\n\n## API\n\n[Read the API docs](./docs/css-parser-algorithms.md)\n\n## Usage\n\nAdd [CSS Parser Algorithms] to your project:\n\n```bash\nnpm install @csstools/css-parser-algorithms @csstools/css-tokenizer --save-dev\n```\n\n[CSS Parser Algorithms] only accepts tokenized CSS.\nIt must be used together with `@csstools/css-tokenizer`.\n\n\n```js\nimport { tokenizer, TokenType } from '@csstools/css-tokenizer';\nimport { parseComponentValue } from '@csstools/css-parser-algorithms';\n\nconst myCSS =  `@media only screen and (min-width: 768rem) {\n\t.foo {\n\t\tcontent: 'Some content!' !important;\n\t}\n}\n`;\n\nconst t = tokenizer({\n\tcss: myCSS,\n});\n\nconst tokens = [];\n\n{\n\twhile (!t.endOfFile()) {\n\t\ttokens.push(t.nextToken());\n\t}\n\n\ttokens.push(t.nextToken()); // EOF-token\n}\n\nconst options = {\n\tonParseError: ((err) => {\n\t\tthrow err;\n\t}),\n};\n\nconst result = parseComponentValue(tokens, options);\n\nconsole.log(result);\n```\n\n### Available functions\n\n- [`parseComponentValue`](https://www.w3.org/TR/css-syntax-3/#parse-component-value)\n- [`parseListOfComponentValues`](https://www.w3.org/TR/css-syntax-3/#parse-list-of-component-values)\n- [`parseCommaSeparatedListOfComponentValues`](https://www.w3.org/TR/css-syntax-3/#parse-comma-separated-list-of-component-values)\n\n### Utilities\n\n#### `gatherNodeAncestry`\n\nThe AST does not expose the entire ancestry of each node.\nThe walker methods do provide access to the current parent, but also not the entire ancestry.\n\nTo gather the entire ancestry for a a given sub tree of the AST you can use `gatherNodeAncestry`.\nThe result is a `Map` with the child nodes as keys and the parents as values.\nThis allows you to lookup any ancestor of any node.\n\n```js\nimport { parseComponentValue } from '@csstools/css-parser-algorithms';\n\nconst result = parseComponentValue(tokens, options);\nconst ancestry = gatherNodeAncestry(result);\n```\n\n### Options\n\n```ts\n{\n\tonParseError?: (error: ParseError) => void\n}\n```\n\n#### `onParseError`\n\nThe parser algorithms are forgiving and won't stop when a parse error is encountered.\nParse errors also aren't tokens.\n\nTo receive parsing error information you can set a callback.\n\nParser errors will try to inform you about the point in the parsing logic the error happened.\nThis tells you the kind of error.\n\n## Goals and non-goals\n\nThings this package aims to be:\n- specification compliant CSS parser\n- a reliable low level package to be used in CSS sub-grammars\n\nWhat it is not:\n- opinionated\n- fast\n- small\n- a replacement for PostCSS (PostCSS is fast and also an ecosystem)\n\n[cli-url]: https://github.com/csstools/postcss-plugins/actions/workflows/test.yml?query=workflow/test\n[discord]: https://discord.gg/bUadyRwkJS\n[npm-url]: https://www.npmjs.com/package/@csstools/css-parser-algorithms\n\n[CSS Parser Algorithms]: https://github.com/csstools/postcss-plugins/tree/main/packages/css-parser-algorithms\n", "node_modules/@csstools/css-parser-algorithms/LICENSE.md": "The MIT License (MIT)\n\nCopyright 2022 Romain Menke, Antonio Laguna <antonio@laguna.es>\n\nPermission is hereby granted, free of charge, to any person obtaining a copy of\nthis software and associated documentation files (the \"Software\"), to deal in\nthe Software without restriction, including without limitation the rights to\nuse, copy, modify, merge, publish, distribute, sublicense, and/or sell copies of\nthe Software, and to permit persons to whom the Software is furnished to do so,\nsubject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all\ncopies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS\nFOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR\nCOPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER\nIN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN\nCONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/@csstools/color-helpers/CHANGELOG.md": "# Changes to Color Helpers\n\n### 6.0.2\n\n_February 21, 2026_\n\n- Updated: gamut mapping algorithm\n\n[Full CHANGELOG](https://github.com/csstools/postcss-plugins/tree/main/packages/color-helpers/CHANGELOG.md)\n", "node_modules/@csstools/color-helpers/README.md": "# Color Helpers <img src=\"https://cssdb.org/images/css.svg\" alt=\"for CSS\" width=\"90\" height=\"90\" align=\"right\">\n\n[<img alt=\"npm version\" src=\"https://img.shields.io/npm/v/@csstools/color-helpers.svg\" height=\"20\">][npm-url]\n[<img alt=\"Build Status\" src=\"https://github.com/csstools/postcss-plugins/actions/workflows/test.yml/badge.svg?branch=main\" height=\"20\">][cli-url]\n[<img alt=\"Discord\" src=\"https://shields.io/badge/Discord-5865F2?logo=discord&logoColor=white\">][discord]\n\n## Usage\n\nAdd [Color Helpers] to your project:\n\n```bash\nnpm install @csstools/color-helpers --save-dev\n```\n\nThis package exists to join all the different color functions scattered among the Colors 4 and Colors 5 plugins we maintain such as:\n\n* [PostCSS Color Function]\n* [PostCSS Lab Function]\n* [PostCSS OKLab Function]\n\n## Copyright\n\nThis software or document includes material copied from or derived from https://github.com/w3c/csswg-drafts/tree/main/css-color-4. Copyright \u00a9 2022 W3C\u00ae (MIT, ERCIM, Keio, Beihang).\n\n[cli-url]: https://github.com/csstools/postcss-plugins/actions/workflows/test.yml?query=workflow/test\n[discord]: https://discord.gg/bUadyRwkJS\n[npm-url]: https://www.npmjs.com/package/@csstools/color-helpers\n\n[Color Helpers]: https://github.com/csstools/postcss-plugins/tree/main/packages/color-helpers hields.io/npm/v/@csstools/css-syntax-patches-for-csstree.svg\" height=\"20\">][npm-url]\n[<img alt=\"Build Status\" src=\"https://github.com/csstools/postcss-plugins/actions/workflows/test.yml/badge.svg?branch=main\" height=\"20\">][cli-url]\n\nPatch [csstree](https://github.com/csstree/csstree) syntax definitions with the latest data from CSS specifications.  \n\n## Usage\n\n```bash\nnpm install @csstools/css-syntax-patches-for-csstree\n```\n\n```js\nimport { fork } from 'css-tree';\nimport syntax_patches from '@csstools/css-syntax-patches-for-csstree' with { type: 'json' };\n\nconst forkedLexer = fork({\n\tatrules: syntax_patches.next.atrules,\n\tproperties: syntax_patches.next.properties,\n\ttypes: syntax_patches.next.types,\n}).lexer;\n```\n\n## `next`\n\n```js\nimport syntax_patches from '@csstools/css-syntax-patches-for-csstree' with { type: 'json' };\n\nconsole.log(syntax_patches.next);\n//                         ^^^^\n```\n\nCSS specifications are often still in flux and various parts might change or disappear altogether.  \nSpecifications also contains parts that haven't been implemented yet in a browser.  \nOnly CSS that is widely adopted can be expected to be stable.\n\nThe `next` grouping contains a combination of what is currently valid in browsers and the progress in various specifications.\n\n_In the future more groupings might be added._\n\n[cli-url]: https://github.com/csstools/postcss-plugins/actions/workflows/test.yml?query=workflow/test\n[npm-url]: https://www.npmjs.com/package/@csstools/css-syntax-patches-for-csstree\n", "node_modules/@csstools/css-syntax-patches-for-csstree/LICENSE.md": "MIT No Attribution (MIT-0)\n\nCopyright \u00a9 CSSTools Contributors\n\nPermission is hereby granted, free of charge, to any person obtaining a copy of\nthis software and associated documentation files (the \u201cSoftware\u201d), to deal in\nthe Software without restriction, including without limitation the rights to\nuse, copy, modify, merge, publish, distribute, sublicense, and/or sell copies\nof the Software, and to permit persons to whom the Software is furnished to do\nso.\n\nTHE SOFTWARE IS PROVIDED \u201cAS IS\u201d, WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,\nFITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\nAUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\nLIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\nOUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE\nSOFTWARE.\n", "node_modules/jsdom/LICENSE.txt": "Copyright (c) 2010 Elijah Insua\n\nPermission is hereby granted, free of charge, to any person\nobtaining a copy of this software and associated documentation\nfiles (the \"Software\"), to deal in the Software without\nrestriction, including without limitation the rights to use,\ncopy, modify, merge, publish, distribute, sublicense, and/or sell\ncopies of the Software, and to permit persons to whom the\nSoftware is furnished to do so, subject to the following\nconditions:\n\nThe above copyright notice and this permission notice shall be\nincluded in all copies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND,\nEXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES\nOF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND\nNONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT\nHOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY,\nWHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING\nFROM, OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR\nOTHER DEALINGS IN THE SOFTWARE.\n", "node_modules/jsdom/README.md": "<h1 align=\"center\">\n    <img width=\"100\" height=\"100\" src=\"logo.svg\" alt=\"\"><br>\n    jsdom\n</h1>\n\njsdom is a pure-JavaScript implementation of many web standards, notably the WHATWG [DOM](https://dom.spec.whatwg.org/) and [HTML](https://html.spec.whatwg.org/multipage/) Standards, for use with Node.js. In general, the goal of the project is to emulate enough of a subset of a web browser to be useful for testing and scraping real-world web applications.\n\nThe latest versions of jsdom require newer Node.js versions; see the `package.json` `\"engines\"` field for details.\n\n## Basic usage\n\n```js\nconst jsdom = require(\"jsdom\");\nconst { JSDOM } = jsdom;\n```\n\nTo use jsdom, you will primarily use the `JSDOM` constructor, which is a named export of the jsdom main module. Pass the constructor a string. You will get back a `JSDOM` object, which has a number of useful properties, notably `window`:\n\n```js\nconst dom = new JSDOM(`<!DOCTYPE html><p>Hello world</p>`);\nconsole.log(dom.window.document.querySelector(\"p\").textContent); // \"Hello world\"\n```\n\n(Note that jsdom will parse the HTML you pass it just like a browser does, including implied `<html>`, `<head>`, and `<body>` tags.)\n\nThe resulting object is an instance of the `JSDOM` class, which contains a number of useful properties and methods besides `window`. In general, it can be used to act on the jsdom from the \"outside,\" doing things that are not possible with the normal DOM APIs. For simple cases, where you don't need any of this functionality, we recommend a coding pattern like\n\n```js\nconst { window } = new JSDOM(`...`);\n// or even\nconst { document } = (new JSDOM(`...`)).window;\n```\n\nFull documentation on everything you can do with the `JSDOM` class is below, in the section \"`JSDOM` Object API\".\n\n## Customizing jsdom\n\nThe `JSDOM` constructor accepts a second parameter which can be used to customize your jsdom in the following ways.\n\n### Simple options\n\n```js\nconst dom = new JSDOM(``, {\n  url: \"https://example.org/\",\n  referrer: \"https://example.com/\",\n  contentType: \"text/html\",\n  includeNodeLocations: true,\n  storageQuota: 10000000\n});\n```\n\n- `url` sets the value returned by `window.location`, `document.URL`, and `document.documentURI`, and affects things like resolution of relative URLs within the document and the same-origin restrictions and referrer used while fetching subresources. It defaults to `\"about:blank\"`.\n- `referrer` just affects the value read from `document.referrer`. It defaults to no referrer (which reflects as the empty string).\n- `contentType` affects the value read from `document.contentType`, as well as how the document is parsed: as HTML or as XML. Values that are not a [HTML MIME type](https://mimesniff.spec.whatwg.org/#html-mime-type) or an [XML MIME type](https://mimesniff.spec.whatwg.org/#xml-mime-type) will throw. It defaults to `\"text/html\"`. If a `charset` parameter is present, it can affect [binary data processing](#encoding-sniffing).\n- `includeNodeLocations` preserves the location info produced by the HTML parser, allowing you to retrieve it with the `nodeLocation()` method (described below). It also ensures that line numbers reported in exception stack traces for code running inside `<script>` elements are correct. It defaults to `false` to give the best performance, and cannot be used with an XML content type since our XML parser does not support location info.\n- `storageQuota` is the maximum size in code units for the separate storage areas used by `localStorage` and `sessionStorage`. Attempts to store data larger than this limit will cause a `DOMException` to be thrown. By default, it is set to 5,000,000 code units per origin, as inspired by the HTML specification.\n\nNote that both `url` and `referrer` are canonicalized before they're used, so e.g. if you pass in `\"https:example.com\"`, jsdom will interpret that as if you had given `\"https://example.com/\"`. If you pass an unparseable URL, the call will throw. (URLs are parsed and serialized according to the [URL Standard](https://url.spec.whatwg.org/).)\n\n### Executing scripts\n\njsdom's most powerful ability is that it can execute scripts inside the jsdom. These scripts can modify the content of the page and access all the web platform APIs jsdom implements.\n\nHowever, this is also highly dangerous when dealing with untrusted content. The jsdom sandbox is not foolproof, and code running inside the DOM's `<script>`s can, if it tries hard enough, get access to the Node.js environment, and thus to your machine. As such, the ability to execute scripts embedded in the HTML is disabled by default:\n\n```js\nconst dom = new JSDOM(`<body>\n  <div id=\"content\"></div>\n  <script>document.getElementById(\"content\").append(document.createElement(\"hr\"));<\/script>\n</body>`);\n\n// The script will not be executed, by default:\nconsole.log(dom.window.document.getElementById(\"content\").children.length); // 0\n```\n\nTo enable executing scripts inside the page, you can use the `runScripts: \"dangerously\"` option:\n\n```js\nconst dom = new JSDOM(`<body>\n  <div id=\"content\"></div>\n  <script>document.getElementById(\"content\").append(document.createElement(\"hr\"));<\/script>\n</body>`, { runScripts: \"dangerously\" });\n\n// The script will be executed and modify the DOM:\nconsole.log(dom.window.document.getElementById(\"content\").children.length); // 1\n```\n\nAgain we emphasize to only use this when feeding jsdom code you know is safe. If you use it on arbitrary user-supplied code, or code from the Internet, you are effectively running untrusted Node.js code, and your machine could be compromised.\n\nIf you want to execute _external_ scripts, included via `<script src=\"\">`, you'll also need to ensure that they load them. To do this, add the option `resources: \"usable\"` [as described below](#loading-subresources). (You'll likely also want to set the `url` option, for the reasons discussed there.)\n\nEvent handler attributes, like `<div onclick=\"\">`, are also governed by this setting; they will not function unless `runScripts` is set to `\"dangerously\"`. (However, event handler _properties_, like `div.onclick = ...`, will function regardless of `runScripts`.) Note that this guarantee covers the web content being processed by jsdom. It does not cover scenarios where the host Node.js environment itself has been compromised (e.g. through prototype pollution). See the [security policy](https://github.com/jsdom/.github/blob/master/SECURITY.md) for more details.\n\nIf you are simply trying to execute script \"from the outside\", instead of letting `<script>` elements and event handlers attributes run \"from the inside\", you can use the `runScripts: \"outside-only\"` option, which enables fresh copies of all the JavaScript spec-provided globals to be installed on `window`. This includes things like `window.Array`, `window.Promise`, etc. It also, notably, includes `window.eval`, which allows running scripts, but with the jsdom `window` as the global:\n\n```js\nconst dom = new JSDOM(`<body>\n  <div id=\"content\"></div>\n  <script>document.getElementById(\"content\").append(document.createElement(\"hr\"));<\/script>\n</body>`, { runScripts: \"outside-only\" });\n\n// run a script outside of JSDOM:\ndom.window.eval('document.getElementById(\"content\").append(document.createElement(\"p\"));');\n\nconsole.log(dom.window.document.getElementById(\"content\").children.length); // 1\nconsole.log(dom.window.document.getElementsByTagName(\"hr\").length); // 0\nconsole.log(dom.window.document.getElementsByTagName(\"p\").length); // 1\n```\n\nThis is turned off by default for performance reasons, but is safe to enable.\n\nNote that in the default configuration, without setting `runScripts`, the values of `window.Array`, `window.eval`, etc. will be the same as those provided by the outer Node.js environment. That is, `window.eval === eval` will hold, so `window.eval` will not run scripts in a useful way.\n\nWe strongly advise against trying to \"execute scripts\" by mashing together the jsdom and Node global environments (e.g. by doing `global.window = dom.window`), and then executing scripts or test code inside the Node global environment. Instead, you should treat jsdom like you would a browser, and run all scripts and tests that need access to a DOM inside the jsdom environment, using `window.eval` or `runScripts: \"dangerously\"`. This might require, for example, creating a browserify bundle to execute as a `<script>` element\u2014just like you would in a browser.\n\nFinally, for advanced use cases you can use the `dom.getInternalVMContext()` method, documented below.\n\n### Pretending to be a visual browser\n\njsdom does not have the capability to render visual content, and will act like a headless browser by default. It provides hints to web pages through APIs such as `document.hidden` that their content is not visible.\n\nWhen the `pretendToBeVisual` option is set to `true`, jsdom will pretend that it is rendering and displaying content. It does this by:\n\n- Changing `document.hidden` to return `false` instead of `true`\n- Changing `document.visibilityState` to return `\"visible\"` instead of `\"prerender\"`\n- Enabling `window.requestAnimationFrame()` and `window.cancelAnimationFrame()` methods, which otherwise do not exist\n\n```js\nconst window = (new JSDOM(``, { pretendToBeVisual: true })).window;\n\nwindow.requestAnimationFrame(timestamp => {\n  console.log(timestamp > 0);\n});\n```\n\nNote that jsdom still [does not do any layout or rendering](#unimplemented-parts-of-the-web-platform), so this is really just about _pretending_ to be visual, not about implementing the parts of the platform a real, visual web browser would implement.\n\n### Loading subresources\n\n#### Basic options\n\nBy default, jsdom will not load any subresources such as scripts, stylesheets, images, or iframes. If you'd like jsdom to load such resources, you can pass the `resources: \"usable\"` option, which will load all usable resources. Those are:\n\n- Frames and iframes, via `<frame>` and `<iframe>`\n- Stylesheets, via `<link rel=\"stylesheet\">`\n- Scripts, via `<script>`, but only if `runScripts: \"dangerously\"` is also set\n- Images, via `<img>`, but only if the `canvas` npm package is also installed (see \"[Canvas Support](#canvas-support)\" below)\n\nWhen attempting to load resources, recall that the default value for the `url` option is `\"about:blank\"`, which means that any resources included via relative URLs will fail to load. (The result of trying to parse the URL `/something` against the URL `about:blank` is an error.) So, you'll likely want to set a non-default value for the `url` option in those cases, or use one of the [convenience APIs](#convenience-apis) that do so automatically.\n\n#### Advanced configuration\n\nTo more fully customize jsdom's resource-loading behavior, including the initial load made by [`JSDOM.fromURL()`](#fromurl) or any loads made with `dom.window.XMLHttpRequest` or `dom.window.WebSocket`, you can pass an options object as the `resources` option value. Doing so will opt you in to the above-described `resources: \"usable\"` behavior as the baseline, on top of which your customizations can be layered.\n\nThe available options are:\n\n- `userAgent` affects the `User-Agent` header sent, and thus the resulting value for `navigator.userAgent`. It defaults to <code>\\`Mozilla/5.0 (${process.platform || \"unknown OS\"}) AppleWebKit/537.36 (KHTML, like Gecko) jsdom/${jsdomVersion}\\`</code>.\n\n- `dispatcher` can be set to a custom [undici `Dispatcher`](https://undici.nodejs.org/#/docs/api/Dispatcher) for advanced use cases such as configuring a proxy or custom TLS settings. For example, to use a proxy, you can use undici's `ProxyAgent`.\n\n- `interceptors` can be set to an array of [`undici` interceptor functions](https://undici.nodejs.org/#/docs/api/Dispatcher?id=parameter-interceptor). Interceptors can be used to modify requests or responses without writing an entirely new `Dispatcher`.\n\nFor the simple case of inspecting an incoming request or returning a synthetic response, you can use jsdom's `requestInterceptor()` helper, which receives a [`Request`](https://developer.mozilla.org/en-US/docs/Web/API/Request) object and context, and can return a [`Response`](https://developer.mozilla.org/en-US/docs/Web/API/Response):\n\n```js\nconst { JSDOM, requestInterceptor } = require(\"jsdom\");\n\nconst dom = new JSDOM(`<script src=\"https://example.com/some-specific-script.js\"><\/script>`, {\n  url: \"https://example.com/\",\n  runScripts: \"dangerously\",\n  resources: {\n    userAgent: \"Mellblomenator/9000\",\n    dispatcher: new ProxyAgent(\"http://127.0.0.1:9001\"),\n    interceptors: [\n      requestInterceptor((request, context) => {\n        // Override the contents of this script to do something unusual.\n        if (request.url === \"https://example.com/some-specific-script.js\") {\n          return new Response(\"window.someGlobal = 5;\", {\n            headers: { \"Content-Type\": \"application/javascript\" }\n          });\n        }\n        // Return undefined to let the request proceed normally\n      })\n    ]\n  }\n});\n```\n\nThe context object passed to the interceptor includes `element` (the DOM element that initiated the request, or `null` for requests that are not from DOM elements). For example:\n\n```js\nrequestInterceptor((request, { element }) => {\n  if (element) {\n    console.log(`Element ${element.localName} is requesting ${request.url}`);\n  }\n  // Return undefined to let the request proceed normally\n})\n```\n\nTo be clear on the flow: when something in your jsdom fetches resources, first the request is set up by jsdom, then it is passed through any `interceptors` in the order provided, then it reaches any provided `dispatcher` (defaulting to [`undici`'s global dispatcher](https://undici.nodejs.org/#/?id=undicigetglobaldispatcher)). If you use jsdom's `requestInterceptor()`, returning promise fulfilled with a `Response` will prevent any further interceptors from running, or the base dispatcher from being reached.\n\n> [!WARNING]\n> All resource loading customization is ignored when scripts inside the jsdom use synchronous `XMLHttpRequest`. This is a technical limitation as we cannot transfer dispatchers or interceptors across a process boundary.\n\n### Virtual consoles\n\nLike web browsers, jsdom has the concept of a \"console\". This records both information directly sent from the page, via scripts executing inside the document using the `window.console` API, as well as information from the jsdom implementation itself. We call the user-controllable console a \"virtual console\", to distinguish it from the Node.js `console` API and from the inside-the-page `window.console` API.\n\nBy default, the `JSDOM` constructor will return an instance with a virtual console that forwards all its output to the Node.js console. This includes both jsdom output (such as not-implemented warnings or CSS parsing errors) and in-page `window.console` calls.\n\nTo create your own virtual console and pass it to jsdom, you can override this default by doing\n\n```js\nconst virtualConsole = new jsdom.VirtualConsole();\nconst dom = new JSDOM(``, { virtualConsole });\n```\n\nCode like this will create a virtual console with no behavior. You can give it behavior by adding event listeners for all the possible console methods:\n\n```js\nvirtualConsole.on(\"error\", () => { ... });\nvirtualConsole.on(\"warn\", () => { ... });\nvirtualConsole.on(\"info\", () => { ... });\nvirtualConsole.on(\"dir\", () => { ... });\n// ... etc. See https://console.spec.whatwg.org/#logging\n```\n\n(Note that it is probably best to set up these event listeners _before_ calling `new JSDOM()`, since errors or console-invoking script might occur during parsing.)\n\nIf you simply want to redirect the virtual console output to another console, like the default Node.js one, you can do\n\n```js\nvirtualConsole.forwardTo(console);\n```\n\nThere is also a special event, `\"jsdomError\"`, which will fire with error objects to report erro
