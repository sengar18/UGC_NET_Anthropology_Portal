<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTA UGC NET Assessment Portal - Anthropology</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                            950: '#451a03',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Raw Data Sync -->
    <script src="pyq_data.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- SVGS / ICONS ---
        const BrainIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>;
        const CheckCircleIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const XCircleIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
        const TrophyIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="text-brand-500"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const BookmarkIcon = ({ filled }) => <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>;
        const FlagIcon = ({ filled }) => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>;
        const EyeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
        const SunIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
        const MoonIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
        const MonitorIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>;

        // --- GLOBAL APP COMPONENT ---
        function App() {
          // --- THEME ---
          const [isDark, setIsDark] = useState(() => {
            const saved = localStorage.getItem('nta_portal_theme');
            if (saved) return saved === 'dark';
            return window.matchMedia('(prefers-color-scheme: dark)').matches;
          });

          useEffect(() => {
            const root = document.documentElement;
            if (isDark) {
              root.classList.add('dark');
              localStorage.setItem('nta_portal_theme', 'dark');
            } else {
              root.classList.remove('dark');
              localStorage.setItem('nta_portal_theme', 'light');
            }
          }, [isDark]);

          // --- DATABASE INITIALIZATION ---
          const getInitialKey = () => {
            if (window.pyqDatabase) {
              const preferred = "UGC NET - 200 Master Assertion-Reason Practice Paper";
              if (window.pyqDatabase[preferred]) return preferred;
              
              const keys = Object.keys(window.pyqDatabase);
              if (keys.length > 0) return keys[0];
            }
            return '';
          };

          const [activeDatabaseKey, setActiveDatabaseKey] = useState(() => {
            const saved = localStorage.getItem('nta_active_db_key');
            return saved && window.pyqDatabase?.[saved] ? saved : getInitialKey();
          });

          useEffect(() => {
            if (activeDatabaseKey) {
              localStorage.setItem('nta_active_db_key', activeDatabaseKey);
            }
          }, [activeDatabaseKey]);

          // --- CENTRAL STATE MACHINE ---
          const [activeTab, setActiveTab] = useState('quiz');
          const [examMode, setExamMode] = useState(() => {
            const saved = localStorage.getItem('nta_exam_mode');
            return saved ? JSON.parse(saved) : false;
          });
          const [searchTerm, setSearchTerm] = useState('');
          const [isFocusMode, setIsFocusMode] = useState(() => {
            const saved = localStorage.getItem('nta_focus_mode');
            return saved ? JSON.parse(saved) : false;
          });

          const [currentQuestionIndex, setCurrentQuestionIndex] = useState(() => {
            const dbKey = localStorage.getItem('nta_active_db_key') || getInitialKey();
            const saved = localStorage.getItem(`nta_current_index_${dbKey}`);
            return saved ? parseInt(saved, 10) : 0;
          });

          const [selectedOptions, setSelectedOptions] = useState(() => {
            const dbKey = localStorage.getItem('nta_active_db_key') || getInitialKey();
            const saved = localStorage.getItem(`nta_exam_selected_${dbKey}`);
            return saved ? JSON.parse(saved) : {};
          });

          const [flaggedQuestions, setFlaggedQuestions] = useState(() => {
            const dbKey = localStorage.getItem('nta_active_db_key') || getInitialKey();
            const saved = localStorage.getItem(`nta_exam_flagged_${dbKey}`);
            return saved ? JSON.parse(saved) : [];
          });

          const [bookmarkedQuestions, setBookmarkedQuestions] = useState(() => {
            const dbKey = localStorage.getItem('nta_active_db_key') || getInitialKey();
            const saved = localStorage.getItem(`nta_exam_bookmarked_${dbKey}`);
            return saved ? JSON.parse(saved) : [];
          });

          const [visitedQuestions, setVisitedQuestions] = useState(() => {
            const dbKey = localStorage.getItem('nta_active_db_key') || getInitialKey();
            const saved = localStorage.getItem(`nta_exam_visited_${dbKey}`);
            return saved ? JSON.parse(saved) : { 1: true };
          });

          const [isAnswerChecked, setIsAnswerChecked] = useState(() => {
            const dbKey = localStorage.getItem('nta_active_db_key') || getInitialKey();
            const saved = localStorage.getItem(`nta_answer_checked_${dbKey}`);
            return saved ? JSON.parse(saved) : {};
          });

          const [score, setScore] = useState(() => {
            const dbKey = localStorage.getItem('nta_active_db_key') || getInitialKey();
            const saved = localStorage.getItem(`nta_score_${dbKey}`);
            return saved ? parseInt(saved, 10) : 0;
          });

          const [isExamSubmitted, setIsExamSubmitted] = useState(() => {
            const dbKey = localStorage.getItem('nta_active_db_key') || getInitialKey();
            const saved = localStorage.getItem(`nta_exam_submitted_${dbKey}`);
            return saved ? JSON.parse(saved) : false;
          });

          const [timeRemaining, setTimeRemaining] = useState(10800); // 3 hours default

          // --- AI TEXTBOOK AUDITOR STATES ---
          const [isAuditorOpen, setIsAuditorOpen] = useState(false);
          const [userDoubt, setUserDoubt] = useState('');
          const [auditResponse, setAuditResponse] = useState('');
          const [isAuditing, setIsAuditing] = useState(false);

          // --- DATABASE ABSTRACTORS ---
          const currentDatabase = useMemo(() => {
            if (window.pyqDatabase && window.pyqDatabase[activeDatabaseKey]) {
              const yearMatch = activeDatabaseKey.match(/(20\d{2})/);
              const yearStr = yearMatch ? yearMatch[1] : "PYQ";

              return window.pyqDatabase[activeDatabaseKey].map((q, idx) => ({
                id: idx + 1,
                year: yearStr,
                unit: q.unit || 'Mixed PYQ',
                difficulty: q.difficulty || 'Actual PYQ',
                question: q.question,
                options: q.options,
                correctAnswerIndex: q.options.indexOf(q.answer) !== -1 ? q.options.indexOf(q.answer) : 0,
                explanation: q.explanation,
                thinker: q.source || 'NTA Previous Year',
                trend: 'Official NTA Solved PYQ Paper'
              }));
            }
            return [];
          }, [activeDatabaseKey]);

          // --- TRANSITION EFFECT WHEN SWITCHING PAPERS ---
          useEffect(() => {
            if (!activeDatabaseKey) return;
            
            const savedIndex = localStorage.getItem(`nta_current_index_${activeDatabaseKey}`);
            setCurrentQuestionIndex(savedIndex ? parseInt(savedIndex, 10) : 0);

            const savedSelected = localStorage.getItem(`nta_exam_selected_${activeDatabaseKey}`);
            setSelectedOptions(savedSelected ? JSON.parse(savedSelected) : {});

            const savedFlagged = localStorage.getItem(`nta_exam_flagged_${activeDatabaseKey}`);
            setFlaggedQuestions(savedFlagged ? JSON.parse(savedFlagged) : []);

            const savedBookmarked = localStorage.getItem(`nta_exam_bookmarked_${activeDatabaseKey}`);
            setBookmarkedQuestions(savedBookmarked ? JSON.parse(savedBookmarked) : []);

            const savedVisited = localStorage.getItem(`nta_exam_visited_${activeDatabaseKey}`);
            setVisitedQuestions(savedVisited ? JSON.parse(savedVisited) : { 1: true });

            const savedAnswerChecked = localStorage.getItem(`nta_answer_checked_${activeDatabaseKey}`);
            setIsAnswerChecked(savedAnswerChecked ? JSON.parse(savedAnswerChecked) : {});

            const savedSubmitted = localStorage.getItem(`nta_exam_submitted_${activeDatabaseKey}`);
            setIsExamSubmitted(savedSubmitted ? JSON.parse(savedSubmitted) : false);

            const savedScore = localStorage.getItem(`nta_score_${activeDatabaseKey}`);
            setScore(savedScore ? parseInt(savedScore, 10) : 0);
          }, [activeDatabaseKey]);

          // --- PERSIST ACTIVE STATE (NAMESPACED BY ACTIVE PAPER) ---
          useEffect(() => {
            if (activeDatabaseKey) {
              localStorage.setItem(`nta_current_index_${activeDatabaseKey}`, currentQuestionIndex.toString());
            }
          }, [currentQuestionIndex, activeDatabaseKey]);

          useEffect(() => {
            if (activeDatabaseKey) {
              localStorage.setItem(`nta_exam_selected_${activeDatabaseKey}`, JSON.stringify(selectedOptions));
            }
          }, [selectedOptions, activeDatabaseKey]);

          useEffect(() => {
            if (activeDatabaseKey) {
              localStorage.setItem(`nta_exam_flagged_${activeDatabaseKey}`, JSON.stringify(flaggedQuestions));
            }
          }, [flaggedQuestions, activeDatabaseKey]);

          useEffect(() => {
            if (activeDatabaseKey) {
              localStorage.setItem(`nta_exam_bookmarked_${activeDatabaseKey}`, JSON.stringify(bookmarkedQuestions));
            }
          }, [bookmarkedQuestions, activeDatabaseKey]);

          useEffect(() => {
            if (activeDatabaseKey) {
              localStorage.setItem(`nta_exam_visited_${activeDatabaseKey}`, JSON.stringify(visitedQuestions));
            }
          }, [visitedQuestions, activeDatabaseKey]);

          useEffect(() => {
            if (activeDatabaseKey) {
              localStorage.setItem(`nta_answer_checked_${activeDatabaseKey}`, JSON.stringify(isAnswerChecked));
            }
          }, [isAnswerChecked, activeDatabaseKey]);

          useEffect(() => {
            if (activeDatabaseKey) {
              localStorage.setItem(`nta_exam_submitted_${activeDatabaseKey}`, JSON.stringify(isExamSubmitted));
            }
          }, [isExamSubmitted, activeDatabaseKey]);

          useEffect(() => {
            if (activeDatabaseKey) {
              localStorage.setItem(`nta_score_${activeDatabaseKey}`, score.toString());
            }
          }, [score, activeDatabaseKey]);

          useEffect(() => {
            localStorage.setItem('nta_exam_mode', JSON.stringify(examMode));
          }, [examMode]);

          useEffect(() => {
            localStorage.setItem('nta_focus_mode', JSON.stringify(isFocusMode));
          }, [isFocusMode]);

          // --- HIGH PRECISION MONOTONIC CLOCK ---
          useEffect(() => {
            if (!examMode || isExamSubmitted) return;

            let startTime = localStorage.getItem('nta_exam_start_time');
            if (!startTime) {
              startTime = Date.now().toString();
              localStorage.setItem('nta_exam_start_time', startTime);
            }

            const startEpoch = parseInt(startTime, 10);
            const duration = 10800; // 3 hours

            let timerFrame;
            const updateTimer = () => {
              const elapsed = Math.floor((Date.now() - startEpoch) / 1000);
              const remaining = Math.max(0, duration - elapsed);
              setTimeRemaining(remaining);

              if (remaining <= 0) {
                handleExamSubmit();
              } else {
                timerFrame = requestAnimationFrame(updateTimer);
              }
            };

            timerFrame = requestAnimationFrame(updateTimer);
            return () => cancelAnimationFrame(timerFrame);
          }, [examMode, isExamSubmitted]);

          // --- DYNAMIC SEARCH ---
          const filteredAllQuestions = useMemo(() => {
            return currentDatabase.filter(q => {
              const matchesSearch = q.question.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                    q.explanation.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                    (q.thinker && q.thinker.toLowerCase().includes(searchTerm.toLowerCase()));
              return matchesSearch;
            });
          }, [searchTerm, currentDatabase]);

          const activeQuestion = filteredAllQuestions[currentQuestionIndex] || filteredAllQuestions[0];

          useEffect(() => {
            if (activeQuestion) {
              setVisitedQuestions(prev => ({
                ...prev,
                [activeQuestion.id]: true
              }));
            }
          }, [activeQuestion]);

          // --- AI AUDITOR HANDLER ---
          const handleAuditRequest = async () => {
            if (!userDoubt.trim()) return;
            setIsAuditing(true);
            setAuditResponse('');
            try {
              const res = await fetch('http://localhost:8001/api/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  question: activeQuestion.question,
                  options: activeQuestion.options,
                  correct_answer: activeQuestion.answer,
                  user_doubt: userDoubt
                })
              });
              const data = await res.json();
              if (data.status === 'success') {
                setAuditResponse(data.audit_report);
              } else {
                setAuditResponse("Error: " + (data.message || "Failed to audit the question."));
              }
            } catch (err) {
              setAuditResponse("Failed to connect to local brain server. Please make sure the backend 'brain_server.py' is running on port 8001 (run 'python brain_server.py' in a separate terminal)!");
            } finally {
              setIsAuditing(false);
            }
          };

          // --- ENGINE HANDLERS ---
          const handleOptionClick = useCallback((qId, optionIdx) => {
            if (examMode && isExamSubmitted) return;
            if (!examMode && isAnswerChecked[qId]) return;

            setSelectedOptions(prev => ({
              ...prev,
              [qId]: optionIdx
            }));

            if (!examMode) {
              setIsAnswerChecked(prev => ({
                ...prev,
                [qId]: true
              }));
            }
          }, [examMode, isExamSubmitted, isAnswerChecked]);

          const handleClearResponse = useCallback((qId) => {
            if (examMode && isExamSubmitted) return;
            setSelectedOptions(prev => {
              const clone = { ...prev };
              delete clone[qId];
              return clone;
            });
            setIsAnswerChecked(prev => {
              const clone = { ...prev };
              delete clone[qId];
              return clone;
            });
          }, [examMode, isExamSubmitted]);

          const handleClearEntirePaper = useCallback(() => {
            if (window.confirm("Are you sure you want to clear ALL responses and reset the current paper? This cannot be undone.")) {
              setSelectedOptions({});
              setIsAnswerChecked({});
              setFlaggedQuestions([]);
              setBookmarkedQuestions([]);
              setVisitedQuestions({ 1: true });
              setScore(0);
              setCurrentQuestionIndex(0);
              setIsExamSubmitted(false);
              setTimeRemaining(10800);
            }
          }, []);

          const toggleFlag = useCallback((qId) => {
            setFlaggedQuestions(prev => 
              prev.includes(qId) ? prev.filter(id => id !== qId) : [...prev, qId]
            );
          }, []);

          const toggleBookmark = useCallback((qId) => {
            setBookmarkedQuestions(prev => 
              prev.includes(qId) ? prev.filter(id => id !== qId) : [...prev, qId]
            );
          }, []);

          const handleManualJump = useCallback((idx) => {
            if (idx >= 0 && idx < filteredAllQuestions.length) {
              setCurrentQuestionIndex(idx);
            }
          }, [filteredAllQuestions]);

          const handleExamSubmit = useCallback(() => {
            let finalScore = 0;
            filteredAllQuestions.forEach(q => {
              if (selectedOptions[q.id] === q.correctAnswerIndex) {
                finalScore += 1;
              }
            });
            setScore(finalScore);
            setIsExamSubmitted(true);
          }, [filteredAllQuestions, selectedOptions]);

          const handleResetEngine = useCallback((mode) => {
            setExamMode(mode);
            setSelectedOptions({});
            setFlaggedQuestions([]);
            setBookmarkedQuestions([]);
            setIsAnswerChecked({});
            setScore(0);
            setIsExamSubmitted(false);
            setCurrentQuestionIndex(0);
            setVisitedQuestions({ 1: true });
            setActiveTab('quiz');
            localStorage.removeItem('nta_exam_start_time');
            setTimeRemaining(10800);
          }, []);

          // --- ERGONOMIC KEYBOARD NAVIGATOR ---
          useEffect(() => {
            const handleKeyDown = (e) => {
              if (activeTab !== 'quiz') return;
              if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;

              switch (e.key) {
                case 'ArrowLeft':
                  e.preventDefault();
                  handleManualJump(currentQuestionIndex - 1);
                  break;
                case 'ArrowRight':
                  e.preventDefault();
                  handleManualJump(currentQuestionIndex + 1);
                  break;
                case '1':
                case '2':
                case '3':
                case '4':
                  const optIdx = parseInt(e.key, 10) - 1;
                  if (activeQuestion) handleOptionClick(activeQuestion.id, optIdx);
                  break;
                case 'f':
                case 'F':
                  if (activeQuestion) toggleFlag(activeQuestion.id);
                  break;
                case 'b':
                case 'B':
                  if (activeQuestion) toggleBookmark(activeQuestion.id);
                  break;
                case 'c':
                case 'C':
                  if (activeQuestion) handleClearResponse(activeQuestion.id);
                  break;
                case 'Enter':
                case ' ':
                  e.preventDefault();
                  handleManualJump(currentQuestionIndex + 1);
                  break;
                default:
                  break;
              }
            };

            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [currentQuestionIndex, activeQuestion, activeTab, handleManualJump, handleOptionClick, toggleFlag, toggleBookmark, handleClearResponse]);

          // --- TIMING formatter ---
          const formatTime = (secs) => {
            const hrs = Math.floor(secs / 3600);
            const mins = Math.floor((secs % 3600) / 60);
            const s = secs % 60;
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
          };

          // --- COGNITIVE COMPUTED ANALYTICS ---
          const computedAnalytics = useMemo(() => {
            const breakdown = {};
            let totalQuestions = currentDatabase.length;
            let totalAttempted = 0;
            let totalCorrect = 0;

            currentDatabase.forEach(q => {
              if (!breakdown[q.unit]) {
                breakdown[q.unit] = { total: 0, attempted: 0, correct: 0 };
              }
              breakdown[q.unit].total += 1;

              const userAns = selectedOptions[q.id];
              if (userAns !== undefined) {
                totalAttempted += 1;
                breakdown[q.unit].attempted += 1;
                if (userAns === q.correctAnswerIndex) {
                  totalCorrect += 1;
                  breakdown[q.unit].correct += 1;
                }
              }
            });

            const generalAccuracy = totalAttempted > 0 ? Math.round((totalCorrect / totalAttempted) * 100) : 0;

            const weaknessProfiling = Object.entries(breakdown)
              .map(([unit, stats]) => {
                const incorrect = stats.attempted - stats.correct;
                const ratio = stats.attempted > 0 ? (incorrect / stats.attempted) : 0;
                return { unit, incorrect, ratio, ...stats };
              })
              .filter(d => d.incorrect > 0)
              .sort((a, b) => b.ratio - a.ratio || b.incorrect - a.incorrect)
              .slice(0, 3);

            return {
              unitBreakdown: Object.entries(breakdown).map(([unit, stats]) => ({
                unit,

                        )}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              </main>

              {/* --- FOOTER --- */}
              <footer className="bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-850 py-4 text-center text-[8px] text-slate-400 dark:text-slate-500 font-semibold uppercase tracking-widest transition-colors duration-200">
                UGC NET Anthropology Simulated Assessment System • NTA Simulator Sync Version 6.0
              </footer>
            </div>
          );
        }

        // --- SUBCOMPONENT: MASTER QUESTION ROW ---
        function LibraryQuestionRow({ question, idx, isBookmarked, toggleBookmark, isFlagged, toggleFlag }) {
          const [showAnswer, setShowAnswer] = useState(false);

          return (
            <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-850 rounded-2xl p-4.5 space-y-3.5 hover:border-slate-300 dark:hover:border-slate-750 transition-all shadow-sm mb-4 duration-200">
              <div className="flex flex-wrap justify-between items-center gap-2 border-b border-slate-100 dark:border-slate-800 pb-2.5">
                <span className="text-[8px] font-black uppercase text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-950/40 px-2.5 py-0.5 rounded-md border border-indigo-100 dark:border-indigo-900/30">
                  {question.unit.split(':')[0]}
                </span>

                <div className="flex items-center gap-2">
                  <span className="text-[8px] font-bold bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded text-slate-455 dark:text-slate-500">{question.year}</span>
                  
                  <button 
                    onClick={() => toggleFlag(question.id)}
                    className={`p-1 rounded transition-all ${isFlagged ? 'text-purple-500 bg-purple-50 dark:bg-purple-950/40' : 'text-slate-400 hover:text-slate-650'}`}
                  >
                    <FlagIcon filled={isFlagged} />
                  </button>

                  <button 
                    onClick={() => toggleBookmark(question.id)}
                    className={`p-1 rounded transition-all ${isBookmarked ? 'text-amber-500 bg-amber-50 dark:bg-amber-950/40' : 'text-slate-400 hover:text-slate-650'}`}
                  >
                    <BookmarkIcon filled={isBookmarked} />
                  </button>
                </div>
              </div>

              <h3 className="font-bold text-slate-900 dark:text-white text-xs md:text-sm leading-relaxed whitespace-pre-line">
                Q-{question.id}: {question.question}
              </h3>

              <div className="flex flex-wrap gap-3 items-center">
                <button 
                  onClick={() => setShowAnswer(!showAnswer)}
                  className="px-3.5 py-1.5 bg-slate-50 hover:bg-slate-100 dark:bg-slate-850 dark:hover:bg-slate-800 text-slate-650 dark:text-slate-300 hover:text-slate-800 dark:hover:text-white font-bold text-[9px] rounded-lg flex items-center gap-1.5 border border-slate-200 dark:border-slate-800 transition-all"
                >
                  <EyeIcon /> {showAnswer ? 'Hide Solution' : 'View Correct Answer'}
                </button>

                {question.thinker && (
                  <span className="text-[8px] font-extrabold bg-brand-500/10 text-brand-600 dark:text-brand-400 px-2.5 py-1 rounded border border-brand-500/20">
                    {question.thinker}
                  </span>
                )}
              </div>

              {showAnswer && (
                <div className="p-3.5 bg-slate-50 dark:bg-slate-950 rounded-xl border border-slate-150 dark:border-slate-855 space-y-2 text-xs font-medium mt-2 transition-colors duration-200">
                  <p className="text-slate-400 dark:text-slate-555 uppercase font-bold text-[8px]">Correct Option:</p>
                  <p className="text-emerald-600 dark:text-emerald-400 font-bold text-xs">
                    Option {String.fromCharCode(65 + question.correctAnswerIndex)}: {question.options[question.correctAnswerIndex]}
                  </p>
                  <div className="pt-2 border-t border-slate-200 dark:border-slate-855 text-slate-600 dark:text-slate-350 leading-relaxed text-xs">
                    {question.explanation}
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
